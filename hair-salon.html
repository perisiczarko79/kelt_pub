<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KlikHub - Frizerski salon | Online rezervacije</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F172A;
            color: #F1F5F9;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1E293B;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .header {
            background: #8b5a2b;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .mode-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 16px 20px 0;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            background: #334155;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: #F97316;
            color: white;
        }
        .panel {
            padding: 24px;
            display: none;
        }
        .panel.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #475569;
            font-size: 1rem;
            background: #0F172A;
            color: white;
        }
        button {
            background: #F97316;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #FB923C; transform: translateY(-2px); }
        .time-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .time-btn {
            background: #334155;
            color: white;
            width: auto;
            padding: 8px 16px;
            border-radius: 40px;
        }
        .time-btn.free { background: #2E7D32; }
        .time-btn.booked { background: #B91C1C; text-decoration: line-through; cursor: not-allowed; }
        .time-btn.blocked { background: #6B7280; cursor: not-allowed; opacity: 0.6; }
        .time-btn.selected { background: #F97316; color: white; }
        .reservation-card {
            background: #0F172A;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 6px solid #F97316;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 10px;
        }
        .status-pending { background: #F97316; color: #1a2a1f; }
        .status-confirmed { background: #2E7D32; color: white; }
        .status-canceled { background: #666; color: white; }
        .admin-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .admin-actions button {
            width: auto;
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E293B;
            color: #F97316;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .login-box {
            background: #1E293B;
            padding: 30px;
            border-radius: 24px;
            max-width: 300px;
            width: 90%;
            text-align: center;
            border: 1px solid #F97316;
        }
        @media (max-width: 600px) {
            .container { border-radius: 0; }
            .time-btn { padding: 6px 12px; }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>✂️ Frizerski salon</h1>
        <p>Online rezervacije termina</p>
    </div>
    <div class="mode-buttons">
        <button id="clientModeBtn" class="mode-btn active">📅 Rezerviši termin</button>
        <button id="adminModeBtn" class="mode-btn">🔐 Admin panel</button>
    </div>

    <!-- KLIJENT PANEL -->
    <div id="clientPanel" class="panel active">
        <form id="reservationForm">
            <div class="form-group">
                <label>📅 Datum</label>
                <input type="date" id="datePicker" required>
            </div>
            <div class="form-group">
                <label>✂️ Usluga</label>
                <select id="serviceSelect" required>
                    <option value="Muško šišanje">Muško šišanje (30 min)</option>
                    <option value="Žensko šišanje">Žensko šišanje (30 min)</option>
                    <option value="Šišanje + brada">Šišanje + brada (45 min)</option>
                    <option value="Feniranje">Feniranje (30 min)</option>
                </select>
            </div>
            <div class="form-group">
                <label>⏰ Odaberi termin</label>
                <div id="timeSlots" class="time-slots">Učitavanje...</div>
            </div>
            <div class="form-group">
                <label>👤 Ime i prezime</label>
                <input type="text" id="clientName" required placeholder="npr. Marko Marković">
            </div>
            <div class="form-group">
                <label>📞 Broj telefona</label>
                <input type="tel" id="clientPhone" required placeholder="061 123 456">
            </div>
            <button type="submit">✅ Rezerviši termin</button>
        </form>
    </div>

    <!-- ADMIN PANEL - pojednostavljen -->
    <div id="adminPanel" class="panel">
        <div class="form-group">
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button id="blockSlotBtnAdmin" style="background:#6B7280;">🔒 Blokiraj termin</button>
                <button id="changePasswordBtnAdmin" style="background:#555;">🔐 Promijeni šifru</button>
            </div>
        </div>
        <div id="allReservationsList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, get, set, push, update, remove } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let salonId = null;
    function getSalonIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        let id = params.get('salon');
        if (!id) {
            id = prompt('Unesite ID salona (npr. gradski_salon):');
            if (id) window.history.replaceState({}, '', `?salon=${encodeURIComponent(id)}`);
            else throw new Error('Missing salon ID');
        }
        return id;
    }
    try { salonId = getSalonIdFromUrl(); }
    catch(e) { document.body.innerHTML = '<div style="text-align:center;margin-top:50px;">Greška: nedostaje ID salona.</div>'; throw e; }

    const reservationsRef = ref(db, `hairSalons/${salonId}/reservations`);
    const settingsRef = ref(db, `hairSalons/${salonId}/settings`);
    const blockedSlotsRef = ref(db, `hairSalons/${salonId}/blockedSlots`);

    const WORK_START = 9;
    const WORK_END = 20;
    const SLOT_MINUTES = 30;
    function generateTimeSlots() {
        const slots = [];
        for (let hour = WORK_START; hour < WORK_END; hour++) {
            for (let min = 0; min < 60; min += SLOT_MINUTES) {
                slots.push(`${hour.toString().padStart(2,'0')}:${min.toString().padStart(2,'0')}`);
            }
        }
        return slots;
    }
    const ALL_SLOTS = generateTimeSlots();

    let isAdminLoggedIn = false;
    let currentAdminPassword = 'salon123';

    async function loadAdminPassword() {
        const snap = await get(settingsRef);
        if (snap.exists() && snap.val().adminPassword) {
            currentAdminPassword = snap.val().adminPassword;
        } else {
            await set(settingsRef, { adminPassword: currentAdminPassword });
        }
    }
    loadAdminPassword();

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Formatiranje datuma iz YYYY-MM-DD u DD.MM.YYYY
    function formatDate(dateStr) {
        if (!dateStr) return '';
        const [year, month, day] = dateStr.split('-');
        return `${day}.${month}.${year}.`;
    }

    // Brisanje isteklih rezervacija (datum + vrijeme < sada)
    async function deleteExpiredReservations() {
        const now = new Date();
        const snapshot = await get(reservationsRef);
        const all = snapshot.val() || {};
        let deleted = false;
        for (const [id, res] of Object.entries(all)) {
            if (res.status === 'canceled') continue;
            const [year, month, day] = res.date.split('-');
            const [hour, minute] = res.time.split(':');
            const resDateTime = new Date(year, month-1, day, hour, minute);
            if (resDateTime < now) {
                await remove(ref(db, `hairSalons/${salonId}/reservations/${id}`));
                deleted = true;
            }
        }
        if (deleted && isAdminLoggedIn) {
            loadAllReservations();
        }
    }
    setInterval(deleteExpiredReservations, 3600000);
    deleteExpiredReservations();

    // ---------- KLIJENT ----------
    let selectedTime = null;

    async function loadBlockedSlotsForDate(date) {
        const blockedRef = ref(db, `hairSalons/${salonId}/blockedSlots/${date}`);
        const snap = await get(blockedRef);
        if (snap.exists()) return Object.keys(snap.val());
        return [];
    }

    async function loadReservationsForDate(date) {
        const snapshot = await get(reservationsRef);
        const all = snapshot.val() || {};
        const booked = [];
        for (const [id, res] of Object.entries(all)) {
            if (res.date === date && (res.status === 'pending' || res.status === 'confirmed')) {
                booked.push(res.time);
            }
        }
        return booked;
    }

    async function renderTimeSlots() {
        const date = document.getElementById('datePicker').value;
        if (!date) {
            document.getElementById('timeSlots').innerHTML = '<span>Odaberite datum</span>';
            return;
        }
        const booked = await loadReservationsForDate(date);
        const blocked = await loadBlockedSlotsForDate(date);
        const container = document.getElementById('timeSlots');
        container.innerHTML = '';
        ALL_SLOTS.forEach(time => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'time-btn';
            btn.textContent = time;
            if (blocked.includes(time)) {
                btn.classList.add('blocked');
                btn.disabled = true;
            } else if (booked.includes(time)) {
                btn.classList.add('booked');
                btn.disabled = true;
            } else {
                btn.classList.add('free');
                btn.onclick = () => {
                    document.querySelectorAll('.time-btn.selected').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedTime = time;
                };
            }
            container.appendChild(btn);
        });
    }

    document.getElementById('datePicker').addEventListener('change', renderTimeSlots);
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('datePicker').value = today;
    renderTimeSlots();

    document.getElementById('reservationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const date = document.getElementById('datePicker').value;
        const service = document.getElementById('serviceSelect').value;
        const name = document.getElementById('clientName').value.trim();
        const phone = document.getElementById('clientPhone').value.trim();
        if (!selectedTime) { showToast('Odaberite termin.'); return; }
        if (!name || !phone) { showToast('Unesite ime i broj telefona.'); return; }
        const booked = await loadReservationsForDate(date);
        const blocked = await loadBlockedSlotsForDate(date);
        if (booked.includes(selectedTime) || blocked.includes(selectedTime)) {
            showToast('Termin je već rezervisan ili blokiran.');
            renderTimeSlots();
            return;
        }
        const newRef = push(reservationsRef);
        await set(newRef, {
            date, time: selectedTime, service,
            clientName: name, clientPhone: phone,
            status: 'pending', createdAt: Date.now()
        });
        showToast(`Rezervacija poslana! Termin: ${formatDate(date)} u ${selectedTime}.`);
        document.getElementById('reservationForm').reset();
        document.getElementById('datePicker').value = today;
        selectedTime = null;
        renderTimeSlots();
        if (isAdminLoggedIn) loadAllReservations();
    });

    // ---------- ADMIN ----------
    function showAdminLogin() {
        const overlay = document.createElement('div');
        overlay.className = 'login-overlay';
        overlay.innerHTML = `
            <div class="login-box">
                <h3>Admin prijava</h3>
                <input type="password" id="adminPassInput" placeholder="Šifra" style="margin: 15px 0; width:100%;">
                <button id="adminLoginBtn">Prijavi se</button>
                <button id="adminLoginClose" style="background:#aaa; margin-top:8px;">Otkaži</button>
            </div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('adminLoginBtn').onclick = async () => {
            const pass = document.getElementById('adminPassInput').value;
            if (pass === currentAdminPassword) {
                isAdminLoggedIn = true;
                overlay.remove();
                document.getElementById('adminPanel').classList.add('active');
                document.getElementById('clientPanel').classList.remove('active');
                document.getElementById('adminModeBtn').classList.add('active');
                document.getElementById('clientModeBtn').classList.remove('active');
                await loadAllReservations();
            } else {
                alert('Pogrešna šifra');
            }
        };
        document.getElementById('adminLoginClose').onclick = () => overlay.remove();
    }

    async function loadAllReservations() {
        const snapshot = await get(reservationsRef);
        const all = snapshot.val() || {};
        const list = [];
        for (const [id, res] of Object.entries(all)) {
            list.push({ id, ...res });
        }
        // sortiranje: prvo najranije (buduće prve)
        list.sort((a,b) => {
            const dateTimeA = new Date(`${a.date}T${a.time}`);
            const dateTimeB = new Date(`${b.date}T${b.time}`);
            return dateTimeA - dateTimeB;
        });
        const container = document.getElementById('allReservationsList');
        if (list.length === 0) {
            container.innerHTML = '<p>Nema rezervacija.</p>';
            return;
        }
        container.innerHTML = '';
        for (const res of list) {
            const statusClass = res.status === 'pending' ? 'status-pending' : (res.status === 'confirmed' ? 'status-confirmed' : 'status-canceled');
            const statusText = res.status === 'pending' ? 'Na čekanju' : (res.status === 'confirmed' ? 'Potvrđeno' : 'Otkazano');
            const div = document.createElement('div');
            div.className = 'reservation-card';
            div.innerHTML = `
                <div><strong>${formatDate(res.date)} ${res.time}</strong> - ${res.service} <span class="status-badge ${statusClass}">${statusText}</span></div>
                <div>👤 ${escapeHtml(res.clientName)}</div>
                <div>📞 ${escapeHtml(res.clientPhone)}</div>
                <div class="admin-actions">
                    ${res.status !== 'confirmed' ? `<button class="confirm-btn" data-id="${res.id}">✅ Potvrdi</button>` : ''}
                    ${res.status !== 'canceled' ? `<button class="cancel-btn" data-id="${res.id}">❌ Otkaži</button>` : ''}
                    <button class="block-btn" data-id="${res.id}" data-date="${res.date}" data-time="${res.time}" style="background:#6B7280;">🔒 Blokiraj ovaj termin</button>
                </div>
            `;
            container.appendChild(div);
        }
        attachAdminEvents();
    }

    function attachAdminEvents() {
        document.querySelectorAll('.confirm-btn').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                await update(ref(db, `hairSalons/${salonId}/reservations/${id}`), { status: 'confirmed' });
                showToast('Potvrđeno');
                loadAllReservations();
                renderTimeSlots();
            };
        });
        document.querySelectorAll('.cancel-btn').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                await update(ref(db, `hairSalons/${salonId}/reservations/${id}`), { status: 'canceled' });
                showToast('Otkazano');
                loadAllReservations();
                renderTimeSlots();
            };
        });
        document.querySelectorAll('.block-btn').forEach(btn => {
            btn.onclick = async () => {
                const date = btn.getAttribute('data-date');
                const time = btn.getAttribute('data-time');
                if (confirm(`Blokirati termin ${formatDate(date)} u ${time}?`)) {
                    await set(ref(db, `hairSalons/${salonId}/blockedSlots/${date}/${time}`), true);
                    showToast(`Termin ${formatDate(date)} ${time} blokiran.`);
                    loadAllReservations();
                    renderTimeSlots();
                }
            };
        });
    }

    async function showBlockSlotDialog() {
        const date = prompt('Unesite datum za blokiranje (YYYY-MM-DD), npr. 2026-06-15:', today);
        if (!date) return;
        // provjera formata datuma
        if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
            showToast('Pogrešan format datuma. Koristite YYYY-MM-DD');
            return;
        }
        const time = prompt(`Unesite vrijeme (hh:mm), mogući termini: ${ALL_SLOTS.join(', ')}`, '09:00');
        if (!time) return;
        if (!ALL_SLOTS.includes(time)) {
            showToast('Pogrešan termin. Dozvoljeni formati: ' + ALL_SLOTS.join(', '));
            return;
        }
        const booked = await loadReservationsForDate(date);
        const blocked = await loadBlockedSlotsForDate(date);
        if (booked.includes(time)) {
            showToast('Termin je već rezervisan, ne može se blokirati.');
            return;
        }
        if (blocked.includes(time)) {
            showToast('Termin je već blokiran.');
            return;
        }
        await set(ref(db, `hairSalons/${salonId}/blockedSlots/${date}/${time}`), true);
        showToast(`Termin ${formatDate(date)} ${time} blokiran.`);
        if (isAdminLoggedIn) loadAllReservations();
        renderTimeSlots();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    async function changeAdminPassword() {
        const oldPass = prompt('Unesite trenutnu admin šifru:');
        if (!oldPass) return;
        if (oldPass !== currentAdminPassword) { showToast('Pogrešna stara šifra.'); return; }
        const newPass = prompt('Unesite novu admin šifru (minimum 4 znaka):');
        if (newPass && newPass.trim().length >= 4) {
            await update(settingsRef, { adminPassword: newPass.trim() });
            currentAdminPassword = newPass.trim();
            showToast('Šifra promijenjena.');
        } else {
            showToast('Šifra nije promijenjena (mora imati bar 4 znaka).');
        }
    }

    document.getElementById('adminModeBtn').onclick = () => {
        if (!isAdminLoggedIn) showAdminLogin();
        else {
            document.getElementById('adminPanel').classList.add('active');
            document.getElementById('clientPanel').classList.remove('active');
            document.getElementById('adminModeBtn').classList.add('active');
            document.getElementById('clientModeBtn').classList.remove('active');
            loadAllReservations();
        }
    };
    document.getElementById('clientModeBtn').onclick = () => {
        document.getElementById('clientPanel').classList.add('active');
        document.getElementById('adminPanel').classList.remove('active');
        document.getElementById('clientModeBtn').classList.add('active');
        document.getElementById('adminModeBtn').classList.remove('active');
        renderTimeSlots();
    };
    document.getElementById('blockSlotBtnAdmin').onclick = () => {
        if (!isAdminLoggedIn) { showToast('Niste prijavljeni kao admin.'); return; }
        showBlockSlotDialog();
    };
    document.getElementById('changePasswordBtnAdmin').onclick = () => {
        if (!isAdminLoggedIn) { showToast('Niste prijavljeni.'); return; }
        changeAdminPassword();
    };
</script>
</body>
</html>
