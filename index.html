<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KELT PUB - Premium QR Menu</title>
    <style>
        /* CSS Reset & Varijable */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-dark: #0a0e0b;
            --bg-card: rgba(16, 28, 20, 0.65);
            --bg-card-hover: rgba(24, 43, 30, 0.8);
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --gold-dark: #aa7c11;
            --red-accent: #a62626;
            --red-light: #ff4d4d;
            --green-accent: #0f341e;
            --text-cream: #f4ebd0;
            --text-muted: #a8a29e;
            --border-gold: rgba(212, 175, 55, 0.35);
            --font-family: 'Times New Roman', Times, serif;
            --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-cream);
            font-family: var(--font-sans);
            line-height: 1.5;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 50% 20%, rgba(15, 52, 30, 0.4) 0%, rgba(10, 14, 11, 0.95) 80%),
                linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.85));
            z-index: -2;
        }

        .menu-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px 120px 16px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 20px;
        }

        header::after {
            content: "❖";
            color: var(--gold-primary);
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            letter-spacing: 4px;
            opacity: 0.8;
        }

        .pub-logo-container {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 5px auto;
        }

        .pub-logo {
            width: 100%;
            height: auto;
            display: block;
            filter: invert(90%) sepia(30%) saturate(800%) hue-rotate(355deg) brightness(105%) drop-shadow(0 4px 15px rgba(212, 175, 55, 0.35));
        }

        .pub-tagline {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
        }

        /* Fiksna Admin Traka */
        .admin-top-bar {
            background: #cc3333;
            color: white;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .admin-exit-btn {
            background: white;
            color: #cc3333;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 11px;
        }

        /* Personalizaciona Zona */
        .personalization-zone {
            margin-bottom: 25px;
            text-align: center;
        }

        .welcome-msg {
            font-family: var(--font-family);
            font-size: 18px;
            color: var(--gold-primary);
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            background: rgba(15, 52, 30, 0.4);
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed rgba(212, 175, 55, 0.2);
        }

        .name-panel {
            background: rgba(16, 28, 20, 0.85);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(8px);
        }

        .name-panel p { font-size: 12px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .name-input-group { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .name-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px; padding: 8px 16px; color: var(--text-cream); text-align: center; width: 65%; outline: none; }
        .name-submit-btn { background: var(--gold-primary); color: var(--bg-dark); border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 12px; }
        .name-skip-btn { background: transparent; border: none; color: var(--text-muted); font-size: 11px; text-decoration: underline; cursor: pointer; text-transform: uppercase; }

        /* Navigacija */
        .section-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            position: sticky;
            top: 15px;
            z-index: 100;
        }

        .nav-btn {
            background: rgba(10, 14, 11, 0.85);
            border: 1px solid var(--border-gold);
            color: var(--text-cream);
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-align: center;
        }

        .nav-btn span { display: block; font-size: 9px; color: var(--gold-primary); }

        .menu-section { margin-bottom: 48px; scroll-margin-top: 80px; }
        .section-header { text-align: center; margin-bottom: 24px; }
        .section-title-sr { font-family: var(--font-family); font-size: 22px; color: var(--gold-primary); text-transform: uppercase; letter-spacing: 2px; }
        .section-title-en { font-family: var(--font-family); font-size: 14px; color: var(--text-muted); font-style: italic; letter-spacing: 2px; }

        .cards-grid { display: flex; flex-direction: column; gap: 20px; }

        /* Kartice */
        .beer-card {
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 14px;
            padding: 20px;
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Preporuka stil */
        .beer-card.featured-recommendation {
            border: 1.5px solid var(--gold-primary);
            background: rgba(24, 43, 30, 0.75);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .recommendation-badge {
            position: absolute; top: 0; right: 0;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
            color: var(--bg-dark); font-size: 8.5px; font-weight: 800;
            text-transform: uppercase; padding: 4px 12px; border-bottom-left-radius: 10px;
        }

        /* Ponuda dana / Akcija stil */
        .beer-card.featured-promo {
            border: 1.5px solid var(--red-light);
            background: rgba(45, 20, 20, 0.75);
            box-shadow: 0 0 15px rgba(230, 38, 38, 0.25);
        }
        .promo-badge {
            position: absolute; top: 0; right: 0;
            background: linear-gradient(135deg, var(--red-accent), var(--red-light));
            color: white; font-size: 8.5px; font-weight: 800;
            text-transform: uppercase; padding: 4px 12px; border-bottom-left-radius: 10px;
        }
        .old-price { text-decoration: line-through; color: var(--text-muted); font-size: 14px; margin-right: 6px; font-weight: normal; }

        .beer-header { display: flex; justify-content: space-between; align-items: center; }
        .beer-name { font-family: var(--font-family); font-size: 18px; font-weight: 700; }
        .beer-price { font-family: var(--font-family); font-size: 18px; font-weight: 700; color: var(--gold-primary); }

        .beer-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; font-size: 11px; text-transform: uppercase; }
        .beer-type { color: var(--gold-light); background: rgba(212, 175, 55, 0.15); padding: 2px 8px; border-radius: 4px; }
        .beer-origin::before { content: "•"; color: var(--gold-primary); margin-right: 4px; }

        .size-selector { display: inline-flex; background: rgba(10, 14, 11, 0.6); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 2px; margin-bottom: 12px; }
        .size-btn { background: transparent; border: none; color: var(--text-muted); padding: 4px 12px; font-size: 11px; font-weight: 600; border-radius: 16px; cursor: pointer; }
        .size-btn.active { background: var(--gold-primary); color: var(--bg-dark); }

        .beer-description-block { border-left: 2px solid rgba(212, 175, 55, 0.2); padding-left: 10px; margin-top: 8px; }
        .desc-sr { font-size: 12.5px; color: var(--text-cream); }
        .desc-en { font-size: 11.5px; color: var(--text-muted); font-style: italic; }

        /* Admin kontrole */
        .admin-controls { background: rgba(0, 0, 0, 0.6); border-top: 1px solid rgba(255,255,255,0.1); margin-top: 15px; padding-top: 12px; display: flex; flex-direction: column; gap: 10px; }
        .admin-input-group { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .admin-input-group label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); }
        .admin-txt-input { background: #111; border: 1px solid #444; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; width: 80px; text-align: center; }
        .admin-actions-btns { display: flex; gap: 6px; }
        .admin-btn-toggle { flex: 1; background: #222; border: 1px solid #444; color: #ccc; padding: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; border-radius: 4px; cursor: pointer; }
        .admin-btn-toggle.active-rec { background: var(--gold-dark); color: white; border-color: var(--gold-primary); }
        .admin-btn-toggle.active-promo { background: var(--red-accent); color: white; border-color: var(--red-light); }

        .admin-footer-save { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 14, 11, 0.95); border-top: 2px solid var(--gold-primary); padding: 15px; text-align: center; z-index: 9998; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); }
        .save-all-btn { background: linear-gradient(to right, var(--gold-dark), var(--gold-primary)); color: black; font-weight: bold; text-transform: uppercase; border: none; padding: 12px 40px; border-radius: 25px; cursor: pointer; font-size: 13px; }

        footer { text-align: center; margin-top: 60px; padding: 24px 0; border-top: 1px solid rgba(212, 175, 55, 0.15); }
        .footer-motto { font-family: var(--font-family); font-size: 11px; color: var(--gold-primary); letter-spacing: 3px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="adminTopBar" class="admin-top-bar" style="display: none;">
        <span>🔐 KELT PUB - ADMIN MOD AKTIVAN</span>
        <button class="admin-exit-btn" onclick="exitAdminMode()">Završi / Izađi</button>
    </div>

    <div class="menu-container">
        <header>
            <div class="pub-logo-container">
                <img src="logo.png" alt="Kelt Pub Logo" class="pub-logo">
            </div>
            <div class="pub-tagline">Premium Digital Beer Menu</div>
        </header>

        <div id="personalizationZone" class="personalization-zone"></div>

        <div class="section-nav">
            <a href="#toceno" class="nav-btn">Točeno Pivo<span>Draft Beer</span></a>
            <a href="#flasice" class="nav-btn">U Flašici<span>Bottled Beer</span></a>
        </div>

        <section id="toceno" class="menu-section">
            <div class="section-header">
                <h2 class="section-title-sr">1. Točeno Pivo</h2>
                <h3 class="section-title-en
