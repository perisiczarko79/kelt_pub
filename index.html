<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>KELT PUB - Digitalni meni</title>
    <style>
        /* SVI STILOVI OSTAJU ISTI KAO I RANIJE (nije mijenjano) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-dark: #0a0e0b;
            --bg-card: rgba(16, 28, 20, 0.65);
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --red-light: #ff4d4d;
            --text-cream: #f4ebd0;
            --text-muted: #a8a29e;
            --border-gold: rgba(212, 175, 55, 0.35);
            --font-sans: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-cream);
            font-family: var(--font-sans);
            line-height: 1.5;
            margin: 0;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 20%, rgba(15,52,30,0.4) 0%, rgba(10,14,11,0.95) 80%);
            z-index: -2;
        }
        .menu-container { max-width: 600px; margin: 0 auto; padding: 20px 16px 100px; }
        header { text-align: center; margin-bottom: 20px; }
        .pub-logo { max-width: 180px; margin-bottom: 10px; }
        .pub-name { font-size: 28px; font-family: 'Times New Roman', serif; letter-spacing: 2px; color: var(--gold-primary); margin: 8px 0; }
        .category-nav {
            position: sticky;
            top: 0;
            background: rgba(10,14,11,0.95);
            backdrop-filter: blur(12px);
            padding: 10px 0;
            margin-bottom: 20px;
            z-index: 100;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid var(--border-gold);
        }
        .category-nav button {
            display: inline-block;
            margin: 0 4px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border-gold);
            color: var(--text-cream);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .admin-bar {
            background: #cc3333; color: white; position: fixed; top: 0; left: 0;
            width: 100%; display: flex; justify-content: space-between;
            padding: 6px 16px; font-size: 12px; z-index: 9999;
        }
        .admin-bar button { background: white; border: none; color: #cc3333; padding: 2px 12px; border-radius: 4px; cursor: pointer; }
        .admin-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.9); border-top: 2px solid var(--gold-primary);
            padding: 12px; text-align: center; z-index: 9998; display: flex;
            justify-content: center; gap: 12px; flex-wrap: wrap;
        }
        .admin-footer button {
            background: var(--gold-primary); border: none; padding: 8px 16px;
            border-radius: 30px; font-weight: bold; cursor: pointer;
        }
        .category-section { margin-bottom: 40px; scroll-margin-top: 80px; }
        .category-title {
            font-size: 24px; font-family: 'Times New Roman', serif;
            color: var(--gold-primary); border-bottom: 1px solid var(--border-gold);
            margin-bottom: 16px; padding-bottom: 4px;
        }
        .cards-grid { display: flex; flex-direction: column; gap: 16px; }
        .card {
            background: var(--bg-card); border: 1px solid var(--border-gold);
            border-radius: 16px; padding: 16px; backdrop-filter: blur(12px);
            position: relative;
        }
        .card.featured { border-color: var(--gold-primary); background: rgba(24,43,30,0.8); }
        .card.promo { border-color: var(--red-light); background: rgba(45,20,20,0.8); }
        .badge {
            position: absolute; top: 0; right: 0;
            background: var(--gold-primary); color: black; font-size: 10px;
            padding: 2px 10px; border-bottom-left-radius: 12px;
        }
        .badge.promo { background: var(--red-light); color: white; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .item-name { font-size: 18px; font-weight: bold; }
        .sizes { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .size-btn {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border-gold);
            color: var(--text-cream); padding: 4px 12px; border-radius: 20px;
            cursor: pointer; font-size: 12px;
        }
        .size-btn.active { background: var(--gold-primary); color: black; }
        .price-display { font-size: 18px; font-weight: bold; color: var(--gold-primary); }
        .old-price { text-decoration: line-through; font-size: 14px; margin-right: 6px; color: var(--text-muted); }
        .description { font-size: 12px; color: var(--text-muted); margin-top: 8px; border-left: 2px solid var(--border-gold); padding-left: 8px; }
        .admin-controls { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.2); display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-btn { background: #222; border: 1px solid #555; color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .admin-btn.danger { background: #a00; }
        .order-btn, .waiter-btn {
            background: #ffd966;
            color: #1a2a1f;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
            width: 100%;
            transition: all 0.2s;
        }
        .order-btn:hover, .waiter-btn:hover {
            background: #ffe6b3;
            transform: translateY(-2px);
        }
        .waiter-btn {
            background: #cc3333;
            color: white;
            margin-top: 20px;
        }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center;
            justify-content: center; z-index: 10000;
        }
        .modal-content {
            background: #1a1e1a; max-width: 500px; width: 90%; max-height: 80%;
            overflow-y: auto; padding: 20px; border-radius: 16px;
            border: 1px solid var(--gold-primary);
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%; padding: 8px; margin: 8px 0; background: #2a2e2a;
            border: 1px solid #555; color: white; border-radius: 8px;
        }
        .footer-motto { text-align: center; margin-top: 40px; font-size: 12px; color: var(--gold-primary); cursor: pointer; }
        .welcome-msg { text-align: center; margin-bottom: 20px; font-size: 18px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #ffd966; padding: 8px 20px;
            border-radius: 40px; font-size: 14px; z-index: 10001;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        button { cursor: pointer; }
    </style>
</head>
<body>

<div id="adminBar" class="admin-bar" style="display: none;">
    <span>🔐 ADMIN MOD AKTIVAN</span>
    <button id="exitAdminBtn">Izađi</button>
</div>

<div class="menu-container">
    <header>
        <img id="pubLogo" class="pub-logo" src="" alt="Logo" style="display: none;">
        <div id="pubName" class="pub-name">KELT PUB</div>
        <p>Digitalni meni</p>
    </header>
    <div id="personalizationZone"></div>
    <div id="categoryNav" class="category-nav"></div>
    <div id="menuContainer"></div>
    <div class="footer-motto" onclick="handleAdminClick()">❖ ❖ ❖</div>
    <button id="callWaiterBtn" class="waiter-btn" style="display: none;">📞 Pozovi konobara</button>
</div>

<div id="adminFooter" class="admin-footer" style="display: none;">
    <button id="addCategoryBtn">➕ Nova kategorija</button>
    <button id="addItemBtn">➕ Dodaj artikal</button>
    <button id="manageCategoriesBtn">📂 Uredi kategorije</button>
    <button id="customizeBtn">🎨 Prilagodi izgled</button>
    <button id="changePasswordBtn">🔐 Promijeni šifru</button>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, onValue, push, set, remove, update, get, child } from 'firebase/database';

    // 🔥 VAŠ FIREBASE CONFIG (ISTI KAO RANIJE)
    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app",
        messagingSenderId: "1026702086011",
        appId: "1:1026702086011:web:8162de6bad4f18b731b7de",
        measurementId: "G-3095YK50QM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ----- Multi-tenant logika (cafeId iz URL) -----
    let cafeId = null;
    function getCafeIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        let id = params.get('cafe');
        if (!id) {
            id = prompt('Unesite ID kafića (npr. gradski_pub):');
            if (id) {
                const newUrl = `${window.location.origin}${window.location.pathname}?cafe=${encodeURIComponent(id)}`;
                window.history.replaceState({}, '', newUrl);
            } else {
                throw new Error('Missing cafe ID');
            }
        }
        return id;
    }

    try {
        cafeId = getCafeIdFromUrl();
    } catch(e) {
        document.body.innerHTML = '<div style="text-align:center;margin-top:50px;">Greška: nedostaje ID kafića. Molimo kontaktirajte administratora.</div>';
        throw e;
    }

    const categoriesRef = ref(db, `${cafeId}/categories`);
    const itemsRef = ref(db, `${cafeId}/menuItems`);
    const settingsRef = ref(db, `${cafeId}/settings`);
    const ordersRef = ref(db, `${cafeId}/orders/pending`);

    let categories = [];
    let items = [];
    let settings = { primaryColor: '#d4af37', backgroundColor: '#0a0e0b', pubName: 'KELT PUB', logoBase64: '', adminPassword: 'kelt2026' };
    let isAdminMode = false;
    let adminClickCount = 0;
    let guestName = null;
    let activeOrderListeners = {}; // za pracenje statusa narudzbi

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => (m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'));
    }

    function showToast(msg, duration = 3000) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    // ---------- POSTAVKE ----------
    function loadSettings() {
        onValue(settingsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) settings = { ...settings, ...data };
            else set(settingsRef, settings);
            applySettings();
        });
    }

    function applySettings() {
        document.documentElement.style.setProperty('--bg-dark', settings.backgroundColor);
        document.documentElement.style.setProperty('--gold-primary', settings.primaryColor);
        document.documentElement.style.setProperty('--border-gold', `${settings.primaryColor}59`);
        document.getElementById('pubName').textContent = settings.pubName;
        document.title = `${settings.pubName} - Digitalni meni`;
        const logoImg = document.getElementById('pubLogo');
        if (settings.logoBase64 && settings.logoBase64 !== '') {
            logoImg.src = settings.logoBase64;
            logoImg.style.display = 'block';
        } else logoImg.style.display = 'none';
    }

    async function initDefaultCategories() {
        const snapshot = await get(categoriesRef);
        if (!snapshot.exists()) {
            const defaultCats = ["Piva", "Vina", "Sokovi", "Topli napici", "Žestoka alkoholna pića", "Rakije"];
            for (let i = 0; i < defaultCats.length; i++) {
                const newCatRef = push(categoriesRef);
                await set(newCatRef, { name: defaultCats[i], order: i });
            }
        }
    }

    function loadData() {
        onValue(categoriesRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                categories = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                categories.sort((a,b) => (a.order || 0) - (b.order || 0));
            } else categories = [];
            renderNav();
            renderMenu();
        });
        onValue(itemsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                items = Object.entries(data).map(([id, val]) => ({ id, ...val }));
            } else items = [];
            renderMenu();
        });
    }

    function renderNav() {
        const navDiv = document.getElementById('categoryNav');
        navDiv.innerHTML = '';
        for (let cat of categories) {
            const btn = document.createElement('button');
            btn.textContent = cat.name;
            btn.onclick = () => {
                const section = document.getElementById(`cat-${cat.id}`);
                if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };
            navDiv.appendChild(btn);
        }
    }

    // ---------- NARUČIVANJE ----------
    async function sendOrder(item, selectedSize, price, guestNameVal) {
        if (!guestNameVal) {
            showToast('Morate unijeti svoje ime da biste naručili.');
            return false;
        }
        const orderData = {
            guestName: guestNameVal,
            type: 'order',
            itemName: item.name,
            size: selectedSize ? selectedSize.name : null,
            price: price,
            timestamp: Date.now(),
            status: 'pending'
        };
        try {
            const newOrderRef = push(ordersRef);
            await set(newOrderRef, orderData);
            const orderId = newOrderRef.key;
            // Slušaj status ove narudžbe
            const orderStatusRef = ref(db, `${cafeId}/orders/pending/${orderId}/status`);
            const unsubscribe = onValue(orderStatusRef, (snapshot) => {
                const status = snapshot.val();
                if (status === 'accepted') {
                    showToast(`✅ Konobar je primio vašu narudžbu (${item.name}). Hvala!`);
                    unsubscribe(); // prestani slušati
                    // ukloni listener iz mape
                    delete activeOrderListeners[orderId];
                }
            });
            activeOrderListeners[orderId] = unsubscribe;
            showToast('Narudžba poslana. Čekamo potvrdu konobara...');
            return true;
        } catch(e) {
            console.error(e);
            showToast('Greška pri slanju narudžbe.');
            return false;
        }
    }

    async function callWaiter(guestNameVal) {
        if (!guestNameVal) {
            showToast('Morate unijeti svoje ime da biste pozvali konobara.');
            return;
        }
        const orderData = {
            guestName: guestNameVal,
            type: 'waiter',
            timestamp: Date.now(),
            status: 'pending'
        };
        try {
            const newOrderRef = push(ordersRef);
            await set(newOrderRef, orderData);
            const orderId = newOrderRef.key;
            const orderStatusRef = ref(db, `${cafeId}/orders/pending/${orderId}/status`);
            const unsubscribe = onValue(orderStatusRef, (snapshot) => {
                const status = snapshot.val();
                if (status === 'accepted') {
                    showToast(`✅ Konobar je primio vaš poziv. Dolazi uskoro!`);
                    unsubscribe();
                    delete activeOrderListeners[orderId];
                }
            });
            activeOrderListeners[orderId] = unsubscribe;
            showToast('Poziv poslan. Čekamo konobara...');
        } catch(e) {
            console.error(e);
            showToast('Greška pri slanju poziva.');
        }
    }

    // ---------- RENDER MENIJA SA DUGMADIMA ZA NARUDŽBU ----------
    function renderMenu() {
        const container = document.getElementById('menuContainer');
        container.innerHTML = '';
        const isGuestLoggedIn = !!guestName;
        const callWaiterBtn = document.getElementById('callWaiterBtn');
        if (isGuestLoggedIn && !isAdminMode) {
            callWaiterBtn.style.display = 'block';
        } else {
            callWaiterBtn.style.display = 'none';
        }

        for (let cat of categories) {
            const catItems = items.filter(item => item.categoryId === cat.id);
            if (catItems.length === 0 && !isAdminMode) continue;
            const section = document.createElement('div');
            section.className = 'category-section';
            section.id = `cat-${cat.id}`;
            section.innerHTML = `<h2 class="category-title">${escapeHtml(cat.name)}</h2><div class="cards-grid"></div>`;
            const grid = section.querySelector('.cards-grid');
            catItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                if (item.featured) card.classList.add('featured');
                if (item.promo) card.classList.add('promo');
                let badgeHtml = '';
                if (item.featured) badgeHtml = '<div class="badge">⭐ Preporuka</div>';
                else if (item.promo) badgeHtml = '<div class="badge promo">🔥 Akcija</div>';
                
                let sizesHtml = '';
                let priceHtml = '';
                let activeSize = null;
                const hasSizes = item.sizes && item.sizes.length > 0;
                if (hasSizes) {
                    sizesHtml = '<div class="sizes">';
                    item.sizes.forEach((size, idx) => {
                        sizesHtml += `<button class="size-btn ${idx === 0 ? 'active' : ''}" data-item-id="${item.id}" data-size-index="${idx}">${escapeHtml(size.name)}</button>`;
                    });
                    sizesHtml += '</div>';
                    const firstSize = item.sizes[0];
                    activeSize = firstSize;
                    if (item.promo && item.promoPrice && item.promoPrice !== "") {
                        priceHtml = `<span class="old-price">${firstSize.price} KM</span> <span style="color:var(--red-light);">${item.promoPrice} KM</span>`;
                    } else {
                        priceHtml = `${firstSize.price} KM`;
                    }
                } else {
                    const singlePrice = item.singlePrice || "0.00";
                    if (item.promo && item.promoPrice && item.promoPrice !== "") {
                        priceHtml = `<span class="old-price">${singlePrice} KM</span> <span style="color:var(--red-light);">${item.promoPrice} KM</span>`;
                    } else {
                        priceHtml = `${singlePrice} KM`;
                    }
                }
                let orderButtonHtml = '';
                if (!isAdminMode && isGuestLoggedIn) {
                    orderButtonHtml = `<button class="order-btn" data-item-id="${item.id}">🍺 Naruči</button>`;
                }
                let adminBtns = '';
                if (isAdminMode) {
                    adminBtns = `
                        <div class="admin-controls">
                            <button class="admin-btn" onclick="window.editItem('${item.id}')">✏️ Uredi</button>
                            <button class="admin-btn danger" onclick="window.deleteItem('${item.id}')">🗑️ Obriši</button>
                            <button class="admin-btn" onclick="window.toggleFeatured('${item.id}')">${item.featured ? '⭐ Ukloni preporuku' : '⭐ Preporuka'}</button>
                            <button class="admin-btn" onclick="window.togglePromo('${item.id}')">${item.promo ? '🔥 Ukloni akciju' : '🔥 Akcija'}</button>
                        </div>
                    `;
                }
                card.innerHTML = `
                    ${badgeHtml}
                    <div class="card-header">
                        <div class="item-name">${escapeHtml(item.name)}</div>
                        <div class="price-display" id="price-${item.id}">${priceHtml}</div>
                    </div>
                    ${sizesHtml}
                    <div class="description">${escapeHtml(item.description || '')}</div>
                    ${orderButtonHtml}
                    ${adminBtns}
                `;
                grid.appendChild(card);
            });
            container.appendChild(section);
        }
        // Attach size button events
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.removeEventListener('click', sizeHandler);
            btn.addEventListener('click', sizeHandler);
        });
        // Attach order button events
        if (!isAdminMode && isGuestLoggedIn) {
            document.querySelectorAll('.order-btn').forEach(btn => {
                btn.removeEventListener('click', orderHandler);
                btn.addEventListener('click', orderHandler);
            });
        }
    }

    function sizeHandler(e) {
        const btn = e.currentTarget;
        const itemId = btn.getAttribute('data-item-id');
        const sizeIndex = parseInt(btn.getAttribute('data-size-index'));
        const item = items.find(i => i.id === itemId);
        if (!item || !item.sizes || !item.sizes[sizeIndex]) return;
        const parent = btn.parentElement;
        parent.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const priceDiv = document.getElementById(`price-${itemId}`);
        const selectedSize = item.sizes[sizeIndex];
        if (item.promo && item.promoPrice && item.promoPrice !== "") {
            priceDiv.innerHTML = `<span class="old-price">${selectedSize.price} KM</span> <span style="color:var(--red-light);">${item.promoPrice} KM</span>`;
        } else {
            priceDiv.innerHTML = `${selectedSize.price} KM`;
        }
    }

    async function orderHandler(e) {
        const btn = e.currentTarget;
        const itemId = btn.getAttribute('data-item-id');
        const item = items.find(i => i.id === itemId);
        if (!item) return;
        let selectedSize = null;
        let price = null;
        if (item.sizes && item.sizes.length > 0) {
            const sizeSelector = btn.closest('.card').querySelector('.sizes');
            const activeSizeBtn = sizeSelector.querySelector('.size-btn.active');
            if (activeSizeBtn) {
                const idx = parseInt(activeSizeBtn.getAttribute('data-size-index'));
                selectedSize = item.sizes[idx];
                price = selectedSize.price;
            } else {
                selectedSize = item.sizes[0];
                price = selectedSize.price;
            }
            if (item.promo && item.promoPrice && item.promoPrice !== "") price = item.promoPrice;
        } else {
            price = item.singlePrice;
        }
        await sendOrder(item, selectedSize, price, guestName);
    }

    // ---------- ADMIN FUNKCIJE (IDEM KAO RANIJE) ----------
    window.deleteItem = async function(id) { /* ... */ };
    window.toggleFeatured = async function(id) { /* ... */ };
    window.togglePromo = async function(id) { /* ... */ };
    window.editItem = function(id) { /* ... */ };
    // Zbog dužine, pretpostavljam da postoje u originalnom kodu. Ovde ih nisam ponovo pisao, ali u finalnom fajlu moraju biti.
    // (U produkciji će se koristiti iste funkcije kao u prethodnoj verziji index.html)

    // ---------- PERSONALIZACIJA ----------
    function initPersonalization() {
        const zone = document.getElementById('personalizationZone');
        const savedName = localStorage.getItem(`pub_guest_name_${cafeId}`);
        if (savedName) {
            guestName = savedName;
            zone.innerHTML = `<div class="welcome-msg">🍻 ${escapeHtml(guestName)}, dobrodošli! <button id="changeNameBtn" class="change-name-btn">Promijeni ime</button></div>`;
            document.getElementById('changeNameBtn').onclick = () => resetName();
            renderMenu();
        } else {
            zone.innerHTML = `
                <div class="welcome-msg">
                    Unesite svoje ime: 
                    <input type="text" id="guestNameInput" placeholder="Vaše ime" maxlength="20" style="background:#333; border:1px solid gold; color:white; padding:4px 8px; border-radius:20px;">
                    <button id="saveNameBtn" style="background:gold; border:none; padding:4px 12px; border-radius:20px;">Sačuvaj</button>
                    <button id="skipNameBtn" style="background:transparent; border:1px solid gold; color:gold; padding:4px 12px; border-radius:20px;">Preskoči</button>
                </div>
            `;
            document.getElementById('saveNameBtn').onclick = () => {
                const name = document.getElementById('guestNameInput').value.trim();
                if (name) {
                    guestName = name;
                    localStorage.setItem(`pub_guest_name_${cafeId}`, name);
                    zone.innerHTML = `<div class="welcome-msg">🍻 ${escapeHtml(guestName)}, dobrodošli! <button id="changeNameBtn" class="change-name-btn">Promijeni ime</button></div>`;
                    document.getElementById('changeNameBtn').onclick = () => resetName();
                    renderMenu();
                } else {
                    zone.style.display = 'none';
                }
            };
            document.getElementById('skipNameBtn').onclick = () => zone.style.display = 'none';
        }
    }

    function resetName() {
        localStorage.removeItem(`pub_guest_name_${cafeId}`);
        guestName = null;
        const zone = document.getElementById('personalizationZone');
        zone.innerHTML = '';
        initPersonalization();
        renderMenu();
    }

    // ---------- ADMIN MOD (ISTI KAO RANIJE) ----------
    async function handleAdminClick() { /* ... */ }
    function enterAdminMode() { /* ... */ }
    function exitAdminMode() { /* ... */ }
    window.handleAdminClick = handleAdminClick;
    window.exitAdminMode = exitAdminMode;

    document.getElementById('callWaiterBtn').onclick = () => callWaiter(guestName);
    document.getElementById('exitAdminBtn').onclick = () => exitAdminMode();
    // Ostali event listeneri za admin dugmad (isti kao prije)

    (async () => {
        await initDefaultCategories();
        loadSettings();
        loadData();
        initPersonalization();
    })();
</script>
</body>
</html>
