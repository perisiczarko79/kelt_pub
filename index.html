<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelt Pub - Meni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Ubuntu', sans-serif; background-color: #0b130e; }
        .beer-card { background: linear-gradient(145deg, #111d16, #0d1712); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); border: 1px solid rgba(255, 255, 255, 0.03); }
        .gold-glow { text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body class="text-gray-200 min-h-screen pb-24">

    <header class="relative overflow-hidden bg-gradient-to-b from-[#070c09] to-[#0b130e] text-center py-10 px-4 border-b border-[#1b3324]">
        <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#1e3f2b_1px,transparent_1px)] [background-size:16px_16px]"></div>
        <h1 class="text-4xl font-bold tracking-wider text-[#d4af37] gold-glow mb-2 uppercase">Kelt Pub</h1>
        <p class="text-xs text-emerald-500 tracking-widest uppercase font-medium bg-[#112217] inline-block px-3 py-1 rounded-full border border-emerald-900/50 mb-4">✨ Živjeli / Cheers ✨</p>
        <p class="text-sm text-gray-400 max-w-xs mx-auto">Dobrodošli! Izaberite omiljeno piće sa našeg šanka. Cijene su izražene u KM.</p>
    </header>

    <main class="max-w-md mx-auto px-4 mt-8">
        <h2 class="text-xl font-bold text-emerald-400 mb-6 flex items-center gap-2 uppercase tracking-wide">
            <i class="fas fa-beer"></i> Ponuda Piva / Beer List
        </h2>
        
        <div id="beer-container" class="space-y-4">
            <div id="loading-status" class="text-center py-8 text-gray-500">
                <i class="fas fa-spinner fa-spin mr-2"></i> Povezivanje sa šankom uživo...
            </div>
        </div>
    </main>

    <footer class="text-center py-8 mt-12 border-t border-emerald-950/30">
        <p id="admin-trigger" class="text-xs text-gray-600 cursor-pointer select-none">© 2026 Kelt Pub Meni • Sva prava zadržana</p>
    </footer>

    <div id="login-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-[#111d16] border border-emerald-900 rounded-2xl w-full max-w-xs p-6 shadow-2xl">
            <h3 class="text-lg font-bold text-center text-[#d4af37] mb-4"><i class="fas fa-lock mr-2"></i> Admin Prijava</h3>
            <input type="password" id="admin-password" placeholder="Unesite šifru..." class="w-full bg-[#0b130e] border border-emerald-950 rounded-xl px-4 py-3 text-center text-white font-mono tracking-widest focus:outline-none focus:border-emerald-500 mb-4">
            <div class="flex gap-2">
                <button onclick="closeModal('login-modal')" class="w-1/2 bg-gray-800 hover:bg-gray-700 py-2.5 rounded-xl text-sm font-medium transition">Odustani</button>
                <button onclick="checkPassword()" class="w-1/2 bg-emerald-600 hover:bg-emerald-500 py-2.5 rounded-xl text-sm font-bold text-white transition">Prijavi se</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden overflow-y-auto p-4 z-50">
        <div class="bg-[#111d16] border border-emerald-800 rounded-3xl w-full max-w-md mx-auto my-4 p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-emerald-950 pb-4">
                <h3 class="text-xl font-bold text-[#d4af37]"><i class="fas fa-sliders-h mr-2"></i> Upravljanje Menijem</h3>
                <button onclick="closeModal('admin-modal')" class="text-gray-400 hover:text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            
            <div id="admin-form" class="space-y-6 mb-8"></div>
            
            <button onclick="saveAllToFirebase()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 py-4 rounded-xl font-bold text-white shadow-lg border border-emerald-400/20 flex items-center justify-center gap-2">
                <i class="fas fa-save"></i> Sačuvaj sve izmjene uživo 💾
            </button>
        </div>
    </div>

    <script>
        // SADA JE DODAT TAČAN databaseURL LINK KOJI JE FALIO SA SLIKE!
        var firebaseConfig = {
            apiKey: "AIzaSyCdG9mn0iWoFLHtCGpm1RMnxcbYwLhX-0M",
            authDomain: "kelt-pub-menu.firebaseapp.com",
            databaseURL: "https://kelt-pub-menu-default-rtdb.firebaseio.com/",
            projectId: "kelt-pub-menu",
            storageBucket: "kelt-pub-menu.firebasestorage.app",
            messagingSenderId: "167715196126",
            appId: "1:167715196126:web:e38fba79c6a99252329243"
        };

        var currentMenuData = {};
        var db, menuRef;

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.database();
            menuRef = db.ref('menu');

            var defaultMenu = {
                "madri": { id: "madri", name: "Madrí Excepcional", volume: "0.5l", price: 3.00, promoPrice: "", isPromo: false, recommended: false },
                "stella": { id: "stella", name: "Stella Artois", volume: "0.33l", price: 2.40, promoPrice: "", isPromo: false, recommended: true },
                "niksicko": { id: "niksicko", name: "Nikšićko Svijetlo", volume: "0.5l", price: 2.50, promoPrice: "", isPromo: false, recommended: false },
                "jelen": { id: "jelen", name: "Jelen Pivo", volume: "0.5l", price: 2.30, promoPrice: "", isPromo: false, recommended: false }
            };

            menuRef.on('value', function(snapshot) {
                var data = snapshot.val();
                if (data) {
                    currentMenuData = data;
                    renderMenu(data);
                    generateAdminForm(data);
                } else {
                    menuRef.set(defaultMenu);
                }
            }, function(error) {
                document.getElementById('loading-status').innerHTML = 
                    `<div class="text-rose-500 p-4 border border-rose-950 rounded-xl bg-rose-950/20 text-xs">
                        <i class="fas fa-exclamation-triangle block text-lg mb-2"></i>
                        <strong>Baza odbija pristup!</strong><br>Provjeri 'Rules' tab na Firebase-u.
                    </div>`;
            });

        } catch (e) {
            console.error(e);
        }

        function renderMenu(menu) {
            var container = document.getElementById('beer-container');
            container.innerHTML = '';

            Object.keys(menu).forEach(function(key) {
                var beer = menu[key];
                var hasPromo = beer.isPromo && beer.promoPrice;
                var priceDisplay = hasPromo 
                    ? '<span class="line-through text-gray-500 text-sm mr-2">' + parseFloat(beer.price).toFixed(2) + '</span><span class="text-rose-500 font-bold">' + parseFloat(beer.promoPrice).toFixed(2) + ' KM</span>'
                    : '<span class="text-[#d4af37] font-bold">' + parseFloat(beer.price).toFixed(2) + ' KM</span>';

                var card = document.createElement('div');
                card.className = 'beer-card relative p-5 rounded-2xl flex justify-between items-center transition-all duration-300 ' + (beer.isPromo ? 'border border-rose-900/50' : '');
                
                card.innerHTML = 
                    (beer.isPromo ? '<span class="absolute -top-2.5 left-4 bg-rose-600 text-white text-[10px] font-bold uppercase tracking-widest px-2.5 py-0.5 rounded-md shadow-md flex items-center gap-1"><i class="fas fa-fire text-[9px]"></i> Ponuda Dana</span>' : '') +
                    '<div class="flex items-center gap-4">' +
                        '<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-950 to-emerald-900 flex items-center justify-center border border-emerald-800/30 text-[#d4af37]">' +
                            '<i class="fas fa-beer text-lg"></i>' +
                        '</div>' +
                        '<div>' +
                            '<div class="flex items-center gap-2">' +
                                '<h3 class="font-bold text-white tracking-wide">' + beer.name + '</h3>' +
                                (beer.recommended && !beer.isPromo ? '<span class="text-[10px] bg-emerald-900/80 text-emerald-400 font-medium px-1.5 py-0.5 rounded border border-emerald-800/30">Preporuka</span>' : '') +
                            '</div>' +
                            '<p class="text-xs text-gray-400 mt-0.5">' + beer.volume + '</p>' +
                        '</div>' +
                    '</div>' +
                    '<div class="text-right">' + priceDisplay + '</div>';
                
                container.appendChild(card);
            });
        }

        function generateAdminForm(menu) {
            var form = document.getElementById('admin-form');
            if (document.getElementById('admin-modal').style.display === 'block') return; 
            
            form.innerHTML = '';
            Object.keys(menu).forEach(function(key) {
                var beer = menu[key];
                var block = document.createElement('div');
                block.className = "bg-[#0b130e] border border-emerald-950 p-4 rounded-2xl space-y-3";
                block.innerHTML = 
                    '<h4 class="font-bold text-white border-b border-emerald-950 pb-1 text-sm text-emerald-400">' + beer.name + '</h4>' +
                    '<div class="grid grid-cols-2 gap-3">' +
                        '<div>' +
                            '<label class="block text-[11px] text-gray-400 mb-1">Standardna (KM):</label>' +
                            '<input type="number" step="0.10" id="price-' + beer.id + '" value="' + beer.price + '" class="w-full bg-[#111d16] border border-emerald-950 rounded-xl px-3 py-2 text-white font-medium text-sm focus:outline-none">' +
                        '</div>' +
                        '<div>' +
                            '<label class="block text-[11px] text-gray-400 mb-1">Promotivna (KM):</label>' +
                            '<input type="number" step="0.10" id="promo-' + beer.id + '" value="' + (beer.promoPrice || '') + '" placeholder="Akcija" class="w-full bg-[#111d16] border border-emerald-950 rounded-xl px-3 py-2 text-white font-medium text-sm focus:outline-none">' +
                        '</div>' +
                    '</div>' +
                    '<div class="flex gap-2 pt-1">' +
                        '<button type="button" onclick="toggleAdminPromo(\'' + beer.id + '\')" class="w-1/2 py-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1 ' + (beer.isPromo ? 'bg-rose-600 text-white' : 'bg-gray-800 text-gray-400') + '">' +
                            '<i class="fas fa-fire"></i> Ponuda Dana' +
                        </button>
                        <button type="button" onclick="toggleAdminRec(\'' + beer.id + '\')" class="w-1/2 py-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1 ' + (beer.recommended ? 'bg-emerald-600 text-white' : 'bg-gray-800 text-gray-400') + '">' +
                            '<i class="fas fa-thumbs-up"></i> Preporuka' +
                        </button>
                    </div>';
                form.appendChild(block);
            });
        }

        function toggleAdminPromo(id) {
            Object.keys(currentMenuData).forEach(function(key) {
                if (key === id) {
                    currentMenuData[key].isPromo = !currentMenuData[key].isPromo;
                } else {
                    currentMenuData[key].isPromo = false; 
                }
            });
            var openState = document.getElementById('admin-modal').style.display;
            document.getElementById('admin-modal').style.display = 'none'; 
            generateAdminForm(currentMenuData);
            document.getElementById('admin-modal').style.display = openState; 
        }

        function toggleAdminRec(id) {
            currentMenuData[id].recommended = !currentMenuData[id].recommended;
            var openState = document.getElementById('admin-modal').style.display;
            document.getElementById('admin-modal').style.display = 'none';
            generateAdminForm(currentMenuData);
            document.getElementById('admin-modal').style.display = openState;
        }

        function saveAllToFirebase() {
            Object.keys(currentMenuData).forEach(function(id) {
                var priceInput = document.getElementById('price-' + id);
                var promoInput = document.getElementById('promo-' + id);
                
                if (priceInput) currentMenuData[id].price = parseFloat(priceInput.value) || 0;
                if (promoInput) currentMenuData[id].promoPrice = promoInput.value ? parseFloat(promoInput.value) : "";
            });

            menuRef.set(currentMenuData)
                .then(function() {
                    alert("Uspješno sačuvano uživo na Firebase! 🍻");
                    closeModal('admin-modal');
                })
                .catch(function(error) {
                    alert("Greška prilikom čuvanja: " + error.message);
                });
        }

        var tapCount = 0;
        var tapTimer;

        document.getElementById('admin-trigger').addEventListener('click', function() {
            tapCount++;
            clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { tapCount = 0; }, 2000);

            if (tapCount === 5) {
                tapCount = 0;
                document.getElementById('login-modal').style.display = 'flex';
                document.getElementById('admin-password').focus();
            }
        });

        function checkPassword() {
            var pass = document.getElementById('admin-password').value;
            if (pass === 'kelt2026') {
                closeModal('login-modal');
                document.getElementById('admin-password').value = '';
                document.getElementById('admin-form').innerHTML = ''; 
                generateAdminForm(currentMenuData);
                document.getElementById('admin-modal').style.display = 'block';
            } else {
                alert('Pogrešna šifra!');
                document.getElementById('admin-password').value = '';
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
    </script>
</body>
</html>
