<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>KELT PUB - Digitalni meni</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-dark: #0a0e0b;
            --bg-card: rgba(16, 28, 20, 0.65);
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --red-light: #ff4d4d;
            --text-cream: #f4ebd0;
            --text-muted: #a8a29e;
            --border-gold: rgba(212, 175, 55, 0.35);
            --font-sans: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-cream);
            font-family: var(--font-sans);
            line-height: 1.5;
            margin: 0;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 20%, rgba(15,52,30,0.4) 0%, rgba(10,14,11,0.95) 80%);
            z-index: -2;
        }
        .menu-container { max-width: 600px; margin: 0 auto; padding: 20px 16px 100px; }
        header { text-align: center; margin-bottom: 20px; }
        .pub-logo { max-width: 180px; margin-bottom: 10px; }
        .admin-bar {
            background: #cc3333; color: white; position: fixed; top: 0; left: 0;
            width: 100%; display: flex; justify-content: space-between;
            padding: 6px 16px; font-size: 12px; z-index: 9999;
        }
        .admin-bar button { background: white; border: none; color: #cc3333; padding: 2px 12px; border-radius: 4px; cursor: pointer; }
        .admin-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.9); border-top: 2px solid var(--gold-primary);
            padding: 12px; text-align: center; z-index: 9998; display: flex;
            justify-content: center; gap: 12px; flex-wrap: wrap;
        }
        .admin-footer button {
            background: var(--gold-primary); border: none; padding: 8px 16px;
            border-radius: 30px; font-weight: bold; cursor: pointer;
        }
        .category-section { margin-bottom: 40px; }
        .category-title {
            font-size: 24px; font-family: 'Times New Roman', serif;
            color: var(--gold-primary); border-bottom: 1px solid var(--border-gold);
            margin-bottom: 16px; padding-bottom: 4px;
        }
        .cards-grid { display: flex; flex-direction: column; gap: 16px; }
        .card {
            background: var(--bg-card); border: 1px solid var(--border-gold);
            border-radius: 16px; padding: 16px; backdrop-filter: blur(12px);
            position: relative;
        }
        .card.featured { border-color: var(--gold-primary); background: rgba(24,43,30,0.8); }
        .card.promo { border-color: var(--red-light); background: rgba(45,20,20,0.8); }
        .badge {
            position: absolute; top: 0; right: 0;
            background: var(--gold-primary); color: black; font-size: 10px;
            padding: 2px 10px; border-bottom-left-radius: 12px;
        }
        .badge.promo { background: var(--red-light); color: white; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .item-name { font-size: 18px; font-weight: bold; }
        .sizes { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .size-btn {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border-gold);
            color: var(--text-cream); padding: 4px 12px; border-radius: 20px;
            cursor: pointer; font-size: 12px;
        }
        .size-btn.active { background: var(--gold-primary); color: black; }
        .price-display { font-size: 18px; font-weight: bold; color: var(--gold-primary); }
        .old-price { text-decoration: line-through; font-size: 14px; margin-right: 6px; color: var(--text-muted); }
        .description { font-size: 12px; color: var(--text-muted); margin-top: 8px; border-left: 2px solid var(--border-gold); padding-left: 8px; }
        .admin-controls { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.2); display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-btn { background: #222; border: 1px solid #555; color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .admin-btn.danger { background: #a00; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center;
            justify-content: center; z-index: 10000;
        }
        .modal-content {
            background: #1a1e1a; max-width: 500px; width: 90%; max-height: 80%;
            overflow-y: auto; padding: 20px; border-radius: 16px;
            border: 1px solid var(--gold-primary);
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%; padding: 8px; margin: 8px 0; background: #2a2e2a;
            border: 1px solid #555; color: white; border-radius: 8px;
        }
        .size-group { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .footer-motto { text-align: center; margin-top: 40px; font-size: 12px; color: var(--gold-primary); cursor: pointer; }
        .welcome-msg { text-align: center; margin-bottom: 20px; font-size: 18px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 30px; }
        button { cursor: pointer; }
    </style>
</head>
<body>

<div id="adminBar" class="admin-bar" style="display: none;">
    <span>🔐 ADMIN MOD AKTIVAN</span>
    <button id="exitAdminBtn">Izađi</button>
</div>

<div class="menu-container">
    <header>
        <img src="logo.png" alt="Kelt Pub" class="pub-logo" onerror="this.style.display='none'">
        <h1>KELT PUB</h1>
        <p>Digitalni meni</p>
    </header>
    <div id="personalizationZone"></div>
    <div id="menuContainer"></div>
    <div class="footer-motto" onclick="handleAdminClick()">❖ ❖ ❖</div>
</div>

<div id="adminFooter" class="admin-footer" style="display: none;">
    <button id="addCategoryBtn">➕ Nova kategorija</button>
    <button id="addItemBtn">➕ Dodaj artikal</button>
    <button id="manageCategoriesBtn">📂 Uredi kategorije</button>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, onValue, push, set, remove, update, get, child } from 'firebase/database';

    // 🔥 ZAMIJENI SA SVOJIM FIREBASE CONFIGOM 🔥
    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app",
        messagingSenderId: "1026702086011",
        appId: "1:1026702086011:web:8162de6bad4f18b731b7de"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const categoriesRef = ref(db, 'categories');
    const itemsRef = ref(db, 'menuItems');

    // Globalne varijable
    let categories = [];      // { id, name, order }
    let items = [];           // { id, categoryId, name, description, sizes, singlePrice, featured, promo, promoPrice }
    let isAdminMode = false;
    let adminClickCount = 0;

    // Helper
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Inicijalizacija podataka ako su prazni
    async function initDefaultData() {
        const catSnapshot = await get(categoriesRef);
        const itemsSnapshot = await get(itemsRef);
        if (!catSnapshot.exists()) {
            // Kreiraj default kategorije
            const defaultCats = [
                "Piva", "Vina", "Sokovi", "Topli napici", "Žestoka alkoholna pića", "Rakije"
            ];
            for (let i = 0; i < defaultCats.length; i++) {
                const newCatRef = push(categoriesRef);
                await set(newCatRef, { name: defaultCats[i], order: i });
            }
            console.log("✅ Kreirane default kategorije");
        }
        if (!itemsSnapshot.exists()) {
            // Kreiraj nekoliko primjera pića
            const pivaCat = await findCategoryIdByName("Piva");
            if (pivaCat) {
                const sampleItems = [
                    { name: "Nikšićko Tamno", description: "Bogato tamno pivo", sizes: [{ name: "0.33l", price: "2.40" }, { name: "0.5l", price: "4.00" }], singlePrice: null },
                    { name: "Madri Excepcional", description: "Svetli lager", sizes: [{ name: "0.3l", price: "3.00" }, { name: "0.5l", price: "5.00" }], singlePrice: null },
                    { name: "Stella Artois", description: "Belgijski premium lager", sizes: [{ name: "0.25l", price: "2.40" }, { name: "0.5l", price: "4.80" }], singlePrice: null }
                ];
                for (const s of sampleItems) {
                    await push(itemsRef, { ...s, categoryId: pivaCat, featured: false, promo: false, promoPrice: "" });
                }
            }
            console.log("✅ Kreirani primjeri pića");
        }
    }

    async function findCategoryIdByName(name) {
        const snapshot = await get(categoriesRef);
        const cats = snapshot.val();
        if (cats) {
            for (const [id, val] of Object.entries(cats)) {
                if (val.name === name) return id;
            }
        }
        return null;
    }

    // Učitavanje podataka
    function loadData() {
        onValue(categoriesRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                categories = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                categories.sort((a,b) => (a.order || 0) - (b.order || 0));
            } else {
                categories = [];
            }
            renderMenu();
        });
        onValue(itemsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                items = Object.entries(data).map(([id, val]) => ({ id, ...val }));
            } else {
                items = [];
            }
            renderMenu();
        });
    }

    function renderMenu() {
        const container = document.getElementById('menuContainer');
        if (!container) return;
        container.innerHTML = '';
        for (let cat of categories) {
            const catItems = items.filter(item => item.categoryId === cat.id);
            if (catItems.length === 0 && !isAdminMode) continue;
            const section = document.createElement('div');
            section.className = 'category-section';
            section.innerHTML = `<h2 class="category-title">${escapeHtml(cat.name)}</h2><div class="cards-grid"></div>`;
            const grid = section.querySelector('.cards-grid');
            catItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                if (item.featured) card.classList.add('featured');
                if (item.promo) card.classList.add('promo');
                let badgeHtml = '';
                if (item.featured) badgeHtml = '<div class="badge">⭐ Preporuka</div>';
                else if (item.promo) badgeHtml = '<div class="badge promo">🔥 Akcija</div>';
                
                // Odredi da li ima veličine ili jednu cijenu
                let sizesHtml = '';
                let priceHtml = '';
                let hasSizes = item.sizes && item.sizes.length > 0;
                if (hasSizes) {
                    sizesHtml = '<div class="sizes">';
                    item.sizes.forEach((size, idx) => {
                        sizesHtml += `<button class="size-btn ${idx === 0 ? 'active' : ''}" data-item-id="${item.id}" data-size-index="${idx}">${escapeHtml(size.name)}</button>`;
                    });
                    sizesHtml += '</div>';
                    const firstSize = item.sizes[0];
                    if (item.promo && item.promoPrice && item.promoPrice !== "") {
                        priceHtml = `<span class="old-price">${firstSize.price} KM</span> <span style="color:var(--red-light);">${item.promoPrice} KM</span>`;
                    } else {
                        priceHtml = `${firstSize.price} KM`;
                    }
                } else {
                    // jedna cijena (singlePrice)
                    const singlePrice = item.singlePrice || "0.00";
                    if (item.promo && item.promoPrice && item.promoPrice !== "") {
                        priceHtml = `<span class="old-price">${singlePrice} KM</span> <span style="color:var(--red-light);">${item.promoPrice} KM</span>`;
                    } else {
                        priceHtml = `${singlePrice} KM`;
                    }
                }
                
                let adminBtns = '';
                if (isAdminMode) {
                    adminBtns = `
                        <div class="admin-controls">
                            <button class="admin-btn" onclick="window.editItem('${item.id}')">✏️ Uredi</button>
                            <button class="admin-btn danger" onclick="window.deleteItem('${item.id}')">🗑️ Obriši</button>
                            <button class="admin-btn" onclick="window.toggleFeatured('${item.id}')">${item.featured ? '⭐ Ukloni preporuku' : '⭐ Preporuka'}</button>
                            <button class="admin-btn" onclick="window.togglePromo('${item.id}')">${item.promo ? '🔥 Ukloni akciju' : '🔥 Akcija'}</button>
                        </div>
                    `;
                }
                card.innerHTML = `
                    ${badgeHtml}
                    <div class="card-header">
                        <div class="item-name">${escapeHtml(item.name)}</div>
                        <div class="price-display" id="price-${item.id}">${priceHtml}</div>
                    </div>
                    ${sizesHtml}
                    <div class="description">${escapeHtml(item.description || '')}</div>
                    ${adminBtns}
                `;
                grid.appendChild(card);
            });
            container.appendChild(section);
        }
        // Attach event handlers for size buttons
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.removeEventListener('click', sizeHandler);
            btn.addEventListener('click', sizeHandler);
        });
    }

    function sizeHandler(e) {
        const btn = e.currentTarget;
        const itemId = btn.getAttribute('data-item-id');
        const sizeIndex = parseInt(btn.getAttribute('data-size-index'));
        const item = items.find(i => i.id === itemId);
        if (!item || !item.sizes || !item.sizes[sizeIndex]) return;
        const parent = btn.parentElement;
        parent.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const priceDiv = document.getElementById(`price-${itemId}`);
        const selectedSize = item.sizes[sizeIndex];
        if (item.promo && item.promoPrice && item.promoPrice !== "") {
            priceDiv.innerHTML = `<span class="old-price">${selectedSize.price} KM</span> <span style="color:var(--red-light);">${item.promoPrice} KM</span>`;
        } else {
            priceDiv.innerHTML = `${selectedSize.price} KM`;
        }
    }

    // ---- ADMIN FUNKCIJE (globalne) ----
    window.deleteItem = async function(id) {
        if (confirm("Obrisati stavku?")) {
            await remove(ref(db, `menuItems/${id}`));
        }
    };
    window.toggleFeatured = async function(id) {
        const item = items.find(i => i.id === id);
        if (item) {
            await update(ref(db, `menuItems/${id}`), { featured: !item.featured, promo: false });
        }
    };
    window.togglePromo = async function(id) {
        const item = items.find(i => i.id === id);
        if (item) {
            let promoPrice = "";
            if (!item.promo) {
                promoPrice = prompt("Unesite promotivnu cijenu (npr. 2.50):", "");
                if (promoPrice === null) return;
            }
            await update(ref(db, `menuItems/${id}`), { promo: !item.promo, featured: false, promoPrice: promoPrice });
        }
    };
    window.editItem = function(id) {
        const item = items.find(i => i.id === id);
        if (item) showItemModal(item);
    };

    // Modal za kategorije (jednostavan)
    async function showCategoryManager() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Upravljanje kategorijama</h3>
                <div id="catList"></div>
                <div style="margin-top:16px;">
                    <button id="newCatBtn">+ Nova kategorija</button>
                    <button id="closeCatBtn">Zatvori</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        function refreshCatList() {
            const listDiv = modal.querySelector('#catList');
            listDiv.innerHTML = '';
            for (let cat of categories) {
                const div = document.createElement('div');
                div.style.display = 'flex';
                div.style.justifyContent = 'space-between';
                div.style.marginBottom = '8px';
                div.style.alignItems = 'center';
                div.innerHTML = `
                    <span>${escapeHtml(cat.name)}</span>
                    <div>
                        <button class="editCatBtn" data-id="${cat.id}">✏️</button>
                        <button class="deleteCatBtn" data-id="${cat.id}">🗑️</button>
                    </div>
                `;
                listDiv.appendChild(div);
            }
            document.querySelectorAll('.editCatBtn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.getAttribute('data-id');
                    const newName = prompt("Novi naziv kategorije:", categories.find(c => c.id === id)?.name);
                    if (newName && newName.trim()) {
                        await update(ref(db, `categories/${id}`), { name: newName.trim() });
                    }
                };
            });
            document.querySelectorAll('.deleteCatBtn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.getAttribute('data-id');
                    const hasItems = items.some(i => i.categoryId === id);
                    if (hasItems) {
                        alert("Ne možete obrisati kategoriju koja sadrži artikle.");
                        return;
                    }
                    if (confirm("Obrisati kategoriju?")) {
                        await remove(ref(db, `categories/${id}`));
                    }
                };
            });
        }
        refreshCatList();
        modal.querySelector('#newCatBtn').onclick = async () => {
            const name = prompt("Naziv nove kategorije:");
            if (name && name.trim()) {
                const newRef = push(categoriesRef);
                const order = categories.length;
                await set(newRef, { name: name.trim(), order });
            }
        };
        modal.querySelector('#closeCatBtn').onclick = () => modal.remove();
    }

    // Modal za artikal (dodavanje/uređivanje)
    let currentEditId = null;
    function showItemModal(item = null) {
        currentEditId = item ? item.id : null;
        const modal = document.createElement('div');
        modal.className = 'modal';
        // Forma
        let catOptions = categories.map(c => `<option value="${c.id}" ${item && item.categoryId === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');
        let hasSizes = item ? (item.sizes && item.sizes.length > 0) : true;
        let sizesHtml = '';
        if (hasSizes) {
            const sizesArray = item && item.sizes ? item.sizes : [{ name: "0.33l", price: "0.00" }];
            sizesHtml = `<div id="sizesList">`;
            sizesArray.forEach((size, idx) => {
                sizesHtml += `
                    <div class="size-group" data-idx="${idx}">
                        <input type="text" placeholder="Naziv (npr. 0.5l)" value="${escapeHtml(size.name)}" class="size-name">
                        <input type="text" placeholder="Cijena (KM)" value="${escapeHtml(size.price)}" class="size-price">
                        <button type="button" class="remove-size" data-idx="${idx}">🗑️</button>
                    </div>
                `;
            });
            sizesHtml += '</div><button type="button" id="addSizeBtn">+ Dodaj veličinu</button>';
        } else {
            sizesHtml = `<div><label>Jedna cijena (KM):</label><input type="text" id="singlePrice" value="${item && item.singlePrice ? escapeHtml(item.singlePrice) : '0.00'}"></div>`;
        }
        modal.innerHTML = `
            <div class="modal-content">
                <h3>${item ? 'Uredi artikal' : 'Dodaj artikal'}</h3>
                <label>Kategorija:</label>
                <select id="modalCategory">${catOptions}</select>
                <label>Naziv:</label>
                <input type="text" id="modalName" value="${item ? escapeHtml(item.name) : ''}">
                <label>Opis:</label>
                <textarea id="modalDesc">${item ? escapeHtml(item.description || '') : ''}</textarea>
                <label><input type="checkbox" id="hasSizesCheck" ${hasSizes ? 'checked' : ''}> Ima više veličina (inace jedna cijena)</label>
                <div id="sizesContainer">${sizesHtml}</div>
                <div style="margin-top:16px;">
                    <button id="saveModalBtn">Sačuvaj</button>
                    <button id="closeModalBtn">Odustani</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const hasSizesCheck = modal.querySelector('#hasSizesCheck');
        const sizesContainer = modal.querySelector('#sizesContainer');
        function toggleSizes() {
            if (hasSizesCheck.checked) {
                sizesContainer.innerHTML = `<div id="sizesList"><div class="size-group" data-idx="0"><input type="text" placeholder="Naziv" class="size-name" value="0.33l"><input type="text" placeholder="Cijena" class="size-price" value="0.00"><button type="button" class="remove-size" data-idx="0">🗑️</button></div></div><button type="button" id="addSizeBtn">+ Dodaj veličinu</button>`;
                attachSizeEvents();
            } else {
                sizesContainer.innerHTML = `<div><label>Jedna cijena (KM):</label><input type="text" id="singlePrice" value="0.00"></div>`;
            }
        }
        function attachSizeEvents() {
            const addBtn = modal.querySelector('#addSizeBtn');
            if (addBtn) addBtn.onclick = () => {
                const list = modal.querySelector('#sizesList');
                const idx = list.children.length;
                const div = document.createElement('div');
                div.className = 'size-group';
                div.setAttribute('data-idx', idx);
                div.innerHTML = `<input type="text" placeholder="Naziv" class="size-name" value="0.33l"><input type="text" placeholder="Cijena" class="size-price" value="0.00"><button type="button" class="remove-size" data-idx="${idx}">🗑️</button>`;
                list.appendChild(div);
                div.querySelector('.remove-size').onclick = () => div.remove();
            };
            modal.querySelectorAll('.remove-size').forEach(btn => {
                btn.onclick = (e) => {
                    const group = btn.closest('.size-group');
                    if (modal.querySelectorAll('.size-group').length > 1) group.remove();
                    else alert("Mora ostati barem jedna veličina");
                };
            });
        }
        hasSizesCheck.onchange = toggleSizes;
        if (hasSizes) attachSizeEvents();
        modal.querySelector('#closeModalBtn').onclick = () => modal.remove();
        modal.querySelector('#saveModalBtn').onclick = async () => {
            const categoryId = modal.querySelector('#modalCategory').value;
            const name = modal.querySelector('#modalName').value.trim();
            const description = modal.querySelector('#modalDesc').value.trim();
            if (!name) { alert("Naziv je obavezan"); return; }
            let sizes = null;
            let singlePrice = null;
            if (hasSizesCheck.checked) {
                const sizeGroups = modal.querySelectorAll('.size-group');
                sizes = [];
                for (let g of sizeGroups) {
                    const sName = g.querySelector('.size-name').value.trim();
                    const sPrice = g.querySelector('.size-price').value.trim().replace(',', '.');
                    if (sName && sPrice && !isNaN(parseFloat(sPrice))) {
                        sizes.push({ name: sName, price: sPrice });
                    }
                }
                if (sizes.length === 0) { alert("Dodajte barem jednu veličinu"); return; }
            } else {
                const sp = modal.querySelector('#singlePrice').value.trim().replace(',', '.');
                if (!sp || isNaN(parseFloat(sp))) { alert("Unesite ispravnu cijenu"); return; }
                singlePrice = sp;
            }
            const data = {
                categoryId, name, description,
                sizes: sizes,
                singlePrice: singlePrice,
                featured: item ? item.featured : false,
                promo: item ? item.promo : false,
                promoPrice: item ? (item.promoPrice || "") : ""
            };
            if (currentEditId) {
                await update(ref(db, `menuItems/${currentEditId}`), data);
            } else {
                await push(itemsRef, data);
            }
            modal.remove();
        };
    }

    // Admin mod ulaz/izlaz
    function handleAdminClick() {
        adminClickCount++;
        if (adminClickCount >= 5) {
            adminClickCount = 0;
            let pass = prompt("Unesite administratorsku šifru:");
            if (pass === "kelt2026") enterAdminMode();
            else alert("Pogrešna šifra!");
        }
    }
    function enterAdminMode() {
        isAdminMode = true;
        document.getElementById('adminBar').style.display = 'flex';
        document.getElementById('adminFooter').style.display = 'flex';
        document.body.classList.add('admin-mode');
        renderMenu();
    }
    function exitAdminMode() {
        isAdminMode = false;
        document.getElementById('adminBar').style.display = 'none';
        document.getElementById('adminFooter').style.display = 'none';
        document.body.classList.remove('admin-mode');
        renderMenu();
    }

    // Personalizacija
    function initPersonalization() {
        const zone = document.getElementById('personalizationZone');
        const savedName = localStorage.getItem('kelt_guest_name');
        if (savedName) {
            zone.innerHTML = `<div class="welcome-msg">🍻 ${escapeHtml(savedName)}, dobrodošli! Pregledajte naš meni.</div>`;
        } else {
            zone.innerHTML = `
                <div class="welcome-msg">
                    Unesite svoje ime: 
                    <input type="text" id="guestNameInput" placeholder="Vaše ime" maxlength="20" style="background:#333; border:1px solid gold; color:white; padding:4px 8px; border-radius:20px;">
                    <button id="saveNameBtn" style="background:gold; border:none; padding:4px 12px; border-radius:20px;">Sačuvaj</button>
                    <button id="skipNameBtn" style="background:transparent; border:1px solid gold; color:gold; padding:4px 12px; border-radius:20px;">Preskoči</button>
                </div>
            `;
            document.getElementById('saveNameBtn').onclick = () => {
                const name = document.getElementById('guestNameInput').value.trim();
                if (name) {
                    localStorage.setItem('kelt_guest_name', name);
                    zone.innerHTML = `<div class="welcome-msg">🍻 ${escapeHtml(name)}, dobrodošli!</div>`;
                } else zone.style.display = 'none';
            };
            document.getElementById('skipNameBtn').onclick = () => zone.style.display = 'none';
        }
    }

    // Inicijalizacija
    window.handleAdminClick = handleAdminClick;
    window.exitAdminMode = exitAdminMode;
    window.editItem = window.editItem;
    window.deleteItem = window.deleteItem;
    window.toggleFeatured = window.toggleFeatured;
    window.togglePromo = window.togglePromo;

    document.getElementById('exitAdminBtn').onclick = () => exitAdminMode();
    document.getElementById('addItemBtn').onclick = () => showItemModal(null);
    document.getElementById('addCategoryBtn').onclick = () => showCategoryManager();
    document.getElementById('manageCategoriesBtn').onclick = () => showCategoryManager();

    // Pokreni
    (async () => {
        await initDefaultData();
        loadData();
        initPersonalization();
    })();
</script>
</body>
</html>
