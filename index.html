    // ============================================================
    // IZMJENA: "Moje nagrade" - samo za članove. Umjesto nesigurnog
    // self-service "Iskoristi" koji je samo lokalno brisao nagradu,
    // dugme sad dodaje nagradu u KORPU (isPrize:true, cijena 0). Nagrada
    // se u bazi označi kao iskorišćena tek kad se narudžba stvarno pošalje
    // (vidi #sendOrderBtn), preko transakcije da se spriječi dvostruko
    // korištenje iste nagrade.
    // ============================================================
    async function showMyPrizes() {
        const userId = sessionStorage.getItem('userId');
        const isLoggedIn = userId && userId !== 'guest';
        if (!isLoggedIn) {
            showToast('🎁 Registrujte se da imate nagrade.');
            return;
        }

        const snap = await get(ref(db, `cafes/${cafeId}/users/${userId}/prizes`));
        const data = snap.val() || {};
        const prizes = Object.entries(data)
            .filter(([, p]) => !p.used)
            .map(([id, p]) => ({ id, ...p }))
            .sort((a, b) => (b.wonAt || 0) - (a.wonAt || 0));

        // IZMJENA: učitaj sve admin-definisane nagrade koje imaju cijenu u bodovima,
        // i svježe stanje bodova gosta (direktno iz baze, ne iz sessionStorage keša).
        const allPrizesSnap = await get(ref(db, `cafes/${cafeId}/settings/greba/prizes`));
        const allPrizes = allPrizesSnap.val() || [];
        const purchasablePrizes = allPrizes
            .map((p, idx) => ({ ...p, prizeIndex: idx }))
            .filter(p => p.pointCost && p.pointCost > 0);

        const pointsSnap = await get(ref(db, `cafes/${cafeId}/users/${userId}/loyaltyPoints`));
        const currentPoints = pointsSnap.val() || 0;

        // IZMJENA: cijena jednog grebanja bodovima (0 ili nedefinisano = isključeno)
        const grebaCost = await getGrebaPointCost();

        if (prizes.length === 0 && purchasablePrizes.length === 0 && grebaCost === 0) {
            showToast('🎁 Trenutno nemate sačuvanih nagrada niti nagrada za zamjenu.');
            return;
        }

        let wonHtml = prizes.map(p => {
            const label = p.type === 'discount' ? `${p.percentage}% popusta` : (p.label || p.itemName || 'Nagrada');
            return `
            <div class="cart-item" style="display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #FFD700;">
                <div>
                    <span style="font-size: 1.5rem;">${p.icon || '🎁'}</span>
                    <span style="font-weight: bold;">${escapeHtml(label)}</span>
                </div>
                <button class="btn btn-success add-prize-to-cart-btn" data-id="${p.id}" style="padding: 4px 12px; font-size: 0.8rem;">
                    🎁 Iskoristi
                </button>
            </div>
        `;
        }).join('');
        if (!wonHtml) wonHtml = '<p style="color: var(--text-secondary); font-size: 0.85rem;">Nemate osvojenih nagrada sa grebe.</p>';

        // IZMJENA: nova sekcija - zamjena bodova za nagrade koje admin označi kao kupovljive bodovima
        let shopHtml = purchasablePrizes.map(p => {
            const label = p.type === 'discount' ? `${p.percentage}% popusta` : (p.label || p.itemName || 'Nagrada');
            const canAfford = currentPoints >= p.pointCost;
            return `
            <div class="cart-item" style="display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #8B5CF6;">
                <div>
                    <span style="font-size: 1.5rem;">${p.icon || '🎁'}</span>
                    <span style="font-weight: bold;">${escapeHtml(label)}</span>
                    <span style="color: #FFD700; font-size: 0.8rem; display: block;">🛍️ ${p.pointCost} bodova</span>
                </div>
                <button class="btn ${canAfford ? 'btn-primary' : 'btn-secondary'} redeem-points-btn" data-idx="${p.prizeIndex}" style="padding: 4px 12px; font-size: 0.8rem;" ${canAfford ? '' : 'disabled'}>
                    Zamijeni
                </button>
            </div>
        `;
        }).join('');
        if (!shopHtml) shopHtml = '<p style="color: var(--text-secondary); font-size: 0.85rem;">Trenutno nema nagrada za zamjenu bodovima.</p>';

        // IZMJENA: dugme za kupovinu grebe bodovima (samo ako je admin postavio cijenu > 0)
        let grebaPlayHtml = '';
        if (grebaCost > 0) {
            const canAffordGreba = currentPoints >= grebaCost;
            grebaPlayHtml = `
                <hr style="margin: 16px 0;">
                <div class="cart-item" style="display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #FFD700;">
                    <div>
                        <span style="font-size: 1.5rem;">🎰</span>
                        <span style="font-weight: bold;">Zaigraj grebu</span>
                        <span style="color: #FFD700; font-size: 0.8rem; display: block;">🛍️ ${grebaCost} bodova</span>
                    </div>
                    <button class="btn ${canAffordGreba ? 'btn-primary' : 'btn-secondary'}" id="playGrebaBtn" style="padding: 4px 12px; font-size: 0.8rem;" ${canAffordGreba ? '' : 'disabled'}>
                        Zaigraj
                    </button>
                </div>
            `;
        }

        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content" style="max-width: 450px;">
                <h3><i class="fas fa-gift" style="color: #FFD700;"></i> Moje nagrade</h3>
                ${wonHtml}
                <hr style="margin: 16px 0;">
                <h4 style="margin-bottom: 10px;">🛍️ Zamijeni bodove <span style="color: #FFD700; font-weight: normal; font-size: 0.85rem;">(imate: ${currentPoints} bodova)</span></h4>
                ${shopHtml}
                ${grebaPlayHtml}
                <div style="margin-top: 16px; text-align: center;">
                    <button class="btn btn-secondary" id="closeMyPrizesBtn">Zatvori</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#closeMyPrizesBtn').onclick = () => modal.remove();

        modal.querySelector('#playGrebaBtn')?.addEventListener('click', async () => {
            const btn = modal.querySelector('#playGrebaBtn');
            if (btn.disabled) return;
            btn.disabled = true;
            modal.remove();
            await playGrebaWithPoints(grebaCost);
        });

        // IZMJENA: zamjena bodova zaštićena transakcijom - sprječava da se isti bodovi
        // potroše dvaput (npr. dva otvorena taba istovremeno kliknu "Zamijeni").
        modal.querySelectorAll('.redeem-points-btn').forEach(btn => {
            btn.onclick = async () => {
                if (btn.disabled) return;
                const idx = parseInt(btn.dataset.idx);
                const prizeDef = purchasablePrizes.find(p => p.prizeIndex === idx);
                if (!prizeDef) return;
                btn.disabled = true;

                const pointsRef = ref(db, `cafes/${cafeId}/users/${userId}/loyaltyPoints`);
                let result;
                let errorMessage = null;
                try {
                    // IZMJENA: isti pristup kao kod grebe - uvijek oduzmi, provjeri nakon
                    // transakcije da li je otišlo u minus (izbjegava lažno "nedovoljno bodova"
                    // zbog zastarjele vrijednosti koju transakcija ponekad vidi na prvi pokušaj).
                    result = await runTransaction(pointsRef, (current) => {
                        const have = (typeof current === 'number') ? current : 0;
                        return have - prizeDef.pointCost;
                    });
                } catch(err) {
                    errorMessage = err.message;
                    result = { committed: false };
                }

                if (result && result.committed && result.snapshot.val() >= 0) {
                    await savePrizeToAccount(userId, prizeDef);
                    const newPoints = result.snapshot.val();
                    sessionStorage.setItem('userPoints', newPoints);
                    updateUserUI();
                    showToast(`✅ Nagrada zamijenjena za ${prizeDef.pointCost} bodova!`);
                    modal.remove();
                    showMyPrizes();
                } else if (result && result.committed && result.snapshot.val() < 0) {
                    try { await update(ref(db, `cafes/${cafeId}/users/${userId}`), { loyaltyPoints: increment(prizeDef.pointCost) }); } catch(e) {}
                    showToast('❌ Nemate dovoljno bodova.');
                    btn.disabled = false;
                } else if (errorMessage) {
                    console.error('Greška pri zamjeni bodova:', errorMessage);
                    showToast('❌ Greška: ' + errorMessage);
                    btn.disabled = false;
                } else {
                    showToast('❌ Nemate dovoljno bodova.');
                    btn.disabled = false;
                }
            };
        });

        modal.querySelectorAll('.add-prize-to-cart-btn').forEach(btn => {
            btn.onclick = () => {
                const prizeId = btn.dataset.id;
                const prize = prizes.find(p => p.id === prizeId);
                if (!prize) return;
                const label = prize.type === 'discount' ? `${prize.percentage}% popusta` : (prize.label || prize.itemName || 'Nagrada');
                cart.push({
                    id: Date.now() + Math.random(),
                    itemName: `🎁 ${label}`,
                    size: null,
                    price: 0,
                    note: '',
                    isPrize: true,
                    prizeId: prizeId
                });
                saveCartToStorage();
                updateCartUI();
                showToast(`${label} dodano u korpu.`, 1500);
                modal.remove();
            };
        });
    }

    // KORPA
    function renderCartModal() {
        const modalDiv=document.createElement('div'); modalDiv.className='cart-modal';
        let itemsHtml='', total=0;
        cart.forEach((ci,idx)=>{
            total+=ci.price;
            // IZMJENA: nagradna stavka prikazuje poklon ikonicu umjesto cijene
            const priceDisplay = ci.isPrize ? '<span style="color:#FFD700; font-weight:700;">🎁 Besplatno</span>' : `${ci.price} KM`;
            itemsHtml+=`<div class="cart-item"><button class="remove-item" data-idx="${idx}">🗑️</button><div class="cart-item-name">${escapeHtml(ci.itemName)}</div><div>${ci.size||''}</div><div class="cart-item-price">${priceDisplay}</div><div class="cart-item-note"><input type="text" placeholder="Napomena" value="${escapeHtml(ci.note)}" data-idx="${idx}" class="item-note-input"></div></div>`;
        });
        modalDiv.innerHTML=`<div class="cart-content"><button class="close-cart">✖</button><h3>Vaša korpa</h3>${itemsHtml||'<p>Prazna</p>'}<div class="cart-total">Ukupno: ${total.toFixed(2)} KM</div><div class="general-note"><textarea id="generalNoteCart" placeholder="Opća napomena">${escapeHtml(generalNote)}</textarea></div><button id="clearCartBtn" style="background:#DC2626; margin-bottom:8px;">🗑️ Isprazni korpu</button><button id="sendOrderBtn" class="send-order-btn">📦 Pošalji narudžbu</button></div>`;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('.close-cart').onclick=()=>modalDiv.remove();
        modalDiv.querySelectorAll('.remove-item').forEach(btn=>btn.onclick=()=>{cart.splice(parseInt(btn.dataset.idx),1); saveCartToStorage(); updateCartUI(); renderCartModal();});
        modalDiv.querySelectorAll('.item-note-input').forEach(inp=>inp.onchange=e=>{cart[parseInt(inp.dataset.idx)].note=e.target.value; saveCartToStorage();});
        modalDiv.querySelector('#generalNoteCart').onchange=e=>{generalNote=e.target.value; saveCartToStorage();};
        modalDiv.querySelector('#clearCartBtn').onclick=()=>{clearCart(); renderCartModal();};
        
        modalDiv.querySelector('#sendOrderBtn').onclick = async (e) => {
            if (!cart.length) return;
            const btn = e.currentTarget;
            if (btn.disabled) return;
            btn.disabled = true;

            const userId = sessionStorage.getItem('userId');
            const isLoggedIn = userId && userId !== 'guest';

            // ============================================================
            // IZMJENA: prije slanja, "potroši" svaku nagradnu stavku preko
            // Firebase transakcije - garantuje da se ista nagrada ne može
            // iskoristiti dvaput (npr. dva otvorena taba).
            // ============================================================
            let finalCartItems = [];
            for (const ci of cart) {
                if (ci.isPrize && ci.prizeId) {
                    if (!isLoggedIn) { continue; }
                    const usedRef = ref(db, `cafes/${cafeId}/users/${userId}/prizes/${ci.prizeId}/used`);
                    let result;
                    try {
                        result = await runTransaction(usedRef, (currentUsed) => {
                            if (currentUsed === true) return; // abort - već iskorišćena
                            return true;
                        });
                    } catch(err) {
                        result = { committed: false };
                    }
                    if (result && result.committed) {
                        finalCartItems.push(ci);
                    } else {
                        showToast(`⚠️ Nagrada "${ci.itemName}" je već iskorišćena i uklonjena je iz narudžbe.`);
                    }
                } else {
                    finalCartItems.push(ci);
                }
            }

            if (finalCartItems.length === 0) {
                showToast('Korpa je prazna nakon uklanjanja iskorišćenih nagrada.');
                btn.disabled = false;
                return;
            }
            
            const total = finalCartItems.reduce((sum, ci) => sum + ci.price, 0);
            
            const orderData = {
                sessionId, 
                guestName: isLoggedIn ? sessionStorage.getItem('username') : guestName,
                tableNumber,
                timestamp: Date.now(), 
                status: 'pending', 
                generalNote,
                isMember: isLoggedIn,
                items: finalCartItems.map(ci => ({ 
                    itemName: ci.itemName, 
                    size: ci.size, 
                    price: ci.price, 
                    note: ci.note,
                    isPrize: ci.isPrize || false
                }))
            };
            
            try {
                const newRef = push(ordersRef);
                await set(newRef, orderData);
                startOrderListener(newRef.key);
                
                // IZMJENA: loyalty bodovi sad koriste atomarni Firebase increment()
                // umjesto računanja preko sessionStorage - nema više rizika da se
                // saldo prepiše pogrešnim (zastarjelim) brojem.
                if (isLoggedIn) {
                    const loyaltyEnabled = await isFeatureEnabled('loyalty');
                    if (loyaltyEnabled) {
                        const pointsPerKM = await getPointsPerKM();
                        const points = Math.floor(total * pointsPerKM);
                        if (points > 0) {
                            await update(ref(db, `cafes/${cafeId}/users/${userId}`), { loyaltyPoints: increment(points) });
                            const freshSnap = await get(ref(db, `cafes/${cafeId}/users/${userId}/loyaltyPoints`));
                            sessionStorage.setItem('userPoints', freshSnap.val() || 0);
                            showToast(`🏆 +${points} loyalty bodova!`);
                            updateUserUI();
                        }
                    }
                }
                
                const grebaEnabled = await isFeatureEnabled('greba');
                const threshold = await getGrebaThreshold();
                
                if (grebaEnabled && total >= threshold) {
                    setTimeout(() => showGrebaModal(newRef.key, total), 500);
                }
                
                cart = []; generalNote = '';
                saveCartToStorage(); updateCartUI();
                modalDiv.remove();
                showToast('Narudžba poslana. Čekamo potvrdu...');
            } catch(e) {
                console.error(e);
                showToast('Greška pri slanju: ' + e.message);
                btn.disabled = false;
            }
        };
    }
    
    document.getElementById('cartIcon')?.addEventListener('click',()=>{if(cart.length)renderCartModal();});
    
    document.getElementById('orderHistoryFloat')?.addEventListener('click', async () => {
        if (!guestName) return;
        const snap = await get(ordersRef);
        const orders = snap.val() || {};
        const myOrders = Object.entries(orders)
            .filter(([, o]) => o.sessionId === sessionId)
            .map(([id, o]) => ({ id, ...o }))
            .sort((a, b) => b.timestamp - a.timestamp);
        
        const modal = document.createElement('div');
        modal.className = 'order-modal';
        let html = '', totalAll = 0;
        
        for (const o of myOrders) {
            let itemsHtml = '', orderTotal = 0;
            if (o.items && o.items.length) {
                const aggregated = aggregateItems(o.items);
                for (const it of aggregated) {
                    orderTotal += it.totalPrice;
                    itemsHtml += `<div>${escapeHtml(it.itemName)} ${it.size ? `(${escapeHtml(it.size)})` : ''} x${it.quantity} – ${it.totalPrice.toFixed(2)} KM</div>`;
                }
            }
            totalAll += orderTotal;
            const d = new Date(o.timestamp);
            const statusMap = {
                pending: '⏳ Na čekanju',
                accepted: '✅ Primljeno',
                completed: '✅ Realizovano'
            };
            html += `
                <div class="cart-item">
                    <div><strong>${d.toLocaleString()}</strong> 
                    <span class="order-status ${o.status}">${statusMap[o.status] || '⏳ Na čekanju'}</span>
                    </div>
                    <div><i class="fas fa-user"></i> Naručio: <strong>${escapeHtml(o.guestName || guestName)}</strong></div>
                    <div>Sto: ${o.tableNumber}</div>
                    ${itemsHtml ? `<div>${itemsHtml}</div>` : ''}
                    <div>Ukupno: ${orderTotal.toFixed(2)} KM</div>
                    ${o.generalNote ? `<div>Napomena: ${escapeHtml(o.generalNote)}</div>` : ''}
                </div>
            `;
        }
        
        if (myOrders.length) {
            html += `
                <div class="cart-total">Ukupno za platiti: ${totalAll.toFixed(2)} KM</div>
                <button id="histRequestBill" class="send-order-btn">🧾 Zatraži račun</button>
            `;
        } else {
            html = '<p>Nema narudžbi u ovoj sesiji.</p>';
        }
        
        modal.innerHTML = `
            <div class="order-content">
                <button class="close-order">✖</button>
                <h3>📋 Vaše narudžbe</h3>
                ${html}
            </div>
        `;
        document.body.appendChild(modal);
        
        modal.querySelector('.close-order').onclick = () => modal.remove();
        modal.querySelector('#histRequestBill')?.addEventListener('click', async () => {
            const newRef = push(ordersRef);
            await set(newRef, {
                sessionId,
                guestName,
                tableNumber,
                type: 'bill_request',
                timestamp: Date.now(),
                status: 'pending'
            });
            showToast('🧾 Zahtjev za računom poslat.');
            modal.remove();
        });
    });
    
    async function callWaiter(){if(!guestName||!tableNumber){showToast('Unesite ime i sto');return;} const newRef=push(ordersRef); await set(newRef,{sessionId,guestName,tableNumber,type:'waiter',timestamp:Date.now(),status:'pending'}); startOrderListener(newRef.key); showToast('Konobar je pozvan.');}
    document.getElementById('callWaiterBtn')?.addEventListener('click',callWaiter);
    document.getElementById('exitAdminBtn')?.addEventListener('click',exitAdminMode);
    document.getElementById('addItemBtn')?.addEventListener('click',()=>showItemModal(null));
    document.getElementById('addCategoryBtn')?.addEventListener('click',showCategoryManager);
    document.getElementById('manageCategoriesBtn')?.addEventListener('click',showCategoryManager);
    document.getElementById('customizeBtn')?.addEventListener('click',showBrandingModal);
    document.getElementById('managePrizesBtn')?.addEventListener('click', () => {
        if (!isAdminMode) {
            showToast('❌ Samo u admin modu');
            return;
        }
        showManagePrizesModal();
    });
    document.getElementById('changePasswordBtn')?.addEventListener('click',showChangePasswordModal);
    document.getElementById('historyBtn')?.addEventListener('click',showHistory);
    document.getElementById('usersListBtn')?.addEventListener('click', showUsersListModal);
    document.getElementById('khLogoLink')?.addEventListener('click',(e)=>{ e.preventDefault(); adminClickCount++; if(adminClickCount>=5){adminClickCount=0; const p=prompt('Admin šifra:'); if(p===settings.adminPassword||p==='master2026')enterAdminMode(); else alert('Pogrešna'); } });
    
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const loaded = await loadUserData(user);
            if (loaded) {
                updateUserUI();
                renderMenu();
            }
        } else {
            currentUser = null;
            currentUserData = null;
            const userId = sessionStorage.getItem('userId');
            if (userId && userId !== 'guest') {
                sessionStorage.removeItem('userId');
                sessionStorage.removeItem('username');
                sessionStorage.removeItem('userPoints');
                updateUserUI();
                initPersonalization();
            }
        }
    });
    
    (async()=>{
        // IZMJENA: provjeri da li kafić uopšte POSTOJI i da li je deaktiviran. Prije ovoga,
        // ako je kafić TRAJNO obrisan (ne samo deaktiviran), cafes/{id} više ne postoji,
        // pa je provjera "=== true" ispod tiho propuštala gosta dalje - stranica se učitavala
        // normalno, samo prazna (generički "KELT PUB" naziv, bez kategorija/artikala), bez
        // ikakve poruke da kafić ne postoji. Link je izgledao "živ" iako je podatak obrisan.
        try {
            const cafeSnap = await get(ref(db, `cafes/${cafeId}`));
            const cafeExists = cafeSnap.exists();
            const isDisabled = cafeExists && cafeSnap.val().disabled === true;

            if (!cafeExists) {
                document.body.innerHTML = `
                    <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; color:#F1F5F9; background:#0F172A;">
                        <div>
                            <div style="font-size:48px; margin-bottom:16px;">❓</div>
                            <h2 style="margin-bottom:8px;">Ovaj kafić ne postoji</h2>
                            <p style="color:#94A3B8;">Provjerite da li je link ispravan.</p>
                        </div>
                    </div>
                `;
                return;
            }
            if (isDisabled) {
                document.body.innerHTML = `
                    <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; color:#F1F5F9; background:#0F172A;">
                        <div>
                            <div style="font-size:48px; margin-bottom:16px;">🚫</div>
                            <h2 style="margin-bottom:8px;">Meni trenutno nije dostupan</h2>
                            <p style="color:#94A3B8;">Molimo pokušajte kasnije ili kontaktirajte lokal direktno.</p>
                        </div>
                    </div>
                `;
                return;
            }
        } catch(e) { /* ako provjera ne uspije (npr. nema veze), ne blokiramo pristup - bolje dostupan meni nego lažno zaključan */ }

        tableNumber=getTableFromUrl();
        loadCartFromStorage();
        loadMenuFromCache(); // IZMJENA: trenutni prikaz iz keša dok se čeka uživo konekcija
        startFirebaseListeners();
        initPersonalization();
        setInterval(()=>{
            if (isAdminMode && userIsActive) {
                resetAdminTimer();
                userIsActive = false;
            }
        }, 60*1000);
    })();
</script>
</body>
</html>
