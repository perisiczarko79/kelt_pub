<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelt Pub - Meni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Ubuntu', sans-serif; background-color: #0b130e; }
        .beer-card { background: linear-gradient(145deg, #111d16, #0d1712); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); border: 1px solid rgba(255, 255, 255, 0.03); }
        .gold-glow { text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body class="text-gray-200 min-h-screen pb-24">

    <header class="relative overflow-hidden bg-gradient-to-b from-[#070c09] to-[#0b130e] text-center py-10 px-4 border-b border-[#1b3324]">
        <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#1e3f2b_1px,transparent_1px)] [background-size:16px_16px]"></div>
        <h1 class="text-4xl font-bold tracking-wider text-[#d4af37] gold-glow mb-2 uppercase">Kelt Pub</h1>
        <p class="text-xs text-emerald-500 tracking-widest uppercase font-medium bg-[#112217] inline-block px-3 py-1 rounded-full border border-emerald-900/50 mb-4">✨ Živjeli / Cheers ✨</p>
        <p class="text-sm text-gray-400 max-w-xs mx-auto">Dobrodošli! Izaberite omiljeno piće sa našeg šanka. Cijene su izražene u KM.</p>
    </header>

    <main class="max-w-md mx-auto px-4 mt-8">
        <h2 class="text-xl font-bold text-emerald-400 mb-6 flex items-center gap-2 uppercase tracking-wide">
            <i class="fas fa-beer"></i> Ponuda Piva / Beer List
        </h2>
        
        <div id="beer-container" class="space-y-4">
            <div class="text-center py-8 text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i> Učitavanje menija...</div>
        </div>
    </main>

    <footer class="text-center py-8 mt-12 border-t border-emerald-950/30">
        <p id="admin-trigger" class="text-xs text-gray-600 cursor-pointer select-none">© 2026 Kelt Pub Meni • Sva prava zadržana</p>
    </footer>

    <div id="login-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-[#111d16] border border-emerald-900 rounded-2xl w-full max-w-xs p-6 shadow-2xl">
            <h3 class="text-lg font-bold text-center text-[#d4af37] mb-4"><i class="fas fa-lock mr-2"></i> Admin Prijava</h3>
            <input type="password" id="admin-password" placeholder="Unesite šifru..." class="w-full bg-[#0b130e] border border-emerald-950 rounded-xl px-4 py-3 text-center text-white font-mono tracking-widest focus:outline-none focus:border-emerald-500 mb-4">
            <div class="flex gap-2">
                <button onclick="closeModal('login-modal')" class="w-1/2 bg-gray-800 hover:bg-gray-700 py-2.5 rounded-xl text-sm font-medium transition">Odustani</button>
                <button onclick="checkPassword()" class="w-1/2 bg-emerald-600 hover:bg-emerald-500 py-2.5 rounded-xl text-sm font-bold text-white transition">Prijavi se</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden overflow-y-auto p-4 z-50">
        <div class="bg-[#111d16] border border-emerald-800 rounded-3xl w-full max-w-md mx-auto my-4 p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-emerald-950 pb-4">
                <h3 class="text-xl font-bold text-[#d4af37]"><i class="fas fa-sliders-h mr-2"></i> Upravljanje Menijem</h3>
                <button onclick="closeModal('admin-modal')" class="text-gray-400 hover:text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            
            <div id="admin-form" class="space-y-6 mb-8"></div>
            
            <button id="firebase-save-btn" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 py-4 rounded-xl font-bold text-white shadow-lg shadow-emerald-950/50 sticky bottom-0 border border-emerald-400/20 flex items-center justify-center gap-2">
                <i class="fas fa-save"></i> Sačuvaj sve izmjene uživo 💾
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdG9mn0iWoFLHtCGpm1RMnxcbYwLhX-0M",
            authDomain: "kelt-pub-menu.firebaseapp.com",
            databaseURL: "https://kelt-pub-menu-default-rtdb.firebaseio.com/",
            projectId: "kelt-pub-menu",
            storageBucket: "kelt-pub-menu.firebasestorage.app",
            messagingSenderId: "167715196126",
            appId: "1:167715196126:web:e38fba79c6a99252329243"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const defaultMenu = {
            "madri": { id: "madri", name: "Madrí Excepcional", volume: "0.5l", price: 3.00, promoPrice: "", isPromo: false, recommended: false },
            "stella": { id: "stella", name: "Stella Artois", volume: "0.33l", price: 2.40, promoPrice: "", isPromo: false, recommended: true },
            "niksicko": { id: "niksicko", name: "Nikšićko Svijetlo", volume: "0.5l", price: 2.50, promoPrice: "", isPromo: false, recommended: false },
            "jelen": { id: "jelen", name: "Jelen Pivo", volume: "0.5l", price: 2.30, promoPrice: "", isPromo: false, recommended: false }
        };

        // Vezujemo Firebase operacije na window objekat da im obične JS funkcije mogu pristupiti
        window.firebaseDB = db;
        window.menuDataRef = ref(db, 'menu');
        window.currentMenuData = {};

        // Slušanje izmjena uživo
        onValue(window.menuDataRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.currentMenuData = data;
                renderMenu(data);
                if (document.getElementById('admin-modal').style.display === 'block' || document.getElementById('admin-form').innerHTML === '') {
                    generateAdminForm(data);
                }
            } else {
                set(window.menuDataRef, defaultMenu);
            }
        });

        // Event listener za glavno sačuvanje dugme
        document.getElementById('firebase-save-btn').addEventListener('click', () => {
            Object.keys(window.currentMenuData).forEach(id => {
                const priceInput = document.getElementById(`price-${id}`);
                const promoInput = document.getElementById(`promo-${id}`);
                
                if (priceInput) window.currentMenuData[id].price = parseFloat(priceInput.value) || 0;
                if (promoInput) window.currentMenuData[id].promoPrice = promoInput.value ? parseFloat(promoInput.value) : "";
            });

            set(ref(window.firebaseDB, 'menu'), window.currentMenuData)
                .then(() => {
                    alert("Uspješno sačuvano na Firebase! Sve izmjene su aktivne uživo! 🍻");
                    closeModal('admin-modal');
                })
                .catch((error) => {
                    alert("Greška: " + error.message);
                });
        });
    </script>

    <script>
        function renderMenu(menu) {
            const container = document.getElementById('beer-container');
            container.innerHTML = '';

            Object.values(menu).forEach(beer => {
                const hasPromo = beer.isPromo && beer.promoPrice;
                const priceDisplay = hasPromo 
                    ? `<span class="line-through text-gray-500 text-sm mr-2">${parseFloat(beer.price).toFixed(2)}</span><span class="text-rose-500 font-bold">${parseFloat(beer.promoPrice).toFixed(2)} KM</span>`
                    : `<span class="text-[#d4af37] font-bold">${parseFloat(beer.price).toFixed(2)} KM</span>`;

                const card = document.createElement('div');
                card.className = `beer-card relative p-5 rounded-2xl flex justify-between items-center transition-all duration-300 ${beer.isPromo ? 'border border-rose-900/50 shadow-rose-950/10' : ''}`;
                
                card.innerHTML = `
                    ${beer.isPromo ? '<span class="absolute -top-2.5 left-4 bg-rose-600 text-white text-[10px] font-bold uppercase tracking-widest px-2.5 py-0.5 rounded-md shadow-md shadow-rose-950/50 flex items-center gap-1"><i class="fas fa-fire text-[9px]"></i> Ponuda Dana</span>' : ''}
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-950 to-emerald-900 flex items-center justify-center border border-emerald-800/30 text-[#d4af37]">
                            <i class="fas fa-beer text-lg"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-white tracking-wide">${beer.name}</h3>
                                ${beer.recommended && !beer.isPromo ? '<span class="text-[10px] bg-emerald-900/80 text-emerald-400 font-medium px-1.5 py-0.5 rounded border border-emerald-800/30">Preporuka</span>' : ''}
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">${beer.volume}</p>
                        </div>
                    </div>
                    <div class="text-right">${priceDisplay}</div>
                `;
                container.appendChild(card);
            });
        }

        function generateAdminForm(menu) {
            const form = document.getElementById('admin-form');
            form.innerHTML = '';

            Object.values(menu).forEach(beer => {
                const block = document.createElement('div');
                block.className = "bg-[#0b130e] border border-emerald-950 p-4 rounded-2xl space-y-3";
                block.innerHTML = `
                    <h4 class="font-bold text-white border-b border-emerald-950 pb-1 text-sm text-emerald-400">${beer.name} (${beer.volume})</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-1">Standardna cijena (KM):</label>
                            <input type="number" step="0.10" id="price-${beer.id}" value="${beer.price}" class="w-full bg-[#111d16] border border-emerald-950 rounded-xl px-3 py-2 text-white font-medium focus:outline-none focus:border-emerald-600 text-sm">
                        </div>
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-1">Promotivna cijena (KM):</label>
                            <input type="number" step="0.10" id="promo-${beer.id}" value="${beer.promoPrice || ''}" placeholder="Npr. 2.50" class="w-full bg-[#111d16] border border-emerald-950 rounded-xl px-3 py-2 text-white font-medium focus:outline-none focus:border-rose-600 text-sm">
                        </div>
                    </div>
                    <div class="flex gap-2 pt-1">
                        <button type="button" onclick="toggleAdminPromo('${beer.id}')" class="w-1/2 py-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1 ${beer.isPromo ? 'bg-rose-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-750'}">
                            <i class="fas fa-fire"></i> Ponuda Dana
                        </button>
                        <button type="button" onclick="toggleAdminRec('${beer.id}')" class="w-1/2 py-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1 ${beer.recommended ? 'bg-emerald-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-750'}">
                            <i class="fas fa-thumbs-up"></i> Preporuka Šanka
                        </button>
                    </div>
                `;
                form.appendChild(block);
            });
        }

        function toggleAdminPromo(id) {
            Object.keys(window.currentMenuData).forEach(key => {
                if (key === id) {
                    window.currentMenuData[key].isPromo = !window.currentMenuData[key].isPromo;
                } else {
                    window.currentMenuData[key].isPromo = false;
                }
            });
            generateAdminForm(window.currentMenuData);
        }

        function toggleAdminRec(id) {
            window.currentMenuData[id].recommended = !window.currentMenuData[id].recommended;
            generateAdminForm(window.currentMenuData);
        }

        // TAJNI KLIK I MODALI
        let tapCount = 0;
        let tapTimer;

        document.getElementById('admin-trigger').addEventListener('click', () => {
            tapCount++;
            clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { tapCount = 0; }, 2000);

            if (tapCount === 5) {
                tapCount = 0;
                document.
