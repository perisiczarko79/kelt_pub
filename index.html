    function applyThemeFromFile(themeFile) {
        document.body.classList.remove('theme-pub-green', 'theme-klikhub-light');

    const THEMES_CACHE_KEY = 'klikhub_themes_cache';
    const THEMES_CACHE_TTL = 6 * 60 * 60 * 1000;

    async function fetchAvailableThemes() {
        try {
            const cachedRaw = sessionStorage.getItem(THEMES_CACHE_KEY);
            if (cachedRaw) {
                const cached = JSON.parse(cachedRaw);
                if (cached.timestamp && (Date.now() - cached.timestamp) < THEMES_CACHE_TTL && Array.isArray(cached.themes)) {
                    return cached.themes;
                }
            }
        } catch(e) {}

        try {
            const repoOwner = 'perisiczarko79';
            const repoName = 'kelt_pub';
            const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/themes`;
            const response = await fetch(apiUrl);
            if (!response.ok) {
                console.warn('Ne mogu dohvatiti listu tema');
                try {
                    const cachedRaw = sessionStorage.getItem(THEMES_CACHE_KEY);
                    if (cachedRaw) return JSON.parse(cachedRaw).themes || [];
                } catch(e) {}
                return [];
            }
            const files = await response.json();
            const cssFiles = files.filter(file => file.name.endsWith('.css') && file.name !== '.gitkeep');
            const themes = cssFiles.map(file => ({
                name: file.name.replace('.css', '').replace(/-/g, ' '),
                file: file.name
            }));
            try {
                sessionStorage.setItem(THEMES_CACHE_KEY, JSON.stringify({ timestamp: Date.now(), themes }));
            } catch(e) {}
            return themes;
        } catch (error) {
            console.error('Greška pri dohvatanju tema:', error);
            try {
                const cachedRaw = sessionStorage.getItem(THEMES_CACHE_KEY);
                if (cachedRaw) return JSON.parse(cachedRaw).themes || [];
            } catch(e) {}
            return [];
        }
    }

    function showToast(msg, dur = 4000) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), dur);
    }
    function escapeHtml(str) { return str ? String(str).replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])) : ''; }
    function getTableFromUrl() {
        const params = new URLSearchParams(window.location.search);
        let table = params.get('table');
        if (table && !isNaN(parseInt(table))) {
            table = parseInt(table);
            sessionStorage.setItem(`pub_table_${cafeId}`, table);
            return table;
        }
        const stored = sessionStorage.getItem(`pub_table_${cafeId}`);
        if (stored && !isNaN(parseInt(stored))) return parseInt(stored);
        return null;
    }
    function saveCartToStorage() { sessionStorage.setItem(`cart_${cafeId}`, JSON.stringify({ cart, generalNote })); }
    function loadCartFromStorage() {
        const saved = sessionStorage.getItem(`cart_${cafeId}`);
        if (saved) { try { const data = JSON.parse(saved); cart = data.cart || []; generalNote = data.generalNote || ''; } catch(e) {} }
        updateCartUI();
    }
    
    function aggregateItems(itemsArray) {
        const map = new Map();
        for (let it of itemsArray) {
            const key = `${it.itemName}|${it.size || ''}`;
            if (map.has(key)) {
                const existing = map.get(key);
                existing.quantity += 1;
                existing.totalPrice += parseFloat(it.price);
            } else {
                map.set(key, {
                    itemName: it.itemName,
                    size: it.size || null,
                    quantity: 1,
                    totalPrice: parseFloat(it.price),
                    note: it.note || null
                });
            }
        }
        return Array.from(map.values());
    }

    function initScratchCanvas(canvas) {
        const wrapper = canvas.closest('.scratch-wrapper');
        if (!wrapper) return;
        const rect = wrapper.getBoundingClientRect();
        const width = 400;
        const height = 220;
        canvas.width = width;
        canvas.height = height;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = (rect.width * (220/400)) + 'px';
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#8a8a8a';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = 'bold 24px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🖐️ GREBAJ', width/2, height/2 - 14);
        ctx.font = '16px Inter, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText('prevuci prstom', width/2, height/2 + 30);
        const prizeReveal = wrapper.querySelector('.prize-reveal');
        let isRevealed = false;
        let isDrawing = false;
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let cx, cy;
            if (e.touches) {
                cx = e.touches[0].clientX;
                cy = e.touches[0].clientY;
                e.preventDefault();
            } else {
                cx = e.clientX;
                cy = e.clientY;
            }
            return {
                x: Math.min(width, Math.max(0, (cx - rect.left) * scaleX)),
                y: Math.min(height, Math.max(0, (cy - rect.top) * scaleY))
            };
        }
        function startDraw(e) {
            if (isRevealed) return;
            isDrawing = true;
            draw(e);
        }
        function draw(e) {
            if (!isDrawing || isRevealed) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 26, 0, Math.PI * 2);
            ctx.fill();
            for (let i = 0; i < 6; i++) {
                const a = Math.random() * Math.PI * 2;
                const d = Math.random() * 12;
                ctx.beginPath();
                ctx.arc(x + Math.cos(a) * d, y + Math.sin(a) * d, 12, 0, Math.PI * 2);
                ctx.fill();
            }
            updateProgress();
        }
        function endDraw() { isDrawing = false; }
        function updateProgress() {
            const imgData = ctx.getImageData(0, 0, width, height);
            let transparent = 0;
            for (let i = 3; i < imgData.data.length; i += 4) {
                if (imgData.data[i] === 0) transparent++;
            }
            const percent = (transparent / (width * height)) * 100;
            if (percent >= 50 && !isRevealed) {
                isRevealed = true;
                prizeReveal.style.opacity = '1';
                showToast('🎊 Osvojili ste nagradu!');
            }
        }
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', endDraw, { passive: false });
    }

    let addToCartLock = false;
    function addToCart(item, selectedSize, price, sizeIndex) {
        if (!guestName) { showToast('Unesite svoje ime.'); return; }
        if (!tableNumber) { showToast('Unesite broj stola.'); return; }
        if (addToCartLock) return;
        addToCartLock = true;
        setTimeout(() => { addToCartLock = false; }, 400);
        let finalPrice = price;
        if (item.promo && item.promoPrices && item.promoPrices[sizeIndex] !== null && item.promoPrices[sizeIndex] !== undefined && item.promoPrices[sizeIndex] !== '') {
            finalPrice = parseFloat(item.promoPrices[sizeIndex]);
        }
        cart.push({ id: Date.now() + Math.random(), itemName: item.name, size: selectedSize?.name || null, price: finalPrice, note: '' });
        saveCartToStorage(); updateCartUI(); showToast(`${item.name} dodato u korpu.`, 1500);
    }
    
    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('cartIcon').style.display = (cart.length > 0 && guestName && !isAdminMode) ? 'flex' : 'none';
    }
    function clearCart() { cart = []; generalNote = ''; saveCartToStorage(); updateCartUI(); }
    function stopAllOrderListeners() { for (const unsub of activeOrderListeners.values()) unsub(); activeOrderListeners.clear(); }
    function startOrderListener(orderId) {
        if (activeOrderListeners.has(orderId)) return;
        const statusRef = ref(db, `${cafeId}/orders/pending/${orderId}/status`);
        const unsub = onValue(statusRef, (snap) => {
            const status = snap.val();
            if (status === 'accepted') showToast('✅ Konobar je primio vašu narudžbu.');
            else if (status === 'completed') { showToast('🎉 Narudžba realizovana. Prijatno!'); cleanupOrderListener(orderId); }
        });
        activeOrderListeners.set(orderId, unsub);
    }
    function cleanupOrderListener(orderId) { const unsub = activeOrderListeners.get(orderId); if (unsub) { unsub(); activeOrderListeners.delete(orderId); } }
    function stopAllFirebaseListeners() {
        if (categoriesUnsub) categoriesUnsub();
        if (itemsUnsub) itemsUnsub();
        if (settingsUnsub) settingsUnsub();
        categoriesUnsub = itemsUnsub = settingsUnsub = null;
        stopAllOrderListeners();
    }
    function startFirebaseListeners() {
        stopAllFirebaseListeners();
        categoriesUnsub = onValue(categoriesRef, (snap) => {
            categories = snap.val() ? Object.entries(snap.val()).map(([id, val]) => ({ id, ...val })).sort((a,b) => (a.order||0)-(b.order||0)) : [];
            renderNav(); renderMenu();
        });
        itemsUnsub = onValue(itemsRef, (snap) => {
            items = snap.val() ? Object.entries(snap.val()).map(([id, val]) => ({ id, ...val })) : [];
            renderMenu();
        });
        settingsUnsub = onValue(settingsRef, (snap) => {
            if (snap.val()) settings = { ...settings, ...snap.val() };
            applySettings();
        });
    }
    function applySettings() {
        document.documentElement.style.setProperty('--bg-dark', settings.backgroundColor);
        document.getElementById('pubName').textContent = settings.pubName;
        document.title = `${settings.pubName} - Digitalni meni`;
        const logoImg = document.getElementById('pubLogo');
        if (settings.logoBase64) { logoImg.src = settings.logoBase64; logoImg.style.display = 'block'; }
        else { logoImg.style.display = 'none'; logoImg.src = ''; }
        if (settings.themeFile) {
            applyThemeFromFile(settings.themeFile);
        } else {
            applyThemeFromFile('');
        }
    }
    
    function renderMenu() {
        const container = document.getElementById('menuContainer');
        if (!container) return;
        container.innerHTML = '';
        for (const cat of categories) {
            const catItems = items.filter(i => i.categoryId === cat.id);
            if (catItems.length === 0 && !isAdminMode) continue;
            const section = document.createElement('div');
            section.className = 'category-section';
            section.id = `cat-${cat.id}`;
            section.innerHTML = `<h2 class="category-title">${escapeHtml(cat.name)}</h2><div class="cards-grid"></div>`;
            const grid = section.querySelector('.cards-grid');
            for (const item of catItems) {
                const card = document.createElement('div');
                card.className = 'card';
                if (item.featured) card.classList.add('featured');
                if (item.promo) card.classList.add('promo');
                let badgeHtml = '';
                if (item.featured) badgeHtml = '<div class="badge">⭐ Preporuka</div>';
                else if (item.promo) badgeHtml = '<div class="badge promo">🔥 Akcija</div>';
                const hasSizes = item.sizes?.length > 0;
                let sizesHtml = '', priceHtml = '';
                if (hasSizes) {
                    sizesHtml = '<div class="sizes">' + item.sizes.map((size, idx) => `<button class="size-btn" data-item-id="${item.id}" data-size-index="${idx}">${escapeHtml(size.name)}</button>`).join('') + '</div>';
                    const first = item.sizes[0];
                    const hasPromoForFirst = item.promo && item.promoPrices && item.promoPrices[0] && item.promoPrices[0] !== '';
                    if (hasPromoForFirst) {
                        priceHtml = `<span class="old-price">${first.price} KM</span> <span style="color:var(--red-light);">${item.promoPrices[0]} KM</span>`;
                    } else {
                        priceHtml = `${first.price} KM`;
                    }
                } else {
                    const sp = item.singlePrice || '0.00';
                    const hasPromo = item.promo && item.promoPrice && item.promoPrice !== '';
                    if (hasPromo) {
                        priceHtml = `<span class="old-price">${sp} KM</span> <span style="color:var(--red-light);">${item.promoPrice} KM</span>`;
                    } else {
                        priceHtml = `${sp} KM`;
                    }
                }
                const cartBtnHtml = (!isAdminMode && guestName) ? `<button class="cart-btn" data-item-id="${item.id}">🛒 Dodaj u korpu</button>` : '';
                const adminBtns = isAdminMode ? `<div class="admin-controls"><button class="admin-btn edit-item" data-id="${item.id}">✏️ Uredi</button><button class="admin-btn danger delete-item" data-id="${item.id}">🗑️ Obriši</button><button class="admin-btn toggle-feat" data-id="${item.id}">${item.featured ? '⭐ Ukloni preporuku' : '⭐ Preporuka'}</button><button class="admin-btn toggle-promo" data-id="${item.id}">${item.promo ? '🔥 Ukloni akciju' : '🔥 Akcija'}</button></div>` : '';
                card.innerHTML = `${badgeHtml}<div class="card-header"><div class="item-name">${escapeHtml(item.name)}</div><div class="price-display" data-price-for="${item.id}">${priceHtml}</div></div>${sizesHtml}<div class="description">${escapeHtml(item.description || '')}</div>${cartBtnHtml}${adminBtns}`;
                grid.appendChild(card);
            }
            container.appendChild(section);
        }
        document.querySelectorAll('.sizes').forEach(div => { const first = div.querySelector('.size-btn'); if(first) first.classList.add('active'); });
        initCategoryObserver();
    }
    
    function initCategoryObserver() {
        const observer = new IntersectionObserver(
            entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.querySelectorAll('.category-nav button').forEach(btn => btn.classList.remove('active'));
                        document.querySelector(`.category-nav button[data-cat="${entry.target.id}"]`)?.classList.add('active');
                    }
                });
            },
            { threshold: 0.3 }
        );
        document.querySelectorAll('.category-section').forEach(section => observer.observe(section));
    }
    
    document.getElementById('menuContainer')?.addEventListener('click', (e) => {
        const target = e.target;
        if (target.classList.contains('size-btn')) {
            const container = target.closest('.sizes');
            if (container) {
                container.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
                target.classList.add('active');
                const itemId = target.dataset.itemId;
                const idx = parseInt(target.dataset.sizeIndex);
                const item = items.find(i => i.id === itemId);
                if (item && item.sizes && item.sizes[idx]) {
                    const size = item.sizes[idx];
                    const priceDiv = document.querySelector(`.price-display[data-price-for="${itemId}"]`);
                    if (priceDiv) {
                        const hasPromoForSize = item.promo && item.promoPrices && item.promoPrices[idx] && item.promoPrices[idx] !== '';
                        if (hasPromoForSize) {
                            priceDiv.innerHTML = `<span class="old-price">${size.price} KM</span> <span style="color:var(--red-light);">${item.promoPrices[idx]} KM</span>`;
                        } else {
                            priceDiv.innerHTML = `${size.price} KM`;
                        }
                    }
                }
            }
        } else if (target.classList.contains('cart-btn')) {
            const itemId = target.dataset.itemId;
            const item = items.find(i => i.id === itemId);
            if (!item) return;
            const card = target.closest('.card');
            let selectedSize = null, price = null, sizeIndex = 0;
            if (item.sizes?.length) {
                const activeSizeBtn = card.querySelector('.size-btn.active');
                sizeIndex = activeSizeBtn ? parseInt(activeSizeBtn.dataset.sizeIndex) : 0;
                selectedSize = item.sizes[sizeIndex];
                price = parseFloat(selectedSize.price);
            } else {
                price = parseFloat(item.singlePrice);
            }
            addToCart(item, selectedSize, price, sizeIndex);
        } else if (target.classList.contains('edit-item')) { const i = items.find(i => i.id === target.dataset.id); if(i) showItemModal(i); }
        else if (target.classList.contains('delete-item')) { if(confirm('Obrisati?')) remove(ref(db, `${cafeId}/menuItems/${target.dataset.id}`)); }
        else if (target.classList.contains('toggle-feat')) { const id = target.dataset.id; const it = items.find(i => i.id === id); if(it) update(ref(db, `${cafeId}/menuItems/${id}`), { featured: !it.featured, promo: false, promoPrices: null, promoPrice: null }); }
        else if (target.classList.contains('toggle-promo')) { 
            const id = target.dataset.id; 
            const it = items.find(i => i.id === id); 
            if(it) {
                if(!it.promo) {
                    if (it.sizes && it.sizes.length > 0) {
                        const promoPrices = [];
                        for (let i = 0; i < it.sizes.length; i++) {
                            let val = prompt(`Unesite akcijsku cijenu za veličinu "${it.sizes[i].name}" (ostavi prazno ako nema akcije za ovu veličinu):`);
                            if (val === null) { promoPrices.push(null); continue; }
                            val = val.trim();
                            if (val === '') promoPrices.push(null);
                            else {
                                const num = parseFloat(val.replace(',', '.'));
                                promoPrices.push(isNaN(num) ? null : num);
                            }
                        }
                        update(ref(db, `${cafeId}/menuItems/${id}`), { promo: true, featured: false, promoPrices: promoPrices, promoPrice: null });
                    } else {
                        const promoPrice = prompt('Promotivna cijena (KM):');
                        if (promoPrice === null) return;
                        const num = parseFloat(promoPrice.replace(',', '.'));
                        update(ref(db, `${cafeId}/menuItems/${id}`), { promo: true, featured: false, promoPrice: isNaN(num) ? '' : num, promoPrices: null });
                    }
                } else {
                    update(ref(db, `${cafeId}/menuItems/${id}`), { promo: false, promoPrices: null, promoPrice: null });
                }
            }
        }
    });

            const desc=modal.querySelector('#itemDesc').value;

                for(const g of groups){
                    const sname=g.querySelector('.size-name')?.value.trim(); 
                    const sprice=g.querySelector('.size-price')?.value.trim().replace(',','.'); 
                    const spromo=g.querySelector('.size-promo')?.value.trim().replace(',','.');

        modalDiv.innerHTML=`<div class="cart-content"><button class="close-cart">✖</button><h3>Vaša korpa</h3>${itemsHtml||'<p>Prazna</p>'}<div class="cart-total">Ukupno: ${total.toFixed(2)} KM</div><div class="general-note"><textarea id="generalNoteCart" placeholder="Opća napomena">${escapeHtml(generalNote)}</textarea></div><button id="clearCartBtn" style="background:#DC2626; margin-bottom:8px;">🗑️ Isprazni korpu</button><button id="sendOrderBtn" class="send-order-btn">📦 Pošalji narudžbu</button></div>`;

        modalDiv.querySelector('.close-cart').onclick=()=>modalDiv.remove();
        modalDiv.querySelectorAll('.remove-item').forEach(btn=>btn.onclick=()=>{cart.splice(parseInt(btn.dataset.idx),1); saveCartToStorage(); updateCartUI(); renderCartModal();});
        modalDiv.querySelectorAll('.item-note-input').forEach(inp=>inp.onchange=e=>{cart[parseInt(inp.dataset.idx)].note=e.target.value; saveCartToStorage();});
        modalDiv.querySelector('#generalNoteCart').onchange=e=>{generalNote=e.target.value; saveCartToStorage();};
        modalDiv.querySelector('#clearCartBtn').onclick=()=>{clearCart(); renderCartModal();};
        
        modalDiv.querySelector('#sendOrderBtn').onclick = async (e) => {
            if (!cart.length) return;
            const btn = e.currentTarget;
            if (btn.disabled) return;
            btn.disabled = true;
            
            const total = cart.reduce((sum, ci) => sum + ci.price, 0);
            
            const orderData = {
                sessionId, guestName, tableNumber,
                timestamp: Date.now(), status: 'pending', generalNote,
                items: cart.map(ci => ({ itemName: ci.itemName, size: ci.size, price: ci.price, note: ci.note }))
            };
            
            try {
                const newRef = push(ordersRef);
                await set(newRef, orderData);
                startOrderListener(newRef.key);
                
                const grebaEnabled = await isFeatureEnabled('greba');
                const threshold = await getGrebaThreshold();
                
                if (grebaEnabled && total >= threshold) {
                    setTimeout(() => showGrebaModal(newRef.key, total), 500);
                }
                
                cart = []; generalNote = '';
                saveCartToStorage(); updateCartUI();
                modalDiv.remove();
                showToast('Narudžba poslana. Čekamo potvrdu...');
            } catch(e) {
                console.error(e);
                showToast('Greška pri slanju: ' + e.message);
                btn.disabled = false;
            }
        };
    }

        initPersonalization();
        setInterval(()=>{
            if (isAdminMode && userIsActive) {
                resetAdminTimer();
                userIsActive = false;
            }
        }, 60*1000);
    })();
</script>
