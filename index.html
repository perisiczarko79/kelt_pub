<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>KELT PUB - Digitalni Meni</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg-dark: #0a0e0b;
            --bg-card: rgba(16, 28, 20, 0.65);
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --red-light: #ff4d4d;
            --text-cream: #f4ebd0;
            --text-muted: #a8a29e;
            --border-gold: rgba(212, 175, 55, 0.35);
            --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-cream);
            font-family: var(--font-sans);
            line-height: 1.5;
            margin: 0;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 20%, rgba(15,52,30,0.4) 0%, rgba(10,14,11,0.95) 80%);
            z-index: -2;
        }
        .menu-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 100px;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        .pub-logo {
            max-width: 200px;
            margin-bottom: 10px;
        }
        .admin-bar {
            background: #cc3333;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 6px 16px;
            font-size: 12px;
            z-index: 9999;
        }
        .admin-bar button {
            background: white;
            border: none;
            color: #cc3333;
            padding: 2px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .admin-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.9);
            border-top: 2px solid var(--gold-primary);
            padding: 12px;
            text-align: center;
            z-index: 9998;
        }
        .save-btn {
            background: var(--gold-primary);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .category-section {
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 24px;
            font-family: 'Times New Roman', serif;
            color: var(--gold-primary);
            border-bottom: 1px solid var(--border-gold);
            margin-bottom: 16px;
            padding-bottom: 4px;
        }
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(12px);
            position: relative;
        }
        .card.featured {
            border-color: var(--gold-primary);
            background: rgba(24,43,30,0.8);
        }
        .card.promo {
            border-color: var(--red-light);
            background: rgba(45,20,20,0.8);
        }
        .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--gold-primary);
            color: black;
            font-size: 10px;
            padding: 2px 10px;
            border-bottom-left-radius: 12px;
        }
        .badge.promo {
            background: var(--red-light);
            color: white;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .item-name {
            font-size: 18px;
            font-weight: bold;
        }
        .sizes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .size-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-gold);
            color: var(--text-cream);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .size-btn.active {
            background: var(--gold-primary);
            color: black;
        }
        .price-display {
            font-size: 18px;
            font-weight: bold;
            color: var(--gold-primary);
        }
        .old-price {
            text-decoration: line-through;
            font-size: 14px;
            margin-right: 6px;
            color: var(--text-muted);
        }
        .description {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            border-left: 2px solid var(--border-gold);
            padding-left: 8px;
        }
        .admin-controls {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.2);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .admin-btn {
            background: #222;
            border: 1px solid #555;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .admin-btn.danger { background: #a00; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .modal-content {
            background: #1a1e1a;
            max-width: 500px;
            width: 90%;
            max-height: 80%;
            overflow-y: auto;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--gold-primary);
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            background: #2a2e2a;
            border: 1px solid #555;
            color: white;
            border-radius: 8px;
        }
        .size-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .footer-motto {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: var(--gold-primary);
            cursor: pointer;
        }
        .welcome-msg {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 30px;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="adminBar" class="admin-bar" style="display: none;">
    <span>🔐 ADMIN MOD AKTIVAN</span>
    <button id="exitAdminBtn">Izađi</button>
</div>

<div class="menu-container">
    <header>
        <img src="logo.png" alt="Kelt Pub" class="pub-logo" onerror="this.style.display='none'">
        <h1>KELT PUB</h1>
        <p>Digitalni meni</p>
    </header>

    <div id="personalizationZone"></div>

    <div id="menuContainer"></div>

    <div class="footer-motto" onclick="handleAdminClick()">❖ ❖ ❖</div>
</div>

<div id="adminFooter" class="admin-footer" style="display: none;">
    <button id="addItemBtn" class="save-btn">➕ Dodaj novo piće / napitak</button>
</div>

<!-- Firebase SDK -->
<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, onValue, push, set, remove, update } from 'firebase/database';

    // 🔥 ZAMIJENI SA SVOJIM FIREBASE CONFIGOM 🔥
    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app",
        messagingSenderId: "1026702086011",
        appId: "1:1026702086011:web:8162de6bad4f18b731b7de"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const menuRef = ref(db, 'menuItems');

    // Globalne varijable
    let items = [];           // niz stavki iz baze
    let currentSizes = [];    // za formu
    let editId = null;
    let isAdminMode = false;
    let adminClickCount = 0;

    // Kategorije i redosled
    const categories = ["Topli napici", "Piva", "Vina", "Sokovi", "Žestoka alkoholna pića", "Rakije"];

    // Pomocne funkcije
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Učitavanje iz baze
    function loadItems() {
        onValue(menuRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                items = Object.entries(data).map(([id, val]) => ({ id, ...val }));
            } else {
                items = [];
            }
            renderMenu();
        });
    }

    // Renderovanje menija
    function renderMenu() {
        const container = document.getElementById('menuContainer');
        if (!container) return;
        container.innerHTML = '';
        
        for (let cat of categories) {
            const catItems = items.filter(item => item.category === cat);
            if (catItems.length === 0 && !isAdminMode) continue;
            
            const section = document.createElement('div');
            section.className = 'category-section';
            section.innerHTML = `<h2 class="category-title">${cat}</h2><div class="cards-grid"></div>`;
            const grid = section.querySelector('.cards-grid');
            
            catItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                if (item.featured) card.classList.add('featured');
                if (item.promo) card.classList.add('promo');
                
                let badgeHtml = '';
                if (item.featured) badgeHtml = '<div class="badge">⭐ Preporuka</div>';
                else if (item.promo) badgeHtml = '<div class="badge promo">🔥 Akcija</div>';
                
                // Pronađi aktivnu veličinu (za prikaz cijene) - prva po redu
                let activeSizeIndex = 0;
                // Za potrebe prikaza cijene, koristi prvu veličinu (kasnije dodajemo event listener)
                let priceHtml = '';
                if (item.sizes && item.sizes.length > 0) {
                    const firstSize = item.sizes[0];
                    if (item.promo && item.promoPrice && item.promoPrice !== "") {
                        priceHtml = `<span class="old-price">${firstSize.price} KM</span> <span style="color:var(--red-light);">${item.promoPrice} KM</span>`;
                    } else {
                        priceHtml = `${firstSize.price} KM`;
                    }
                } else {
                    priceHtml = "Cijena nije definisana";
                }
                
                let sizesHtml = '';
                if (item.sizes && item.sizes.length > 0) {
                    sizesHtml = '<div class="sizes">';
                    item.sizes.forEach((size, idx) => {
                        sizesHtml += `<button class="size-btn ${idx === 0 ? 'active' : ''}" data-size-index="${idx}" data-item-id="${item.id}">${size.name}</button>`;
                    });
                    sizesHtml += '</div>';
                }
                
                let adminBtns = '';
                if (isAdminMode) {
                    adminBtns = `
                        <div class="admin-controls">
                            <button class="admin-btn" onclick="window.editItem('${item.id}')">✏️ Uredi</button>
                            <button class="admin-btn danger" onclick="window.deleteItem('${item.id}')">🗑️ Obriši</button>
                            <button class="admin-btn" onclick="window.toggleFeatured('${item.id}')">${item.featured ? '⭐ Ukloni preporuku' : '⭐ Preporuka'}</button>
                            <button class="admin-btn" onclick="window.togglePromo('${item.id}')">${item.promo ? '🔥 Ukloni akciju' : '🔥 Akcija'}</button>
                        </div>
                    `;
                }
                
                card.innerHTML = `
                    ${badgeHtml}
                    <div class="card-header">
                        <div class="item-name">${escapeHtml(item.name)}</div>
                        <div class="price-display" id="price-${item.id}">${priceHtml}</div>
                    </div>
                    ${sizesHtml}
                    <div class="description">${escapeHtml(item.description)}</div>
                    ${adminBtns}
                `;
                grid.appendChild(card);
            });
            
            if (catItems.length > 0 || isAdminMode) {
                container.appendChild(section);
            }
        }
        
        // Dodaj event listenere za dugmad veličina
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.removeEventListener('click', sizeHandler);
            btn.addEventListener('click', sizeHandler);
        });
    }
    
    function sizeHandler(e) {
        const btn = e.currentTarget;
        const itemId = btn.getAttribute('data-item-id');
        const sizeIndex = parseInt(btn.getAttribute('data-size-index'));
        const item = items.find(i => i.id === itemId);
        if (!item || !item.sizes || !item.sizes[sizeIndex]) return;
        
        // Ažuriraj aktivnu klasu u ovoj grupi
        const parentSizes = btn.parentElement;
        parentSizes.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Ažuriraj prikaz cijene
        const priceDiv = document.getElementById(`price-${itemId}`);
        const selectedSize = item.sizes[sizeIndex];
        if (item.promo && item.promoPrice && item.promoPrice !== "") {
            priceDiv.innerHTML = `<span class="old-price">${selectedSize.price} KM</span> <span style="color:var(--red-light);">${item.promoPrice} KM</span>`;
        } else {
            priceDiv.innerHTML = `${selectedSize.price} KM`;
        }
    }
    
    // Admin funkcije (globalno izložene)
    window.editItem = function(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        editId = id;
        currentSizes = item.sizes ? [...item.sizes] : [];
        showModal(item);
    };
    
    window.deleteItem = async function(id) {
        if (confirm("Da li sigurno želite obrisati ovu stavku?")) {
            await remove(ref(db, `menuItems/${id}`));
        }
    };
    
    window.toggleFeatured = async function(id) {
        const item = items.find(i => i.id === id);
        if (item) {
            await update(ref(db, `menuItems/${id}`), { featured: !item.featured, promo: false });
        }
    };
    
    window.togglePromo = async function(id) {
        const item = items.find(i => i.id === id);
        if (item) {
            // Ako se uključuje promo, pitaj za promotivnu cijenu
            let promoPrice = "";
            if (!item.promo) {
                promoPrice = prompt("Unesite promotivnu cijenu (npr. 2.50) ili ostavite prazno:", "");
                if (promoPrice === null) return;
            }
            await update(ref(db, `menuItems/${id}`), { promo: !item.promo, featured: false, promoPrice: promoPrice });
        }
    };
    
    // Modal za dodavanje/uređivanje
    function showModal(item = null) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        
        const isEdit = item !== null;
        const categoriesOptions = categories.map(c => `<option value="${c}" ${item && item.category === c ? 'selected' : ''}>${c}</option>`).join('');
        
        // Generiši HTML za veličine
        let sizesHtml = '<div id="sizesList">';
        if (currentSizes.length === 0) currentSizes.push({ name: "0.33l", price: "0.00" });
        currentSizes.forEach((size, idx) => {
            sizesHtml += `
                <div class="size-group" data-idx="${idx}">
                    <input type="text" placeholder="Naziv (npr. 0.5l)" value="${escapeHtml(size.name)}" class="size-name">
                    <input type="text" placeholder="Cijena (KM)" value="${escapeHtml(size.price)}" class="size-price">
                    <button type="button" class="remove-size" data-idx="${idx}">🗑️</button>
                </div>
            `;
        });
        sizesHtml += '</div><button type="button" id="addSizeBtn">+ Dodaj veličinu</button>';
        
        modal.innerHTML = `
            <div class="modal-content">
                <h3>${isEdit ? 'Uredi' : 'Dodaj'} stavku</h3>
                <label>Kategorija:</label>
                <select id="modalCategory">${categoriesOptions}</select>
                <label>Naziv:</label>
                <input type="text" id="modalName" value="${item ? escapeHtml(item.name) : ''}">
                <label>Opis (srpski):</label>
                <textarea id="modalDesc">${item ? escapeHtml(item.description) : ''}</textarea>
                <label>Veličine i cijene:</label>
                ${sizesHtml}
                <div style="margin-top: 16px;">
                    <button id="saveModalBtn">Sačuvaj</button>
                    <button id="closeModalBtn">Odustani</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        // Dodaj event za dodavanje veličine
        document.getElementById('addSizeBtn').onclick = () => {
            currentSizes.push({ name: "0.33l", price: "0.00" });
            showModal(item); // re-render
        };
        // Event za uklanjanje veličine
        document.querySelectorAll('.remove-size').forEach(btn => {
            btn.onclick = (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                currentSizes.splice(idx, 1);
                if (currentSizes.length === 0) currentSizes.push({ name: "", price: "" });
                showModal(item);
            };
        });
        
        document.getElementById('closeModalBtn').onclick = () => modal.remove();
        document.getElementById('saveModalBtn').onclick = async () => {
            const category = document.getElementById('modalCategory').value;
            const name = document.getElementById('modalName').value.trim();
            const description = document.getElementById('modalDesc').value.trim();
            if (!name) {
                alert("Naziv je obavezan.");
                return;
            }
            // Prikupi veličine
            const sizeDivs = document.querySelectorAll('.size-group');
            const newSizes = [];
            sizeDivs.forEach(div => {
                const nameInput = div.querySelector('.size-name');
                const priceInput = div.querySelector('.size-price');
                const sName = nameInput.value.trim();
                const sPrice = priceInput.value.trim().replace(',', '.');
                if (sName && sPrice && !isNaN(parseFloat(sPrice))) {
                    newSizes.push({ name: sName, price: sPrice });
                }
            });
            if (newSizes.length === 0) {
                alert("Morate dodati barem jednu veličinu.");
                return;
            }
            
            const data = {
                category,
                name,
                description,
                sizes: newSizes,
                featured: item ? item.featured : false,
                promo: item ? item.promo : false,
                promoPrice: item ? (item.promoPrice || "") : ""
            };
            
            if (isEdit) {
                await update(ref(db, `menuItems/${item.id}`), data);
            } else {
                await push(menuRef, data);
            }
            modal.remove();
            currentSizes = [];
            editId = null;
        };
    }
    
    // Admin mod
    function handleAdminClick() {
        adminClickCount++;
        if (adminClickCount >= 5) {
            adminClickCount = 0;
            let pass = prompt("Unesite administratorsku šifru:");
            if (pass === "kelt2026") enterAdminMode();
            else alert("Pogrešna šifra!");
        }
    }
    
    function enterAdminMode() {
        isAdminMode = true;
        document.getElementById('adminBar').style.display = 'flex';
        document.getElementById('adminFooter').style.display = 'block';
        document.body.classList.add('admin-mode');
        renderMenu();
    }
    
    function exitAdminMode() {
        isAdminMode = false;
        document.getElementById('adminBar').style.display = 'none';
        document.getElementById('adminFooter').style.display = 'none';
        document.body.classList.remove('admin-mode');
        renderMenu();
    }
    
    // Personalizacija (ime gosta)
    function initPersonalization() {
        const zone = document.getElementById('personalizationZone');
        const savedName = localStorage.getItem('kelt_guest_name');
        if (savedName) {
            zone.innerHTML = `<div class="welcome-msg">🍻 ${escapeHtml(savedName)}, dobrodošli! Pregledajte naš meni.</div>`;
        } else {
            zone.innerHTML = `
                <div class="welcome-msg">
                    Unesite svoje ime: 
                    <input type="text" id="guestNameInput" placeholder="Vaše ime" maxlength="20" style="background:#333; border:1px solid gold; color:white; padding:4px 8px; border-radius:20px;">
                    <button id="saveNameBtn" style="background:gold; border:none; padding:4px 12px; border-radius:20px;">Sačuvaj</button>
                    <button id="skipNameBtn" style="background:transparent; border:1px solid gold; color:gold; padding:4px 12px; border-radius:20px;">Preskoči</button>
                </div>
            `;
            document.getElementById('saveNameBtn').onclick = () => {
                const name = document.getElementById('guestNameInput').value.trim();
                if (name) {
                    localStorage.setItem('kelt_guest_name', name);
                    zone.innerHTML = `<div class="welcome-msg">🍻 ${escapeHtml(name)}, dobrodošli!</div>`;
                } else {
                    zone.style.display = 'none';
                }
            };
            document.getElementById('skipNameBtn').onclick = () => zone.style.display = 'none';
        }
    }
    
    // Globalni izloženi funkcije
    window.handleAdminClick = handleAdminClick;
    window.editItem = window.editItem;
    window.deleteItem = window.deleteItem;
    window.toggleFeatured = window.toggleFeatured;
    window.togglePromo = window.togglePromo;
    window.exitAdminMode = exitAdminMode;
    
    // Inicijalizacija
    document.getElementById('exitAdminBtn').onclick = () => exitAdminMode();
    document.getElementById('addItemBtn').onclick = () => {
        currentSizes = [{ name: "0.33l", price: "0.00" }];
        editId = null;
        showModal(null);
    };
    
    loadItems();
    initPersonalization();
</script>
</body>
</html>
