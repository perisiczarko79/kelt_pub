<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prijem - test</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
    background: #f4f4f4;
  }
  h1 { font-size: 18px; margin-bottom: 16px; }
  label { display: block; font-size: 13px; margin: 12px 0 4px; color: #333; }
  input, textarea {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }
  textarea { min-height: 70px; resize: vertical; }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    font-size: 16px;
    font-weight: bold;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .kod-info {
    margin-top: 14px;
    text-align: center;
    font-size: 14px;
    color: #555;
    min-height: 20px;
  }

  /* ===== NALJEPNICA — DK-22205 kontinuirana (62mm siroko x 40mm visoko) ===== */
  #labela {
    display: none;
    width: 62mm;
    height: 40mm;
    padding: 2mm 3mm;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
    color: #000;
  }
  #labela .kod {
    font-size: 22pt;
    font-weight: bold;
    letter-spacing: 1px;
  }
  #labela .ime {
    font-size: 12pt;
    font-weight: bold;
    margin-top: 1.5mm;
  }
  #labela .tel { font-size: 11pt; }
  #labela .kvar {
    font-size: 9pt;
    margin-top: 1.5mm;
    overflow: hidden;
  }
  #labela .datum {
    font-size: 7pt;
    color: #333;
    margin-top: 1.5mm;
  }

  @media print {
    @page {
      size: 62mm 40mm;
      margin: 0;
    }
    body { background: #fff; margin: 0; padding: 0; max-width: none; }
    body > *:not(#labela) { display: none !important; }
    #labela { display: block !important; }
  }
</style>
</head>
<body>

  <h1>Prijem uređaja — TEST štampe</h1>

  <label>Ime</label>
  <input id="ime" placeholder="Marko">

  <label>Prezime</label>
  <input id="prezime" placeholder="Marković">

  <label>Broj telefona</label>
  <input id="tel" type="tel" placeholder="065/123-456">

  <label>Opis kvara</label>
  <textarea id="kvar" placeholder="Ne pali se, razbijen ekran..."></textarea>

  <button onclick="stampaj()">Otvori nalog i štampaj naljepnicu</button>

  <div class="kod-info" id="kodInfo"></div>

  <div id="labela">
    <div class="kod" id="l_kod"></div>
    <div class="ime" id="l_ime"></div>
    <div class="tel" id="l_tel"></div>
    <div class="kvar" id="l_kvar"></div>
    <div class="datum" id="l_datum"></div>
  </div>

<script>
  function generisiKod() {
    const znakovi = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let k = "";
    for (let i = 0; i < 4; i++) {
      k += znakovi[Math.floor(Math.random() * znakovi.length)];
    }
    return k;
  }

  function stampaj() {
    const ime = document.getElementById("ime").value.trim();
    const prezime = document.getElementById("prezime").value.trim();
    const tel = document.getElementById("tel").value.trim();
    const kvar = document.getElementById("kvar").value.trim();

    if (!ime && !prezime && !tel && !kvar) {
      alert("Unesi bar nešto za test.");
      return;
    }

    const kod = generisiKod();
    const sada = new Date();
    const datum = sada.toLocaleDateString("bs-BA") + "  " +
      sada.toLocaleTimeString("bs-BA", { hour: "2-digit", minute: "2-digit" });

    document.getElementById("l_kod").textContent = kod;
    document.getElementById("l_ime").textContent = (ime + " " + prezime).trim();
    document.getElementById("l_tel").textContent = tel;
    document.getElementById("l_kvar").textContent = kvar;
    document.getElementById("l_datum").textContent = datum;

    document.getElementById("kodInfo").textContent = "Kod naloga: " + kod;

    window.print();
  }
</script>

</body>
</html>
