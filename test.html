<!DOCTYPE html>
<html>
<head>
    <title>Firebase test</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
</head>
<body>
    <h1>Firebase test</h1>
    <button id="writeBtn">Napiši test podatak</button>
    <button id="readBtn">Pročitaj test podatak</button>
    <pre id="output"></pre>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, get, child } from 'firebase/database';

        const firebaseConfig = {
            apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
            authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
            databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kelt-pub-menu-2df61",
            storageBucket: "kelt-pub-menu-2df61.firebasestorage.app",
            messagingSenderId: "1026702086011",
            appId: "1:1026702086011:web:8162de6bad4f18b731b7de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const testRef = ref(db, 'test/testData');

        document.getElementById('writeBtn').onclick = async () => {
            try {
                await set(testRef, { message: "Hello from test!", timestamp: Date.now() });
                document.getElementById('output').innerText = 'Podatak uspješno upisan!';
            } catch (e) {
                document.getElementById('output').innerText = 'Greška pri pisanju: ' + e.message;
            }
        };

        document.getElementById('readBtn').onclick = async () => {
            try {
                const snapshot = await get(child(ref(db), 'test/testData'));
                if (snapshot.exists()) {
                    document.getElementById('output').innerText = JSON.stringify(snapshot.val(), null, 2);
                } else {
                    document.getElementById('output').innerText = 'Nema podataka. Prvo kliknite "Napiši".';
                }
            } catch (e) {
                document.getElementById('output').innerText = 'Greška pri čitanju: ' + e.message;
            }
        };
    </script>
</body>
</html>
