<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KlikHub - QR kodovi za stolove (broj u kodu)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0F172A;
            color: #F1F5F9;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #1E293B;
            border-radius: 24px;
            padding: 24px;
        }
        h2 { margin-bottom: 20px; color: #F97316; }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            margin-bottom: 30px;
            background: #0F172A;
            padding: 20px;
            border-radius: 20px;
        }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-weight: 500; font-size: 0.9rem; }
        input, button {
            padding: 10px 16px;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
        }
        input {
            background: #334155;
            color: white;
            border: 1px solid #475569;
        }
        button {
            background: #F97316;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #EA580C; transform: translateY(-2px); }
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        .qr-item {
            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            break-inside: avoid;
        }
        .qr-item canvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .button-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }
        .download-btn {
            background: #3B82F6;
            padding: 4px 12px;
            font-size: 0.7rem;
        }
        .print-only { display: none; }
        @media print {
            body { background: white; padding: 0; }
            .container { background: white; padding: 0; }
            .controls, .print-hide, .button-group { display: none; }
            .qr-grid { margin: 0; gap: 20px; }
            .qr-item { break-inside: avoid; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
<div class="container">
    <h2>🔲 Generisanje QR kodova (broj stola u sredini)</h2>
    <div class="controls">
        <div class="input-group">
            <label>ID kafića:</label>
            <input type="text" id="cafeId" value="gradski_pub">
        </div>
        <div class="input-group">
            <label>Stolovi od:</label>
            <input type="number" id="fromTable" value="1" style="width:80px">
        </div>
        <div class="input-group">
            <label>do:</label>
            <input type="number" id="toTable" value="20" style="width:80px">
        </div>
        <button id="generateBtn">🔄 Generiši</button>
        <button id="pdfBtn" class="print-hide">🖨️ Štampaj / PDF</button>
    </div>
    <div id="qrContainer" class="qr-grid"></div>
</div>

<script>
    const generateBtn = document.getElementById('generateBtn');
    const pdfBtn = document.getElementById('pdfBtn');
    const qrContainer = document.getElementById('qrContainer');

    async function generateQRs() {
        const cafeId = document.getElementById('cafeId').value.trim();
        const from = parseInt(document.getElementById('fromTable').value);
        const to = parseInt(document.getElementById('toTable').value);
        if (!cafeId || isNaN(from) || isNaN(to) || from > to) {
            alert('Provjerite podatke');
            return;
        }
        qrContainer.innerHTML = '<div style="grid-column:1/-1; text-align:center;">Generišem...</div>';
        
        const baseUrl = `${window.location.protocol}//${window.location.host}`;
        const fragment = document.createDocumentFragment();
        
        for (let i = from; i <= to; i++) {
            const url = `${baseUrl}/index.html?cafe=${encodeURIComponent(cafeId)}&table=${i}`;
            const container = document.createElement('div');
            container.className = 'qr-item';
            
            const canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 200;
            
            try {
                await QRCode.toCanvas(canvas, url, {
                    width: 200,
                    margin: 1,
                    color: { dark: '#000000', light: '#FFFFFF' },
                    errorCorrectionLevel: 'H'
                });
                const ctx = canvas.getContext('2d');
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const fontSize = 32;
                ctx.font = `bold ${fontSize}px "Segoe UI", "Inter", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.beginPath();
                ctx.arc(centerX, centerY, fontSize * 0.8, 0, 2 * Math.PI);
                ctx.fillStyle = '#FFFFFF';
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.fillText(i.toString(), centerX, centerY);
                ctx.font = `bold ${fontSize * 0.4}px "Segoe UI"`;
                ctx.fillStyle = '#333333';
                ctx.fillText("STO", centerX, centerY - fontSize * 0.6);
            } catch(e) { console.error(e); }
            
            const label = document.createElement('div');
            label.style.marginTop = '8px';
            label.style.fontWeight = 'bold';
            label.innerText = `Sto ${i}`;
            
            const btnGroup = document.createElement('div');
            btnGroup.className = 'button-group';
            const downloadBtn = document.createElement('button');
            downloadBtn.innerText = '💾 Preuzmi PNG';
            downloadBtn.className = 'download-btn';
            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.download = `sto_${i}.png`;
                link.href = canvas.toDataURL();
                link.click();
            };
            btnGroup.appendChild(downloadBtn);
            
            container.appendChild(canvas);
            container.appendChild(label);
            container.appendChild(btnGroup);
            fragment.appendChild(container);
        }
        qrContainer.innerHTML = '';
        qrContainer.appendChild(fragment);
    }
    
    function printQRs() {
        window.print();
    }
    
    generateBtn.addEventListener('click', generateQRs);
    pdfBtn.addEventListener('click', printQRs);
    generateQRs();
</script>
</body>
</html>
