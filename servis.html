<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servis — Master</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f1115; --card:#191c22; --elev:#22262e; --line:rgba(255,255,255,0.08);
    --txt:#e8eaed; --muted:#9aa0a8; --accent:#3b82f6; --green:#22c55e;
    --amber:#f59e0b; --red:#ef4444; --purple:#8b5cf6; --wa:#25d366;
  }
  body { font-family:-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--txt); line-height:1.5; padding-bottom:40px; }
  .wrap { max-width:640px; margin:0 auto; padding:0 14px; }
  @media (min-width:900px){ .wrap{ max-width:1000px; } }

  header { text-align:center; padding:18px 0 10px; }
  header h1 { font-size:20px; font-weight:700; letter-spacing:-0.3px; }
  header p { font-size:12px; color:var(--muted); }

  .tabs { display:flex; gap:6px; background:var(--card); padding:6px; border-radius:14px; margin:0 auto 18px; position:sticky; top:8px; z-index:50; border:1px solid var(--line); max-width:640px; }
  .tab { flex:1; padding:10px; border:none; background:transparent; color:var(--muted); font-size:13px; font-weight:600; border-radius:10px; cursor:pointer; transition:background .2s,color .2s; }
  .tab.active { background:var(--accent); color:#fff; }

  .panel { display:none; }
  .panel.active { display:block; }
  .form-narrow { max-width:640px; margin:0 auto; }

  label { display:block; font-size:13px; color:var(--muted); margin:12px 0 5px; }
  input, textarea, select { width:100%; padding:12px 14px; background:var(--elev); border:1px solid var(--line); color:var(--txt); border-radius:10px; font-size:16px; font-family:inherit; }
  input:focus, textarea:focus, select:focus { outline:none; border-color:var(--accent); }
  textarea { min-height:80px; resize:vertical; }

  .btn { width:100%; padding:14px; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; margin-top:18px; transition:transform .15s,opacity .2s; }
  .btn:active { transform:scale(.98); }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-green { background:var(--green); color:#05230f; }
  .btn-wa { background:var(--wa); color:#053d1c; }

  .search-row { margin-bottom:12px; max-width:640px; }
  .filters { display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px; -webkit-overflow-scrolling:touch; }
  .filter-btn { flex-shrink:0; padding:7px 14px; background:var(--card); border:1px solid var(--line); color:var(--muted); border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; }
  .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .nalozi-grid { display:block; }
  @media (min-width:900px){ .nalozi-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; } }
  .nalog { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
  @media (min-width:900px){ .nalog{ margin-bottom:0; } }
  .nalog-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:6px; }
  .nalog-kod { font-size:18px; font-weight:800; letter-spacing:1px; color:var(--accent); }
  .nalog-ime { font-weight:600; font-size:15px; }
  .nalog-tel { font-size:13px; color:var(--muted); }
  .nalog-tel a { color:var(--muted); text-decoration:none; }
  .nalog-serviser { font-size:12px; color:var(--purple); font-weight:600; margin-top:2px; }
  .nalog-kvar { font-size:14px; margin:8px 0; padding:8px 10px; background:var(--elev); border-radius:8px; border-left:2px solid var(--accent); }
  .nalog-meta { font-size:12px; color:var(--muted); }
  .nalog-uradjeno { font-size:13px; margin-top:6px; color:var(--txt); }
  .nalog-cijena { font-weight:700; color:var(--green); }

  .status { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.3px; white-space:nowrap; }
  .status.primljen { background:rgba(59,130,246,.15); color:#93c5fd; }
  .status.u_radu   { background:rgba(245,158,11,.15); color:#fcd34d; }
  .status.gotovo   { background:rgba(34,197,94,.15); color:#86efac; }
  .status.preuzeto { background:rgba(255,255,255,.08); color:var(--muted); }
  .status.otkazano { background:rgba(239,68,68,.15); color:#fca5a5; }

  .nalog-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; padding-top:12px; border-top:1px solid var(--line); }
  .act { padding:8px 14px; border:none; border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; }
  .act-blue { background:var(--accent); color:#fff; }
  .act-green { background:var(--green); color:#05230f; }
  .act-gray { background:var(--elev); color:var(--txt); border:1px solid var(--line); }
  .act-red { background:transparent; color:#fca5a5; border:1px solid rgba(239,68,68,.3); }
  .act-print { background:var(--purple); color:#fff; }
  .act-wa { background:var(--wa); color:#053d1c; }

  .period-box { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:16px; }
  .period-btns { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .period-btn { padding:8px 14px; background:var(--elev); border:1px solid var(--line); color:var(--muted); border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; }
  .period-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .custom-range { display:none; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .custom-range.show { display:flex; }
  .custom-range > div { flex:1; min-width:140px; }
  .custom-range label { margin-top:0; }
  .serviser-filter { margin-top:10px; }
  .serviser-filter label { margin-top:0; }

  .export-btns { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
  .export-btns button { flex:1; min-width:140px; padding:12px; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; }
  .exp-pdf { background:var(--purple); color:#fff; }
  .exp-csv { background:var(--green); color:#05230f; }

  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  @media (min-width:900px){ .stat-grid{ grid-template-columns:repeat(3,1fr); } }
  .stat-card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; }
  .stat-label { font-size:12px; color:var(--muted); margin-bottom:4px; }
  .stat-value { font-size:26px; font-weight:800; }
  .stat-value.money { color:var(--green); }
  .stat-section-title { font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin:20px 0 10px; }
  .status-row { display:flex; justify-content:space-between; padding:10px 14px; background:var(--card); border:1px solid var(--line); border-radius:10px; margin-bottom:8px; font-size:14px; }

  /* SERVISERI tab */
  .serviser-card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .serviser-card .info b { font-size:15px; }
  .serviser-card .info span { display:block; font-size:12px; color:var(--muted); }

  .empty { text-align:center; padding:50px 20px; color:var(--muted); }
  .empty div { font-size:40px; margin-bottom:10px; opacity:.4; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--elev); color:var(--txt); padding:12px 22px; border-radius:30px; font-size:14px; border:1px solid var(--line); box-shadow:0 10px 30px rgba(0,0,0,.5); z-index:9999; animation:tin .25s ease; }
  @keyframes tin { from{ opacity:0; transform:translateX(-50%) translateY(12px);} }

  .modal { position:fixed; inset:0; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; padding:16px; z-index:9000; }
  .modal-box { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:22px; width:100%; max-width:420px; }
  .modal-box h3 { font-size:18px; margin-bottom:4px; }
  .modal-box .sub { font-size:13px; color:var(--muted); margin-bottom:8px; }
  .modal-actions { display:flex; gap:10px; margin-top:18px; }
  .modal-actions .btn { margin-top:0; }

  /* LOGIN GATE */
  #gate { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:99998; padding:20px; }
  #gate .box { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:28px; max-width:340px; width:100%; text-align:center; }
  #gate h2 { margin-bottom:6px; }
  #gate p { font-size:13px; color:var(--muted); margin-bottom:16px; }

  /* NALJEPNICA */
  #labela { display:none; }
  @media print {
    @page { size:29mm 62mm; margin:0; }
    html, body { background:#fff; margin:0; padding:0; max-width:none; }
    body > *:not(#labela):not(#izvjestaj) { display:none !important; }
    body:not(.print-izvjestaj) #izvjestaj { display:none !important; }
    #labela { display:block !important; position:absolute; top:0; left:0; }
    #labela .sadrzaj { width:62mm; height:29mm; padding:2mm 3mm; box-sizing:border-box; font-family:Arial,sans-serif; color:#000; transform:rotate(90deg); transform-origin:top left; position:absolute; top:0; left:29mm; }
    #labela .l-kod { font-size:13pt; font-weight:bold; letter-spacing:1px; }
    #labela .l-ime { font-size:10pt; font-weight:bold; margin-top:1mm; }
    #labela .l-tel { font-size:9pt; }
    #labela .l-linija { font-size:8pt; margin-top:1mm; word-wrap:break-word; }
    #labela .l-cijena { font-size:10pt; font-weight:bold; margin-top:1mm; }
    #labela .l-datum { font-size:6.5pt; color:#333; margin-top:1mm; }
    body.print-izvjestaj > *:not(#izvjestaj) { display:none !important; }
    body.print-izvjestaj #izvjestaj { display:block !important; }
  }
  #izvjestaj { display:none; }
  body.print-izvjestaj-prep #izvjestaj { display:block; position:fixed; inset:0; background:#fff; color:#000; padding:20mm; z-index:99999; overflow:auto; font-family:Arial,sans-serif; }
  #izvjestaj h2 { font-size:20px; margin-bottom:4px; color:#000; }
  #izvjestaj .izv-period { font-size:13px; color:#444; margin-bottom:16px; }
  #izvjestaj .izv-summary { display:flex; flex-wrap:wrap; gap:16px; margin-bottom:20px; }
  #izvjestaj .izv-summary div { font-size:14px; }
  #izvjestaj .izv-summary b { display:block; font-size:22px; }
  #izvjestaj table { width:100%; border-collapse:collapse; font-size:12px; }
  #izvjestaj th, #izvjestaj td { border:1px solid #ccc; padding:6px 8px; text-align:left; }
  #izvjestaj th { background:#f0f0f0; }
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="gate">
  <div class="box">
    <h2>🔧 Servis</h2>
    <p>Master pristup</p>
    <input type="password" id="masterPass" placeholder="Šifra" style="text-align:center;">
    <button class="btn btn-primary" id="gateBtn">Uđi</button>
  </div>
</div>

<div class="wrap" id="app" style="display:none;">
  <header>
    <h1>🔧 Servis — Master</h1>
    <p>Prijem, dodjela, statistika</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="prijem">Prijem</button>
    <button class="tab" data-tab="nalozi">Nalozi</button>
    <button class="tab" data-tab="stat">Statistika</button>
    <button class="tab" data-tab="serviseri">Serviseri</button>
  </div>

  <!-- PRIJEM -->
  <div class="panel active" id="panel-prijem">
    <div class="form-narrow">
      <label>Ime</label>
      <input id="f_ime" placeholder="Dragan">
      <label>Prezime</label>
      <input id="f_prezime" placeholder="Trivković">
      <label>Telefon</label>
      <input id="f_tel" type="tel" placeholder="066 667 214">
      <label>Opis kvara / uređaj</label>
      <textarea id="f_kvar" placeholder="Telefon S24 ultra, razbijen ekran"></textarea>
      <label>Dodijeli serviseru</label>
      <select id="f_serviser"><option value="">— bez dodjele —</option></select>
      <button class="btn btn-primary" id="btnSacuvaj">💾 Sačuvaj i štampaj naljepnicu</button>
    </div>
  </div>

  <!-- NALOZI -->
  <div class="panel" id="panel-nalozi">
    <div class="search-row">
      <input id="pretraga" placeholder="🔍 Pretraga — ime, telefon, kod...">
    </div>
    <div class="filters" id="filteri">
      <button class="filter-btn active" data-f="aktivni">Aktivni</button>
      <button class="filter-btn" data-f="svi">Svi</button>
      <button class="filter-btn" data-f="primljen">Primljeni</button>
      <button class="filter-btn" data-f="u_radu">U radu</button>
      <button class="filter-btn" data-f="gotovo">Gotovi</button>
      <button class="filter-btn" data-f="preuzeto">Preuzeti</button>
      <button class="filter-btn" data-f="otkazano">Otkazani</button>
      <button class="filter-btn" data-f="arhiva">📥 Arhiva</button>
    </div>
    <div id="listaNaloga" class="nalozi-grid"></div>
  </div>

  <!-- STATISTIKA -->
  <div class="panel" id="panel-stat">
    <div class="period-box">
      <div class="period-btns" id="periodBtns">
        <button class="period-btn" data-p="danas">Danas</button>
        <button class="period-btn" data-p="sedmica">Sedmica</button>
        <button class="period-btn active" data-p="mjesec">Mjesec</button>
        <button class="period-btn" data-p="godina">Godina</button>
        <button class="period-btn" data-p="sve">Sve</button>
        <button class="period-btn" data-p="custom">Prilagođeno</button>
      </div>
      <div class="custom-range" id="customRange">
        <div><label>Od</label><input type="date" id="dOd"></div>
        <div><label>Do</label><input type="date" id="dDo"></div>
      </div>
      <div class="serviser-filter">
        <label>Serviser</label>
        <select id="statServiser"><option value="">Svi serviseri</option></select>
      </div>
      <div class="export-btns">
        <button class="exp-pdf" id="btnPDF">📄 Izvezi PDF</button>
        <button class="exp-csv" id="btnCSV">📊 Izvezi CSV</button>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Novih naloga</div><div class="stat-value" id="s_novih">0</div></div>
      <div class="stat-card"><div class="stat-label">Završeno</div><div class="stat-value" id="s_zavrseno">0</div></div>
      <div class="stat-card"><div class="stat-label">Promet</div><div class="stat-value money" id="s_promet">0 KM</div></div>
      <div class="stat-card"><div class="stat-label">Prosječna cijena</div><div class="stat-value money" id="s_prosjek">0 KM</div></div>
      <div class="stat-card"><div class="stat-label">Ukupno naloga (svih)</div><div class="stat-value" id="s_ukupno">0</div></div>
      <div class="stat-card"><div class="stat-label">Otkazano (period)</div><div class="stat-value" id="s_otkazano">0</div></div>
    </div>

    <div class="stat-section-title">Trenutno po statusu (aktivni)</div>
    <div class="status-row"><span>🔵 Primljeni</span><b id="c_primljen">0</b></div>
    <div class="status-row"><span>🟠 U radu</span><b id="c_u_radu">0</b></div>
    <div class="status-row"><span>🟢 Gotovi (čekaju preuzimanje)</span><b id="c_gotovo">0</b></div>
    <div class="status-row"><span>⚪ Preuzeti</span><b id="c_preuzeto">0</b></div>
  </div>

  <!-- SERVISERI -->
  <div class="panel" id="panel-serviseri">
    <div class="form-narrow">
      <label>Ime servisera</label>
      <input id="sv_ime" placeholder="Marko">
      <label>WhatsApp broj (sa pozivnim, npr. 38765123456)</label>
      <input id="sv_wa" type="tel" placeholder="38765123456">
      <button class="btn btn-primary" id="btnDodajServisera">➕ Dodaj servisera</button>
      <div class="stat-section-title">Lista servisera</div>
      <div id="listaServisera"></div>
    </div>
  </div>
</div>

<!-- NALJEPNICA -->
<div id="labela">
  <div class="sadrzaj">
    <div class="l-kod" id="lb_kod"></div>
    <div class="l-ime" id="lb_ime"></div>
    <div class="l-tel" id="lb_tel"></div>
    <div class="l-linija" id="lb_linija"></div>
    <div class="l-cijena" id="lb_cijena"></div>
    <div class="l-datum" id="lb_datum"></div>
  </div>
</div>

<div id="izvjestaj"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getDatabase, ref, onValue, push, set, update, get, remove } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
  authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
  databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kelt-pub-menu-2df61",
  storageBucket: "kelt-pub-menu-2df61.firebasestorage.app"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const naloziRef = ref(db, 'servis/nalozi');
const serviseriRef = ref(db, 'servis/serviseri');

const MASTER_PASS = 'servis2026';   // <-- master sifra

// osnovni URL do serviser.html (isti folder)
const SERVISER_URL = location.href.replace(/[^/]*$/, '') + 'serviser.html';

let naloziCache = {};
let serviseriCache = {};
let trenutniFilter = 'aktivni';
let trenutniPeriod = 'mjesec';

// ---------- LOGIN ----------
function unlock() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  sessionStorage.setItem('servisMaster', '1');
}
document.getElementById('gateBtn').onclick = () => {
  if (document.getElementById('masterPass').value === MASTER_PASS) unlock();
  else toast('Pogrešna šifra.');
};
document.getElementById('masterPass').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('gateBtn').click(); });
if (sessionStorage.getItem('servisMaster') === '1') unlock();

// ---------- POMOCNE ----------
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }
function esc(s){ return s?String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])):''; }
function generisiKod(){ const zn="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let k=""; for(let i=0;i<4;i++)k+=zn[Math.floor(Math.random()*zn.length)]; return k; }
function fmtDatum(ts){ if(!ts)return''; const d=new Date(ts); return d.toLocaleDateString('sr-RS')+'. '+d.toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'}); }
function fmtDatumKratko(ts){ if(!ts)return''; return new Date(ts).toLocaleDateString('sr-RS'); }
function statusLabel(s){ return {primljen:'Primljen',u_radu:'U radu',gotovo:'Gotovo',preuzeto:'Preuzeto',otkazano:'Otkazano'}[s]||s; }
function serviserIme(id){ return id && serviseriCache[id] ? serviseriCache[id].ime : ''; }

// ---------- STAMPA ----------
function stampaj({kod,ime,tel,linija,cijena,datum}){
  document.getElementById('lb_kod').textContent=kod||'';
  document.getElementById('lb_ime').textContent=ime||'';
  document.getElementById('lb_tel').textContent=tel||'';
  document.getElementById('lb_linija').textContent=linija||'';
  document.getElementById('lb_cijena').textContent=cijena||'';
  document.getElementById('lb_datum').textContent=datum||'';
  document.body.classList.remove('print-izvjestaj');
  window.print();
}

// ---------- TABOVI ----------
document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='stat') racunajStatistiku();
  };
});

// ---------- SERVISERI ----------
onValue(serviseriRef, snap=>{
  serviseriCache = snap.val() || {};
  renderServisere();
  popuniServiserDropdowns();
  renderNaloge();
});
function popuniServiserDropdowns(){
  const arr = Object.entries(serviseriCache).map(([id,s])=>({id,...s})).sort((a,b)=>(a.ime||'').localeCompare(b.ime||''));
  const optHtml = arr.map(s=>`<option value="${s.id}">${esc(s.ime)}</option>`).join('');
  const fs = document.getElementById('f_serviser');
  fs.innerHTML = '<option value="">— bez dodjele —</option>' + optHtml;
  const ss = document.getElementById('statServiser');
  const prev = ss.value;
  ss.innerHTML = '<option value="">Svi serviseri</option>' + optHtml;
  ss.value = prev;
}
function renderServisere(){
  const l = document.getElementById('listaServisera');
  const arr = Object.entries(serviseriCache).map(([id,s])=>({id,...s})).sort((a,b)=>(a.ime||'').localeCompare(b.ime||''));
  if(!arr.length){ l.innerHTML=`<div class="empty"><div>👤</div>Nema servisera. Dodaj prvog.</div>`; return; }
  l.innerHTML = arr.map(s=>`
    <div class="serviser-card">
      <div class="info"><b>${esc(s.ime)}</b><span>📱 ${esc(s.whatsapp||'—')}</span></div>
      <button class="act act-red" data-del="${s.id}">🗑️</button>
    </div>`).join('');
  l.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
    if(confirm('Obrisati servisera '+serviserIme(b.dataset.del)+'?')) await remove(ref(db,'servis/serviseri/'+b.dataset.del));
  });
}
document.getElementById('btnDodajServisera').onclick=async()=>{
  const ime=document.getElementById('sv_ime').value.trim();
  const wa=document.getElementById('sv_wa').value.trim().replace(/[^\d]/g,'');
  if(!ime){ toast('Unesite ime.'); return; }
  await push(serviseriRef,{ime,whatsapp:wa});
  document.getElementById('sv_ime').value='';
  document.getElementById('sv_wa').value='';
  toast('Serviser dodat.');
};

// ---------- PRIJEM ----------
document.getElementById('btnSacuvaj').onclick=async()=>{
  const ime=document.getElementById('f_ime').value.trim();
  const prezime=document.getElementById('f_prezime').value.trim();
  const tel=document.getElementById('f_tel').value.trim();
  const kvar=document.getElementById('f_kvar').value.trim();
  const serviser=document.getElementById('f_serviser').value;
  if(!ime&&!prezime){ toast('Unesite ime i prezime.'); return; }
  if(!tel){ toast('Unesite telefon.'); return; }
  if(!kvar){ toast('Unesite opis kvara.'); return; }

  const kod=generisiKod(); const now=Date.now();
  const nalog={ kod,ime,prezime,telefon:tel,kvar,serviser:serviser||'', status:'primljen', uradjeno:'', cijena:0, createdAt:now, closedAt:null, arhiviran:false };
  try{
    const nRef=push(naloziRef);
    await set(nRef,nalog);
    stampaj({ kod, ime:(ime+' '+prezime).trim(), tel, linija:kvar, cijena:'', datum:fmtDatum(now) });

    // ako je dodijeljen serviser sa WA brojem -> ponudi slanje
    if(serviser && serviseriCache[serviser] && serviseriCache[serviser].whatsapp){
      posaljiWhatsApp(nRef.key, nalog, serviser);
    }
    document.getElementById('f_ime').value='';
    document.getElementById('f_prezime').value='';
    document.getElementById('f_tel').value='';
    document.getElementById('f_kvar').value='';
    document.getElementById('f_serviser').value='';
    toast('Nalog '+kod+' sačuvan.');
  }catch(e){ console.error(e); toast('Greška: '+e.message); }
};

function posaljiWhatsApp(nalogId, n, serviserId){
  const sv = serviseriCache[serviserId];
  if(!sv || !sv.whatsapp){ toast('Serviser nema WhatsApp broj.'); return; }
  const link = SERVISER_URL + '?nalog=' + nalogId;
  const poruka = `🔧 Novi servis — ${n.kod}\nKlijent: ${n.ime} ${n.prezime}\nKvar: ${n.kvar}\n\nOtvori nalog:\n${link}`;
  const url = `https://wa.me/${sv.whatsapp}?text=${encodeURIComponent(poruka)}`;
  window.open(url, '_blank');
}

// ---------- SLUSANJE NALOGA ----------
onValue(naloziRef, snap=>{
  naloziCache = snap.val() || {};
  renderNaloge();
  if(document.getElementById('panel-stat').classList.contains('active')) racunajStatistiku();
});

document.getElementById('pretraga').addEventListener('input', renderNaloge);
document.querySelectorAll('.filter-btn').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); trenutniFilter=b.dataset.f; renderNaloge(); };
});

function renderNaloge(){
  const lista=document.getElementById('listaNaloga');
  const q=document.getElementById('pretraga').value.trim().toLowerCase();
  let arr=Object.entries(naloziCache).map(([id,n])=>({id,...n}));
  arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  arr=arr.filter(n=>{
    if(trenutniFilter==='arhiva') return n.arhiviran===true;
    if(n.arhiviran===true) return false;
    if(trenutniFilter==='svi') return true;
    if(trenutniFilter==='aktivni') return n.status==='primljen'||n.status==='u_radu'||n.status==='gotovo';
    return n.status===trenutniFilter;
  });
  if(q) arr=arr.filter(n=>`${n.kod} ${n.ime} ${n.prezime} ${n.telefon} ${n.kvar} ${serviserIme(n.serviser)}`.toLowerCase().includes(q));
  if(!arr.length){ lista.innerHTML=`<div class="empty" style="grid-column:1/-1;"><div>📭</div>Nema naloga za prikaz.</div>`; return; }

  lista.innerHTML=arr.map(n=>{
    const punoIme=`${esc(n.ime)} ${esc(n.prezime)}`.trim();
    const svIme=serviserIme(n.serviser);
    let actions='';
    if(!n.arhiviran){
      if(n.status==='primljen') actions+=`<button class="act act-blue" data-act="rad" data-id="${n.id}">▶️ Počni rad</button>`;
      else if(n.status==='u_radu') actions+=`<button class="act act-green" data-act="zavrsi" data-id="${n.id}">✅ Završi</button>`;
      else if(n.status==='gotovo'){
        actions+=`<button class="act act-blue" data-act="izdaj" data-id="${n.id}">📤 Izdaj</button>`;
        actions+=`<button class="act act-print" data-act="reprint" data-id="${n.id}">🖨️ Naljepnica</button>`;
      }
      // WA dugme ako ima servisera sa brojem i nalog aktivan
      if(n.serviser && serviseriCache[n.serviser] && serviseriCache[n.serviser].whatsapp && (n.status==='primljen'||n.status==='u_radu')){
        actions+=`<button class="act act-wa" data-act="wa" data-id="${n.id}">📱 WhatsApp</button>`;
      }
      if(n.status==='preuzeto'||n.status==='otkazano') actions+=`<button class="act act-gray" data-act="arhiviraj" data-id="${n.id}">📥 Arhiviraj</button>`;
      if(n.status!=='preuzeto'&&n.status!=='otkazano') actions+=`<button class="act act-red" data-act="otkazi" data-id="${n.id}">Otkaži</button>`;
    } else {
      actions+=`<button class="act act-gray" data-act="vrati" data-id="${n.id}">↩️ Vrati iz arhive</button>`;
      actions+=`<button class="act act-red" data-act="obrisi" data-id="${n.id}">🗑️ Obriši</button>`;
    }
    const uradjenoHtml=(n.status==='gotovo'||n.status==='preuzeto')&&(n.uradjeno||n.cijena)
      ? `<div class="nalog-uradjeno">Urađeno: ${esc(n.uradjeno)||'—'} · <span class="nalog-cijena">${n.cijena||0} KM</span></div>`:'';
    return `
      <div class="nalog">
        <div class="nalog-top">
          <div>
            <div class="nalog-kod">${esc(n.kod)}</div>
            <div class="nalog-ime">${punoIme}</div>
            <div class="nalog-tel"><a href="tel:${esc(n.telefon)}">${esc(n.telefon)}</a></div>
            ${svIme?`<div class="nalog-serviser">👤 ${esc(svIme)}</div>`:''}
          </div>
          <span class="status ${n.status}">${statusLabel(n.status)}</span>
        </div>
        <div class="nalog-kvar">${esc(n.kvar)}</div>
        ${uradjenoHtml}
        <div class="nalog-meta">Primljen: ${fmtDatum(n.createdAt)}${n.closedAt?' · Gotovo: '+fmtDatum(n.closedAt):''}</div>
        <div class="nalog-actions">${actions}</div>
      </div>`;
  }).join('');
  lista.querySelectorAll('.act').forEach(btn=>btn.onclick=()=>rukujAkciju(btn.dataset.act,btn.dataset.id));
}

async function rukujAkciju(act,id){
  const n=naloziCache[id]; if(!n)return;
  if(act==='rad'){ await update(ref(db,'servis/nalozi/'+id),{status:'u_radu'}); toast(n.kod+' — u radu.'); }
  else if(act==='izdaj'){ await update(ref(db,'servis/nalozi/'+id),{status:'preuzeto'}); toast(n.kod+' izdat.'); }
  else if(act==='otkazi'){ if(!confirm('Otkazati nalog '+n.kod+'?'))return; await update(ref(db,'servis/nalozi/'+id),{status:'otkazano'}); toast(n.kod+' otkazan.'); }
  else if(act==='arhiviraj'){ await update(ref(db,'servis/nalozi/'+id),{arhiviran:true}); toast(n.kod+' arhiviran.'); }
  else if(act==='vrati'){ await update(ref(db,'servis/nalozi/'+id),{arhiviran:false}); toast(n.kod+' vraćen.'); }
  else if(act==='obrisi'){ if(!confirm('Trajno obrisati nalog '+n.kod+' ('+n.ime+' '+n.prezime+')?\n\nOvo se NE može poništiti i nalog nestaje iz statistike i izvještaja.'))return; await remove(ref(db,'servis/nalozi/'+id)); toast(n.kod+' trajno obrisan.'); }
  else if(act==='wa'){ posaljiWhatsApp(id,n,n.serviser); }
  else if(act==='reprint'){ stampaj({kod:n.kod,ime:`${n.ime} ${n.prezime}`.trim(),tel:n.telefon,linija:'Urađeno: '+(n.uradjeno||'—'),cijena:'Cijena: '+(n.cijena||0)+' KM',datum:fmtDatum(n.closedAt||n.createdAt)}); }
  else if(act==='zavrsi') otvoriModalZavrsetka(id,n);
}

function otvoriModalZavrsetka(id,n){
  const modal=document.createElement('div'); modal.className='modal';
  modal.innerHTML=`
    <div class="modal-box">
      <h3>Završetak — ${esc(n.kod)}</h3>
      <div class="sub">${esc(n.ime)} ${esc(n.prezime)} · ${esc(n.telefon)}</div>
      <label>Šta je urađeno</label>
      <textarea id="m_uradjeno" placeholder="Zamjena stakla">${esc(n.uradjeno||'')}</textarea>
      <label>Cijena (KM)</label>
      <input id="m_cijena" type="number" inputmode="numeric" placeholder="120" value="${n.cijena||''}">
      <div class="modal-actions">
        <button class="btn act-gray" id="m_odustani">Odustani</button>
        <button class="btn btn-green" id="m_potvrdi">✅ Završi i štampaj</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#m_odustani').onclick=()=>modal.remove();
  modal.onclick=e=>{ if(e.target===modal) modal.remove(); };
  modal.querySelector('#m_potvrdi').onclick=async()=>{
    const uradjeno=modal.querySelector('#m_uradjeno').value.trim();
    const cijena=parseFloat(modal.querySelector('#m_cijena').value)||0;
    if(!uradjeno){ toast('Unesite šta je urađeno.'); return; }
    const now=Date.now();
    await update(ref(db,'servis/nalozi/'+id),{status:'gotovo',uradjeno,cijena,closedAt:now});
    modal.remove();
    stampaj({kod:n.kod,ime:`${n.ime} ${n.prezime}`.trim(),tel:n.telefon,linija:'Urađeno: '+uradjeno,cijena:'Cijena: '+cijena+' KM',datum:fmtDatum(now)});
    toast(n.kod+' završen.');
  };
}

// ---------- PERIOD / STATISTIKA ----------
document.querySelectorAll('.period-btn').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('.period-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); trenutniPeriod=b.dataset.p; document.getElementById('customRange').classList.toggle('show',trenutniPeriod==='custom'); racunajStatistiku(); };
});
document.getElementById('dOd').addEventListener('change',()=>{ if(trenutniPeriod==='custom') racunajStatistiku(); });
document.getElementById('dDo').addEventListener('change',()=>{ if(trenutniPeriod==='custom') racunajStatistiku(); });
document.getElementById('statServiser').addEventListener('change', racunajStatistiku);

function periodOpseg(){
  const now=new Date(); let od, doo=Date.now();
  if(trenutniPeriod==='danas') od=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  else if(trenutniPeriod==='sedmica'){ const dan=(now.getDay()+6)%7; od=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dan).getTime(); }
  else if(trenutniPeriod==='mjesec') od=new Date(now.getFullYear(),now.getMonth(),1).getTime();
  else if(trenutniPeriod==='godina') od=new Date(now.getFullYear(),0,1).getTime();
  else if(trenutniPeriod==='sve') od=0;
  else if(trenutniPeriod==='custom'){ const o=document.getElementById('dOd').value,d=document.getElementById('dDo').value; od=o?new Date(o+'T00:00:00').getTime():0; doo=d?new Date(d+'T23:59:59').getTime():Date.now(); }
  return {od,doo};
}
function periodLabel(){
  const map={danas:'Danas',sedmica:'Ova sedmica',mjesec:'Ovaj mjesec',godina:'Ova godina',sve:'Svi podaci'};
  if(trenutniPeriod==='custom'){ const o=document.getElementById('dOd').value,d=document.getElementById('dDo').value; return `Period: ${o||'početak'} — ${d||'danas'}`; }
  return map[trenutniPeriod]||'';
}
function statServiserId(){ return document.getElementById('statServiser').value; }

function racunajStatistiku(){
  const svFilter=statServiserId();
  const {od,doo}=periodOpseg();
  let novih=0,zavrseno=0,promet=0,otkazano=0,sumCijena=0,brojSaCijenom=0;
  const brojac={primljen:0,u_radu:0,gotovo:0,preuzeto:0};
  for(const n of Object.values(naloziCache)){
    if(svFilter && n.serviser!==svFilter) continue;
    if(!n.arhiviran && brojac[n.status]!==undefined) brojac[n.status]++;
    if(n.createdAt>=od&&n.createdAt<=doo){ novih++; if(n.status==='otkazano') otkazano++; }
    const naplacen=(n.status==='gotovo'||n.status==='preuzeto')&&n.cijena>0&&n.closedAt>=od&&n.closedAt<=doo;
    if(naplacen){ zavrseno++; promet+=n.cijena; sumCijena+=n.cijena; brojSaCijenom++; }
  }
  const arrLen = svFilter ? Object.values(naloziCache).filter(n=>n.serviser===svFilter).length : Object.values(naloziCache).length;
  document.getElementById('s_novih').textContent=novih;
  document.getElementById('s_zavrseno').textContent=zavrseno;
  document.getElementById('s_promet').textContent=promet+' KM';
  document.getElementById('s_prosjek').textContent=(brojSaCijenom?Math.round(sumCijena/brojSaCijenom):0)+' KM';
  document.getElementById('s_ukupno').textContent=arrLen;
  document.getElementById('s_otkazano').textContent=otkazano;
  document.getElementById('c_primljen').textContent=brojac.primljen;
  document.getElementById('c_u_radu').textContent=brojac.u_radu;
  document.getElementById('c_gotovo').textContent=brojac.gotovo;
  document.getElementById('c_preuzeto').textContent=brojac.preuzeto;
}

// ---------- IZVOZ ----------
function naloziUPeriodu(){
  const svFilter=statServiserId();
  const {od,doo}=periodOpseg();
  return Object.values(naloziCache)
    .filter(n=>n.createdAt>=od&&n.createdAt<=doo&&(!svFilter||n.serviser===svFilter))
    .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
}

document.getElementById('btnCSV').onclick=()=>{
  const arr=naloziUPeriodu();
  if(!arr.length){ toast('Nema naloga u periodu.'); return; }
  const head=['Kod','Ime','Prezime','Telefon','Kvar','Serviser','Status','Uradjeno','Cijena','Primljen','Zavrseno'];
  const rows=arr.map(n=>[n.kod,n.ime,n.prezime,n.telefon,(n.kvar||'').replace(/\n/g,' '),serviserIme(n.serviser),statusLabel(n.status),(n.uradjeno||'').replace(/\n/g,' '),n.cijena||0,fmtDatum(n.createdAt),fmtDatum(n.closedAt)]);
  const csv=[head,...rows].map(r=>r.map(c=>{ const s=String(c??''); return /[",;\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(';')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`servis_${trenutniPeriod}_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url); toast('CSV izvezen.');
};

document.getElementById('btnPDF').onclick=()=>{
  const arr=naloziUPeriodu();
  if(!arr.length){ toast('Nema naloga u periodu.'); return; }
  let promet=0,brojSaCijenom=0,zavrseno=0;
  arr.forEach(n=>{ if((n.status==='gotovo'||n.status==='preuzeto')&&n.cijena>0){ promet+=n.cijena; brojSaCijenom++; zavrseno++; } });
  const prosjek=brojSaCijenom?Math.round(promet/brojSaCijenom):0;
  const svLabel = statServiserId() ? ' · Serviser: '+serviserIme(statServiserId()) : '';
  const rows=arr.map(n=>`
    <tr><td>${esc(n.kod)}</td><td>${esc(n.ime)} ${esc(n.prezime)}</td><td>${esc(n.telefon)}</td>
    <td>${esc(n.kvar)}</td><td>${esc(serviserIme(n.serviser))}</td><td>${statusLabel(n.status)}</td>
    <td>${esc(n.uradjeno||'')}</td><td style="text-align:right">${n.cijena||0} KM</td><td>${fmtDatumKratko(n.createdAt)}</td></tr>`).join('');
  document.getElementById('izvjestaj').innerHTML=`
    <h2>Izvještaj servisa</h2>
    <div class="izv-period">${esc(periodLabel())}${esc(svLabel)} · izrađeno ${fmtDatum(Date.now())}</div>
    <div class="izv-summary">
      <div>Naloga u periodu<b>${arr.length}</b></div>
      <div>Završeno<b>${zavrseno}</b></div>
      <div>Promet<b>${promet} KM</b></div>
      <div>Prosječna cijena<b>${prosjek} KM</b></div>
    </div>
    <table><thead><tr><th>Kod</th><th>Klijent</th><th>Telefon</th><th>Kvar</th><th>Serviser</th><th>Status</th><th>Urađeno</th><th>Cijena</th><th>Primljen</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
  document.body.classList.add('print-izvjestaj-prep');
  document.body.classList.add('print-izvjestaj');
  setTimeout(()=>{ window.print(); document.body.classList.remove('print-izvjestaj-prep'); document.body.classList.remove('print-izvjestaj'); },100);
};
</script>
