<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servis</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1115;
    --card: #191c22;
    --elev: #22262e;
    --line: rgba(255,255,255,0.08);
    --txt: #e8eaed;
    --muted: #9aa0a8;
    --accent: #3b82f6;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #8b5cf6;
  }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--txt);
    line-height: 1.5;
    padding-bottom: 40px;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 14px; }

  header {
    text-align: center;
    padding: 18px 0 10px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header p { font-size: 12px; color: var(--muted); }

  /* TABOVI */
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--card);
    padding: 6px;
    border-radius: 14px;
    margin-bottom: 18px;
    position: sticky;
    top: 8px;
    z-index: 50;
    border: 1px solid var(--line);
  }
  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .tab.active { background: var(--accent); color: #fff; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* FORMA */
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 5px; }
  input, textarea, select {
    width: 100%;
    padding: 12px 14px;
    background: var(--elev);
    border: 1px solid var(--line);
    color: var(--txt);
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { min-height: 80px; resize: vertical; }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 18px;
    transition: transform 0.15s, opacity 0.2s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-green { background: var(--green); color: #05230f; }
  .btn-sm {
    padding: 8px 14px;
    font-size: 13px;
    border-radius: 9px;
    margin-top: 0;
    width: auto;
    font-weight: 600;
  }

  /* PRETRAGA / FILTER */
  .search-row { margin-bottom: 12px; }
  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 6px;
    margin-bottom: 14px;
    -webkit-overflow-scrolling: touch;
  }
  .filter-btn {
    flex-shrink: 0;
    padding: 7px 14px;
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--muted);
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* KARTICA NALOGA */
  .nalog {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .nalog-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
  }
  .nalog-kod {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--accent);
  }
  .nalog-ime { font-weight: 600; font-size: 15px; }
  .nalog-tel { font-size: 13px; color: var(--muted); }
  .nalog-tel a { color: var(--muted); text-decoration: none; }
  .nalog-kvar {
    font-size: 14px;
    margin: 8px 0;
    padding: 8px 10px;
    background: var(--elev);
    border-radius: 8px;
    border-left: 2px solid var(--accent);
  }
  .nalog-meta { font-size: 12px; color: var(--muted); }
  .nalog-uradjeno {
    font-size: 13px;
    margin-top: 6px;
    color: var(--txt);
  }
  .nalog-cijena {
    font-weight: 700;
    color: var(--green);
  }

  .status {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .status.primljen { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .status.u_radu   { background: rgba(245,158,11,0.15); color: #fcd34d; }
  .status.gotovo   { background: rgba(34,197,94,0.15); color: #86efac; }
  .status.preuzeto { background: rgba(255,255,255,0.08); color: var(--muted); }
  .status.otkazano { background: rgba(239,68,68,0.15); color: #fca5a5; }

  .nalog-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }
  .act {
    padding: 8px 14px;
    border: none;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .act-blue { background: var(--accent); color: #fff; }
  .act-green { background: var(--green); color: #05230f; }
  .act-gray { background: var(--elev); color: var(--txt); border: 1px solid var(--line); }
  .act-red { background: transparent; color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
  .act-print { background: var(--purple); color: #fff; }

  /* STATISTIKA */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
  }
  .stat-card.full { grid-column: 1 / -1; }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 800; }
  .stat-value.money { color: var(--green); }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .stat-section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 20px 0 10px;
  }
  .status-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .status-row b { font-weight: 700; }

  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
  }
  .empty div { font-size: 40px; margin-bottom: 10px; opacity: 0.4; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--elev);
    color: var(--txt);
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 14px;
    border: 1px solid var(--line);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 9999;
    animation: tin 0.25s ease;
  }
  @keyframes tin { from { opacity: 0; transform: translateX(-50%) translateY(12px); } }

  /* ===== MODAL ZAVRSETKA ===== */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    padding: 16px; z-index: 9000;
  }
  .modal-box {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    width: 100%; max-width: 420px;
  }
  .modal-box h3 { font-size: 18px; margin-bottom: 4px; }
  .modal-box .sub { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .modal-actions .btn { margin-top: 0; }

  /* ============================================================
     NALJEPNICA 62x29mm polozeno, tekst rotiran 90 (za Chrome)
     ============================================================ */
  #labela { display: none; }

  @media print {
    @page { size: 29mm 62mm; margin: 0; }
    html, body { background: #fff; margin: 0; padding: 0; max-width: none; }
    body > *:not(#labela) { display: none !important; }
    #labela {
      display: block !important;
      position: absolute; top: 0; left: 0;
    }
    #labela .sadrzaj {
      width: 62mm; height: 29mm;
      padding: 2mm 3mm;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      color: #000;
      transform: rotate(90deg);
      transform-origin: top left;
      position: absolute; top: 0; left: 29mm;
    }
    #labela .l-kod { font-size: 13pt; font-weight: bold; letter-spacing: 1px; }
    #labela .l-ime { font-size: 10pt; font-weight: bold; margin-top: 1mm; }
    #labela .l-tel { font-size: 9pt; }
    #labela .l-linija { font-size: 8pt; margin-top: 1mm; word-wrap: break-word; }
    #labela .l-cijena { font-size: 10pt; font-weight: bold; margin-top: 1mm; }
    #labela .l-datum { font-size: 6.5pt; color: #333; margin-top: 1mm; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>🔧 Servis</h1>
    <p>Prijem i praćenje popravki</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="prijem">Prijem</button>
    <button class="tab" data-tab="nalozi">Nalozi</button>
    <button class="tab" data-tab="stat">Statistika</button>
  </div>

  <!-- ===== PRIJEM ===== -->
  <div class="panel active" id="panel-prijem">
    <label>Ime</label>
    <input id="f_ime" placeholder="Dragan">
    <label>Prezime</label>
    <input id="f_prezime" placeholder="Trivković">
    <label>Telefon</label>
    <input id="f_tel" type="tel" placeholder="066 667 214">
    <label>Opis kvara / uređaj</label>
    <textarea id="f_kvar" placeholder="Telefon S24 ultra, razbijen ekran"></textarea>
    <button class="btn btn-primary" id="btnSacuvaj">💾 Sačuvaj i štampaj naljepnicu</button>
  </div>

  <!-- ===== NALOZI ===== -->
  <div class="panel" id="panel-nalozi">
    <div class="search-row">
      <input id="pretraga" placeholder="🔍 Pretraga — ime, telefon, kod...">
    </div>
    <div class="filters" id="filteri">
      <button class="filter-btn active" data-f="aktivni">Aktivni</button>
      <button class="filter-btn" data-f="svi">Svi</button>
      <button class="filter-btn" data-f="primljen">Primljeni</button>
      <button class="filter-btn" data-f="u_radu">U radu</button>
      <button class="filter-btn" data-f="gotovo">Gotovi</button>
      <button class="filter-btn" data-f="preuzeto">Preuzeti</button>
      <button class="filter-btn" data-f="otkazano">Otkazani</button>
    </div>
    <div id="listaNaloga"></div>
  </div>

  <!-- ===== STATISTIKA ===== -->
  <div class="panel" id="panel-stat">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Danas — novih</div>
        <div class="stat-value" id="s_danas_novih">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Danas — promet</div>
        <div class="stat-value money" id="s_danas_promet">0 KM</div>
        <div class="stat-sub" id="s_danas_zavrseno">0 završeno</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Mjesec — naloga</div>
        <div class="stat-value" id="s_mjesec_naloga">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Mjesec — promet</div>
        <div class="stat-value money" id="s_mjesec_promet">0 KM</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Prosječna cijena</div>
        <div class="stat-value money" id="s_prosjek">0 KM</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ukupno naloga</div>
        <div class="stat-value" id="s_ukupno">0</div>
      </div>
    </div>

    <div class="stat-section-title">Trenutno po statusu</div>
    <div class="status-row"><span>🔵 Primljeni</span><b id="c_primljen">0</b></div>
    <div class="status-row"><span>🟠 U radu</span><b id="c_u_radu">0</b></div>
    <div class="status-row"><span>🟢 Gotovi (čekaju preuzimanje)</span><b id="c_gotovo">0</b></div>
    <div class="status-row"><span>⚪ Preuzeti</span><b id="c_preuzeto">0</b></div>
  </div>
</div>

<!-- NALJEPNICA -->
<div id="labela">
  <div class="sadrzaj">
    <div class="l-kod" id="lb_kod"></div>
    <div class="l-ime" id="lb_ime"></div>
    <div class="l-tel" id="lb_tel"></div>
    <div class="l-linija" id="lb_linija"></div>
    <div class="l-cijena" id="lb_cijena"></div>
    <div class="l-datum" id="lb_datum"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getDatabase, ref, onValue, push, set, update, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
  authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
  databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kelt-pub-menu-2df61",
  storageBucket: "kelt-pub-menu-2df61.firebasestorage.app"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const naloziRef = ref(db, 'servis/nalozi');

let naloziCache = {};      // {id: nalog}
let trenutniFilter = 'aktivni';

// ---------- POMOCNE ----------
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
function esc(s) {
  return s ? String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])) : '';
}
function generisiKod() {
  const zn = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let k = "";
  for (let i = 0; i < 4; i++) k += zn[Math.floor(Math.random() * zn.length)];
  return k;
}
function fmtDatum(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('sr-RS') + '. ' +
         d.toLocaleTimeString('sr-RS', { hour: '2-digit', minute: '2-digit' });
}
function statusLabel(s) {
  return { primljen:'Primljen', u_radu:'U radu', gotovo:'Gotovo', preuzeto:'Preuzeto', otkazano:'Otkazano' }[s] || s;
}

// ---------- STAMPA ----------
function stampaj({ kod, ime, tel, linija, cijena, datum }) {
  document.getElementById('lb_kod').textContent = kod || '';
  document.getElementById('lb_ime').textContent = ime || '';
  document.getElementById('lb_tel').textContent = tel || '';
  document.getElementById('lb_linija').textContent = linija || '';
  document.getElementById('lb_cijena').textContent = cijena || '';
  document.getElementById('lb_datum').textContent = datum || '';
  window.print();
}

// ---------- TABOVI ----------
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'stat') racunajStatistiku();
  };
});

// ---------- PRIJEM ----------
document.getElementById('btnSacuvaj').onclick = async () => {
  const ime = document.getElementById('f_ime').value.trim();
  const prezime = document.getElementById('f_prezime').value.trim();
  const tel = document.getElementById('f_tel').value.trim();
  const kvar = document.getElementById('f_kvar').value.trim();

  if (!ime && !prezime) { toast('Unesite ime i prezime.'); return; }
  if (!tel) { toast('Unesite telefon.'); return; }
  if (!kvar) { toast('Unesite opis kvara.'); return; }

  const kod = generisiKod();
  const now = Date.now();
  const nalog = {
    kod, ime, prezime, telefon: tel, kvar,
    status: 'primljen',
    uradjeno: '', cijena: 0,
    createdAt: now, closedAt: null
  };

  try {
    const nRef = push(naloziRef);
    await set(nRef, nalog);

    // stampa prijemne naljepnice
    stampaj({
      kod,
      ime: (ime + ' ' + prezime).trim(),
      tel,
      linija: kvar,
      cijena: '',
      datum: fmtDatum(now)
    });

    // reset forme
    document.getElementById('f_ime').value = '';
    document.getElementById('f_prezime').value = '';
    document.getElementById('f_tel').value = '';
    document.getElementById('f_kvar').value = '';
    toast('Nalog ' + kod + ' sačuvan.');
  } catch (e) {
    console.error(e);
    toast('Greška: ' + e.message);
  }
};

// ---------- SLUSANJE NALOGA ----------
onValue(naloziRef, (snap) => {
  naloziCache = snap.val() || {};
  renderNaloge();
  if (document.getElementById('panel-stat').classList.contains('active')) racunajStatistiku();
});

// ---------- RENDER NALOGA ----------
document.getElementById('pretraga').addEventListener('input', renderNaloge);
document.querySelectorAll('.filter-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    trenutniFilter = b.dataset.f;
    renderNaloge();
  };
});

function renderNaloge() {
  const lista = document.getElementById('listaNaloga');
  const q = document.getElementById('pretraga').value.trim().toLowerCase();

  let arr = Object.entries(naloziCache).map(([id, n]) => ({ id, ...n }));
  arr.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  // filter
  arr = arr.filter(n => {
    if (trenutniFilter === 'svi') return true;
    if (trenutniFilter === 'aktivni') return n.status === 'primljen' || n.status === 'u_radu' || n.status === 'gotovo';
    return n.status === trenutniFilter;
  });

  // pretraga
  if (q) {
    arr = arr.filter(n => {
      const hay = `${n.kod} ${n.ime} ${n.prezime} ${n.telefon} ${n.kvar}`.toLowerCase();
      return hay.includes(q);
    });
  }

  if (!arr.length) {
    lista.innerHTML = `<div class="empty"><div>📭</div>Nema naloga za prikaz.</div>`;
    return;
  }

  lista.innerHTML = arr.map(n => {
    const punoIme = `${esc(n.ime)} ${esc(n.prezime)}`.trim();
    let actions = '';
    if (n.status === 'primljen') {
      actions += `<button class="act act-blue" data-act="rad" data-id="${n.id}">▶️ Počni rad</button>`;
    } else if (n.status === 'u_radu') {
      actions += `<button class="act act-green" data-act="zavrsi" data-id="${n.id}">✅ Završi</button>`;
    } else if (n.status === 'gotovo') {
      actions += `<button class="act act-blue" data-act="izdaj" data-id="${n.id}">📤 Izdaj</button>`;
      actions += `<button class="act act-print" data-act="reprint" data-id="${n.id}">🖨️ Naljepnica</button>`;
    }
    if (n.status !== 'preuzeto' && n.status !== 'otkazano') {
      actions += `<button class="act act-red" data-act="otkazi" data-id="${n.id}">Otkaži</button>`;
    }

    const uradjenoHtml = (n.status === 'gotovo' || n.status === 'preuzeto') && (n.uradjeno || n.cijena)
      ? `<div class="nalog-uradjeno">Urađeno: ${esc(n.uradjeno) || '—'} · <span class="nalog-cijena">${n.cijena || 0} KM</span></div>`
      : '';

    return `
      <div class="nalog">
        <div class="nalog-top">
          <div>
            <div class="nalog-kod">${esc(n.kod)}</div>
            <div class="nalog-ime">${punoIme}</div>
            <div class="nalog-tel"><a href="tel:${esc(n.telefon)}">${esc(n.telefon)}</a></div>
          </div>
          <span class="status ${n.status}">${statusLabel(n.status)}</span>
        </div>
        <div class="nalog-kvar">${esc(n.kvar)}</div>
        ${uradjenoHtml}
        <div class="nalog-meta">Primljen: ${fmtDatum(n.createdAt)}${n.closedAt ? ' · Gotovo: ' + fmtDatum(n.closedAt) : ''}</div>
        <div class="nalog-actions">${actions}</div>
      </div>
    `;
  }).join('');

  // vezi akcije
  lista.querySelectorAll('.act').forEach(btn => {
    btn.onclick = () => rukujAkciju(btn.dataset.act, btn.dataset.id);
  });
}

// ---------- AKCIJE NAD NALOGOM ----------
async function rukujAkciju(act, id) {
  const n = naloziCache[id];
  if (!n) return;

  if (act === 'rad') {
    await update(ref(db, 'servis/nalozi/' + id), { status: 'u_radu' });
    toast('Nalog ' + n.kod + ' — u radu.');
  }
  else if (act === 'izdaj') {
    await update(ref(db, 'servis/nalozi/' + id), { status: 'preuzeto' });
    toast('Nalog ' + n.kod + ' izdat.');
  }
  else if (act === 'otkazi') {
    if (!confirm('Otkazati nalog ' + n.kod + '?')) return;
    await update(ref(db, 'servis/nalozi/' + id), { status: 'otkazano' });
    toast('Nalog ' + n.kod + ' otkazan.');
  }
  else if (act === 'reprint') {
    stampaj({
      kod: n.kod,
      ime: `${n.ime} ${n.prezime}`.trim(),
      tel: n.telefon,
      linija: 'Urađeno: ' + (n.uradjeno || '—'),
      cijena: 'Cijena: ' + (n.cijena || 0) + ' KM',
      datum: fmtDatum(n.closedAt || n.createdAt)
    });
  }
  else if (act === 'zavrsi') {
    otvoriModalZavrsetka(id, n);
  }
}

// ---------- MODAL ZAVRSETKA ----------
function otvoriModalZavrsetka(id, n) {
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <div class="modal-box">
      <h3>Završetak — ${esc(n.kod)}</h3>
      <div class="sub">${esc(n.ime)} ${esc(n.prezime)} · ${esc(n.telefon)}</div>
      <label>Šta je urađeno</label>
      <textarea id="m_uradjeno" placeholder="Zamjena stakla">${esc(n.uradjeno || '')}</textarea>
      <label>Cijena (KM)</label>
      <input id="m_cijena" type="number" inputmode="numeric" placeholder="120" value="${n.cijena || ''}">
      <div class="modal-actions">
        <button class="btn act-gray" id="m_odustani">Odustani</button>
        <button class="btn btn-green" id="m_potvrdi">✅ Završi i štampaj</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  modal.querySelector('#m_odustani').onclick = () => modal.remove();
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };

  modal.querySelector('#m_potvrdi').onclick = async () => {
    const uradjeno = modal.querySelector('#m_uradjeno').value.trim();
    const cijena = parseFloat(modal.querySelector('#m_cijena').value) || 0;
    if (!uradjeno) { toast('Unesite šta je urađeno.'); return; }

    const now = Date.now();
    await update(ref(db, 'servis/nalozi/' + id), {
      status: 'gotovo',
      uradjeno,
      cijena,
      closedAt: now
    });
    modal.remove();

    // stampa zavrsne naljepnice
    stampaj({
      kod: n.kod,
      ime: `${n.ime} ${n.prezime}`.trim(),
      tel: n.telefon,
      linija: 'Urađeno: ' + uradjeno,
      cijena: 'Cijena: ' + cijena + ' KM',
      datum: fmtDatum(now)
    });
    toast('Nalog ' + n.kod + ' završen.');
  };
}

// ---------- STATISTIKA ----------
function racunajStatistiku() {
  const arr = Object.values(naloziCache);
  const now = new Date();
  const danasStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const mjesecStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

  let danasNovih = 0, danasZavrseno = 0, danasPromet = 0;
  let mjesecNaloga = 0, mjesecPromet = 0;
  let sumCijena = 0, brojSaCijenom = 0;
  const brojac = { primljen: 0, u_radu: 0, gotovo: 0, preuzeto: 0, otkazano: 0 };

  for (const n of arr) {
    if (n.status && brojac[n.status] !== undefined) brojac[n.status]++;

    if (n.createdAt >= danasStart) danasNovih++;
    if (n.createdAt >= mjesecStart) mjesecNaloga++;

    // promet racunamo po zatvaranju (gotovo/preuzeto sa cijenom)
    const naplacen = (n.status === 'gotovo' || n.status === 'preuzeto') && n.cijena > 0;
    if (naplacen) {
      sumCijena += n.cijena;
      brojSaCijenom++;
      if (n.closedAt >= danasStart) { danasZavrseno++; danasPromet += n.cijena; }
      if (n.closedAt >= mjesecStart) { mjesecPromet += n.cijena; }
    }
  }

  document.getElementById('s_danas_novih').textContent = danasNovih;
  document.getElementById('s_danas_promet').textContent = danasPromet + ' KM';
  document.getElementById('s_danas_zavrseno').textContent = danasZavrseno + ' završeno';
  document.getElementById('s_mjesec_naloga').textContent = mjesecNaloga;
  document.getElementById('s_mjesec_promet').textContent = mjesecPromet + ' KM';
  document.getElementById('s_prosjek').textContent = (brojSaCijenom ? Math.round(sumCijena / brojSaCijenom) : 0) + ' KM';
  document.getElementById('s_ukupno').textContent = arr.length;

  document.getElementById('c_primljen').textContent = brojac.primljen;
  document.getElementById('c_u_radu').textContent = brojac.u_radu;
  document.getElementById('c_gotovo').textContent = brojac.gotovo;
  document.getElementById('c_preuzeto').textContent = brojac.preuzeto;
}
</script>
