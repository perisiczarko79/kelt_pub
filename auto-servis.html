<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KlikHub - Auto servis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0A0C10;
            --bg-secondary: #14161C;
            --bg-card: #1A1D25;
            --bg-elevated: #22252E;
            --accent-primary: #E85D04;
            --accent-secondary: #FFBA08;
            --accent-glow: rgba(232, 93, 4, 0.2);
            --success: #2E7D32;
            --warning: #F59E0B;
            --danger: #DC2626;
            --info: #3B82F6;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A5B5;
            --text-tertiary: #6B7280;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-medium: rgba(255, 255, 255, 0.12);
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 20px rgba(232, 93, 4, 0.3);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 16px;
            background-image: radial-gradient(circle at 25% 0%, rgba(232, 93, 4, 0.05) 0%, transparent 50%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            padding: 16px 24px;
            border-radius: var(--radius-xl);
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .brand-icon { font-size: 2rem; }
        
        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .brand span {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        
        /* MODE BUTTONS - veliki, jasni */
        .mode-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .mode-btn i { font-size: 1.5rem; }
        
        .mode-btn:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }
        
        .mode-btn.active {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #F48C06 100%);
            border-color: var(--accent-primary);
            color: white;
            box-shadow: var(--shadow-glow);
        }
        
        /* PANELS */
        .panel { display: none; }
        .panel.active { display: block; }
        
        /* CONTACT BAR */
        .contact-bar {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
            border-radius: var(--radius-lg);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }
        
        .contact-item i { color: var(--accent-primary); font-size: 1.1rem; }
        .contact-item a {
            color: var(--text-primary);
            text-decoration: none;
            transition: var(--transition-base);
        }
        .contact-item a:hover { color: var(--accent-primary); }
        
        /* DASHBOARD STATS - za gazdu */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--border-light);
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 4px;
        }
        
        /* DATE PICKER - veliki, jednostavan */
        .date-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .date-selector input[type="date"] {
            padding: 14px 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-medium);
            font-size: 1.1rem;
            background: var(--bg-card);
            color: var(--text-primary);
            flex: 1;
            min-width: 200px;
        }
        
        .date-selector input[type="date"]:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .btn {
            padding: 14px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-base);
            border: none;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #F48C06 100%);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-success:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-danger:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-medium);
        }
        
        .btn-secondary:hover {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--accent-primary);
        }
        
        .btn-warning {
            background: var(--warning);
            color: #1a2a1f;
        }
        
        .btn-warning:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }
        
        .btn-lg {
            padding: 18px 32px;
            font-size: 1.2rem;
        }
        
        /* TIME SLOTS - veliki dugmadi za mehaničare */
        .time-slots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        
        .time-btn {
            padding: 16px 8px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            background: var(--bg-card);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-base);
            text-align: center;
        }
        
        .time-btn:hover:not(.disabled) {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }
        
        .time-btn.free {
            background: var(--bg-card);
            border-color: var(--border-medium);
        }
        
        .time-btn.booked {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
            cursor: not-allowed;
        }
        
        .time-btn.pending {
            background: var(--warning);
            border-color: var(--warning);
            color: #1a2a1f;
            cursor: not-allowed;
        }
        
        .time-btn.in-progress {
            background: var(--info);
            border-color: var(--info);
            color: white;
            cursor: pointer;
        }
        
        .time-btn.completed {
            background: var(--success);
            border-color: var(--success);
            color: white;
            cursor: not-allowed;
        }
        
        .time-btn.blocked {
            background: var(--bg-elevated);
            border-color: var(--border-light);
            color: var(--text-tertiary);
            cursor: not-allowed;
            opacity: 0.5;
            text-decoration: line-through;
        }
        
        .time-btn.selected {
            border: 3px solid var(--accent-primary);
            box-shadow: var(--shadow-glow);
            transform: scale(0.98);
        }
        
        .time-btn .vehicle-info {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: block;
            margin-top: 4px;
        }
        
        .time-btn.booked .vehicle-info,
        .time-btn.in-progress .vehicle-info,
        .time-btn.completed .vehicle-info {
            color: rgba(255,255,255,0.7);
        }
        
        /* SERVICE CARDS - za pregled termina */
        .service-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 18px;
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            transition: var(--transition-base);
        }
        
        .service-card:hover {
            border-color: var(--accent-primary);
        }
        
        .service-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 8px;
        }
        
        .service-card-header .time {
            font-weight: 700;
            color: var(--accent-primary);
            font-size: 1.1rem;
        }
        
        .service-card-header .client {
            font-weight: 600;
            font-size: 1.05rem;
        }
        
        .service-card-header .vehicle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .service-card-body {
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding-left: 12px;
            border-left: 2px solid var(--accent-primary);
            margin-top: 8px;
        }
        
        .service-card-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        
        .service-card-actions .btn {
            padding: 10px 18px;
            font-size: 0.85rem;
        }
        
        /* STATUS BADGE - veliki i jasni */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-confirmed { background: rgba(46, 125, 50, 0.2); color: #4CAF50; border: 1px solid rgba(76, 175, 80, 0.3); }
        .status-in-progress { background: rgba(59, 130, 246, 0.2); color: var(--info); border: 1px solid rgba(59, 130, 246, 0.3); }
        .status-completed { background: rgba(46, 125, 50, 0.2); color: #4CAF50; border: 1px solid rgba(76, 175, 80, 0.3); }
        .status-cancelled { background: rgba(220, 38, 38, 0.2); color: var(--danger); border: 1px solid rgba(220, 38, 38, 0.3); }
        
        /* MODAL - veliki, jednostavan */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        
        .modal-content {
            background: var(--bg-secondary);
            max-width: 600px;
            width: 100%;
            padding: 32px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-medium);
            animation: modalSlideIn 0.3s ease;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-content h3 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .modal-content .form-group {
            margin-bottom: 18px;
        }
        
        .modal-content label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
        
        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-medium);
            font-size: 1rem;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: var(--transition-fast);
        }
        
        .modal-content input:focus,
        .modal-content select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .modal-content textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        
        .modal-actions .btn {
            padding: 14px 28px;
        }
        
        /* WORKSHOP VIEW - veliki prikaz za mehaničare */
        .workshop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .workshop-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--border-light);
            transition: var(--transition-base);
        }
        
        .workshop-card:hover {
            border-color: var(--accent-primary);
        }
        
        .workshop-card .time-big {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .workshop-card .client-big {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 8px 0 4px;
        }
        
        .workshop-card .vehicle-big {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        
        .workshop-card .service-big {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 8px;
            padding: 8px 12px;
            background: var(--bg-elevated);
            border-radius: var(--radius-sm);
        }
        
        .workshop-card .actions-big {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .workshop-card .actions-big .btn {
            flex: 1;
            justify-content: center;
            padding: 14px;
            font-size: 1rem;
        }
        
        /* LOGIN */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
        }
        
        .login-box {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: var(--radius-xl);
            max-width: 380px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--accent-primary);
            animation: modalSlideIn 0.3s ease;
        }
        
        .login-box i { font-size: 48px; color: var(--accent-primary); margin-bottom: 20px; }
        .login-box h3 { font-size: 1.5rem; margin-bottom: 8px; }
        .login-box p { color: var(--text-secondary); margin-bottom: 20px; }
        .login-box input {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-medium);
            font-size: 1rem;
            background: var(--bg-card);
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        .login-box input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            color: var(--accent-primary);
            padding: 16px 32px;
            border-radius: 50px;
            z-index: 3000;
            font-weight: 600;
            border: 1px solid var(--accent-primary);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideUp 0.3s ease, fadeOut 0.3s ease 3s forwards;
            font-size: 1rem;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        
        /* FOOTER */
        .footer {
            margin-top: 32px;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
            border-top: 1px solid var(--border-light);
            text-align: center;
            border-radius: var(--radius-xl);
        }
        
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .copyright { font-size: 0.7rem; color: var(--text-tertiary); }
        .footer-links { display: flex; gap: 16px; }
        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.75rem;
            transition: var(--transition-base);
        }
        .footer-links a:hover { color: var(--accent-primary); }
        
        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-tertiary);
        }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .header { flex-direction: column; text-align: center; }
            .mode-btn { padding: 12px; font-size: 0.9rem; }
            .mode-btn i { font-size: 1.2rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .time-slots { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
            .workshop-grid { grid-template-columns: 1fr; }
            .workshop-card .actions-big .btn { flex: 1 1 100%; }
            .contact-bar { gap: 12px; }
            .modal-content { padding: 20px; }
            .date-selector input[type="date"] { font-size: 0.9rem; }
            .btn { padding: 12px 18px; font-size: 0.9rem; }
        }
        
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .time-slots { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; }
            .time-btn { padding: 12px 4px; font-size: 0.8rem; }
            .service-card-actions .btn { flex: 1 1 100%; }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="brand">
            <span class="brand-icon">🔧</span>
            <div>
                <h1>KlikHub Auto servis</h1>
                <span>Upravljanje radionicom</span>
            </div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <span id="currentUserDisplay" style="color: var(--text-secondary); font-size: 0.9rem;"></span>
            <button id="logoutBtn" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.8rem; display: none;">
                <i class="fas fa-sign-out-alt"></i> Odjava
            </button>
        </div>
    </div>

    <!-- CONTACT BAR -->
    <div class="contact-bar">
        <div class="contact-item"><i class="fas fa-phone-alt"></i> <a href="tel:+38765387281">+387 65 387 281</a></div>
        <div class="contact-item"><i class="fas fa-envelope"></i> <a href="mailto:klikhub.app@gmail.com">klikhub.app@gmail.com</a></div>
        <div class="contact-item"><i class="fas fa-clock"></i> Pon - Sub: 08-17h</div>
    </div>

    <!-- MODE BUTTONS -->
    <div class="mode-buttons">
        <button class="mode-btn active" data-mode="admin" onclick="switchMode('admin')">
            <i class="fas fa-chart-line"></i> Admin <span style="font-size:0.8rem;font-weight:400;color:var(--text-secondary);">(gazda)</span>
        </button>
        <button class="mode-btn" data-mode="workshop" onclick="switchMode('workshop')">
            <i class="fas fa-wrench"></i> Radionica <span style="font-size:0.8rem;font-weight:400;color:var(--text-secondary);">(mehaničari)</span>
        </button>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="panel active">
        <!-- Statistika -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="statToday">0</div>
                <div class="stat-label">Današnjih termina</div>
            </div>

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m]));
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const [y, m, d] = dateStr.split('-');
        return `${d}.${m}.${y}.`;
    }

    function getToday() {
        return new Date().toISOString().split('T')[0];
    }

    function getTimeSlotsForDate(date) {
        const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
        const dayOfWeek = dayNames[new Date(date).getDay()];
        const dayData = workingHours[dayOfWeek];
        if (!dayData || !dayData.enabled) return [];
        const slots = [];
        for (const interval of dayData.intervals) {
            let [sh, sm] = interval.start.split(':').map(Number);
            let [eh, em] = interval.end.split(':').map(Number);
            let start = sh * 60 + sm;
            let end = eh * 60 + em;
            for (let t = start; t < end; t += slotInterval) {
                slots.push(`${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}`);
            }
        }
        return slots;
    }

    function getSlotsForDuration(startTime, durationMinutes) {
        const slots = [];
        let [h, m] = startTime.split(':').map(Number);
        let total = h * 60 + m;
        let remaining = durationMinutes;
        while (remaining > 0) {
            slots.push(`${Math.floor(total/60).toString().padStart(2,'0')}:${(total%60).toString().padStart(2,'0')}`);
            total += slotInterval;
            remaining -= slotInterval;
        }
        return slots;
    }

                monday: { enabled: true, intervals: [{ start: "08:00", end: "17:00" }] },
                tuesday: { enabled: true, intervals: [{ start: "08:00", end: "17:00" }] },
                wednesday: { enabled: true, intervals: [{ start: "08:00", end: "17:00" }] },

            await set(workingHoursRef, workingHours);
        }
    }

    async function loadSettings() {
        const snap = await get(settingsRef);
        if (snap.exists()) {
            if (snap.val().adminPassword) adminPassword = snap.val().adminPassword;
            if (snap.val().workshopPassword) workshopPassword = snap.val().workshopPassword;
            if (snap.val().slotInterval) slotInterval = snap.val().slotInterval;
        }
    }

    async function loadBlockedSlotsForDate(date) {
        const snap = await get(ref(db, `autoServis/${shopId}/blockedSlots/${date}`));
        return snap.exists() ? Object.keys(snap.val()) : [];
    }

    async function loadAppointmentsForDate(date) {
        const snap = await get(appointmentsRef);
        const all = snap.val() || {};
        const result = [];
        for (const [id, app] of Object.entries(all)) {
            if (app.date === date) {
                result.push({ id, ...app });
            }
        }
        result.sort((a,b) => a.time.localeCompare(b.time));
        return result;
    }

    async function loadAllAppointments() {
        const snap = await get(appointmentsRef);
        return snap.val() || {};
    }

    // RENDER ADMIN TIME SLOTS
    async function renderAdminTimeSlots() {
        const date = document.getElementById('adminDatePicker').value;
        if (!date) {
            document.getElementById('adminTimeSlots').innerHTML = '<div class="empty-state"><i class="fas fa-calendar-times"></i><br>Odaberite datum</div>';
            return;
        }

        const [appointments, blocked] = await Promise.all([
            loadAppointmentsForDate(date),
            loadBlockedSlotsForDate(date)
        ]);

        const allSlots = getTimeSlotsForDate(date);
        const container = document.getElementById('adminTimeSlots');
        container.innerHTML = '';

        if (allSlots.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-moon"></i><br>Nema radnih termina</div>';
            return;
        }

        const occupied = new Map();
        for (const app of appointments) {
            const duration = servicesList.find(s => s.name === app.service)?.duration || 60;
            const slots = getSlotsForDuration(app.time, duration);
            for (const s of slots) {
                occupied.set(s, { id: app.id, status: app.status, data: app });
            }
        }
        for (const s of blocked) {
            occupied.set(s, { status: 'blocked' });
        }

        for (const slot of allSlots) {
            const btn = document.createElement('button');
            btn.className = 'time-btn';
            const occ = occupied.get(slot);

            if (occ) {
                if (occ.status === 'blocked') {
                    btn.classList.add('blocked');
                    btn.innerHTML = `${slot}<span class="vehicle-info">🔒 Blokirano</span>`;
                } else if (occ.status === 'pending') {
                    btn.classList.add('pending');
                    btn.innerHTML = `${slot}<span class="vehicle-info">⏳ ${escapeHtml(occ.data.clientName)}</span>`;
                    btn.onclick = () => showAppointmentDetails(occ.id, occ.data);
                } else if (occ.status === 'confirmed') {
                    btn.classList.add('booked');
                    btn.innerHTML = `${slot}<span class="vehicle-info">📅 ${escapeHtml(occ.data.clientName)}</span>`;
                    btn.onclick = () => showAppointmentDetails(occ.id, occ.data);
                } else if (occ.status === 'in-progress') {
                    btn.classList.add('in-progress');
                    btn.innerHTML = `${slot}<span class="vehicle-info">🔧 ${escapeHtml(occ.data.clientName)}</span>`;
                    btn.onclick = () => showAppointmentDetails(occ.id, occ.data);
                } else if (occ.status === 'completed') {
                    btn.classList.add('completed');
                    btn.innerHTML = `${slot}<span class="vehicle-info">✅ Završeno</span>`;
                    btn.onclick = () => showAppointmentDetails(occ.id, occ.data);
                } else {
                    btn.classList.add('booked');
                    btn.innerHTML = `${slot}<span class="vehicle-info">📌 Rezervisano</span>`;
                }
            } else {
                btn.classList.add('free');
                btn.innerHTML = `${slot}<span class="vehicle-info">🔓 Slobodno</span>`;
                btn.onclick = () => {
                    showAddAppointmentModalWithTime(date, slot);
                };
            }
            container.appendChild(btn);
        }
    }

        const client = document.getElementById('appClient').value.trim();
        const phone = document.getElementById('appPhone').value.trim();
        const vehicle = document.getElementById('appVehicle').value.trim();
        const model = document.getElementById('appModel').value.trim();
        const serviceSelect = document.getElementById('appService');
        const service = serviceSelect.value;
        const note = document.getElementById('appNote').value.trim();

        if (!date || !time || !client || !service) {
            showToast('Popunite sva obavezna polja (datum, vrijeme, ime, usluga)');
            return;
        }

        const duration = parseInt(serviceSelect.options[serviceSelect.selectedIndex]?.getAttribute('data-duration')) || 60;
        const slotsToOccupy = getSlotsForDuration(time, duration);

        // Provjera preklapanja
        const [appointments, blocked] = await Promise.all([
            loadAppointmentsForDate(date),
            loadBlockedSlotsForDate(date)
        ]);

        const occupied = new Set(blocked);
        for (const app of appointments) {
            const d = servicesList.find(s => s.name === app.service)?.duration || 60;
            for (const s of getSlotsForDuration(app.time, d)) occupied.add(s);
        }

        if (slotsToOccupy.some(s => occupied.has(s))) {
            showToast('Termin nije slobodan za odabranu uslugu');
            return;
        }

        try {
            await push(appointmentsRef, {
                date, time, clientName: client, phone, vehicle, model,
                service, note, status: 'pending', createdAt: Date.now()
            });
            showToast('✅ Termin dodan!');
            closeModal('appointmentModal');
            refreshAllViews();
        } catch(e) {
            showToast('Greška: ' + e.message);
        }
    };

    // BLOCK
    window.showBlockModal = function() {
        const date = document.getElementById('adminDatePicker').value || getToday();
        document.getElementById('blockDate').value = date;
        populateBlockTimeSelect();
        document.getElementById('blockModal').style.display = 'flex';
    };

    async function populateBlockTimeSelect() {
        const date = document.getElementById('blockDate').value;
        const select = document.getElementById('blockTime');
        select.innerHTML = '';
        if (!date) return;

        const [appointments, blocked] = await Promise.all([
            loadAppointmentsForDate(date),
            loadBlockedSlotsForDate(date)
        ]);
        const allSlots = getTimeSlotsForDate(date);

        const occupied = new Set(blocked);
        for (const app of appointments) {
            const d = servicesList.find(s => s.name === app.service)?.duration || 60;
            for (const s of getSlotsForDuration(app.time, d)) occupied.add(s);
        }

        const freeSlots = allSlots.filter(s => !occupied.has(s));
        if (freeSlots.length === 0) {
            select.innerHTML = '<option value="">Nema slobodnih termina</option>';
            select.disabled = true;
        } else {
            select.disabled = false;
            freeSlots.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                select.appendChild(opt);
            });
        }
    }

    window.saveBlock = async function() {
        const date = document.getElementById('blockDate').value;
        const time = document.getElementById('blockTime').value;
        const reason = document.getElementById('blockReason').value.trim() || 'Blokirano';

        if (!date || !time) {
            showToast('Odaberite datum i termin');
            return;
        }

        try {
            await set(ref(db, `autoServis/${shopId}/blockedSlots/${date}/${time}`), { reason, blockedAt: Date.now() });
            showToast(`🔒 Termin ${time} blokiran`);
            closeModal('blockModal');
            refreshAllViews();
        } catch(e) {
            showToast('Greška: ' + e.message);
        }
    };

    // REFRESH
    function refreshAllViews() {
        renderAdminTimeSlots();
        renderAdminList();
        renderWorkshopView();
        updateStats();
    }

    window.refreshAdminView = function() {
        renderAdminTimeSlots();
        renderAdminList();
        updateStats();
    };

    window.refreshWorkshopView = function() {
        renderWorkshopView();
    };

    // UPDATE STATS
    async function updateStats() {
        const today = getToday();
        const appointments = await loadAppointmentsForDate(today);
        document.getElementById('statToday').textContent = appointments.length;
        document.getElementById('statPending').textContent = appointments.filter(a => a.status === 'pending').length;
        document.getElementById('statInProgress').textContent = appointments.filter(a => a.status === 'in-progress').length;
        document.getElementById('statCompleted').textContent = appointments.filter(a => a.status === 'completed').length;
    }

    // SWITCH MODE
    window.switchMode = function(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

        if (mode === 'admin') {
            document.getElementById('adminPanel').classList.add('active');
            renderAdminTimeSlots();
            renderAdminList();
            updateStats();
        } else {
            document.getElementById('workshopPanel').classList.add('active');
            renderWorkshopView();
        }
    };

    // DATE CHANGE LISTENERS
    document.getElementById('adminDatePicker').addEventListener('change', () => {
        renderAdminTimeSlots();
        renderAdminList();
    });

    document.getElementById('workshopDatePicker').addEventListener('change', renderWorkshopView);

    document.getElementById('appDate').addEventListener('change', populateTimeSelect);
    document.getElementById('blockDate').addEventListener('change', populateBlockTimeSelect);

    // START REALTIME LISTENERS
    function startRealtimeSync() {
        if (appointmentsListener) off(appointmentsRef, 'value', appointmentsListener);
        appointmentsListener = onValue(appointmentsRef, () => {
            if (currentMode === 'admin') {
                renderAdminTimeSlots();
                renderAdminList();
                updateStats();
            } else {
                renderWorkshopView();
            }
        });
    }

    // SETUP DATE PICKERS
    const today = getToday();
    document.getElementById('adminDatePicker').value = today;
    document.getElementById('workshopDatePicker').value = today;
    document.getElementById('appDate').value = today;
    document.getElementById('blockDate').value = today;

    // LOGIN
    function showLogin(role) {
        const overlay = document.createElement('div');
        overlay.className = 'login-overlay';
        overlay.id = 'loginOverlay';
        const isAdmin = role === 'admin';
        overlay.innerHTML = `
            <div class="login-box">
                <i class="fas ${isAdmin ? 'fa-chart-line' : 'fa-wrench'}"></i>
                <h3>${isAdmin ? '👑 Admin prijava' : '🔧 Radionica prijava'}</h3>
                <p>${isAdmin ? 'Pristup za gazdu' : 'Pristup za mehaničare'}</p>
                <input type="password" id="loginPass" placeholder="Unesite šifru">
                <button class="btn btn-primary" style="width:100%;justify-content:center;" id="loginBtn">Prijavi se</button>
                <button class="btn btn-secondary" style="width:100%;justify-content:center;margin-top:8px;" id="loginCancelBtn">Otkaži</button>
            </div>
        `;
        document.body.appendChild(overlay);

        const loginBtn = document.getElementById('loginBtn');
        const loginCancel = document.getElementById('loginCancelBtn');
        const passInput = document.getElementById('loginPass');

        const attemptLogin = () => {
            const pass = passInput.value;
            const correct = isAdmin ? adminPassword : workshopPassword;
            if (pass === correct) {
                isLoggedIn = true;
                currentUser = isAdmin ? 'admin' : 'workshop';
                overlay.remove();
                document.getElementById('currentUserDisplay').textContent = isAdmin ? '👑 Admin' : '🔧 Radionica';
                document.getElementById('logoutBtn').style.display = 'inline-block';

                if (isAdmin) {
                    switchMode('admin');
                    document.getElementById('adminPanel').classList.add('active');
                } else {
                    switchMode('workshop');
                    document.getElementById('workshopPanel').classList.add('active');
                }
                showToast(`✅ Prijavljeni ste kao ${isAdmin ? 'Admin' : 'Radionica'}`);
                startRealtimeSync();
                refreshAllViews();
            } else {
                showToast('❌ Pogrešna šifra');
                passInput.value = '';
            }
        };

        loginBtn.onclick = attemptLogin;
        passInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });
        loginCancel.onclick = () => overlay.remove();

        // Fokus
        setTimeout(() => passInput.focus(), 200);
    }

    // LOGOUT
    document.getElementById('logoutBtn').onclick = () => {
        isLoggedIn = false;
        currentUser = null;
        document.getElementById('currentUserDisplay').textContent = '';
        document.getElementById('logoutBtn').style.display = 'none';
        if (appointmentsListener) off(appointmentsRef, 'value', appointmentsListener);
        // Sakrij sve panele i prikaži login ponovo
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        showLogin('admin');
    };

    // INIT
    async function init() {
        await Promise.all([loadServices(), loadWorkingHours(), loadSettings()]);
        // Prikaži login za admina (gazda prvi ulazi)
        showLogin('admin');
    }

    // Console info
    console.log('🚗 KlikHub Auto servis');
    console.log('🔧 Admin šifra:', adminPassword);
    console.log('🔧 Radionica šifra:', workshopPassword);

    init();

    // Global za modal zatvaranje klikom van
    document.getElementById('appointmentModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal('appointmentModal');
    });
    document.getElementById('blockModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal('blockModal');
    });
</script>

</body>
</html>
