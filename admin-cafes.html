<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upravljanje kafićima</title>
    <style>
        body { font-family: sans-serif; background: #0a0e0b; color: #f4ebd0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1a1e1a; padding: 20px; border-radius: 16px; }
        input, button { padding: 8px 12px; margin: 5px; border-radius: 8px; border: none; }
        button { background: #d4af37; color: black; cursor: pointer; font-weight: bold; }
        .cafe-list { margin-top: 20px; }
        .cafe-item { background: #2a2e2a; margin: 10px 0; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .cafe-id { font-family: monospace; background: #000; padding: 4px 8px; border-radius: 4px; }
        .link { color: #d4af37; text-decoration: none; }
        .delete-btn { background: #a00; color: white; }
        .orphan { border-left: 4px solid #ff9800; background: #3a2a1a; }
        .login-box { text-align: center; margin-top: 50px; }
        input[type="password"] { background: #333; color: white; border: 1px solid #d4af37; }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>Upravljanje kafićima</h1>
    <div id="loginSection">
        <h2>Prijava</h2>
        <input type="password" id="masterPass" placeholder="Master šifra">
        <button id="loginBtn">Prijavi se</button>
    </div>
    <div id="adminSection" style="display: none;">
        <div>
            <h3>Dodaj novi kafić</h3>
            <input type="text" id="newCafeId" placeholder="ID kafića (npr. gradski_pub)">
            <input type="text" id="newCafeName" placeholder="Naziv (opciono)">
            <button id="addCafeBtn">Dodaj</button>
        </div>
        <h3>📋 Aktivni kafići</h3>
        <div class="cafe-list" id="cafeList"></div>
        <h3>⚠️ Neregistrovani (orphan) kafići (nisu u /cafes, ali imaju podatke)</h3>
        <div class="cafe-list" id="orphanList"></div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, get, set, remove, push, onValue, list } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app",
        messagingSenderId: "1026702086011",
        appId: "1:1026702086011:web:8162de6bad4f18b731b7de",
        measurementId: "G-3095YK50QM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const cafesRef = ref(db, 'cafes');

    function checkAuth() {
        return sessionStorage.getItem('master_auth') === 'true';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => (m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'));
    }

    // Prikazuje kafiće iz /cafes (registrovane)
    function renderRegisteredCafes() {
        const listDiv = document.getElementById('cafeList');
        onValue(cafesRef, (snapshot) => {
            const data = snapshot.val();
            listDiv.innerHTML = '';
            if (data) {
                for (let [id, info] of Object.entries(data)) {
                    const div = document.createElement('div');
                    div.className = 'cafe-item';
                    div.innerHTML = `
                        <div>
                            <strong>${escapeHtml(info.name || id)}</strong><br>
                            <span class="cafe-id">${id}</span><br>
                            <a class="link" href="index.html?cafe=${id}" target="_blank">🔗 Otvori meni</a>
                        </div>
                        <button class="delete-btn" data-id="${id}" data-type="registered">Obriši</button>
                    `;
                    listDiv.appendChild(div);
                }
                attachDeleteEvents();
            } else {
                listDiv.innerHTML = '<p>Nema dodanih kafića.</p>';
            }
        });
    }

    // Pronalazi sve root čvorove koji liče na kafiće (imaju categories, menuItems ili settings)
    // a nisu u /cafes listi
    async function renderOrphanCafes() {
        const orphanDiv = document.getElementById('orphanList');
        orphanDiv.innerHTML = '<p>Učitavanje...</p>';
        try {
            // Dohvati sve root čvorove (prvi nivo)
            const rootSnapshot = await get(ref(db, '/'));
            const rootData = rootSnapshot.val();
            if (!rootData) {
                orphanDiv.innerHTML = '<p>Nema podataka.</p>';
                return;
            }
            // Dohvati registrovane ID-eve iz /cafes
            const cafesSnap = await get(cafesRef);
            const registered = cafesSnap.val() ? Object.keys(cafesSnap.val()) : [];
            const orphanCandidates = [];
            for (const [key, value] of Object.entries(rootData)) {
                // Izuzmi sistematske čvorove (masterPassword, cafes, fishingCatalog, itd.)
                if (key === 'masterPassword' || key === 'cafes' || key === 'fishingCatalog') continue;
                // Provjeri da li ima strukturu kafića (categories ili menuItems ili settings)
                if (value && (value.categories !== undefined || value.menuItems !== undefined || value.settings !== undefined)) {
                    if (!registered.includes(key)) {
                        orphanCandidates.push(key);
                    }
                }
            }
            if (orphanCandidates.length === 0) {
                orphanDiv.innerHTML = '<p>Nema neregistrovanih kafića.</p>';
                return;
            }
            orphanDiv.innerHTML = '';
            for (const id of orphanCandidates) {
                const div = document.createElement('div');
                div.className = 'cafe-item orphan';
                div.innerHTML = `
                    <div>
                        <strong>⚠️ Neregistrovani kafić</strong><br>
                        <span class="cafe-id">${escapeHtml(id)}</span><br>
                        <span style="font-size:12px;">(postoji u bazi, ali nije u /cafes listi)</span>
                        <a class="link" href="index.html?cafe=${id}" target="_blank" style="margin-left:10px;">🔗 Otvori meni</a>
                    </div>
                    <button class="delete-btn" data-id="${id}" data-type="orphan">Obriši (trajno)</button>
                `;
                orphanDiv.appendChild(div);
            }
            attachDeleteEvents();
        } catch (e) {
            console.error(e);
            orphanDiv.innerHTML = '<p>Greška pri učitavanju.</p>';
        }
    }

    function attachDeleteEvents() {
        // Registrovani kafići
        document.querySelectorAll('.delete-btn[data-type="registered"]').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                if (confirm(`⚠️ PAŽNJA: Brišete kafić "${id}". Svi podaci (kategorije, artikli, postavke, narudžbe) bit će trajno izgubljeni! Nastaviti?`)) {
                    try {
                        await remove(ref(db, `cafes/${id}`));
                        await remove(ref(db, `${id}`));
                        alert(`Kafić "${id}" i svi njegovi podaci su obrisani.`);
                        renderOrphanCafes(); // osvježi
                    } catch (error) {
                        console.error(error);
                        alert('Greška pri brisanju.');
                    }
                }
            };
        });
        // Orphan kafići
        document.querySelectorAll('.delete-btn[data-type="orphan"]').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                if (confirm(`⚠️ BRIŠETE NEREGISTROVANI KAFIĆ "${id}". Svi podaci (kategorije, artikli, postavke, narudžbe) bit će trajno izgubljeni! Nastaviti?`)) {
                    try {
                        await remove(ref(db, `${id}`));
                        alert(`Kafić "${id}" obrisan.`);
                        renderOrphanCafes(); // osvježi
                    } catch (error) {
                        console.error(error);
                        alert('Greška pri brisanju.');
                    }
                }
            };
        });
    }

    function login() {
        const pass = document.getElementById('masterPass').value;
        if (pass === 'master2026') {  // promijenite master šifru po želji
            sessionStorage.setItem('master_auth', 'true');
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            renderRegisteredCafes();
            renderOrphanCafes();
        } else {
            alert('Pogrešna šifra!');
        }
    }

    document.getElementById('loginBtn').onclick = login;
    document.getElementById('addCafeBtn').onclick = async () => {
        const cafeId = document.getElementById('newCafeId').value.trim();
        const cafeName = document.getElementById('newCafeName').value.trim();
        if (!cafeId) { alert('Unesite ID kafića'); return; }
        if (cafeId.includes('/') || cafeId.includes('.') || cafeId.includes('#')) { alert('ID sadrži nedozvoljene znakove'); return; }
        const snapshot = await get(ref(db, `cafes/${cafeId}`));
        if (snapshot.exists()) { alert('Kafić sa tim ID već postoji'); return; }
        await set(ref(db, `cafes/${cafeId}`), { name: cafeName || cafeId, created: Date.now() });
        alert(`Kafić dodan. Link: ${window.location.origin}${window.location.pathname.replace('admin-cafes.html', 'index.html')}?cafe=${cafeId}`);
        document.getElementById('newCafeId').value = '';
        document.getElementById('newCafeName').value = '';
        renderRegisteredCafes();
        renderOrphanCafes();
    };

    if (checkAuth()) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminSection').style.display = 'block';
        renderRegisteredCafes();
        renderOrphanCafes();
    }
</script>
</body>
</html>
