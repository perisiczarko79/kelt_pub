<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Šank panel</title>
    <style>
        body { background: #1a1a1a; color: #f0f0f0; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #ffd966; }
        .orders-list { margin-top: 20px; }
        .order-card {
            background: #2c2c2c; border-left: 5px solid #ffd966; padding: 12px;
            margin-bottom: 12px; border-radius: 8px;
            position: relative;
        }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .guest-name { font-weight: bold; color: #ffd966; }
        .timestamp { font-size: 11px; color: #aaa; }
        .order-items { margin: 8px 0 8px 16px; border-left: 2px solid #555; padding-left: 12px; }
        .order-item { margin: 6px 0; }
        .item-note { font-size: 11px; color: #aaa; font-style: italic; }
        .general-note { background: #3a3a3a; padding: 6px; border-radius: 6px; margin-top: 8px; font-size: 12px; }
        .status-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ffd966;
            color: #1a2a1f;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }
        .status-badge.accepted { background: #2196f3; color: white; }
        .button-group {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .btn-primary { background: #4caf50; color: white; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-primary:disabled { background: #888; cursor: not-allowed; }
        .btn-secondary { background: #ff9800; color: white; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-secondary:disabled { background: #888; cursor: not-allowed; }
        .empty { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <h1 id="pageTitle">Šank panel</h1>
    <div id="ordersContainer" class="orders-list"><div class="empty">Učitavanje...</div></div>
</div>
<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, onChildAdded, onChildChanged, update, get } from 'firebase/database';
    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app",
        messagingSenderId: "1026702086011",
        appId: "1:1026702086011:web:8162de6bad4f18b731b7de"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const params = new URLSearchParams(location.search);
    let cafeId = params.get('cafe');
    if (!cafeId) cafeId = prompt('Unesite ID kafića (npr. gradski_pub):');
    if (!cafeId) { document.body.innerHTML = '<div class="empty">Nedostaje ID kafića.</div>'; throw new Error(); }
    
    document.getElementById('pageTitle').innerText = `🍺 Šank panel - ${cafeId}`;
    document.title = `Šank panel - ${cafeId}`;
    
    const pendingRef = ref(db, `${cafeId}/orders/pending`);
    let audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
    function playSound() { audio.play().catch(e => console.log('Zvuk nije podržan')); }
    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : ''; }
    function formatTime(ts) { const d = new Date(ts); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`; }
    
    function renderOrder(id, order) {
        const container = document.getElementById('ordersContainer');
        if (container.querySelector('.empty')) container.innerHTML = '';
        let card = document.getElementById(`order-${id}`);
        const isNew = !card;
        if (isNew) {
            card = document.createElement('div');
            card.className = 'order-card';
            card.id = `order-${id}`;
        }
        let itemsHtml = '';
        if (order.items && order.items.length) {
            itemsHtml = '<div class="order-items">';
            order.items.forEach(it => {
                itemsHtml += `<div class="order-item"><strong>${escapeHtml(it.itemName)}</strong> ${it.size ? `(${it.size})` : ''} - ${it.price} KM`;
                if (it.note) itemsHtml += `<div class="item-note">📝 ${escapeHtml(it.note)}</div>`;
                itemsHtml += `</div>`;
            });
            itemsHtml += '</div>';
        } else if (order.type === 'waiter') {
            itemsHtml = '<div class="order-items">📞 Poziv konobara</div>';
        }
        const generalNoteHtml = order.generalNote ? `<div class="general-note">📝 Opća napomena: ${escapeHtml(order.generalNote)}</div>` : '';
        const status = order.status || 'pending';
        let statusBadgeHtml = '';
        if (status === 'accepted') statusBadgeHtml = '<div class="status-badge accepted">✅ Primljeno</div>';
        else if (status === 'pending') statusBadgeHtml = '<div class="status-badge">⏳ Na čekanju</div>';
        
        // Build inner HTML
        card.innerHTML = `
            ${statusBadgeHtml}
            <div class="order-header">
                <span class="guest-name">${escapeHtml(order.guestName)}</span>
                <span class="timestamp">${formatTime(order.timestamp)}</span>
            </div>
            ${itemsHtml}
            ${generalNoteHtml}
            <div class="button-group">
                <button class="btn-primary accept-btn" data-id="${id}" ${status !== 'pending' ? 'disabled' : ''}>📥 Primljeno</button>
                <button class="btn-secondary complete-btn" data-id="${id}" ${status !== 'accepted' ? 'disabled' : ''}>✅ Realizovano</button>
            </div>
        `;
        
        if (isNew) {
            container.appendChild(card);
        }
        
        // Attach event listeners (remove old ones first)
        const acceptBtn = card.querySelector('.accept-btn');
        const completeBtn = card.querySelector('.complete-btn');
        // Clone and replace to remove old listeners (simpler)
        const newAcceptBtn = acceptBtn.cloneNode(true);
        const newCompleteBtn = completeBtn.cloneNode(true);
        acceptBtn.parentNode.replaceChild(newAcceptBtn, acceptBtn);
        completeBtn.parentNode.replaceChild(newCompleteBtn, completeBtn);
        
        newAcceptBtn.addEventListener('click', async () => {
            await update(ref(db, `${cafeId}/orders/pending/${id}`), { status: 'accepted' });
        });
        newCompleteBtn.addEventListener('click', async () => {
            await update(ref(db, `${cafeId}/orders/pending/${id}`), { status: 'completed' });
            card.remove();
            if (container.children.length === 0) container.innerHTML = '<div class="empty">Nema aktivnih zahtjeva.</div>';
        });
    }
    
    onChildAdded(pendingRef, (snap) => {
        const order = snap.val();
        if (order.status !== 'completed') {
            playSound();
            renderOrder(snap.key, order);
        }
    });
    
    onChildChanged(pendingRef, (snap) => {
        const order = snap.val();
        const card = document.getElementById(`order-${snap.key}`);
        if (order.status === 'completed') {
            if (card) card.remove();
        } else {
            // Update existing card in place (re-render)
            if (card) {
                renderOrder(snap.key, order); // this will update the card content
            } else {
                // if card doesn't exist but status not completed, add it
                if (order.status !== 'completed') renderOrder(snap.key, order);
            }
        }
        // After removal, check emptiness
        const container = document.getElementById('ordersContainer');
        if (container.children.length === 0 && !container.querySelector('.empty')) {
            container.innerHTML = '<div class="empty">Nema aktivnih zahtjeva.</div>';
        }
    });
    
    get(pendingRef).then(snap => {
        const container = document.getElementById('ordersContainer');
        container.innerHTML = '';
        const orders = snap.val();
        if (orders) {
            Object.entries(orders).forEach(([id, order]) => {
                if (order.status !== 'completed') renderOrder(id, order);
            });
        }
        if (container.children.length === 0) container.innerHTML = '<div class="empty">Nema aktivnih zahtjeva.</div>';
    });
</script>
</body>
</html>
