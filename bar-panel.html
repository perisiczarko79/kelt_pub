<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KlikPub - Šank panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0F172A;
            color: #F1F5F9;
            font-family: 'Inter', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #F97316;
        }
        .logo-area { display: flex; }
        .kh-logo-img { height: 45px; width: auto; }
        h1 { font-size: 24px; color: #F97316; }

        /* IZMJENA: dugme za uključivanje zvuka (mora ga korisnik prvo aktivirati - browseri blokiraju autoplay zvuka) */
        .sound-toggle {
            background: rgba(255,255,255,0.08);
            border: 1px solid #334155;
            color: #F1F5F9;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .sound-toggle.active { background: #F97316; border-color: #F97316; color: #0F172A; }
        
        .contact-bar {
            background: #1E293B;
            border-radius: 16px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            border: 1px solid #334155;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #94A3B8;
        }
        .contact-item i { color: #F97316; width: 16px; }
        
        .orders-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .order-card {
            background: #1E293B;
            border-radius: 20px;
            padding: 16px;
            border-left: 4px solid #F97316;
            transition: 0.2s;
        }
        .order-card.prize-order {
            border-left-color: #FFD700;
            background: #1a2a1f;
        }
        .order-card.member-order {
            border-left-color: #8B5CF6;
        }
        /* IZMJENA: vizuelno isticanje narudžbi koje čekaju predugo */
        .order-card.stale {
            border-left-color: #DC2626;
            box-shadow: 0 0 0 1px rgba(220,38,38,0.4);
        }
        .stale-badge {
            background: #DC2626;
            color: #fff;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
        }
        /* IZMJENA: kratka animacija kad stigne nova narudžba */
        .new-order-flash {
            animation: flashNew 1.6s ease;
        }
        @keyframes flashNew {
            0% { box-shadow: 0 0 0 4px rgba(249,115,22,0.7); }
            100% { box-shadow: none; }
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
        }
        .order-time { font-size: 14px; color: #94A3B8; }
        .order-table {
            background: #F97316;
            color: #0F172A;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        .order-guest { font-size: 14px; color: #CBD5E1; }
        .order-guest i { margin-right: 6px; color: #F97316; }
        .member-badge {
            background: #8B5CF6;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
        }
        .prize-badge {
            background: #FFD700;
            color: #0F172A;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
        }
        
        .order-items { margin: 12px 0; padding-left: 12px; }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed #334155;
            font-size: 14px;
        }
        .order-item.prize-item {
            border-bottom-color: rgba(255,215,0,0.3);
            background: rgba(255,215,0,0.05);
            border-radius: 8px;
            padding: 6px 12px;
        }
        .item-name { font-weight: 500; }
        .item-price { color: #F97316; font-weight: 600; }
        .item-price.free { color: #22C55E; }
        
        .general-note {
            background: #0F172A;
            padding: 8px 12px;
            border-radius: 12px;
            margin: 12px 0;
            font-size: 13px;
            color: #94A3B8;
            border-left: 3px solid #F97316;
        }
        .general-note.prize-note {
            border-left-color: #FFD700;
        }
        
        .order-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        .btn-accept { background: #22C55E; color: white; }
        .btn-accept:hover { background: #16A34A; transform: scale(1.02); }
        .btn-complete { background: #F97316; color: white; }
        .btn-complete:hover { background: #EA580C; transform: scale(1.02); }
        .btn-waiter { background: #EAB308; color: #0F172A; }
        .btn-waiter:hover { background: #CA8A04; }
        .btn-bill { background: #8B5CF6; color: white; }
        .btn-bill:hover { background: #7C3AED; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #1E293B;
            border-radius: 20px;
            color: #64748B;
        }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        /* IZMJENA: nova sekcija za nagrade */
        .prizes-section {
            margin-top: 30px;
        }
        .prizes-section h2 {
            color: #FFD700;
            font-size: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .prize-card {
            background: #1E293B;
            border-left: 4px solid #FFD700;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .prize-card-info { font-size: 14px; }
        .prize-card-info .prize-user {
            font-size: 12px;
            color: #94A3B8;
            margin-top: 2px;
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            text-align: center;
            font-size: 12px;
            color: #64748B;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .footer-links a { color: #64748B; text-decoration: none; }
        .footer-links a:hover { color: #F97316; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E293B;
            color: #F97316;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            border: 1px solid #F97316;
            animation: fadeInOut 2.5s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); visibility: hidden; }
        }
        
        @media (max-width: 600px) {
            body { padding: 12px; }
            .order-header { flex-direction: column; align-items: flex-start; }
            .order-actions { width: 100%; }
            .btn { flex: 1; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <img src="kh-logo.png" alt="KlikHub" class="kh-logo-img" id="khLogo">
            </div>
            <h1><i class="fas fa-tachometer-alt"></i> Šank panel</h1>
            <button id="soundToggleBtn" class="sound-toggle"><i class="fas fa-volume-mute"></i> Zvuk isključen</button>
        </div>
        
        <div class="contact-bar">
            <div class="contact-item"><i class="fas fa-phone-alt"></i> +387 65 387 281</div>
            <div class="contact-item"><i class="fas fa-envelope"></i> klikhub.app@gmail.com</div>
            <div class="contact-item"><i class="fas fa-clock"></i> Pon - Sub: 09-23h</div>
        </div>
        
        <div id="ordersContainer" class="orders-container">
            <div class="empty-state">
                <i class="fas fa-beer-mug-empty"></i>
                <p>Nema aktivnih narudžbi</p>
            </div>
        </div>

        <div class="prizes-section">
            <h2><i class="fas fa-gift"></i> Nagrade na čekanju</h2>
            <div id="prizesContainer">
                <div class="empty-state" style="padding: 24px;">
                    <p>Nema neiskorišćenih nagrada.</p>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <div class="footer-links">
                <a href="#" id="refreshBtn"><i class="fas fa-sync-alt"></i> Osveži</a>
                <a href="https://klikhub.app" target="_blank">KlikHub</a>
            </div>
            <div>© 2024 KlikHub. Sva prava zadržana.</div>
        </div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
    
    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, onValue, update, remove, get } from 'firebase/database';
        
        const firebaseConfig = {
            apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
            authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
            databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kelt-pub-menu-2df61",
            storageBucket: "kelt-pub-menu-2df61.firebasestorage.app"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let cafeId = null;
        
        function getCafeIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            let id = params.get('cafe');
            if (!id) {
                id = prompt('Unesite ID kafića (npr. gradski_pub):');
                if (id) window.history.replaceState({}, '', `?cafe=${encodeURIComponent(id)}`);
                else throw new Error('Missing cafe ID');
            }
            return id;
        }
        
        try {
            cafeId = getCafeIdFromUrl();
        } catch(e) {
            document.body.innerHTML = '<div style="text-align:center;margin-top:50px;">Greška: nedostaje ID kafića.</div>';
            throw e;
        }
        
        const ordersRef = ref(db, `${cafeId}/orders/pending`);
        const historyRef = ref(db, `${cafeId}/orders/history`);
        const usersRef = ref(db, `cafes/${cafeId}/users`);

        let soundEnabled = false;
        let previousOrderIds = new Set();
        let isFirstLoad = true;
        
        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return 'Nepoznato';
            const d = new Date(timestamp);
            return `${d.toLocaleDateString()} ${d.toLocaleTimeString()}`;
        }

        // IZMJENA: kratki zvučni signal preko Web Audio API-ja - ne treba nikakav zvučni fajl.
        // Browseri blokiraju zvuk dok korisnik ne klikne nešto na stranici, zato postoji dugme za uključivanje.
        function playBeep() {
            if (!soundEnabled) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.25, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            } catch(e) { /* Web Audio nije dostupan - tiho zanemari */ }
        }

        document.getElementById('soundToggleBtn').onclick = () => {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundToggleBtn');
            if (soundEnabled) {
                btn.classList.add('active');
                btn.innerHTML = '<i class="fas fa-volume-up"></i> Zvuk uključen';
                playBeep(); // odmah "otključa" audio kontekst uz gest korisnika
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '<i class="fas fa-volume-mute"></i> Zvuk isključen';
            }
        };
        
        function aggregateItems(itemsArray) {
            if (!itemsArray || !Array.isArray(itemsArray)) return itemsArray || [];
            const map = new Map();
            for (const it of itemsArray) {
                const key = `${it.itemName}|${it.size || ''}`;
                if (map.has(key)) {
                    const existing = map.get(key);
                    existing.quantity += 1;
                    existing.totalPrice += parseFloat(it.price || 0);
                } else {
                    map.set(key, {
                        itemName: it.itemName,
                        size: it.size || null,
                        quantity: 1,
                        totalPrice: parseFloat(it.price || 0),
                        note: it.note || null,
                        isPrize: it.isPrize || false
                    });
                }
            }
            return Array.from(map.values());
        }
        
        async function acceptOrder(orderId) {
            await update(ref(db, `${cafeId}/orders/pending/${orderId}`), { status: 'accepted' });
            showToast('✅ Narudžba prihvaćena');
        }
        
        async function completeOrder(orderId, orderData) {
            const historyOrder = {
                ...orderData,
                status: 'completed',
                closedAt: Date.now()
            };
            
            if (!historyOrder.totalAmount && historyOrder.items) {
                historyOrder.totalAmount = historyOrder.items.reduce((sum, item) => sum + parseFloat(item.price || 0), 0);
            }
            
            await update(ref(db, `${cafeId}/orders/history/${orderId}`), historyOrder);
            await remove(ref(db, `${cafeId}/orders/pending/${orderId}`));
            showToast('✅ Narudžba završena i arhivirana');
        }
        
        async function handleWaiterCall(orderId) {
            await update(ref(db, `${cafeId}/orders/pending/${orderId}`), { status: 'accepted' });
            showToast('📞 Konobar je obaviješten');
            setTimeout(async () => {
                await remove(ref(db, `${cafeId}/orders/pending/${orderId}`));
            }, 5000);
        }
        
        async function handleBillRequest(orderId) {
            await update(ref(db, `${cafeId}/orders/pending/${orderId}`), { status: 'accepted' });
            showToast('🧾 Zahtjev za računom primljen');
            setTimeout(async () => {
                await remove(ref(db, `${cafeId}/orders/pending/${orderId}`));
            }, 3000);
        }

        // ============================================================
        // IZMJENA: cleanup zaglavljenih "poziv konobara"/"zahtjev za račun"
        // zapisa. Ranije se brisanje oslanjalo isključivo na setTimeout u
        // trenutnoj sesiji browsera - ako osoblje zatvori tab prije nego
        // istekne, zapis ostaje zauvijek u pending listi. Ovo prolazi kroz
        // sve pending zapise pri svakom učitavanju i briše one koji su tipa
        // waiter/bill_request, status "accepted", starije od 2 minuta.
        // ============================================================
        async function cleanupStaleWaiterBillEntries(orders) {
            const now = Date.now();
            const staleThreshold = 2 * 60 * 1000;
            for (const [id, order] of Object.entries(orders || {})) {
                const isWaiterOrBill = order.type === 'waiter' || order.type === 'bill_request';
                if (isWaiterOrBill && order.status === 'accepted' && order.timestamp && (now - order.timestamp) > staleThreshold) {
                    try { await remove(ref(db, `${cafeId}/orders/pending/${id}`)); } catch(e) {}
                }
            }
        }
        
        function renderOrders(orders) {
            const container = document.getElementById('ordersContainer');
            if (!container) return;

            // IZMJENA: sačuvaj poziciju skrola prije ponovnog iscrtavanja liste
            const prevScrollY = window.scrollY;
            
            const ordersArray = Object.entries(orders || {});
            
            if (ordersArray.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-beer-mug-empty"></i>
                        <p>Nema aktivnih narudžbi</p>
                    </div>
                `;
                return;
            }
            
            ordersArray.sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));

            // IZMJENA: detektuj nove narudžbe (za zvuk/animaciju) - preskoči na prvom učitavanju
            const currentIds = new Set(ordersArray.map(([id]) => id));
            let hasNewOrder = false;
            if (!isFirstLoad) {
                for (const id of currentIds) {
                    if (!previousOrderIds.has(id)) { hasNewOrder = true; break; }
                }
            }
            
            let html = '';
            for (const [id, order] of ordersArray) {
                const orderTime = formatTime(order.timestamp);
                const isWaiterCall = order.type === 'waiter';
                const isBillRequest = order.type === 'bill_request';
                const hasPrizes = order.items && order.items.some(item => item.isPrize === true);
                const isMember = order.isMember === true;

                // IZMJENA: obilježi narudžbe koje čekaju predugo (10+ minuta, još uvijek pending/accepted, nisu poziv/račun)
                const isStale = !isWaiterCall && !isBillRequest && order.timestamp &&
                    (Date.now() - order.timestamp) > 10 * 60 * 1000 &&
                    (order.status === 'pending' || order.status === 'accepted');
                
                let cardClass = 'order-card';
                if (hasPrizes) cardClass += ' prize-order';
                if (isMember) cardClass += ' member-order';
                if (isStale) cardClass += ' stale';
                if (hasNewOrder && !previousOrderIds.has(id) && !isFirstLoad) cardClass += ' new-order-flash';
                
                let itemsHtml = '';
                let orderTotal = 0;
                
                if (order.items && !isWaiterCall && !isBillRequest) {
                    const aggregated = aggregateItems(order.items);
                    aggregated.forEach(item => {
                        const itemPrice = item.totalPrice || 0;
                        if (item.isPrize) {
                            itemsHtml += `
                                <div class="order-item prize-item">
                                    <span class="item-name">🎁 NAGRADA: ${escapeHtml(item.itemName)} ${item.size ? '(' + escapeHtml(item.size) + ')' : ''} x${item.quantity}</span>
                                    <span class="item-price free">0.00 KM</span>
                                </div>
                            `;
                        } else {
                            orderTotal += itemPrice;
                            itemsHtml += `
                                <div class="order-item">
                                    <span class="item-name">${escapeHtml(item.itemName)} ${item.size ? '(' + escapeHtml(item.size) + ')' : ''} x${item.quantity}</span>
                                    <span class="item-price">${itemPrice.toFixed(2)} KM</span>
                                </div>
                            `;
                        }
                    });
                }
                
                let specialHtml = '';
                if (isWaiterCall) {
                    specialHtml = '<div class="general-note"><i class="fas fa-bell"></i> 📞 Konobar je pozvan</div>';
                } else if (isBillRequest) {
                    specialHtml = '<div class="general-note"><i class="fas fa-receipt"></i> 🧾 Zahtjev za računom</div>';
                } else if (order.generalNote) {
                    const noteClass = hasPrizes ? 'general-note prize-note' : 'general-note';
                    specialHtml = `<div class="${noteClass}"><i class="fas fa-comment"></i> ${escapeHtml(order.generalNote)}</div>`;
                }
                
                let actionButtons = '';
                if (isWaiterCall) {
                    actionButtons = `
                        <button class="btn btn-accept" data-id="${id}" data-type="waiter">✅ Odgovori</button>
                    `;
                } else if (isBillRequest) {
                    actionButtons = `
                        <button class="btn btn-accept" data-id="${id}" data-type="bill">📄 Zaduži</button>
                    `;
                } else if (order.status === 'pending') {
                    actionButtons = `
                        <button class="btn btn-accept" data-id="${id}" data-type="accept">✅ Prihvati</button>
                        <button class="btn btn-complete" data-id="${id}" data-type="complete">✓ Završi</button>
                    `;
                } else if (order.status === 'accepted') {
                    actionButtons = `
                        <button class="btn btn-complete" data-id="${id}" data-type="complete">✓ Završi narudžbu</button>
                    `;
                }
                
                let totalDisplay = '';
                if (!isWaiterCall && !isBillRequest && orderTotal > 0) {
                    // IZMJENA: uklonjen mrtav "Popust" prikaz - discountTotal se nikad nije računao nigdje u kodu
                    totalDisplay = `
                        <div style="text-align:right; margin-top:8px; font-weight:bold; color:#F97316;">
                            Ukupno: ${orderTotal.toFixed(2)} KM
                        </div>
                    `;
                }
                
                html += `
                    <div class="${cardClass}" data-order-id="${id}">
                        <div class="order-header">
                            <span class="order-time"><i class="far fa-clock"></i> ${orderTime}</span>
                            <span class="order-table"><i class="fas fa-chair"></i> Sto ${order.tableNumber || '?'}</span>
                            <span class="order-guest">
                                <i class="fas fa-user"></i> ${escapeHtml(order.guestName || 'Gost')}
                                ${isMember ? '<span class="member-badge">⭐ Član</span>' : ''}
                                ${hasPrizes ? '<span class="prize-badge">🎁 Nagrada</span>' : ''}
                                ${isStale ? '<span class="stale-badge">⏰ Čeka dugo</span>' : ''}
                            </span>
                        </div>
                        ${specialHtml}
                        ${itemsHtml ? `<div class="order-items">${itemsHtml}</div>` : ''}
                        ${totalDisplay}
                        <div class="order-actions">
                            ${actionButtons}
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;

            // IZMJENA: obavijesti (zvuk) ako ima nova narudžba, i vrati skrol na mjesto gdje je bio
            if (hasNewOrder) {
                playBeep();
            }
            previousOrderIds = currentIds;
            isFirstLoad = false;
            window.scrollTo(0, prevScrollY);
            
            document.querySelectorAll('.order-actions .btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const orderId = btn.dataset.id;
                    const type = btn.dataset.type;
                    const order = orders[orderId];
                    
                    if (type === 'accept') {
                        await acceptOrder(orderId);
                    } else if (type === 'complete') {
                        await completeOrder(orderId, order);
                    } else if (type === 'waiter') {
                        await handleWaiterCall(orderId);
                    } else if (type === 'bill') {
                        await handleBillRequest(orderId);
                    }
                });
            });
        }

        // ============================================================
        // IZMJENA: nova sekcija "Nagrade na čekanju" - prikazuje sve
        // neiskorišćene nagrade svih članova ovog kafića (ime + šta je
        // osvojio + kad), sa dugmetom "Uručeno" (uz potvrdu) koje ih
        // označava kao iskorišćene.
        // ============================================================
        async function loadAllPendingPrizes() {
            let users = {};
            try {
                const usersSnap = await get(usersRef);
                users = usersSnap.val() || {};
            } catch(e) {
                console.error('Greška pri učitavanju nagrada:', e);
            }
            let allPrizes = [];
            for (const [uid, userData] of Object.entries(users)) {
                const prizes = userData.prizes || {};
                for (const [prizeId, prize] of Object.entries(prizes)) {
                    if (!prize.used) {
                        allPrizes.push({ uid, prizeId, username: userData.username || 'Nepoznato', ...prize });
                    }
                }
            }
            allPrizes.sort((a, b) => (b.wonAt || 0) - (a.wonAt || 0));
            renderPrizesSection(allPrizes);
        }

        function renderPrizesSection(prizes) {
            const container = document.getElementById('prizesContainer');
            if (!container) return;
            if (prizes.length === 0) {
                container.innerHTML = `<div class="empty-state" style="padding: 24px;"><p>Nema neiskorišćenih nagrada.</p></div>`;
                return;
            }
            let html = '';
            for (const p of prizes) {
                const label = p.type === 'discount' ? `${p.percentage}% popusta` : (p.label || p.itemName || 'Nagrada');
                const wonTime = p.wonAt ? formatTime(p.wonAt) : '';
                html += `
                    <div class="prize-card">
                        <div class="prize-card-info">
                            <div><strong>${p.icon || '🎁'} ${escapeHtml(label)}</strong></div>
                            <div class="prize-user"><i class="fas fa-user"></i> ${escapeHtml(p.username)} • osvojeno: ${wonTime}</div>
                        </div>
                        <button class="btn btn-accept redeem-prize-btn" data-uid="${p.uid}" data-prize-id="${p.prizeId}">✅ Uručeno</button>
                    </div>
                `;
            }
            container.innerHTML = html;
            container.querySelectorAll('.redeem-prize-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('Označiti ovu nagradu kao uručenu gostu?')) return;
                    const uid = btn.dataset.uid;
                    const prizeId = btn.dataset.prizeId;
                    await update(ref(db, `cafes/${cafeId}/users/${uid}/prizes/${prizeId}`), { used: true, usedAt: Date.now() });
                    showToast('✅ Nagrada uručena');
                    loadAllPendingPrizes();
                });
            });
        }
        
        onValue(ordersRef, async (snap) => {
            const orders = snap.val() || {};
            await cleanupStaleWaiterBillEntries(orders);
            renderOrders(orders);
        });

        // Nagrade se osvježavaju odvojeno - nisu dio pending narudžbi
        loadAllPendingPrizes();
        setInterval(loadAllPendingPrizes, 30000);
        
        document.getElementById('khLogo')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.open('https://kelt-pub.vercel.app/klikhub.html', '_blank');
        });
        
        document.getElementById('refreshBtn')?.addEventListener('click', async (e) => {
            e.preventDefault();
            const snap = await get(ordersRef);
            renderOrders(snap.val() || {});
            loadAllPendingPrizes();
            showToast('🔄 Osveženo');
        });
        
        document.title = `Šank panel - ${cafeId}`;
        console.log('Šank panel pokrenut za cafe:', cafeId);
    </script>
</body>
</html>
