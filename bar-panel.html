<!DOCTYPE html>
<html>
<head>
    <title>Šank panel</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .table-card { background: #2c2c2c; margin-bottom: 20px; padding: 12px; border-left: 5px solid #ffd966; border-radius: 8px; }
        .table-number { font-size: 1.3rem; font-weight: bold; color: #ffd966; }
        .order-item { background: #3a3a3a; margin-top: 8px; padding: 8px; border-radius: 8px; }
        .guest-name { font-weight: bold; color: #ffd966; }
        .items-list { margin-left: 16px; }
        .order-buttons { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 4px 8px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-accept { background: #4caf50; color: white; }
        .btn-complete { background: #ff9800; color: white; }
        .btn-delete { background: #a00; color: white; }
        .btn-close-table { background: #a00; color: white; margin-top: 12px; padding: 6px; width: 100%; border-radius: 8px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #ffd966; padding: 8px 16px; border-radius: 20px; z-index: 1000; }
        .error { color: #ff6666; background: #330000; padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🍺 Šank panel - <span id="cafeTitle">KELT PUB</span></h1>
    <div id="output">Učitavanje...</div>
    <div id="errorLog" style="margin-top: 20px; padding: 10px; background: #222; border-radius: 8px; font-family: monospace; font-size: 12px;"></div>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, onValue, update, remove, push, set } from 'firebase/database';

        function logError(msg) {
            const errorDiv = document.getElementById('errorLog');
            errorDiv.innerHTML += `<div class="error">⚠️ ${msg}</div>`;
            console.error(msg);
        }

        try {
            const firebaseConfig = {
                apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
                authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
                databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "kelt-pub-menu-2df61",
                storageBucket: "kelt-pub-menu-2df61.firebasestorage.app",
                messagingSenderId: "1026702086011",
                appId: "1:1026702086011:web:8162de6bad4f18b731b7de"
            };

            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);

            const params = new URLSearchParams(location.search);
            let cafeId = params.get('cafe');
            if (!cafeId) cafeId = prompt('Unesite ID kafića (npr. kelt2026):');
            if (!cafeId) { document.body.innerHTML = '<div>Nedostaje ID kafića.</div>'; throw new Error(); }

            document.getElementById('cafeTitle').innerText = cafeId;
            const pendingRef = ref(db, `${cafeId}/orders/pending`);
            const historyRef = ref(db, `${cafeId}/orders/history`);
            let soundEnabled = true;
            let audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
            function playSound() { if (soundEnabled) audio.play().catch(e => console.log('Zvuk nije podržan')); }
            function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : ''; }
            function showToast(msg) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerText = msg;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }

            let orders = [];

            async function closeTable(tableNumber) {
                const toArchive = orders.filter(o => o.tableNumber == tableNumber);
                if (toArchive.length === 0) {
                    showToast(`Nema narudžbi za sto ${tableNumber}.`);
                    return;
                }
                if (confirm(`Zatvoriti račun za sto ${tableNumber}? Sve narudžbe će biti arhivirane i obrisane.`)) {
                    try {
                        let allItems = [], totalAmount = 0;
                        for (let order of toArchive) {
                            if (order.items && Array.isArray(order.items)) {
                                order.items.forEach(it => {
                                    allItems.push(it);
                                    totalAmount += parseFloat(it.price);
                                });
                            } else if (order.type === 'waiter') {
                                allItems.push({ type: 'waiter', note: 'Poziv konobara' });
                            } else if (order.type === 'bill_request') {
                                allItems.push({ type: 'bill_request', note: 'Zahtjev za računom' });
                            }
                        }
                        const newHistoryRef = push(historyRef);
                        await set(newHistoryRef, {
                            tableNumber: tableNumber,
                            closedAt: Date.now(),
                            totalAmount: totalAmount,
                            items: allItems,
                            ordersCount: toArchive.length
                        });
                        for (let order of toArchive) {
                            await remove(ref(db, `${cafeId}/orders/pending/${order.id}`));
                        }
                        orders = orders.filter(o => o.tableNumber != tableNumber);
                        renderTables();
                        showToast(`✅ Račun za sto ${tableNumber} zatvoren i arhiviran.`);
                    } catch(e) { showToast('Greška: ' + e.message); logError(e.message); }
                }
            }

            async function deleteSingleCompletedOrder(orderId) {
                const order = orders.find(o => o.id === orderId);
                if (!order || order.status !== 'completed') return;
                if (confirm('Obrisati ovu realizovanu narudžbu?')) {
                    try {
                        await remove(ref(db, `${cafeId}/orders/pending/${orderId}`));
                        orders = orders.filter(o => o.id !== orderId);
                        renderTables();
                        showToast('Obrisano.');
                    } catch(e) { showToast('Greška: ' + e.message); logError(e.message); }
                }
            }

            async function acceptOrder(orderId) {
                try {
                    await update(ref(db, `${cafeId}/orders/pending/${orderId}`), { status: 'accepted' });
                    showToast('Primljeno');
                } catch(e) { showToast('Greška: ' + e.message); logError(e.message); }
            }

            async function completeOrder(orderId) {
                try {
                    await update(ref(db, `${cafeId}/orders/pending/${orderId}`), { status: 'completed' });
                    showToast('Realizovano');
                } catch(e) { showToast('Greška: ' + e.message); logError(e.message); }
            }

            function renderTables() {
                try {
                    const container = document.getElementById('output');
                    const tablesMap = new Map();

                    for (let order of orders) {
                        const table = order.tableNumber || '?';
                        if (!tablesMap.has(table)) tablesMap.set(table, { orders: [], total: 0 });
                        const data = tablesMap.get(table);
                        data.orders.push(order);
                        if (order.status !== 'completed') {
                            let orderTotal = 0;
                            if (order.items && Array.isArray(order.items)) {
                                order.items.forEach(it => orderTotal += parseFloat(it.price));
                            }
                            data.total += orderTotal;
                        }
                    }

                    if (tablesMap.size === 0) {
                        container.innerHTML = '<div>Nema aktivnih stolova.</div>';
                        return;
                    }

                    let html = '';
                    for (let [table, data] of tablesMap.entries()) {
                        html += `<div class="table-card"><div class="table-number">🍻 Sto ${escapeHtml(table)} - Ukupno: ${data.total.toFixed(2)} KM</div>`;
                        for (let order of data.orders) {
                            let itemsArray = order.items;
                            if (itemsArray && typeof itemsArray === 'object' && !Array.isArray(itemsArray)) {
                                itemsArray = Object.values(itemsArray);
                            }
                            const statusText = order.status === 'pending' ? '⏳ Na čekanju' : (order.status === 'accepted' ? '✅ Primljeno' : '✅ Realizovano');
                            html += `<div class="order-item">`;
                            html += `<div class="guest-name">${escapeHtml(order.guestName || 'Gost')} - ${statusText}</div>`;
                            if (itemsArray && itemsArray.length) {
                                html += `<div class="items-list">`;
                                itemsArray.forEach(it => {
                                    html += `<div>🍺 ${escapeHtml(it.itemName)} ${it.size ? `(${it.size})` : ''} - ${it.price} KM`;
                                    if (it.note) html += ` <em>(${escapeHtml(it.note)})</em>`;
                                    html += `</div>`;
                                });
                                html += `</div>`;
                            } else if (order.type === 'waiter') {
                                html += `<div>📞 Poziv konobara</div>`;
                            } else if (order.type === 'bill_request') {
                                html += `<div>🧾 Zahtjev za računom</div>`;
                            }
                            html += `<div class="order-buttons">`;
                            if (order.status === 'pending' && order.type !== 'bill_request') {
                                html += `<button class="btn-accept" data-id="${order.id}">📥 Primljeno</button>`;
                            }
                            if (order.status === 'accepted') {
                                html += `<button class="btn-complete" data-id="${order.id}">✅ Realizovano</button>`;
                            }
                            if (order.status === 'completed') {
                                html += `<button class="btn-delete" data-id="${order.id}">🗑️ Obriši</button>`;
                            }
                            html += `</div></div>`;
                        }
                        html += `<button class="btn-close-table" data-table="${table}">🧾 Zatvori račun</button></div>`;
                    }
                    container.innerHTML = html;
                    attachEvents();
                } catch(e) {
                    logError('Greška u renderTables: ' + e.message);
                    document.getElementById('output').innerHTML = `<div class="error">Greška: ${e.message}</div>`;
                }
            }

            function attachEvents() {
                try {
                    document.querySelectorAll('.btn-accept').forEach(btn => {
                        btn.onclick = () => acceptOrder(btn.getAttribute('data-id'));
                    });
                    document.querySelectorAll('.btn-complete').forEach(btn => {
                        btn.onclick = () => completeOrder(btn.getAttribute('data-id'));
                    });
                    document.querySelectorAll('.btn-delete').forEach(btn => {
                        btn.onclick = () => deleteSingleCompletedOrder(btn.getAttribute('data-id'));
                    });
                    document.querySelectorAll('.btn-close-table').forEach(btn => {
                        btn.onclick = () => closeTable(btn.getAttribute('data-table'));
                    });
                } catch(e) {
                    logError('Greška u attachEvents: ' + e.message);
                }
            }

            onValue(pendingRef, (snapshot) => {
                try {
                    const data = snapshot.val();
                    orders = [];
                    if (data) {
                        for (const [id, order] of Object.entries(data)) {
                            let itemsArray = order.items;
                            if (itemsArray && typeof itemsArray === 'object' && !Array.isArray(itemsArray)) {
                                itemsArray = Object.values(itemsArray);
                            }
                            orders.push({ id, ...order, items: itemsArray });
                        }
                    }
                    renderTables();
                    playSound();
                } catch(e) {
                    logError('Greška u onValue: ' + e.message);
                }
            });
        } catch(e) {
            document.getElementById('errorLog').innerHTML += `<div class="error">Inicijalna greška: ${e.message}</div>`;
        }
    </script>
</body>
</html>
