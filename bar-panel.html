<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Šank panel - KELT PUB</title>
    <style>
        body { background: #1a1a1a; color: #f0f0f0; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #ffd966; }
        .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-top: 20px; }
        .table-card {
            background: #2c2c2c;
            border-radius: 12px;
            padding: 12px;
            border-left: 5px solid #ffd966;
            position: relative;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #3a3a3a;
            padding: 6px 10px;
            border-radius: 8px;
        }
        .table-number { color: #ffd966; }
        .table-total { color: #ffaa66; }
        .order-item {
            background: #3a3a3a;
            margin: 8px 0;
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
        }
        .guest-name { font-weight: bold; color: #ffd966; }
        .order-status {
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
        }
        .status-pending { background: #ff9800; color: #1a2a1f; }
        .status-accepted { background: #2196f3; color: white; }
        .status-completed { background: #4caf50; color: white; }
        .items-list { margin-left: 12px; font-size: 12px; color: #ccc; }
        .item-note { font-style: italic; color: #aaa; font-size: 11px; }
        .order-buttons {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            justify-content: flex-end;
        }
        .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 16px; border: none; cursor: pointer; font-weight: bold; }
        .btn-accept { background: #4caf50; color: white; }
        .btn-complete { background: #ff9800; color: white; }
        .btn-delete-single { background: #a00; color: white; }
        .btn-close-table { background: #a00; color: white; margin-top: 10px; width: 100%; padding: 6px; border-radius: 20px; }
        .empty { text-align: center; padding: 40px; color: #aaa; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #ffd966; padding: 8px 16px; border-radius: 20px; z-index: 1000; font-size: 14px; }
        .sound-toggle { background: #555; border: none; color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🍺 Šank panel - <span id="cafeTitle">KELT PUB</span></h1>
    <button id="soundToggleBtn" class="sound-toggle">🔊 Zvuk uključen</button>
    <div id="tablesContainer" class="tables-grid"><div class="empty">Učitavanje...</div></div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, onValue, update, remove, push, set, onChildAdded, onChildChanged } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app",
        messagingSenderId: "1026702086011",
        appId: "1:1026702086011:web:8162de6bad4f18b731b7de"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(location.search);
    let cafeId = params.get('cafe');
    if (!cafeId) cafeId = prompt('Unesite ID kafića (npr. gradski_pub):');
    if (!cafeId) { document.body.innerHTML = '<div class="empty">Nedostaje ID kafića.</div>'; throw new Error(); }

    document.getElementById('cafeTitle').innerText = cafeId;
    const pendingRef = ref(db, `${cafeId}/orders/pending`);
    const historyRef = ref(db, `${cafeId}/orders/history`);
    let soundEnabled = true;
    let audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
    function playSound() { if (soundEnabled) audio.play().catch(e => console.log('Zvuk nije podržan')); }
    function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : ''; }
    function formatTime(ts) { const d = new Date(ts); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`; }
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    let orders = [];  // sve narudžbe (pending, accepted, completed) - ne uključuju deleted
    let ordersMap = new Map(); // id -> order za brži pristup
    let tablesMap = new Map(); // table -> { orders: [], total: 0 }

    function rebuildTables() {
        tablesMap.clear();
        for (let order of orders) {
            const table = order.tableNumber || '?';
            if (!tablesMap.has(table)) {
                tablesMap.set(table, { orders: [], total: 0 });
            }
            const tableData = tablesMap.get(table);
            tableData.orders.push(order);
            // Ukupno za naplatu: sabiramo samo pending i accepted
            if (order.status !== 'completed') {
                let orderTotal = 0;
                if (order.items) order.items.forEach(it => orderTotal += parseFloat(it.price));
                tableData.total += orderTotal;
            }
        }
        renderTables();
    }

    async function closeTable(tableNumber) {
        const toArchive = orders.filter(o => o.tableNumber == tableNumber);
        if (toArchive.length === 0) {
            showToast(`Nema narudžbi za sto ${tableNumber}.`);
            return;
        }
        if (confirm(`Zatvoriti račun za sto ${tableNumber}? Sve narudžbe će biti arhivirane i obrisane.`)) {
            try {
                let allItems = [];
                let totalAmount = 0;
                for (let order of toArchive) {
                    if (order.items) {
                        order.items.forEach(it => {
                            allItems.push(it);
                            totalAmount += parseFloat(it.price);
                        });
                    } else if (order.type === 'waiter') {
                        allItems.push({ type: 'waiter', note: 'Poziv konobara' });
                    } else if (order.type === 'bill_request') {
                        allItems.push({ type: 'bill_request', note: 'Zahtjev za računom' });
                    }
                }
                const archiveRecord = {
                    tableNumber: tableNumber,
                    closedAt: Date.now(),
                    totalAmount: totalAmount,
                    items: allItems,
                    ordersCount: toArchive.length
                };
                const newHistoryRef = push(historyRef);
                await set(newHistoryRef, archiveRecord);
                for (let order of toArchive) {
                    await remove(ref(db, `${cafeId}/orders/pending/${order.id}`));
                }
                // lokalno ukloni
                orders = orders.filter(o => o.tableNumber != tableNumber);
                rebuildTables();
                showToast(`✅ Račun za sto ${tableNumber} zatvoren i arhiviran.`);
            } catch (error) {
                console.error(error);
                showToast('❌ Greška: ' + error.message);
            }
        }
    }

    async function deleteSingleCompletedOrder(orderId) {
        const order = ordersMap.get(orderId);
        if (!order || order.status !== 'completed') return;
        if (confirm('Obrisati ovu realizovanu narudžbu?')) {
            try {
                await remove(ref(db, `${cafeId}/orders/pending/${orderId}`));
                orders = orders.filter(o => o.id !== orderId);
                ordersMap.delete(orderId);
                rebuildTables();
                showToast('Obrisano.');
            } catch (e) {
                showToast('Greška: ' + e.message);
            }
        }
    }

    async function acceptOrder(orderId) {
        try {
            await update(ref(db, `${cafeId}/orders/pending/${orderId}`), { status: 'accepted' });
            showToast('Narudžba primljena');
        } catch (e) {
            showToast('Greška: ' + e.message);
        }
    }

    async function completeOrder(orderId) {
        try {
            await update(ref(db, `${cafeId}/orders/pending/${orderId}`), { status: 'completed' });
            showToast('Narudžba realizovana');
        } catch (e) {
            showToast('Greška: ' + e.message);
        }
    }

    function renderTables() {
        const container = document.getElementById('tablesContainer');
        if (tablesMap.size === 0) {
            container.innerHTML = '<div class="empty">Nema aktivnih stolova.</div>';
            return;
        }
        container.innerHTML = '';
        for (let [table, data] of tablesMap.entries()) {
            const tableDiv = document.createElement('div');
            tableDiv.className = 'table-card';
            let ordersHtml = '';
            for (let order of data.orders) {
                const statusClass = order.status === 'pending' ? 'status-pending' : (order.status === 'accepted' ? 'status-accepted' : 'status-completed');
                const statusText = order.status === 'pending' ? '⏳ Na čekanju' : (order.status === 'accepted' ? '✅ Primljeno' : '✅ Realizovano');
                let itemsHtml = '';
                if (order.items && order.items.length) {
                    order.items.forEach(it => {
                        itemsHtml += `<div><strong>${escapeHtml(it.itemName)}</strong> ${it.size ? `(${it.size})` : ''} - ${it.price} KM`;
                        if (it.note) itemsHtml += `<div class="item-note">📝 ${escapeHtml(it.note)}</div>`;
                        itemsHtml += `</div>`;
                    });
                } else if (order.type === 'waiter') {
                    itemsHtml = '<div>📞 Poziv konobara</div>';
                } else if (order.type === 'bill_request') {
                    itemsHtml = '<div>🧾 Zahtjev za računom</div>';
                }
                ordersHtml += `
                    <div class="order-item">
                        <div class="order-header">
                            <span class="guest-name">${escapeHtml(order.guestName || 'Gost')}</span>
                            <span class="order-status ${statusClass}">${statusText}</span>
                            <span>${formatTime(order.timestamp)}</span>
                        </div>
                        <div class="items-list">${itemsHtml}</div>
                        <div class="order-buttons">
                            ${order.status === 'pending' && order.type !== 'bill_request' ? `<button class="btn-sm btn-accept" data-id="${order.id}">📥 Primljeno</button>` : ''}
                            ${order.status === 'accepted' ? `<button class="btn-sm btn-complete" data-id="${order.id}">✅ Realizovano</button>` : ''}
                            ${order.status === 'completed' ? `<button class="btn-sm btn-delete-single" data-id="${order.id}">🗑️ Obriši</button>` : ''}
                        </div>
                    </div>
                `;
            }
            const totalToPay = data.total.toFixed(2);
            tableDiv.innerHTML = `
                <div class="table-header">
                    <span class="table-number">🍻 Sto ${escapeHtml(table)}</span>
                    <span class="table-total">💰 Ukupno: ${totalToPay} KM</span>
                </div>
                ${ordersHtml}
                <button class="btn-close-table" data-table="${table}">🧾 Zatvori račun (arhiviraj i obriši)</button>
            `;
            container.appendChild(tableDiv);
        }
        attachEvents();
    }

    function attachEvents() {
        // Accept buttons
        document.querySelectorAll('.btn-accept').forEach(btn => {
            btn.onclick = () => {
                const id = btn.getAttribute('data-id');
                acceptOrder(id);
            };
        });
        // Complete buttons
        document.querySelectorAll('.btn-complete').forEach(btn => {
            btn.onclick = () => {
                const id = btn.getAttribute('data-id');
                completeOrder(id);
            };
        });
        // Delete single completed
        document.querySelectorAll('.btn-delete-single').forEach(btn => {
            btn.onclick = () => {
                const id = btn.getAttribute('data-id');
                deleteSingleCompletedOrder(id);
            };
        });
        // Close table
        document.querySelectorAll('.btn-close-table').forEach(btn => {
            btn.onclick = () => {
                const table = btn.getAttribute('data-table');
                closeTable(table);
            };
        });
    }

    // Inicijalno učitavanje svih narudžbi (pending)
    function loadOrders() {
        onValue(pendingRef, (snapshot) => {
            const data = snapshot.val();
            const newOrders = [];
            if (data) {
                for (let [id, order] of Object.entries(data)) {
                    newOrders.push({ id, ...order });
                }
            }
            orders = newOrders;
            ordersMap.clear();
            orders.forEach(o => ordersMap.set(o.id, o));
            rebuildTables();
        });
    }

    // Listener za nove narudžbe (samo za zvuk)
    onChildAdded(pendingRef, (snapshot) => {
        const order = snapshot.val();
        if (order) {
            playSound();
            showToast('Nova narudžba!');
        }
    });

    // Listener za promjene statusa (da ažuriramo orders i rebuild)
    onChildChanged(pendingRef, (snapshot) => {
        const id = snapshot.key;
        const newOrder = snapshot.val();
        const index = orders.findIndex(o => o.id === id);
        if (index !== -1) {
            orders[index] = { id, ...newOrder };
            ordersMap.set(id, orders[index]);
        } else {
            orders.push({ id, ...newOrder });
            ordersMap.set(id, { id, ...newOrder });
        }
        rebuildTables();
    });

    document.getElementById('soundToggleBtn').onclick = () => {
        soundEnabled = !soundEnabled;
        document.getElementById('soundToggleBtn').innerText = soundEnabled ? '🔊 Zvuk uključen' : '🔇 Zvuk isključen';
    };

    loadOrders();
</script>
</body>
</html>
