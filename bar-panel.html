<!DOCTYPE html>
<html>
<head>
    <title>Šank panel - jednostavni prikaz</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
</head>
<body>
    <h1>Šank panel - jednostavni prikaz narudžbi</h1>
    <div id="output">Učitavanje...</div>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, onValue } from 'firebase/database';

        const firebaseConfig = {
            apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
            authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
            databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kelt-pub-menu-2df61",
            storageBucket: "kelt-pub-menu-2df61.firebasestorage.app",
            messagingSenderId: "1026702086011",
            appId: "1:1026702086011:web:8162de6bad4f18b731b7de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const params = new URLSearchParams(location.search);
        let cafeId = params.get('cafe');
        if (!cafeId) cafeId = 'kelt2026';

        const pendingRef = ref(db, `${cafeId}/orders/pending`);
        const outputDiv = document.getElementById('output');

        onValue(pendingRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Pretvori u HTML listu
                let html = '<ul>';
                for (const [id, order] of Object.entries(data)) {
                    html += `<li><strong>${order.guestName || 'Gost'}</strong> (sto ${order.tableNumber || '?'}) - status: ${order.status}`;
                    if (order.items) {
                        const itemsArray = Array.isArray(order.items) ? order.items : Object.values(order.items);
                        html += '<ul>';
                        itemsArray.forEach(it => {
                            html += `<li>${it.itemName} ${it.size ? `(${it.size})` : ''} - ${it.price} KM ${it.note ? `(napomena: ${it.note})` : ''}</li>`;
                        });
                        html += '</ul>';
                    } else if (order.type === 'waiter') {
                        html += '<li>📞 Poziv konobara</li>';
                    } else if (order.type === 'bill_request') {
                        html += '<li>🧾 Zahtjev za računom</li>';
                    }
                    html += `</li><hr>`;
                }
                html += '</ul>';
                outputDiv.innerHTML = html;
            } else {
                outputDiv.innerHTML = 'Nema narudžbi.';
            }
        });
    </script>
</body>
</html>
