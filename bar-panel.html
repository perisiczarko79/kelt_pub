<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Šank panel - KELT PUB</title>
    <style>
        body {
            background: #1a1a1a;
            color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffd966;
        }
        .orders-list {
            margin-top: 20px;
        }
        .order-card {
            background: #2c2c2c;
            border-left: 5px solid #ffd966;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .order-info {
            flex: 1;
        }
        .order-info strong {
            color: #ffd966;
        }
        .timestamp {
            font-size: 11px;
            color: #aaa;
        }
        .accept-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .accept-btn:hover {
            background: #45a049;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #ffd966;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🍺 Šank panel - KELT PUB</h1>
    <div id="ordersContainer" class="orders-list">
        <div class="empty">Učitavanje...</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, onChildAdded, onChildChanged, update, get } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app",
        messagingSenderId: "1026702086011",
        appId: "1:1026702086011:web:8162de6bad4f18b731b7de",
        measurementId: "G-3095YK50QM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(window.location.search);
    let cafeId = params.get('cafe');
    if (!cafeId) {
        cafeId = prompt('Unesite ID kafića (npr. gradski_pub):');
        if (!cafeId) {
            document.body.innerHTML = '<div class="empty">Nedostaje ID kafića.</div>';
            throw new Error('No cafe ID');
        }
    }

    const pendingOrdersRef = ref(db, `${cafeId}/orders/pending`);
    let audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3'); // besplatni zvuk

    function playSound() {
        audio.play().catch(e => console.log('Zvuk nije podržan', e));
    }

    function formatTime(timestamp) {
        const date = new Date(timestamp);
        return `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}:${date.getSeconds().toString().padStart(2,'0')}`;
    }

    function renderOrder(orderId, order) {
        const container = document.getElementById('ordersContainer');
        if (container.querySelector('.empty')) container.innerHTML = '';
        const card = document.createElement('div');
        card.className = 'order-card';
        card.id = `order-${orderId}`;
        let details = '';
        if (order.type === 'order') {
            details = `<strong>${escapeHtml(order.guestName)}</strong> naručuje: ${escapeHtml(order.itemName)} ${order.size ? `(${order.size})` : ''} - ${order.price} KM`;
        } else {
            details = `<strong>${escapeHtml(order.guestName)}</strong> poziva konobara! 📞`;
        }
        card.innerHTML = `
            <div class="order-info">
                ${details}
                <div class="timestamp">${formatTime(order.timestamp)}</div>
            </div>
            <button class="accept-btn" data-id="${orderId}">✅ Primljeno</button>
        `;
        container.appendChild(card);
        const btn = card.querySelector('.accept-btn');
        btn.addEventListener('click', async () => {
            // Označi kao prihvaćeno
            const orderRef = ref(db, `${cafeId}/orders/pending/${orderId}`);
            await update(orderRef, { status: 'accepted' });
            // Ukloni karticu sa tableta (ili ažuriraj)
            card.remove();
            if (container.children.length === 0) {
                container.innerHTML = '<div class="empty">Nema aktivnih zahtjeva.</div>';
            }
            // Također možemo obrisati nakon nekog vremena? Status accepted će ostati, ali gost je već dobio notifikaciju.
            // Opciono: obrišemo čvor nakon 2 sekunde (da ne gomila)
            setTimeout(async () => {
                await update(orderRef, { status: 'accepted' }); // već je, ali možemo izbrisati
                // await remove(orderRef); // ako želimo da se skroz obriše
            }, 2000);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => (m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'));
    }

    // Slušaj nove zahtjeve (onChildAdded)
    onChildAdded(pendingOrdersRef, (snapshot) => {
        const order = snapshot.val();
        if (order.status === 'pending') {
            playSound();
            renderOrder(snapshot.key, order);
        }
    });

    // Opciono: ako neki zahtjev promijeni status (možda ručno), ali ne moramo
    onChildChanged(pendingOrdersRef, (snapshot) => {
        const order = snapshot.val();
        if (order.status !== 'pending') {
            const card = document.getElementById(`order-${snapshot.key}`);
            if (card) card.remove();
        }
    });

    // Inicijalno učitaj postojeće pending zahtjeve
    get(pendingOrdersRef).then((snapshot) => {
        const container = document.getElementById('ordersContainer');
        container.innerHTML = '';
        const orders = snapshot.val();
        if (orders) {
            Object.entries(orders).forEach(([id, order]) => {
                if (order.status === 'pending') {
                    renderOrder(id, order);
                }
            });
        } else {
            container.innerHTML = '<div class="empty">Nema aktivnih zahtjeva.</div>';
        }
    });
</script>
</body>
</html>
