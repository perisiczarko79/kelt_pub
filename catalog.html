<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Katalog ribolovnih mušica</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a2a1f;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #e8f0e8;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 2rem;
            color: #ffd966;
        }
        /* Navigacija */
        .category-nav {
            position: sticky;
            top: 0;
            background: #1a2a1f;
            backdrop-filter: blur(12px);
            padding: 12px 0;
            margin-bottom: 30px;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-bottom: 1px solid #ffd966;
            flex-wrap: wrap;
        }
        .category-nav button {
            background: #2c3e2b;
            border: 1px solid #ffd966;
            color: #ffd966;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }
        .category-nav button:hover {
            background: #ffd966;
            color: #1a2a1f;
        }
        .category {
            margin-bottom: 40px;
            scroll-margin-top: 80px;
        }
        .category h2 {
            background: #2c3e2b;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-left: 5px solid #ffd966;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .card {
            background: #2a3a28;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #1e2a1c;
        }
        .card-info {
            padding: 12px;
        }
        .card-info h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: #ffd966;
        }
        .price {
            font-weight: bold;
            font-size: 1.2rem;
            color: #f0b27a;
        }
        .admin-controls {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .admin-btn {
            background: #3a4a38;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .admin-btn.danger {
            background: #a33;
        }
        .admin-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #333;
            color: white;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            z-index: 1000;
            font-size: 14px;
        }
        .admin-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1e2a1c;
            border-top: 2px solid #ffd966;
            padding: 12px;
            text-align: center;
            z-index: 999;
        }
        .admin-footer button {
            background: #ffd966;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #2a3a28;
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 80%;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            background: #1e2a1c;
            border: 1px solid #ffd966;
            color: white;
            border-radius: 8px;
        }
        .modal-content label {
            font-weight: bold;
        }
        .preview-img {
            max-width: 100px;
            max-height: 100px;
            margin: 8px 0;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #ffd966;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 3000;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .footer-motto {
            text-align: center;
            margin: 30px 0 20px;
            font-size: 12px;
            color: #8aa07a;
            cursor: pointer;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="adminBar" class="admin-bar" style="display: none;">
    <span>🔐 ADMIN MOD AKTIVAN (Katalog mušica)</span>
    <button id="exitAdminBtn">Izađi</button>
</div>

<div class="container">
    <h1>🎣 Katalog ribolovnih mušica</h1>
    <div id="categoryNav" class="category-nav"></div>
    <div id="catalogContainer"></div>
    <div class="footer-motto" onclick="handleAdminClick()">❖ ❖ ❖</div>
</div>

<div id="adminFooter" class="admin-footer" style="display: none;">
    <button id="addItemBtn">➕ Dodaj mušicu</button>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, onValue, push, set, remove, update } from 'firebase/database';

    // 🔥 VAŠ FIREBASE CONFIG (ISTI KAO ZA MENI) 🔥
    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app",
        messagingSenderId: "1026702086011",
        appId: "1:1026702086011:web:8162de6bad4f18b731b7de",
        measurementId: "G-3095YK50QM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const itemsRef = ref(db, 'fishing/items');

    let items = [];
    let isAdminMode = false;
    let adminClickCount = 0;
    const CATALOG_ADMIN_PASSWORD = 'fishing2026';

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => (m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'));
    }

    function showToast(msg, duration = 2000) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    function loadItems() {
        onValue(itemsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                items = Object.entries(data).map(([id, val]) => ({ id, ...val }));
            } else {
                items = [];
            }
            renderNav();
            renderCatalog();
        });
    }

    function renderNav() {
        const navDiv = document.getElementById('categoryNav');
        navDiv.innerHTML = '';
        const categories = [
            { key: 'povrsinske', name: '🌊 Površinske' },
            { key: 'podvodne', name: '💧 Podvodne' }
        ];
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.textContent = cat.name;
            btn.onclick = () => {
                const section = document.getElementById(`cat-${cat.key}`);
                if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };
            navDiv.appendChild(btn);
        });
    }

    function renderCatalog() {
        const container = document.getElementById('catalogContainer');
        container.innerHTML = '';

        const categories = [
            { key: 'povrsinske', name: '🌊 Površinske mušice' },
            { key: 'podvodne', name: '💧 Podvodne mušice' }
        ];

        for (let cat of categories) {
            const catItems = items.filter(item => item.category === cat.key);
            if (catItems.length === 0 && !isAdminMode) continue;
            const section = document.createElement('div');
            section.className = 'category';
            section.id = `cat-${cat.key}`;
            section.innerHTML = `<h2>${cat.name}</h2><div class="grid" id="grid-${cat.key}"></div>`;
            const grid = section.querySelector(`.grid`);
            catItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${escapeHtml(item.imageBase64 || '')}" alt="${escapeHtml(item.name)}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2255%22%20text-anchor%3D%22middle%22%20fill%3D%22%23aaa%22%3ENo%20image%3C%2Ftext%3E%3C%2Fsvg%3E'">
                    <div class="card-info">
                        <h3>${escapeHtml(item.name)}</h3>
                        <div class="price">${escapeHtml(item.price)} KM</div>
                        ${isAdminMode ? `
                            <div class="admin-controls">
                                <button class="admin-btn" onclick="window.editItem('${item.id}')">✏️ Uredi</button>
                                <button class="admin-btn danger" onclick="window.deleteItem('${item.id}')">🗑️ Obriši</button>
                            </div>
                        ` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
            container.appendChild(section);
        }
    }

    window.deleteItem = async function(id) {
        if (confirm('Obrisati mušicu?')) {
            await remove(ref(db, `fishing/items/${id}`));
            showToast('Obrisano', 1500);
        }
    };

    window.editItem = function(id) {
        const item = items.find(i => i.id === id);
        if (item) showItemModal(item);
    };

    let currentEditId = null;

    function showItemModal(item = null) {
        currentEditId = item ? item.id : null;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>${item ? 'Uredi mušicu' : 'Dodaj mušicu'}</h3>
                <label>Naziv:</label>
                <input type="text" id="modalName" value="${item ? escapeHtml(item.name) : ''}">
                <label>Cijena (KM):</label>
                <input type="text" id="modalPrice" value="${item ? escapeHtml(item.price) : ''}">
                <label>Kategorija:</label>
                <select id="modalCategory">
                    <option value="povrsinske" ${item && item.category === 'povrsinske' ? 'selected' : ''}>Površinske</option>
                    <option value="podvodne" ${item && item.category === 'podvodne' ? 'selected' : ''}>Podvodne</option>
                </select>
                <label>Slika (upload):</label>
                <input type="file" id="modalImage" accept="image/*">
                <div id="imagePreview">
                    ${item && item.imageBase64 ? `<img src="${escapeHtml(item.imageBase64)}" class="preview-img">` : ''}
                </div>
                <div style="margin-top:16px;">
                    <button id="saveModalBtn">Sačuvaj</button>
                    <button id="closeModalBtn">Odustani</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        const fileInput = modal.querySelector('#modalImage');
        const previewDiv = modal.querySelector('#imagePreview');
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewDiv.innerHTML = `<img src="${ev.target.result}" class="preview-img">`;
                    modal.setAttribute('data-imageBase64', ev.target.result);
                };
                reader.readAsDataURL(file);
            }
        };

        modal.querySelector('#closeModalBtn').onclick = () => modal.remove();
        modal.querySelector('#saveModalBtn').onclick = async () => {
            const name = modal.querySelector('#modalName').value.trim();
            const price = modal.querySelector('#modalPrice').value.trim().replace(',', '.');
            const category = modal.querySelector('#modalCategory').value;
            if (!name) { alert('Unesite naziv'); return; }
            if (!price || isNaN(parseFloat(price))) { alert('Unesite ispravnu cijenu'); return; }
            let imageBase64 = modal.getAttribute('data-imageBase64') || (item ? item.imageBase64 : '');
            if (!imageBase64 && fileInput.files.length === 0 && !item) {
                alert('Odaberite sliku');
                return;
            }
            const data = { name, price: parseFloat(price).toFixed(2), category, imageBase64 };
            if (currentEditId) {
                await update(ref(db, `fishing/items/${currentEditId}`), data);
                showToast('Mušica izmijenjena', 1500);
            } else {
                await push(itemsRef, data);
                showToast('Mušica dodata', 1500);
            }
            modal.remove();
        };
    }

    async function handleAdminClick() {
        adminClickCount++;
        if (adminClickCount >= 5) {
            adminClickCount = 0;
            let pass = prompt('Unesite admin šifru za katalog:');
            if (pass === CATALOG_ADMIN_PASSWORD) {
                enterAdminMode();
            } else {
                alert('Pogrešna šifra!');
            }
        }
    }

    function enterAdminMode() {
        isAdminMode = true;
        document.getElementById('adminBar').style.display = 'flex';
        document.getElementById('adminFooter').style.display = 'block';
        renderCatalog();
    }

    function exitAdminMode() {
        isAdminMode = false;
        document.getElementById('adminBar').style.display = 'none';
        document.getElementById('adminFooter').style.display = 'none';
        renderCatalog();
    }

    window.handleAdminClick = handleAdminClick;
    window.editItem = window.editItem;
    window.deleteItem = window.deleteItem;

    document.getElementById('exitAdminBtn').onclick = () => exitAdminMode();
    document.getElementById('addItemBtn').onclick = () => showItemModal(null);

    loadItems();
</script>
</body>
</html>
