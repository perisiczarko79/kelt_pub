<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KlikHub - Frizerski salon (Interni organizator)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            /* Premium paleta boja */
            --bg-primary: #0A0C10;
            --bg-secondary: #14161C;
            --bg-card: #1A1D25;
            --bg-elevated: #22252E;
            
            --accent-primary: #E85D04;
            --accent-secondary: #FFBA08;
            --accent-glow: rgba(232, 93, 4, 0.2);
            
            --success: #2E7D32;
            --warning: #F59E0B;
            --danger: #DC2626;
            --info: #3B82F6;
            
            --text-primary: #FFFFFF;
            --text-secondary: #A0A5B5;
            --text-tertiary: #6B7280;
            
            --border-light: rgba(255, 255, 255, 0.08);
            --border-medium: rgba(255, 255, 255, 0.12);
            
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 20px rgba(232, 93, 4, 0.3);
            
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 24px;
            background-image: radial-gradient(circle at 25% 0%, rgba(232, 93, 4, 0.05) 0%, transparent 50%);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-secondary);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
        }
        
        .header {
            background: linear-gradient(135deg, #0A0C10 0%, #14161C 100%);
            padding: 28px 32px;
            text-align: left;
            border-bottom: 2px solid var(--accent-primary);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '✂️';
            position: absolute;
            right: -20px;
            top: -20px;
            font-size: 140px;
            opacity: 0.03;
            pointer-events: none;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sub i {
            color: var(--accent-primary);
        }
        
        .panel {
            padding: 28px 32px;
        }
        
        .sticky-controls {
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            z-index: 100;
            padding: 16px 0;
            margin: -16px 0 0 0;
            backdrop-filter: blur(10px);
            background: rgba(20, 22, 28, 0.95);
            border-bottom: 1px solid var(--border-light);
        }
        
        .section-title {
            font-size: 1.2rem;
            margin: 28px 0 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i {
            color: var(--accent-primary);
            font-size: 1.3rem;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-medium), transparent);
            margin-left: 16px;
        }
        
        .section-sub {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-bottom: 16px;
            margin-left: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-medium);
            font-size: 0.95rem;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: var(--transition-fast);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        button {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-base);
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #F48C06 100%);
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }
        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-medium);
        }
        .btn-secondary:hover {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--accent-primary);
        }
        .btn-danger {
            background: linear-gradient(135deg, #DC2626 0%, #B91C1C 100%);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            color: white;
        }
        .action-btn {
            padding: 8px 16px;
            font-size: 0.85rem;
            border-radius: var(--radius-md);
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
        }
        .action-btn:hover {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--accent-primary);
            transform: translateY(-1px);
        }
        
        .time-slots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .time-btn {
            aspect-ratio: 1 / 1;
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }
        .time-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }
        .time-btn:hover::before {
            left: 100%;
        }
        .time-btn:active {
            transform: scale(0.97);
        }
        .time-btn.booked {
            background: linear-gradient(135deg, #7F1D1D 0%, #991B1B 100%);
            border-color: var(--danger);
            cursor: pointer;
        }
        .time-btn.pending {
            background: linear-gradient(135deg, #92400E 0%, #B45309 100%);
            border-color: var(--warning);
        }
        .time-btn.blocked {
            background: var(--bg-elevated);
            opacity: 0.5;
            cursor: pointer;
            text-decoration: line-through;
        }
        .time-btn.selected {
            border: 2px solid var(--accent-primary);
            box-shadow: var(--shadow-glow);
            transform: scale(0.98);
        }
        
        .reservation-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 18px;
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            transition: var(--transition-base);
            position: relative;
        }
        .reservation-card:hover {
            transform: translateX(4px);
            border-color: var(--accent-primary);
            background: var(--bg-elevated);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-confirmed { background: rgba(46, 125, 50, 0.2); color: #4CAF50; border: 1px solid rgba(76, 175, 80, 0.3); }
        .status-completed { background: rgba(59, 130, 246, 0.2); color: var(--info); border: 1px solid rgba(59, 130, 246, 0.3); }
        
        .admin-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .admin-actions button {
            width: auto;
            padding: 6px 14px;
            font-size: 0.8rem;
            border-radius: var(--radius-sm);
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
        }
        .admin-actions button:hover {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--accent-primary);
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .modal-content {
            background: var(--bg-secondary);
            max-width: 550px;
            width: 100%;
            padding: 28px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-medium);
            animation: modalSlideIn 0.3s ease;
            max-height: 85vh;
            overflow-y: auto;
        }
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .detail-row {
            margin: 12px 0;
            padding: 12px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
        }
        
        .all-reservations-item {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: var(--transition-fast);
            border: 1px solid var(--border-light);
        }
        .all-reservations-item:hover {
            background: var(--bg-elevated);
            border-color: var(--accent-primary);
            transform: translateX(4px);
        }
        
        .service-item, .interval-item {
            background: var(--bg-card);
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .service-item input, .interval-item input {
            flex: 1;
            margin: 0;
            min-width: 150px;
        }
        .service-item .remove-service, .interval-item .remove-interval {
            background: var(--danger);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            color: white;
        }
        
        .day-row {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 12px;
        }
        .day-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .day-header label { font-weight: 500; width: 100px; }
        .intervals-container {
            margin-left: 30px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            color: var(--accent-primary);
            padding: 14px 28px;
            border-radius: 50px;
            z-index: 3000;
            font-weight: 500;
            border: 1px solid var(--accent-primary);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideUp 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
        }
        .login-box {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: var(--radius-xl);
            max-width: 350px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--accent-primary);
            animation: modalSlideIn 0.3s ease;
        }
        .login-box i {
            font-size: 48px;
            color: var(--accent-primary);
            margin-bottom: 20px;
        }
        .login-box h3 {
            margin-bottom: 20px;
        }
        .login-box input {
            margin: 15px 0;
        }
        
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        input[type="date"] {
            background: var(--bg-card);
            border: 1px solid var(--border-medium);
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7);
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-tertiary);
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            body { padding: 12px; }
            .panel { padding: 20px; }
            .header { padding: 20px; }
            .time-slots { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; }
            .time-btn { font-size: 0.75rem; }
            .section-title { font-size: 1rem; margin: 20px 0 12px; }
        }
        @media (max-width: 480px) {
            .time-slots { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 6px; }
            .flex-row { gap: 8px; }
            .action-btn { padding: 6px 12px; font-size: 0.7rem; }
            .service-item { flex-direction: column; }
            .interval-item { flex-direction: column; }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1><i class="fas fa-cut" style="margin-right: 10px;"></i>Frizerski salon</h1>
        <div class="sub">
            <i class="fas fa-calendar-alt"></i>
            <span>Interni organizator termina</span>
        </div>
    </div>
    <div class="panel">
        <div class="flex-row" style="justify-content: space-between; margin-bottom: 24px;">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button id="changePasswordBtn" class="action-btn"><i class="fas fa-key"></i> Promijeni šifru</button>
                <button id="masterAdminBtn" class="action-btn" style="background: linear-gradient(135deg, #8B5CF6, #6D28D9); display:none;"><i class="fas fa-crown"></i> Master admin</button>
                <button id="refreshBtn" class="action-btn"><i class="fas fa-sync-alt"></i> Osvježi</button>
                <button id="showAllReservationsBtn" class="action-btn"><i class="fas fa-list-ul"></i> Sve rezervacije</button>
            </div>
        </div>

        <div class="sticky-controls">
            <div class="section-title">
                <i class="fas fa-calendar-week"></i>
                Termini
            </div>
            <div class="flex-row" style="justify-content: space-between; margin-bottom: 16px; gap: 12px;">
                <input type="date" id="datePicker" style="flex:2;">
                <button id="addManualBtn" class="btn-primary" style="flex:1;"><i class="fas fa-plus-circle"></i> Ručno dodaj</button>
                <button id="blockSlotBtn" class="btn-danger" style="flex:1;"><i class="fas fa-ban"></i> Blokiraj termin</button>
            </div>
            <div id="selectedDateDisplay" class="section-sub"></div>
        </div>
        <div id="timeSlotsContainer" class="time-slots"></div>

        <div class="section-title">
            <i class="fas fa-clock"></i>
            Rezervacije na čekanju
        </div>
        <div id="pendingReservationsList"></div>

        <div class="section-title">
            <i class="fas fa-check-circle"></i>
            Potvrđene rezervacije
        </div>
        <div id="confirmedReservationsList"></div>

        <div class="section-title">
            <i class="fas fa-check-double"></i>
            Završene rezervacije
        </div>
        <div id="completedReservationsList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, get, set, push, update, remove } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let salonId = null;
    function getSalonIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        let id = params.get('salon');
        if (!id) {
            id = prompt('Unesite ID salona (npr. gradski_salon):');
            if (id) window.history.replaceState({}, '', `?salon=${encodeURIComponent(id)}`);
            else throw new Error('Missing salon ID');
        }
        return id;
    }
    try { salonId = getSalonIdFromUrl(); }
    catch(e) { document.body.innerHTML = '<div style="text-align:center;margin-top:50px;">Greška: nedostaje ID salona.</div>'; throw e; }

    const reservationsRef = ref(db, `hairSalons/${salonId}/reservations`);
    const settingsRef = ref(db, `hairSalons/${salonId}/settings`);
    const blockedSlotsRef = ref(db, `hairSalons/${salonId}/blockedSlots`);
    const servicesRef = ref(db, `hairSalons/${salonId}/services`);
    const workingHoursRef = ref(db, `hairSalons/${salonId}/settings/workingHours`);

    let servicesList = [];
    let workingHours = {};
    let slotInterval = 30;
    let isLoggedIn = false;
    let isMasterAdmin = false;
    let currentAdminPassword = 'salon123';
    let selectedSlots = new Set();

    async function loadServices() {
        const snap = await get(servicesRef);
        if (snap.exists() && Array.isArray(snap.val())) {
            servicesList = snap.val();
        } else {
            servicesList = [
                { name: "Muško šišanje", duration: 30 },
                { name: "Žensko šišanje", duration: 30 },
                { name: "Šišanje + brada", duration: 45 },
                { name: "Feniranje", duration: 30 }
            ];
            await set(servicesRef, servicesList);
        }
    }

    async function loadWorkingHours() {
        const snap = await get(workingHoursRef);
        if (snap.exists()) {
            workingHours = snap.val();
        } else {
            workingHours = {
                monday: { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] },
                tuesday: { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] },
                wednesday: { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] },
                thursday: { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] },
                friday: { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] },
                saturday: { enabled: true, intervals: [{ start: "09:00", end: "15:00" }] },
                sunday: { enabled: false, intervals: [] }
            };
            await set(workingHoursRef, workingHours);
        }
    }

    async function loadSlotInterval() {
        const snap = await get(settingsRef);
        if (snap.exists() && snap.val().slotInterval) {
            slotInterval = snap.val().slotInterval;
        } else {
            slotInterval = 30;
            await update(settingsRef, { slotInterval });
        }
    }

    function getTimeSlotsForDate(date) {
        const dayNames = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
        const dateObj = new Date(date);
        const dayOfWeek = dayNames[dateObj.getDay()];
        const dayData = workingHours[dayOfWeek];
        if (!dayData || !dayData.enabled) return [];
        const slots = [];
        for (let interval of dayData.intervals) {
            let [startHour, startMin] = interval.start.split(':').map(Number);
            let [endHour, endMin] = interval.end.split(':').map(Number);
            let startTotal = startHour * 60 + startMin;
            let endTotal = endHour * 60 + endMin;
            for (let time = startTotal; time < endTotal; time += slotInterval) {
                let hour = Math.floor(time / 60);
                let minute = time % 60;
                slots.push(`${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}`);
            }
        }
        return slots;
    }

    function getSlotsOccupiedByReservation(startTime, durationMinutes) {
        const slots = [];
        let current = startTime;
        let remaining = durationMinutes;
        while (remaining > 0) {
            slots.push(current);
            let [hour, minute] = current.split(':').map(Number);
            let totalMinutes = hour * 60 + minute + slotInterval;
            let newHour = Math.floor(totalMinutes / 60);
            let newMinute = totalMinutes % 60;
            current = `${newHour.toString().padStart(2,'0')}:${newMinute.toString().padStart(2,'0')}`;
            remaining -= slotInterval;
        }
        return slots;
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const [year, month, day] = dateStr.split('-');
        return `${day}.${month}.${year}.`;
    }

    async function loadReservationsForDate(date) {
        const snapshot = await get(reservationsRef);
        const all = snapshot.val() || {};
        const reservations = [];
        for (const [id, res] of Object.entries(all)) {
            if (res.date === date) {
                reservations.push({ id, ...res });
            }
        }
        return reservations;
    }

    async function loadBlockedSlotsForDate(date) {
        const blockedRef = ref(db, `hairSalons/${salonId}/blockedSlots/${date}`);
        const snap = await get(blockedRef);
        if (snap.exists()) return Object.keys(snap.val());
        return [];
    }

    async function renderTimeSlots() {
        const date = document.getElementById('datePicker').value;
        if (!date) {
            document.getElementById('timeSlotsContainer').innerHTML = '<div class="empty-state"><i class="fas fa-calendar-times"></i><br>Odaberite datum</div>';
            document.getElementById('selectedDateDisplay').innerHTML = '';
            return;
        }
        document.getElementById('selectedDateDisplay').innerHTML = `<i class="fas fa-calendar-day"></i> ${formatDate(date)}`;
        const reservations = await loadReservationsForDate(date);
        const blocked = await loadBlockedSlotsForDate(date);
        const allSlots = getTimeSlotsForDate(date);
        const container = document.getElementById('timeSlotsContainer');
        container.innerHTML = '';
        selectedSlots.clear();

        const occupiedBy = new Map();
        for (const res of reservations) {
            const duration = res.duration || servicesList.find(s => s.name === res.service)?.duration || 30;
            const slots = getSlotsOccupiedByReservation(res.time, duration);
            for (const slot of slots) {
                occupiedBy.set(slot, { status: res.status, id: res.id, data: res });
            }
        }

        for (const slot of allSlots) {
            const btn = document.createElement('button');
            btn.className = 'time-btn';
            btn.innerHTML = `<i class="fas fa-clock" style="font-size: 0.7rem; margin-right: 4px;"></i>${slot}`;
            if (blocked.includes(slot)) {
                btn.classList.add('blocked');
                btn.onclick = () => unblockSlot(slot);
            } else if (occupiedBy.has(slot)) {
                const occ = occupiedBy.get(slot);
                if (occ.status === 'pending') {
                    btn.classList.add('pending');
                } else {
                    btn.classList.add('booked');
                }
                btn.onclick = () => showReservationDetails(occ.id, occ.data);
            } else {
                btn.onclick = () => showAddReservationModal(slot);
            }
            if (selectedSlots.has(slot)) {
                btn.classList.add('selected');
            }
            container.appendChild(btn);
        }
        if (allSlots.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-moon"></i><br>Nema radnih termina za ovaj datum</div>';
        }
    }

    async function unblockSlot(slot) {
        const date = document.getElementById('datePicker').value;
        await remove(ref(db, `hairSalons/${salonId}/blockedSlots/${date}/${slot}`));
        showToast(`Termin ${slot} odblokiran`);
        renderTimeSlots();
        renderAllLists();
    }

                    ${reservation.status !== 'canceled' ? `<button id="modalCancelBtn" class="btn-danger"><i class="fas fa-trash"></i> Otkaži</button>` : ''}
                    ${reservation.status === 'confirmed' ? `<button id="modalCompleteBtn" style="background: var(--info);"><i class="fas fa-check-double"></i> Završi</button>` : ''}

                <div class="form-group">

                </div>
                <div class="form-group">
                    <label><i class="fas fa-cut"></i> Usluga</label>
                    <select id="modalServiceSelect">${servicesOptions}</select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Ime klijenta</label>
                    <input type="text" id="modalClientName" placeholder="Ime i prezime">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Telefon</label>
                    <input type="text" id="modalClientPhone" placeholder="Broj telefona">
                </div>
                <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                    <button id="modalCancelAdd" class="btn-secondary">Odustani</button>
                    <button id="modalSaveAdd" class="btn-primary"><i class="fas fa-save"></i> Dodaj rezervaciju</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#modalCancelAdd').onclick = () => modalDiv.remove();
        modalDiv.querySelector('#modalSaveAdd').onclick = async () => {
            let time = selectedTime;
            if (!time) {
                const timeSelect = modalDiv.querySelector('#modalTimeSelect');
                time = timeSelect.value;
                if (!time) { showToast('Odaberite termin'); return; }
            }
            const serviceSelect = modalDiv.querySelector('#modalServiceSelect');
            const serviceName = serviceSelect.value;
            const duration = parseInt(serviceSelect.options[serviceSelect.selectedIndex].getAttribute('data-duration'));
            const name = modalDiv.querySelector('#modalClientName').value.trim();
            const phone = modalDiv.querySelector('#modalClientPhone').value.trim();
            if (!name || !phone) { showToast('Unesite ime i broj telefona'); return; }
            
            const slotsToOccupy = getSlotsOccupiedByReservation(time, duration);
            const reservations = await loadReservationsForDate(date);
            const blocked = await loadBlockedSlotsForDate(date);
            let conflict = false;
            for (const slot of slotsToOccupy) {
                for (const res of reservations) {
                    const resDuration = res.duration || 30;
                    const resSlots = getSlotsOccupiedByReservation(res.time, resDuration);
                    if (resSlots.includes(slot)) conflict = true;
                }
                if (blocked.includes(slot)) conflict = true;
            }
            if (conflict) { showToast('Termin nije slobodan za odabranu uslugu'); return; }
            
            const newRef = push(reservationsRef);
            await set(newRef, {
                date, time, service: serviceName, duration,
                clientName: name, clientPhone: phone,
                status: 'confirmed', createdAt: Date.now()
            });
            showToast('Rezervacija dodana');
            modalDiv.remove();
            renderAllLists();
            renderTimeSlots();
        };
    }

    async function showBlockSlotModal() {
        const date = document.getElementById('datePicker').value;
        if (!date) { showToast('Odaberite datum'); return; }
        const allSlots = getTimeSlotsForDate(date);
        const reservations = await loadReservationsForDate(date);
        const blocked = await loadBlockedSlotsForDate(date);
        
        const occupiedSlots = new Set();
        for (const res of reservations) {
            const dur = res.duration || 30;
            const slots = getSlotsOccupiedByReservation(res.time, dur);
            slots.forEach(s => occupiedSlots.add(s));
        }
        blocked.forEach(s => occupiedSlots.add(s));
        const freeSlots = allSlots.filter(slot => !occupiedSlots.has(slot));
        if (freeSlots.length === 0) { showToast('Nema slobodnih termina za blokiranje'); return; }
        
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        let slotsOptions = '';
        freeSlots.forEach(slot => {
            slotsOptions += `<option value="${slot}">${slot}</option>`;
        });
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3><i class="fas fa-ban" style="color: var(--danger); margin-right: 10px;"></i>Blokiraj termin za ${formatDate(date)}</h3>
                <div class="form-group">
                    <label>Odaberi termin</label>
                    <select id="blockTimeSelect">${slotsOptions}</select>
                </div>

                    <button id="modalConfirmBlock" class="btn-danger"><i class="fas fa-lock"></i> Blokiraj</button>

        modalDiv.querySelector('#modalCancelBlock').onclick = () => modalDiv.remove();

            const time = modalDiv.querySelector('#blockTimeSelect').value;

            renderTimeSlots();

    }

    async function loadAllReservationsForLists() {
        const snapshot = await get(reservationsRef);
        const all = snapshot.val() || {};
        const pending = [];
        const confirmed = [];
        const completed = [];
        const now = new Date();
        for (const [id, res] of Object.entries(all)) {
            const [year, month, day] = res.date.split('-');
            const [hour, minute] = res.time.split(':');
            const resDateTime = new Date(year, month-1, day, hour, minute);
            if (res.status === 'pending') {
                pending.push({ id, ...res, dateTime: resDateTime });
            } else if (res.status === 'confirmed') {
                if (resDateTime < now) {
                    await update(ref(db, `hairSalons/${salonId}/reservations/${id}`), { status: 'completed' });
                    completed.push({ id, ...res, dateTime: resDateTime });
                } else {
                    confirmed.push({ id, ...res, dateTime: resDateTime });
                }
            } else if (res.status === 'completed') {
                completed.push({ id, ...res, dateTime: resDateTime });
            }
        }
        pending.sort((a,b) => a.dateTime - b.dateTime);
        confirmed.sort((a,b) => a.dateTime - b.dateTime);
        completed.sort((a,b) => b.dateTime - a.dateTime);
        return { pending, confirmed, completed };
    }

                    await remove(ref(db, `hairSalons/${salonId}/reservations/${id}`));
                    showToast('Rezervacija otkazana');
                    renderAllLists();
                    renderTimeSlots();
                }
            };
        });
        document.querySelectorAll('.confirmed-complete').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                await update(ref(db, `hairSalons/${salonId}/reservations/${id}`), { status: 'completed' });
                showToast('Označeno kao završeno');
                renderAllLists();
                renderTimeSlots();
            };
        });
        document.querySelectorAll('.completed-delete').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                if (confirm('Trajno obrisati ovu rezervaciju?')) {
                    await remove(ref(db, `hairSalons/${salonId}/reservations/${id}`));
                    showToast('Rezervacija obrisana');
                    renderAllLists();
                }
            };
        });
        document.querySelectorAll('.pending-block, .confirmed-block').forEach(btn => {
            btn.onclick = async () => {
                const date = btn.getAttribute('data-date');
                const time = btn.getAttribute('data-time');
                const duration = parseInt(btn.getAttribute('data-duration')) || 30;
                const slots = getSlotsOccupiedByReservation(time, duration);
                if (confirm(`Blokirati termin ${formatDate(date)} od ${time} (trajanje ${duration} min)?`)) {
                    for (let slot of slots) {
                        await set(ref(db, `hairSalons/${salonId}/blockedSlots/${date}/${slot}`), true);
                    }
                    const id = btn.getAttribute('data-id');
                    if (id) await remove(ref(db, `hairSalons/${salonId}/reservations/${id}`));
                    showToast(`Termin blokiran`);
                    renderAllLists();
                    renderTimeSlots();
                }
            };
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    async function changeAdminPassword() {
        const oldPass = prompt('Unesite trenutnu admin šifru:');
        if (!oldPass) return;
        if (oldPass !== currentAdminPassword) { showToast('Pogrešna stara šifra'); return; }
        const newPass = prompt('Unesite novu admin šifru (minimum 4 znaka):');
        if (newPass && newPass.trim().length >= 4) {
            await update(settingsRef, { adminPassword: newPass.trim() });
            currentAdminPassword = newPass.trim();
            showToast('Šifra uspješno promijenjena');
        } else {
            showToast('Šifra nije promijenjena (mora imati bar 4 znaka)');
        }
    }

    async function showMasterAdminModal() {
        if (!isMasterAdmin) { showToast('Nemate ovlaštenje za ove postavke'); return; }
        let currentServices = [...servicesList];
        let currentWorkingHours = JSON.parse(JSON.stringify(workingHours));
        let currentSlotInterval = slotInterval;
        
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3><i class="fas fa-crown" style="color: var(--accent-secondary);"></i> Master admin - Postavke salona</h3>
                <h4><i class="fas fa-cut"></i> Usluge</h4>
                <div id="masterServicesContainer"></div>
                <button type="button" id="masterAddServiceBtn" class="btn-secondary" style="margin-top: 8px;"><i class="fas fa-plus"></i> Dodaj uslugu</button>
                <hr style="margin: 16px 0; border-color: var(--border-light);">
                <h4><i class="fas fa-clock"></i> Radno vrijeme</h4>
                <div id="masterWorkingHoursContainer"></div>
                <hr style="margin: 16px 0; border-color: var(--border-light);">
                <h4><i class="fas fa-hourglass-half"></i> Interval termina (minute)</h4>
                <select id="masterSlotIntervalSelect">
                    <option value="15" ${currentSlotInterval === 15 ? 'selected' : ''}>15 minuta</option>
                    <option value="30" ${currentSlotInterval === 30 ? 'selected' : ''}>30 minuta</option>
                    <option value="45" ${currentSlotInterval === 45 ? 'selected' : ''}>45 minuta</option>
                    <option value="60" ${currentSlotInterval === 60 ? 'selected' : ''}>60 minuta</option>
                </select>
                <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                    <button id="closeMasterModal" class="btn-secondary">Odustani</button>
                    <button id="saveMasterBtn" class="btn-primary"><i class="fas fa-save"></i> Sačuvaj promjene</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        
        const servicesContainer = modalDiv.querySelector('#masterServicesContainer');
        const whContainer = modalDiv.querySelector('#masterWorkingHoursContainer');
        
        let tempServices = JSON.parse(JSON.stringify(currentServices));
        let tempWH = JSON.parse(JSON.stringify(currentWorkingHours));
        
        function renderServices() {
            servicesContainer.innerHTML = '';
            tempServices.forEach((s, idx) => {
                const div = document.createElement('div');
                div.className = 'service-item';
                div.innerHTML = `
                    <input type="text" placeholder="Naziv usluge" value="${escapeHtml(s.name)}" data-idx="${idx}" class="master-service-name" style="flex:2;">
                    <input type="number" placeholder="Trajanje (min)" value="${s.duration}" data-idx="${idx}" class="master-service-duration" style="width:130px;">
                    <button type="button" class="remove-service" data-idx="${idx}"><i class="fas fa-trash"></i></button>
                `;
                servicesContainer.appendChild(div);
            });
            document.querySelectorAll('.remove-service').forEach(btn => {
                btn.onclick = () => {
                    const idx = parseInt(btn.dataset.idx);
                    tempServices.splice(idx, 1);
                    renderServices();
                };
            });
            document.querySelectorAll('.master-service-name, .master-service-duration').forEach(inp => {
                inp.onchange = (e) => {
                    const idx = parseInt(inp.dataset.idx);
                    if (inp.classList.contains('master-service-name')) tempServices[idx].name = inp.value;
                    if (inp.classList.contains('master-service-duration')) tempServices[idx].duration = parseInt(inp.value);
                };
            });
        }
        renderServices();
        modalDiv.querySelector('#masterAddServiceBtn').onclick = () => {
            tempServices.push({ name: "Nova usluga", duration: 30 });
            renderServices();
        };
        
        const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
        const dayNames = ['Ponedjeljak', 'Utorak', 'Srijeda', 'Četvrtak', 'Petak', 'Subota', 'Nedjelja'];
        
        function renderWorkingHours() {
            whContainer.innerHTML = '';
            days.forEach((day, idx) => {
                const dayData = tempWH[day] || { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] };
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-row';
                dayDiv.innerHTML = `
                    <div class="day-header">
                        <label style="width:100px;">${dayNames[idx]}</label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" class="master-day-enabled" ${dayData.enabled ? 'checked' : ''}> Radni dan
                        </label>
                    </div>
                    <div class="intervals-container" id="master-intervals-${day}"></div>
                    <button type="button" class="btn-secondary master-add-interval" data-day="${day}" style="margin-top: 8px;"><i class="fas fa-plus"></i> Dodaj interval</button>
                `;
                whContainer.appendChild(dayDiv);
                const intervalsContainer = dayDiv.querySelector(`.intervals-container`);
                const intervals = dayData.intervals || [];
                function renderIntervals() {
                    intervalsContainer.innerHTML = '';
                    intervals.forEach((interval, iidx) => {
                        const intDiv = document.createElement('div');
                        intDiv.className = 'interval-item';
                        intDiv.innerHTML = `
                            <input type="time" value="${interval.start}" data-day="${day}" data-idx="${iidx}" class="master-interval-start">
                            <span>-</span>
                            <input type="time" value="${interval.end}" data-day="${day}" data-idx="${iidx}" class="master-interval-end">
                            <button type="button" class="remove-interval" data-day="${day}" data-idx="${iidx}"><i class="fas fa-trash"></i></button>
                        `;
                        intervalsContainer.appendChild(intDiv);
                    });
                    intervalsContainer.querySelectorAll('.master-interval-start, .master-interval-end').forEach(inp => {
                        inp.onchange = (e) => {
                            const d = inp.dataset.day;
                            const iidx = parseInt(inp.dataset.idx);
                            if (!tempWH[d]) tempWH[d] = { enabled: true, intervals: [] };
                            if (!tempWH[d].intervals) tempWH[d].intervals = [];
                            if (inp.classList.contains('master-interval-start')) tempWH[d].intervals[iidx].start = inp.value;
                            else tempWH[d].intervals[iidx].end = inp.value;
                        };
                    });
                    intervalsContainer.querySelectorAll('.remove-interval').forEach(btn => {
                        btn.onclick = () => {
                            const d = btn.dataset.day;
                            const iidx = parseInt(btn.dataset.idx);
                            tempWH[d].intervals.splice(iidx, 1);
                            renderWorkingHours();
                        };
                    });
                }
                renderIntervals();
                const addBtn = dayDiv.querySelector('.master-add-interval');
                addBtn.onclick = () => {
                    if (!tempWH[day]) tempWH[day] = { enabled: true, intervals: [] };
                    if (!tempWH[day].intervals) tempWH[day].intervals = [];
                    tempWH[day].intervals.push({ start: "09:00", end: "17:00" });
                    renderWorkingHours();
                };
                const enabledChk = dayDiv.querySelector('.master-day-enabled');
                enabledChk.onchange = (e) => {
                    tempWH[day].enabled = e.target.checked;
                    renderWorkingHours();
                };
            });
        }
        renderWorkingHours();
        
        modalDiv.querySelector('#closeMasterModal').onclick = () => modalDiv.remove();
        modalDiv.querySelector('#saveMasterBtn').onclick = async () => {
            const newInterval = parseInt(modalDiv.querySelector('#masterSlotIntervalSelect').value);
            try {
                await set(ref(db, `hairSalons/${salonId}/services`), tempServices);
                await set(ref(db, `hairSalons/${salonId}/settings/workingHours`), tempWH);
                await update(ref(db, `hairSalons/${salonId}/settings`), { slotInterval: newInterval });
                showToast('Postavke salona su sačuvane');
                modalDiv.remove();
                await loadServices();
                await loadWorkingHours();
                await loadSlotInterval();
                renderTimeSlots();
                renderAllLists();
            } catch(e) {
                showToast('Greška: ' + e.message);
            }
        };
    }

    document.getElementById('datePicker').addEventListener('change', () => {
        renderTimeSlots();
        renderAllLists();
    });
    document.getElementById('addManualBtn').onclick = () => showAddReservationModal(null);
    document.getElementById('blockSlotBtn').onclick = () => showBlockSlotModal();
    document.getElementById('refreshBtn').onclick = () => {
        renderTimeSlots();
        renderAllLists();
        showToast('Sve je osvježeno');
    };
    document.getElementById('changePasswordBtn').onclick = () => changeAdminPassword();
    document.getElementById('showAllReservationsBtn').onclick = () => showAllReservations();
    const masterBtn = document.getElementById('masterAdminBtn');
    if (masterBtn) masterBtn.onclick = showMasterAdminModal;

    function showLogin() {
        const overlay = document.createElement('div');
        overlay.className = 'login-overlay';
        overlay.innerHTML = `
            <div class="login-box">
                <i class="fas fa-cut"></i>
                <h3>Prijava za frizera</h3>
                <input type="password" id="adminPassInput" placeholder="Šifra">
                <button id="adminLoginBtn" class="btn-primary" style="width:100%;"><i class="fas fa-sign-in-alt"></i> Prijavi se</button>
            </div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('adminLoginBtn').onclick = async () => {
            const pass = document.getElementById('adminPassInput').value;
            if (pass === currentAdminPassword) {
                isLoggedIn = true;
                isMasterAdmin = false;
                overlay.remove();
                await loadServices();
                await loadWorkingHours();
                await loadSlotInterval();
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('datePicker').value = today;
                await renderTimeSlots();
                await renderAllLists();
                if (document.getElementById('masterAdminBtn')) document.getElementById('masterAdminBtn').style.display = 'none';
                showToast('Uspješno ste prijavljeni');
            } else if (pass === 'master2026') {
                isLoggedIn = true;
                isMasterAdmin = true;
                overlay.remove();
                await loadServices();
                await loadWorkingHours();
                await loadSlotInterval();
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('datePicker').value = today;
                await renderTimeSlots();
                await renderAllLists();
                if (document.getElementById('masterAdminBtn')) {
                    document.getElementById('masterAdminBtn').style.display = 'inline-block';
                }
                showToast('Prijavljeni ste kao Master admin');
            } else {
                alert('Pogrešna šifra');
            }
        };
    }
    showLogin();
</script>
</body>
</html>
