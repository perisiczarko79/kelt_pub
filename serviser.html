<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servis — Serviser</title>
<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlNlcnZpcyIsCiAgInNob3J0X25hbWUiOiAiU2VydmlzIiwKICAic3RhcnRfdXJsIjogIi4vc2VydmlzZXIuaHRtbCIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBmMTExNSIsCiAgInRoZW1lX2NvbG9yIjogIiMwZjExMTUiLAogICJpY29ucyI6IFtdCn0=">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  :root { --bg:#0f1115; --card:#191c22; --elev:#22262e; --line:rgba(255,255,255,0.08); --txt:#e8eaed; --muted:#9aa0a8; --accent:#3b82f6; --green:#22c55e; --amber:#f59e0b; --red:#ef4444; }
  body { font-family:-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--txt); line-height:1.5; padding-bottom:30px; }
  .wrap { max-width:560px; margin:0 auto; padding:0 14px; }
  header { text-align:center; padding:18px 0 12px; }
  header h1 { font-size:19px; font-weight:700; }
  header p { font-size:12px; color:var(--muted); }

  label { display:block; font-size:13px; color:var(--muted); margin:12px 0 5px; }
  input, textarea, select { width:100%; padding:12px 14px; background:var(--elev); border:1px solid var(--line); color:var(--txt); border-radius:10px; font-size:16px; font-family:inherit; }
  input:focus, textarea:focus, select:focus { outline:none; border-color:var(--accent); }
  textarea { min-height:70px; resize:vertical; }
  .btn { width:100%; padding:14px; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; margin-top:16px; }
  .btn:active { transform:scale(.98); }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-green { background:var(--green); color:#05230f; }
  .btn-gray { background:var(--elev); color:var(--txt); border:1px solid var(--line); }

  .who-bar { display:flex; justify-content:space-between; align-items:center; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 14px; margin-bottom:14px; font-size:14px; }
  .who-bar b { color:var(--accent); }
  .who-bar button { background:none; border:none; color:var(--muted); font-size:12px; cursor:pointer; text-decoration:underline; }

  .filters { display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px; }
  .filter-btn { flex-shrink:0; padding:7px 14px; background:var(--card); border:1px solid var(--line); color:var(--muted); border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; }
  .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .nalog { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; }
  .nalog.highlight { border-color:var(--accent); box-shadow:0 0 0 2px rgba(59,130,246,.25); }
  .nalog-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }
  .nalog-kod { font-size:20px; font-weight:800; letter-spacing:1px; color:var(--accent); }
  .nalog-ime { font-weight:600; font-size:16px; margin-top:2px; }
  .nalog-tel { font-size:14px; margin-top:2px; }
  .nalog-tel a { color:var(--green); text-decoration:none; font-weight:600; }
  .nalog-kvar { font-size:15px; margin:10px 0; padding:10px 12px; background:var(--elev); border-radius:8px; border-left:3px solid var(--accent); }
  .nalog-meta { font-size:12px; color:var(--muted); }
  .nalog-uradjeno { font-size:14px; margin-top:8px; }
  .nalog-cijena { font-weight:700; color:var(--green); }

  .status { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; white-space:nowrap; }
  .status.primljen { background:rgba(59,130,246,.15); color:#93c5fd; }
  .status.u_radu   { background:rgba(245,158,11,.15); color:#fcd34d; }
  .status.gotovo   { background:rgba(34,197,94,.15); color:#86efac; }
  .status.preuzeto { background:rgba(255,255,255,.08); color:var(--muted); }
  .status.otkazano { background:rgba(239,68,68,.15); color:#fca5a5; }

  .nalog-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
  .nalog-actions .btn { margin-top:0; flex:1; min-width:130px; }

  .empty { text-align:center; padding:50px 20px; color:var(--muted); }
  .empty div { font-size:40px; margin-bottom:10px; opacity:.4; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--elev); color:var(--txt); padding:12px 22px; border-radius:30px; font-size:14px; border:1px solid var(--line); box-shadow:0 10px 30px rgba(0,0,0,.5); z-index:9999; animation:tin .25s ease; }
  @keyframes tin { from{ opacity:0; transform:translateX(-50%) translateY(12px);} }

  .modal { position:fixed; inset:0; background:rgba(0,0,0,.8); display:flex; align-items:center; justify-content:center; padding:16px; z-index:9000; }
  .modal-box { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:22px; width:100%; max-width:400px; }
  .modal-box h3 { font-size:18px; margin-bottom:4px; }
  .modal-box .sub { font-size:13px; color:var(--muted); margin-bottom:8px; }
  .modal-actions { display:flex; gap:10px; margin-top:18px; }
  .modal-actions .btn { margin-top:0; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>🔧 Servis</h1>
    <p>Serviserski pregled</p>
  </header>

  <!-- izbor servisera (prvi put) -->
  <div id="pickWho" style="display:none;">
    <label>Ko si?</label>
    <select id="whoSelect"><option value="">— izaberi sebe —</option></select>
    <button class="btn btn-primary" id="whoBtn">Nastavi</button>
  </div>

  <!-- glavni prikaz -->
  <div id="main" style="display:none;">
    <div class="who-bar">
      <span>Serviser: <b id="whoName"></b></span>
      <button id="changeWho">promijeni</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-f="aktivni">Aktivni</button>
      <button class="filter-btn" data-f="u_radu">U radu</button>
      <button class="filter-btn" data-f="gotovo">Gotovi</button>
      <button class="filter-btn" data-f="svi">Svi moji</button>
    </div>
    <div id="lista"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getDatabase, ref, onValue, update, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
  authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
  databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kelt-pub-menu-2df61",
  storageBucket: "kelt-pub-menu-2df61.firebasestorage.app"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let naloziCache = {};
let serviseriCache = {};
let mojId = localStorage.getItem('servisMojId') || '';
let filter = 'aktivni';

// nalog iz linka
const params = new URLSearchParams(location.search);
const nalogIzLinka = params.get('nalog');

function toast(m){ const t=document.createElement('div'); t.className='toast'; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }
function esc(s){ return s?String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])):''; }
function fmtDatum(ts){ if(!ts)return''; const d=new Date(ts); return d.toLocaleDateString('sr-RS')+'. '+d.toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'}); }
function statusLabel(s){ return {primljen:'Primljen',u_radu:'U radu',gotovo:'Gotovo',preuzeto:'Preuzeto',otkazano:'Otkazano'}[s]||s; }

// serviseri
onValue(ref(db,'servis/serviseri'), snap=>{
  serviseriCache = snap.val() || {};
  const sel=document.getElementById('whoSelect');
  const arr=Object.entries(serviseriCache).map(([id,s])=>({id,...s})).sort((a,b)=>(a.ime||'').localeCompare(b.ime||''));
  sel.innerHTML='<option value="">— izaberi sebe —</option>'+arr.map(s=>`<option value="${s.id}">${esc(s.ime)}</option>`).join('');
  odluciPrikaz();
});

document.getElementById('whoBtn').onclick=()=>{
  const v=document.getElementById('whoSelect').value;
  if(!v){ toast('Izaberi sebe iz liste.'); return; }
  mojId=v; localStorage.setItem('servisMojId',v);
  odluciPrikaz();
};
document.getElementById('changeWho').onclick=()=>{
  mojId=''; localStorage.removeItem('servisMojId');
  odluciPrikaz();
};

function odluciPrikaz(){
  if(!mojId || !serviseriCache[mojId]){
    document.getElementById('pickWho').style.display='block';
    document.getElementById('main').style.display='none';
    return;
  }
  document.getElementById('pickWho').style.display='none';
  document.getElementById('main').style.display='block';
  document.getElementById('whoName').textContent = serviseriCache[mojId].ime || '';
  render();
}

document.querySelectorAll('.filter-btn').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); filter=b.dataset.f; render(); };
});

// nalozi
onValue(ref(db,'servis/nalozi'), snap=>{
  naloziCache = snap.val() || {};
  if(mojId && serviseriCache[mojId]) render();
});

function mojiNalozi(){
  return Object.entries(naloziCache).map(([id,n])=>({id,...n}))
    .filter(n=>n.serviser===mojId && !n.arhiviran)
    .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
}

function render(){
  const lista=document.getElementById('lista');
  let arr=mojiNalozi();
  if(filter==='aktivni') arr=arr.filter(n=>n.status==='primljen'||n.status==='u_radu'||n.status==='gotovo');
  else if(filter!=='svi') arr=arr.filter(n=>n.status===filter);

  if(!arr.length){ lista.innerHTML=`<div class="empty"><div>📭</div>Nema naloga.</div>`; return; }

  lista.innerHTML=arr.map(n=>{
    const hl = (nalogIzLinka===n.id) ? ' highlight' : '';
    let actions='';
    if(n.status==='primljen') actions+=`<button class="btn btn-primary" data-act="prihvati" data-id="${n.id}">✋ Prihvati i počni</button>`;
    else if(n.status==='u_radu') actions+=`<button class="btn btn-green" data-act="zavrsi" data-id="${n.id}">✅ Završi</button>`;
    const uradjenoHtml=(n.status==='gotovo'||n.status==='preuzeto')&&(n.uradjeno||n.cijena)
      ? `<div class="nalog-uradjeno">Urađeno: ${esc(n.uradjeno)||'—'} · <span class="nalog-cijena">${n.cijena||0} KM</span></div>`:'';
    return `
      <div class="nalog${hl}">
        <div class="nalog-top">
          <div>
            <div class="nalog-kod">${esc(n.kod)}</div>
            <div class="nalog-ime">${esc(n.ime)} ${esc(n.prezime)}</div>
            <div class="nalog-tel">📞 <a href="tel:${esc(n.telefon)}">${esc(n.telefon)}</a></div>
          </div>
          <span class="status ${n.status}">${statusLabel(n.status)}</span>
        </div>
        <div class="nalog-kvar">${esc(n.kvar)}</div>
        ${uradjenoHtml}
        <div class="nalog-meta">Primljen: ${fmtDatum(n.createdAt)}${n.closedAt?' · Gotovo: '+fmtDatum(n.closedAt):''}</div>
        <div class="nalog-actions">${actions}</div>
      </div>`;
  }).join('');

  lista.querySelectorAll('[data-act]').forEach(btn=>btn.onclick=()=>akcija(btn.dataset.act,btn.dataset.id));

  // skroluj na nalog iz linka
  if(nalogIzLinka){
    const el=lista.querySelector('.highlight');
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

async function akcija(act,id){
  const n=naloziCache[id]; if(!n)return;
  if(act==='prihvati'){
    await update(ref(db,'servis/nalozi/'+id),{status:'u_radu'});
    toast(n.kod+' — prihvaćeno, u radu.');
  } else if(act==='zavrsi'){
    otvoriZavrsetak(id,n);
  }
}

function otvoriZavrsetak(id,n){
  const modal=document.createElement('div'); modal.className='modal';
  modal.innerHTML=`
    <div class="modal-box">
      <h3>Završetak — ${esc(n.kod)}</h3>
      <div class="sub">${esc(n.ime)} ${esc(n.prezime)}</div>
      <label>Šta je urađeno</label>
      <textarea id="z_uradjeno" placeholder="Zamjena stakla">${esc(n.uradjeno||'')}</textarea>
      <label>Cijena (KM)</label>
      <input id="z_cijena" type="number" inputmode="numeric" placeholder="120" value="${n.cijena||''}">
      <div class="modal-actions">
        <button class="btn btn-gray" id="z_odustani">Odustani</button>
        <button class="btn btn-green" id="z_potvrdi">✅ Završi</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#z_odustani').onclick=()=>modal.remove();
  modal.onclick=e=>{ if(e.target===modal) modal.remove(); };
  modal.querySelector('#z_potvrdi').onclick=async()=>{
    const uradjeno=modal.querySelector('#z_uradjeno').value.trim();
    const cijena=parseFloat(modal.querySelector('#z_cijena').value)||0;
    if(!uradjeno){ toast('Unesite šta je urađeno.'); return; }
    await update(ref(db,'servis/nalozi/'+id),{status:'gotovo',uradjeno,cijena,closedAt:Date.now()});
    modal.remove();
    toast(n.kod+' završen. Master će štampati i izdati.');
  };
}
</script>

</body>
</html>
