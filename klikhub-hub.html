<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KlikHub HUB | Centralno upravljanje</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F172A;
            color: #F1F5F9;
            padding: 24px 16px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-area img { height: 48px; width: auto; }
        .logo-area h1 { font-size: 1.8rem; font-weight: 700; }
        .logo-area span { color: #F97316; }
        .user-area { display: flex; align-items: center; gap: 16px; }
        .btn-logout {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-logout:hover { background: #F97316; }
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: #CBD5E1;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active { background: #F97316; color: white; }
        .card {
            background: #1E293B;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .card-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .tenant-card {
            background: #0F172A;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.2s;
        }
        .tenant-card:hover { border-color: #F97316; }
        .tenant-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }
        .type-cafe { background: #F97316; color: #0F172A; }
        .type-salon { background: #10B981; color: #0F172A; }
        .type-catalog { background: #8B5CF6; color: white; }
        .type-shifts { background: #C9A15A; color: #1a1712; }
        .tenant-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 4px; }
        .tenant-id { font-family: monospace; color: #94A3B8; font-size: 0.8rem; margin-bottom: 12px; }
        .button-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
            margin-top: 12px;
        }
        button {
            background: #F97316;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        button.secondary { background: #334155; }
        button.danger { background: #DC2626; }
        button.success { background: #10B981; }
        button.purple { background: #8B5CF6; }
        button.small { padding: 4px 12px; font-size: 0.75rem; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content {
            background: #1E293B;
            max-width: 550px;
            width: 100%;
            padding: 24px;
            border-radius: 24px;
            border: 1px solid #F97316;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
        }
        .modal-content label {
            color: #94A3B8;
            font-size: 0.9rem;
            font-weight: 500;
        }
        /* IZMJENA: napomena info-boks u loyalty modalu - koristi hardkodovanu boju iz hub palete
           umjesto nedefinisane CSS varijable --text-secondary koja ovdje nikad nije postojala */
        .info-note {
            color: #94A3B8;
            font-size: 0.85rem;
        }
        .feature-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #0F172A;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .status-enabled { color: #10B981; }
        .status-disabled { color: #DC2626; }
        .flex-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E293B;
            color: #F97316;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1100;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <img id="brandLogo" src="kh-logo.png" alt="KlikHub" style="display:none;">
            <h1>Klik<span>Hub</span> HUB</h1>
        </div>
        <div class="user-area">
            <span id="userDisplay">Super Admin</span>
            <button id="logoutBtn" class="btn-logout">Odjava</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-type="all">🏠 Svi tenant-i</button>
        <button class="tab-btn" data-type="cafe">🍺 Kafići</button>
        <button class="tab-btn" data-type="salon">✂️ Frizerski saloni</button>
        <button class="tab-btn" data-type="catalog">📦 Katalozi</button>
        <button class="tab-btn" data-type="shifts">📅 Rasporedi smjena</button>
    </div>

    <div id="tenantList"></div>
    <div style="margin-top: 20px; text-align: center;">
        <button id="addTenantBtn" style="padding: 12px 32px;">+ Dodaj novi tenant</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, get, set, update, remove, push } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    if (!sessionStorage.getItem('klikhub_hub_auth')) {
        const masterPass = prompt('Unesite master šifru:');
        if (masterPass === 'master2026') {
            sessionStorage.setItem('klikhub_hub_auth', 'true');
        } else {
            document.body.innerHTML = '<div style="text-align:center; margin-top:50px;">❌ Neovlašten pristup</div>';
            throw new Error('Unauthorized');
        }
    }

    let currentFilter = 'all';
    let tenants = [];

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ========================================
    // LOAD TENANTS
    // ========================================
    async function loadTenants() {
        const tenantsSnap = await get(ref(db, 'klikhub/tenants'));
        const registered = tenantsSnap.val() || {};
        const cafesSnap = await get(ref(db, 'cafes'));
        const cafes = cafesSnap.val() || {};
        const salonsSnap = await get(ref(db, 'hairSalons'));
        const salons = salonsSnap.val() || {};
        const catalogExists = await get(ref(db, 'fishingCatalog'));
        
        let all = [];
        for (const [id, data] of Object.entries(registered)) {
            // IZMJENA: normalizuj stare tipove salona (online/interni) na jedinstven 'salon' tip -
            // podaci u hairSalons/{id} su isti bez obzira kako je tenant nekad bio registrovan.
            const normalizedType = (data.type === 'salon-online' || data.type === 'salon-internal') ? 'salon' : data.type;
            all.push({ id, ...data, type: normalizedType, registered: true });
        }
        for (const [id, data] of Object.entries(cafes)) {
            if (!registered[id]) {
                all.push({ id, type: 'cafe', name: data.name || id, createdAt: data.created, active: !data.disabled, registered: false });
            }
        }
        for (const [id, data] of Object.entries(salons)) {
            if (!registered[id]) {
                all.push({ id, type: 'salon', name: data.settings?.name || id, createdAt: data.settings?.created, active: true, registered: false });
            }
        }
        if (catalogExists.exists()) {
            const catalogId = 'fishingCatalog';
            if (!registered[catalogId]) {
                // IZMJENA: stari, ručno pravljen katalog (jedan fajl, jedan klijent) dobija poseban
                // tip 'catalog-legacy' da se ne pomiješa sa novim multi-tenant 'catalog' tipom
                all.push({ id: catalogId, type: 'catalog-legacy', name: 'Katalog mušica (stari)', createdAt: Date.now(), active: true, registered: false });
            }
        }
        tenants = all;
        renderTenants();
    }

    // ========================================
    // RENDER TENANTS
    // ========================================
    function renderTenants() {
        const filtered = currentFilter === 'all' ? tenants : tenants.filter(t => t.type === currentFilter);
        const container = document.getElementById('tenantList');
        if (filtered.length === 0) {
            container.innerHTML = `<div class="card"><p>Nema tenanata za prikaz.</p></div>`;
            return;
        }
        let html = `<div class="card"><div class="card-title">📋 Tenant-i (${filtered.length})</div><div class="grid">`;
        for (const t of filtered) {
            let typeClass = '';
            let typeLabel = '';
            if (t.type === 'cafe') {
                typeClass = 'type-cafe';
                typeLabel = '🍺 Kafić';
            } else if (t.type === 'salon') {
                typeClass = 'type-salon';
                typeLabel = '✂️ Frizerski salon';
            } else if (t.type === 'catalog') {
                typeClass = 'type-catalog';
                typeLabel = '📦 Katalog proizvoda';
            } else if (t.type === 'shifts') {
                typeClass = 'type-shifts';
                typeLabel = '📅 Raspored smjena';
            } else {
                // 'catalog-legacy' - stari ručno pravljen katalog (npr. Katalog mušica)
                typeClass = 'type-catalog';
                typeLabel = '📦 Katalog (stari)';
            }
            const activeStatus = t.active ? 'Aktivan' : 'Deaktiviran';
            // IZMJENA: salon ima dva odvojena linka (vlasnik/planer + gost/zaposleni).
            // Raspored smjena NE treba to isto - smjene.html već ima svoje dugme
            // "🔗 Podijeli link za konobare" koje generiše link ka zahtjev.html, pa
            // dupliranje tog dugmeta ovdje u Hub-u samo pravi nepotrebnu zbrku.
            let openButtonsHtml;
            if (t.type === 'salon') {
                openButtonsHtml = `<button class="small openSalonClientBtn" data-id="${t.id}">🔗 Otvori (klijent)</button>
                   <button class="small openSalonStaffBtn" data-id="${t.id}">🔗 Otvori (frizer)</button>`;
            } else if (t.type === 'shifts') {
                openButtonsHtml = `<button class="small openShiftsPlannerBtn" data-id="${t.id}">🔗 Otvori (planer)</button>`;
            } else {
                openButtonsHtml = `<button class="small openTenantBtn" data-id="${t.id}" data-type="${t.type}">🔗 Otvori</button>`;
            }
            html += `
                <div class="tenant-card">
                    <span class="tenant-type ${typeClass}">${typeLabel}</span>
                    <div class="tenant-name">${escapeHtml(t.name)}</div>
                    <div class="tenant-id">ID: ${t.id}</div>
                    <div>Status: ${activeStatus}</div>
                    <div class="button-group">
                        <button class="small secondary editTenantBtn" data-id="${t.id}" data-type="${t.type}">✏️ Uredi</button>
                        ${openButtonsHtml}
                        <button class="small toggleActiveBtn" data-id="${t.id}" data-active="${t.active}">${t.active ? 'Deaktiviraj' : 'Aktiviraj'}</button>
                        ${t.type === 'cafe' ? `<button class="small purple loyaltyBtn" data-id="${t.id}">🎁 Loyalty</button>` : ''}
                        ${t.type === 'salon' ? `<button class="small purple salonSettingsBtn" data-id="${t.id}">✂️ Salon postavke</button>` : ''}
                        ${t.type === 'catalog' ? `<button class="small purple catalogSettingsBtn" data-id="${t.id}">📦 Katalog postavke</button>` : ''}
                        <button class="small danger deleteTenantBtn" data-id="${t.id}" data-type="${t.type}">Obriši</button>
                    </div>
                </div>
            `;
        }
        html += `</div></div>`;
        container.innerHTML = html;

        // Event listeners
        document.querySelectorAll('.editTenantBtn').forEach(btn => {
            btn.onclick = () => showEditTenantModal(btn.dataset.id, btn.dataset.type);
        });
        document.querySelectorAll('.openTenantBtn').forEach(btn => {
            btn.onclick = () => {
                const id = btn.dataset.id;
                const type = btn.dataset.type;
                if (type === 'cafe') window.open(`/index.html?cafe=${id}`, '_blank');
                else if (type === 'catalog') window.open(`/katalog.html?catalog=${id}`, '_blank');
                else if (type === 'catalog-legacy') window.open(`/catalog.html?id=${id}`, '_blank');
            };
        });
        // IZMJENA: salon sad ima dva odvojena dugmeta umjesto jednog koje je zavisilo od tipa
        document.querySelectorAll('.openSalonClientBtn').forEach(btn => {
            btn.onclick = () => window.open(`/hair-salon.html?salon=${btn.dataset.id}`, '_blank');
        });
        document.querySelectorAll('.openSalonStaffBtn').forEach(btn => {
            btn.onclick = () => window.open(`/hair-salon-internal.html?salon=${btn.dataset.id}`, '_blank');
        });
        // IZMJENA: raspored smjena - samo planer se otvara odavde (link za zaposlene
        // se dijeli iz samog planera preko "🔗 Podijeli link za konobare")
        document.querySelectorAll('.openShiftsPlannerBtn').forEach(btn => {
            btn.onclick = () => window.open(`/smjene.html?tenant=${btn.dataset.id}`, '_blank');
        });
        document.querySelectorAll('.toggleActiveBtn').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.dataset.id;
                const current = btn.dataset.active === 'true';
                const type = btn.dataset.type;
                if (type === 'cafe') {
                    await update(ref(db, `cafes/${id}`), { disabled: !current });
                } else if (type === 'salon') {
                    await update(ref(db, `hairSalons/${id}/settings`), { disabled: !current });
                } else if (type === 'catalog') {
                    await update(ref(db, `catalogs/${id}/settings`), { disabled: !current });
                } else {
                    // IZMJENA: prije je ovo pisalo samo { active: !current }, što bi za tenant koji
                    // NIJE ranije ručno registrovan u klikhub/tenants (npr. auto-detektovan katalog)
                    // izbrisalo/izostavilo type i name polja pri sljedećem učitavanju. Sad se čuva
                    // kompletan postojeći zapis tog tenanta.
                    const t = tenants.find(x => x.id === id);
                    await update(ref(db, `klikhub/tenants/${id}`), {
                        active: !current,
                        type: t?.type || type,
                        name: t?.name || id,
                        createdAt: t?.createdAt || Date.now()
                    });
                }
                showToast(`Tenant ${id} ${!current ? 'deaktiviran' : 'aktiviran'}`);
                loadTenants();
            };
        });
        document.querySelectorAll('.deleteTenantBtn').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.dataset.id;
                const type = btn.dataset.type;
                if (confirm(`Trajno obrisati tenant "${id}"? Svi podaci će nestati.`)) {
                    if (type === 'cafe') {
                        await remove(ref(db, `cafes/${id}`));
                        await remove(ref(db, `${id}`));
                    } else if (type === 'salon') {
                        await remove(ref(db, `hairSalons/${id}`));
                    } else if (type === 'catalog') {
                        await remove(ref(db, `catalogs/${id}`));
                    } else if (type === 'catalog-legacy') {
                        await remove(ref(db, `fishingCatalog`));
                    } else if (type === 'shifts') {
                        await remove(ref(db, `shiftSchedules/${id}`));
                    }
                    await remove(ref(db, `klikhub/tenants/${id}`));
                    showToast(`Obrisano ${id}`);
                    loadTenants();
                }
            };
        });
        // Loyalty dugmad
        document.querySelectorAll('.loyaltyBtn').forEach(btn => {
            btn.onclick = () => showLoyaltyModal(btn.dataset.id);
        });
        // IZMJENA: dugme za salon-specifične prekidače (za sada: više frizera)
        document.querySelectorAll('.salonSettingsBtn').forEach(btn => {
            btn.onclick = () => showSalonSettingsModal(btn.dataset.id);
        });
        // IZMJENA: dugme za katalog-specifične prekidače (analitika, maks. slika po proizvodu)
        document.querySelectorAll('.catalogSettingsBtn').forEach(btn => {
            btn.onclick = () => showCatalogSettingsModal(btn.dataset.id);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // ========================================
    // EDIT TENANT MODAL
    // ========================================
    const defaultServices = [
        { name: "Muško šišanje", duration: 30 },
        { name: "Žensko šišanje", duration: 30 },
        { name: "Šišanje + brada", duration: 45 },
        { name: "Feniranje", duration: 30 }
    ];

    const defaultWorkingHours = {
        monday: { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] },
        tuesday: { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] },
        wednesday: { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] },
        thursday: { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] },
        friday: { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] },
        saturday: { enabled: true, intervals: [{ start: "09:00", end: "15:00" }] },
        sunday: { enabled: false, intervals: [] }
    };

    async function showEditTenantModal(id, type) {
        let existingData = {};
        if (id && (type === 'cafe' || type === 'salon')) {
            if (type === 'cafe') {
                const cafeSnap = await get(ref(db, `cafes/${id}`));
                if (cafeSnap.exists()) existingData = cafeSnap.val();
            } else {
                const settingsSnap = await get(ref(db, `hairSalons/${id}/settings`));
                if (settingsSnap.exists()) existingData = settingsSnap.val();
            }
        } else if (id && (type === 'catalog' || type === 'shifts')) {
            const catSnap = await get(ref(db, `klikhub/tenants/${id}`));
            if (catSnap.exists()) existingData = catSnap.val();
        }

        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>${id ? 'Uredi' : 'Dodaj'} tenant</h3>
                <label>Tip tenanta</label>
                <select id="tenantTypeSelect">
                    <option value="cafe" ${type === 'cafe' ? 'selected' : ''}>🍺 Kafić (pub meni)</option>
                    <option value="salon" ${type === 'salon' ? 'selected' : ''}>✂️ Frizerski salon</option>
                    <option value="catalog" ${type === 'catalog' ? 'selected' : ''}>📦 Katalog proizvoda</option>
                    <option value="shifts" ${type === 'shifts' ? 'selected' : ''}>📅 Raspored smjena</option>
                </select>
                <label>ID (jedinstven, mala slova, bez razmaka)</label>
                <input type="text" id="tenantId" value="${id || ''}" ${id ? 'readonly' : ''} placeholder="npr. gradski_pub">
                <label>Naziv (prikazni)</label>
                <input type="text" id="tenantName" value="${escapeHtml(existingData.name || '')}" placeholder="npr. Gradski pub">
                <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                    <button id="cancelTenantModal">Odustani</button>
                    <button id="saveTenantBtn">Sačuvaj</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        document.getElementById('cancelTenantModal').onclick = () => modal.remove();
        document.getElementById('saveTenantBtn').onclick = async () => {
            const selectedType = modal.querySelector('#tenantTypeSelect').value;
            let newId = document.getElementById('tenantId').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '_');
            const name = document.getElementById('tenantName').value.trim();
            if (!newId) { alert('Unesite ID'); return; }
            if (!name) { alert('Unesite naziv'); return; }

            try {
                if (selectedType === 'cafe') {
                    const existing = await get(ref(db, `cafes/${newId}`));
                    if (!id && existing.exists()) { alert('ID već postoji'); return; }
                    // IZMJENA: prije se naziv upisivao na cafes/{id}/name, ali index.html
                    // stvarno čita naziv sa cafes/{id}/settings/pubName - zbog tog
                    // neslaganja, novi kafići su uvijek prikazivali zakucano "KELT PUB"
                    // umjesto pravog naziva. Sad se upisuje na ISPRAVNO mjesto, plus
                    // adminPassword da ne dijeli isti podrazumijevani sa svima.
                    await set(ref(db, `cafes/${newId}`), { name, created: Date.now(), disabled: false });
                    await update(ref(db, `cafes/${newId}/settings`), { pubName: name, adminPassword: 'kelt2026' });
                } else if (selectedType === 'salon') {
                    const existing = await get(ref(db, `hairSalons/${newId}/settings`));
                    if (!id && existing.exists()) { alert('ID već postoji'); return; }
                    await set(ref(db, `hairSalons/${newId}/services`), defaultServices);
                    await set(ref(db, `hairSalons/${newId}/settings/workingHours`), defaultWorkingHours);
                    await set(ref(db, `hairSalons/${newId}/settings`), { name, created: Date.now(), disabled: false, adminPassword: 'salon123', slotInterval: 30 });
                } else if (selectedType === 'catalog') {
                    const existing = await get(ref(db, `catalogs/${newId}/settings`));
                    if (!id && existing.exists()) { alert('ID već postoji'); return; }
                    const defaultCategory = { "cat1": { name: "Proizvodi", order: 0 } };
                    await set(ref(db, `catalogs/${newId}/categories`), defaultCategory);
                    await set(ref(db, `catalogs/${newId}/settings`), {
                        name, created: Date.now(), disabled: false, adminPassword: 'katalog2026',
                        description: '', workingHours: '', address: '', whatsappNumber: '',
                        primaryColor: '#F97316', backgroundColor: '#0F172A', logoBase64: '',
                        maxImagesPerProduct: 5
                    });
                    await set(ref(db, `catalogs/${newId}/contentVersion`), 0);
                } else if (selectedType === 'shifts') {
                    const existing = await get(ref(db, `shiftSchedules/${newId}`));
                    if (!id && existing.exists()) { alert('ID već postoji'); return; }
                    // IZMJENA: prazna lista konobara (bez "Marko, Ana, Ivo, Jovana" placeholdera
                    // iz smjene.html) - novi klijent kreće čisto i sam dodaje svoje osoblje.
                    await set(ref(db, `shiftSchedules/${newId}`), { staff: [], weeks: {}, blocked: {} });
                }
                await set(ref(db, `klikhub/tenants/${newId}`), { type: selectedType, name, createdAt: Date.now(), active: true });
                showToast(`Tenant ${newId} dodat/ažuriran`);
                modal.remove();
                loadTenants();
            } catch (error) {
                console.error(error);
                showToast('Greška pri čuvanju: ' + error.message);
            }
        };
    }

    // ========================================
    // LOYALTY MODAL – SAMO KONTROLE (BEZ NAGRADA)
    // ========================================
    async function showLoyaltyModal(cafeId) {
        // Učitaj trenutne postavke
        const settingsSnap = await get(ref(db, `cafes/${cafeId}/settings`));
        const settings = settingsSnap.val() || {};
        const features = settings.features || {};
        const grebaSettings = settings.greba || {};
        const threshold = grebaSettings.threshold || 20;

        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>🎁 Loyalty postavke - ${cafeId}</h3>
                
                <!-- Toggle Loyalty -->
                <div class="feature-item">
                    <span>🏆 Loyalty bodovi</span>
                    <span class="${features.loyalty?.enabled ? 'status-enabled' : 'status-disabled'}">${features.loyalty?.enabled ? '✅ Aktivirano' : '🔒 Deaktivirano'}</span>
                    <button class="small ${features.loyalty?.enabled ? 'danger' : 'success'}" id="toggleLoyalty">
                        ${features.loyalty?.enabled ? 'Deaktiviraj' : 'Aktiviraj'}
                    </button>
                </div>
                
                <!-- Toggle Greba -->
                <div class="feature-item">
                    <span>🎁 Greba nagrada</span>
                    <span class="${features.greba?.enabled ? 'status-enabled' : 'status-disabled'}">${features.greba?.enabled ? '✅ Aktivirano' : '🔒 Deaktivirano'}</span>
                    <button class="small ${features.greba?.enabled ? 'danger' : 'success'}" id="toggleGreba">
                        ${features.greba?.enabled ? 'Deaktiviraj' : 'Aktiviraj'}
                    </button>
                </div>
                
                <!-- Threshold -->
                <hr style="border-color: rgba(255,255,255,0.1); margin: 16px 0;">
                <label>💰 Minimalni iznos za grebu</label>
                <div class="flex-row">
                    <input type="number" id="thresholdInput" value="${threshold}" style="width: 100px;">
                    <span style="color: #94A3B8;">KM</span>
                    <button class="small secondary" id="saveThresholdBtn">Sačuvaj</button>
                </div>
                
                <!-- NAPOMENA: NAGRADE SE DEFINISU U ADMIN MENIJU -->
                <div style="margin-top: 16px; padding: 12px; background: rgba(249,115,22,0.1); border-radius: 12px; border-left: 3px solid #F97316;">
                    <span class="info-note">
                        <i class="fas fa-info-circle"></i> 
                        Nagrade se definišu u <strong>admin meniju</strong> (5 klikova na ⚡ KlikHub → "🎁 Upravljanje nagradama")
                    </span>
                </div>
                
                <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                    <button id="closeLoyaltyModal" class="secondary">Zatvori</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        // Toggle Loyalty
        document.getElementById('toggleLoyalty').onclick = async () => {
            const current = features.loyalty?.enabled || false;
            await update(ref(db, `cafes/${cafeId}/settings/features/loyalty`), { enabled: !current });
            showToast(`Loyalty ${!current ? 'aktivirano' : 'deaktivirano'}`);
            modal.remove();
            showLoyaltyModal(cafeId);
        };

        // Toggle Greba
        document.getElementById('toggleGreba').onclick = async () => {
            const current = features.greba?.enabled || false;
            await update(ref(db, `cafes/${cafeId}/settings/features/greba`), { enabled: !current });
            showToast(`Greba ${!current ? 'aktivirano' : 'deaktivirano'}`);
            modal.remove();
            showLoyaltyModal(cafeId);
        };

        // Sačuvaj threshold
        document.getElementById('saveThresholdBtn').onclick = async () => {
            const newThreshold = parseInt(document.getElementById('thresholdInput').value);
            if (isNaN(newThreshold) || newThreshold < 1) {
                showToast('Unesite ispravan iznos (minimum 1 KM)');
                return;
            }
            await update(ref(db, `cafes/${cafeId}/settings/greba`), { threshold: newThreshold });
            showToast(`Minimalni iznos postavljen na ${newThreshold} KM`);
            modal.remove();
            showLoyaltyModal(cafeId);
        };

        // Zatvori
        document.getElementById('closeLoyaltyModal').onclick = () => modal.remove();
    }

    // ========================================
    // SALON POSTAVKE – SAMO PREKIDAČI (detalji idu u lokalnom master adminu salona)
    // ========================================
    async function showSalonSettingsModal(salonId) {
        const featSnap = await get(ref(db, `hairSalons/${salonId}/settings/features/multiStaff/enabled`));
        const multiStaffEnabled = featSnap.val() === true;

        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>✂️ Salon postavke - ${salonId}</h3>

                <div class="feature-item">
                    <span>👥 Više frizera (multi-staff)</span>
                    <span class="${multiStaffEnabled ? 'status-enabled' : 'status-disabled'}">${multiStaffEnabled ? '✅ Aktivirano' : '🔒 Deaktivirano'}</span>
                    <button class="small ${multiStaffEnabled ? 'danger' : 'success'}" id="toggleMultiStaff">
                        ${multiStaffEnabled ? 'Deaktiviraj' : 'Aktiviraj'}
                    </button>
                </div>

                <div style="margin-top: 16px; padding: 12px; background: rgba(249,115,22,0.1); border-radius: 12px; border-left: 3px solid #F97316;">
                    <span class="info-note">
                        <i class="fas fa-info-circle"></i>
                        Imena frizera, usluge, radno vrijeme i politika otkazivanja se podešavaju u <strong>Master admin</strong> panelu samog salona (interni organizator).
                    </span>
                </div>

                <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                    <button id="closeSalonSettingsModal" class="secondary">Zatvori</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        document.getElementById('toggleMultiStaff').onclick = async () => {
            await update(ref(db, `hairSalons/${salonId}/settings/features/multiStaff`), { enabled: !multiStaffEnabled });
            showToast(`Više frizera ${!multiStaffEnabled ? 'aktivirano' : 'deaktivirano'}`);
            modal.remove();
            showSalonSettingsModal(salonId);
        };

        document.getElementById('closeSalonSettingsModal').onclick = () => modal.remove();
    }

    // ========================================
    // KATALOG POSTAVKE – SAMO PREKIDAČI (detalji idu u lokalnom admin panelu kataloga)
    // ========================================
    async function showCatalogSettingsModal(catalogId) {
        const analyticsSnap = await get(ref(db, `catalogs/${catalogId}/settings/features/analytics/enabled`));
        const analyticsEnabled = analyticsSnap.val() === true;
        const maxImgSnap = await get(ref(db, `catalogs/${catalogId}/settings/maxImagesPerProduct`));
        const maxImages = (typeof maxImgSnap.val() === 'number' && maxImgSnap.val() > 0) ? maxImgSnap.val() : 5;

        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>📦 Katalog postavke - ${catalogId}</h3>

                <div class="feature-item">
                    <span>📊 Analitika (pregledi/upiti po proizvodu)</span>
                    <span class="${analyticsEnabled ? 'status-enabled' : 'status-disabled'}">${analyticsEnabled ? '✅ Aktivirano' : '🔒 Deaktivirano'}</span>
                    <button class="small ${analyticsEnabled ? 'danger' : 'success'}" id="toggleAnalytics">
                        ${analyticsEnabled ? 'Deaktiviraj' : 'Aktiviraj'}
                    </button>
                </div>

                <hr style="border-color: rgba(255,255,255,0.1); margin: 16px 0;">
                <label>🖼️ Maksimalan broj slika po proizvodu</label>
                <div class="flex-row">
                    <input type="number" id="maxImagesInput" value="${maxImages}" min="1" max="20" style="width: 100px;">
                    <button class="small secondary" id="saveMaxImagesBtn">Sačuvaj</button>
                </div>

                <div style="margin-top: 16px; padding: 12px; background: rgba(249,115,22,0.1); border-radius: 12px; border-left: 3px solid #F97316;">
                    <span class="info-note">
                        <i class="fas fa-info-circle"></i>
                        Kategorije, proizvodi, WhatsApp broj i izgled se podešavaju u lokalnom admin panelu samog kataloga.
                    </span>
                </div>

                <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                    <button id="closeCatalogSettingsModal" class="secondary">Zatvori</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        document.getElementById('toggleAnalytics').onclick = async () => {
            await update(ref(db, `catalogs/${catalogId}/settings/features/analytics`), { enabled: !analyticsEnabled });
            showToast(`Analitika ${!analyticsEnabled ? 'aktivirana' : 'deaktivirana'}`);
            modal.remove();
            showCatalogSettingsModal(catalogId);
        };

        document.getElementById('saveMaxImagesBtn').onclick = async () => {
            const val = parseInt(document.getElementById('maxImagesInput').value);
            if (isNaN(val) || val < 1 || val > 20) {
                showToast('Unesite broj između 1 i 20');
                return;
            }
            await update(ref(db, `catalogs/${catalogId}/settings`), { maxImagesPerProduct: val });
            showToast(`Maksimalan broj slika postavljen na ${val}`);
            modal.remove();
            showCatalogSettingsModal(catalogId);
        };

        document.getElementById('closeCatalogSettingsModal').onclick = () => modal.remove();
    }

    // ========================================
    // ADD TENANT
    // ========================================
    document.getElementById('addTenantBtn').onclick = () => showEditTenantModal(null, 'cafe');
    
    // ========================================
    // TABS
    // ========================================
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.type;
            loadTenants();
        };
    });

    // ========================================
    // LOGOUT
    // ========================================
    document.getElementById('logoutBtn').onclick = () => {
        sessionStorage.removeItem('klikhub_hub_auth');
        location.reload();
    };

    // ========================================
    // BRANDING
    // ========================================
    async function loadBranding() {
        const snap = await get(ref(db, 'klikhub/settings'));
        if (snap.exists()) {
            const data = snap.val();
            if (data.primaryColor) document.documentElement.style.setProperty('--orange', data.primaryColor);
            if (data.logoUrl) {
                const logoImg = document.getElementById('brandLogo');
                logoImg.src = data.logoUrl;
                logoImg.style.display = 'block';
            }
        }
    }

    // ========================================
    // INIT
    // ========================================
    loadBranding();
    loadTenants();

    console.log('👑 KlikHub Hub | Master admin');
    console.log('📋 Tenanti učitani');
    console.log('🎁 Loyalty kontrole aktivne za kafiće (nagrade se definišu u admin meniju)');
</script>
