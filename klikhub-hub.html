<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KlikHub HUB | Centralno upravljanje</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F172A;
            color: #F1F5F9;
            padding: 24px 16px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-area img { height: 48px; width: auto; }
        .logo-area h1 { font-size: 1.8rem; font-weight: 700; }
        .logo-area span { color: #F97316; }
        .user-area { display: flex; align-items: center; gap: 16px; }
        .btn-logout {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-logout:hover { background: #F97316; }
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: #CBD5E1;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active { background: #F97316; color: white; }
        .card {
            background: #1E293B;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .card-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .tenant-card {
            background: #0F172A;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.2s;
        }
        .tenant-card:hover { border-color: #F97316; }
        .tenant-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }
        .type-cafe { background: #F97316; color: #0F172A; }
        .type-salon-online { background: #10B981; color: #0F172A; }
        .type-salon-internal { background: #3B82F6; color: white; }
        .type-catalog { background: #8B5CF6; color: white; }
        .tenant-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 4px; }
        .tenant-id { font-family: monospace; color: #94A3B8; font-size: 0.8rem; margin-bottom: 12px; }
        .button-group {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 12px;
        }
        button {
            background: #F97316;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        button.secondary { background: #334155; }
        button.danger { background: #DC2626; }
        button.small { padding: 4px 12px; font-size: 0.8rem; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content {
            background: #1E293B;
            max-width: 900px;
            width: 100%;
            padding: 24px;
            border-radius: 24px;
            border: 1px solid #F97316;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
        }
        .service-item, .interval-item {
            background: #0F172A;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .service-item input {
            flex: 1;
            margin: 0;
            min-width: 150px;
        }
        .service-item .remove-service {
            background: #DC2626;
            padding: 8px 12px;
            border-radius: 40px;
        }
        .day-row {
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 12px;
        }
        .day-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .day-header label { font-weight: bold; width: 100px; }
        .intervals-container {
            margin-left: 30px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E293B;
            color: #F97316;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1100;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        @media (max-width: 700px) {
            .service-item { flex-direction: column; align-items: stretch; }
            .service-item input { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <img id="brandLogo" src="kh-logo.png" alt="KlikHub" style="display:none;">
            <h1>Klik<span>Hub</span> HUB</h1>
        </div>
        <div class="user-area">
            <span>Super Admin</span>
            <button id="logoutBtn" class="btn-logout">Odjava</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-type="all">🏠 Svi tenant-i</button>
        <button class="tab-btn" data-type="cafe">🍺 Kafići</button>
        <button class="tab-btn" data-type="salon">✂️ Frizerski saloni</button>
        <button class="tab-btn" data-type="catalog">📦 Katalozi</button>
        <button class="tab-btn" data-type="orphan">⚠️ Orphan</button>
    </div>

    <div id="tenantList"></div>
    <div style="margin-top: 20px; text-align: center;">
        <button id="addTenantBtn" style="padding: 12px 32px;">+ Dodaj novi tenant (kafić, salon, katalog)</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, get, set, update, remove } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyALY3oKvPW_mDZiaBl0EdFCkTjd6fqwisQ",
        authDomain: "kelt-pub-menu-2df61.firebaseapp.com",
        databaseURL: "https://kelt-pub-menu-2df61-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelt-pub-menu-2df61",
        storageBucket: "kelt-pub-menu-2df61.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    if (!sessionStorage.getItem('klikhub_hub_auth')) {
        const masterPass = prompt('Unesite master šifru:');
        if (masterPass === 'master2026') {
            sessionStorage.setItem('klikhub_hub_auth', 'true');
        } else {
            document.body.innerHTML = '<div style="text-align:center; margin-top:50px;">❌ Neovlašten pristup</div>';
            throw new Error('Unauthorized');
        }
    }

    let currentFilter = 'all';
    let tenants = [];

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function loadTenants() {
        const tenantsSnap = await get(ref(db, 'klikhub/tenants'));
        const registered = tenantsSnap.val() || {};
        const cafesSnap = await get(ref(db, 'cafes'));
        const cafes = cafesSnap.val() || {};
        const salonsSnap = await get(ref(db, 'hairSalons'));
        const salons = salonsSnap.val() || {};
        const catalogExists = await get(ref(db, 'fishingCatalog'));
        
        let all = [];
        for (const [id, data] of Object.entries(registered)) {
            all.push({ id, ...data, registered: true });
        }
        for (const [id, data] of Object.entries(cafes)) {
            if (!registered[id]) {
                all.push({ id, type: 'cafe', name: data.name || id, createdAt: data.created, active: !data.disabled, registered: false });
            }
        }
        for (const [id, data] of Object.entries(salons)) {
            if (!registered[id]) {
                let salonType = data.settings?.type || 'online';
                all.push({ id, type: 'salon', name: data.settings?.name || id, createdAt: data.settings?.created, active: true, registered: false, salonType });
            }
        }
        if (catalogExists.exists()) {
            const catalogId = 'fishingCatalog';
            if (!registered[catalogId]) {
                all.push({ id: catalogId, type: 'catalog', name: 'Katalog mušica', createdAt: Date.now(), active: true, registered: false });
            }
        }
        tenants = all;
        renderTenants();
    }

    function renderTenants() {
        const filtered = currentFilter === 'all' ? tenants : tenants.filter(t => t.type === currentFilter);
        const container = document.getElementById('tenantList');
        if (filtered.length === 0) {
            container.innerHTML = `<div class="card"><p>Nema tenanata za prikaz.</p></div>`;
            return;
        }
        let html = `<div class="card"><div class="card-title">📋 Tenant-i (${filtered.length})</div><div class="grid">`;
        for (const t of filtered) {
            let typeClass = '';
            let typeLabel = '';
            if (t.type === 'cafe') {
                typeClass = 'type-cafe';
                typeLabel = '🍺 Kafić';
            } else if (t.type === 'salon') {
                if (t.salonType === 'internal') {
                    typeClass = 'type-salon-internal';
                    typeLabel = '✂️ Frizerski salon (INTERNI)';
                } else {
                    typeClass = 'type-salon-online';
                    typeLabel = '✂️ Frizerski salon (ONLINE)';
                }
            } else {
                typeClass = 'type-catalog';
                typeLabel = '📦 Katalog';
            }
            const activeStatus = t.active ? 'Aktivan' : 'Deaktiviran';
            html += `
                <div class="tenant-card">
                    <span class="tenant-type ${typeClass}">${typeLabel}</span>
                    <div class="tenant-name">${escapeHtml(t.name)}</div>
                    <div class="tenant-id">ID: ${t.id}</div>
                    <div>Status: ${activeStatus}</div>
                    <div class="button-group">
                        <button class="small secondary editTenantBtn" data-id="${t.id}" data-type="${t.type}" data-salontype="${t.salonType || ''}">✏️ Uredi</button>
                        <button class="small openTenantBtn" data-id="${t.id}" data-type="${t.type}" data-salontype="${t.salonType || ''}">🔗 Otvori</button>
                        <button class="small toggleActiveBtn" data-id="${t.id}" data-active="${t.active}">${t.active ? 'Deaktiviraj' : 'Aktiviraj'}</button>
                        <button class="small danger deleteTenantBtn" data-id="${t.id}" data-type="${t.type}">Obriši</button>
                    </div>
                </div>
            `;
        }
        html += `</div></div>`;
        container.innerHTML = html;

        document.querySelectorAll('.editTenantBtn').forEach(btn => {
            btn.onclick = () => showEditTenantModal(btn.dataset.id, btn.dataset.type, btn.dataset.salontype);
        });
        document.querySelectorAll('.openTenantBtn').forEach(btn => {
            btn.onclick = () => {
                const id = btn.dataset.id;
                const type = btn.dataset.type;
                const salonType = btn.dataset.salontype;
                if (type === 'cafe') window.open(`/index.html?cafe=${id}`, '_blank');
                else if (type === 'salon') {
                    if (salonType === 'internal') {
                        window.open(`/hair-salon-internal.html?salon=${id}`, '_blank');
                    } else {
                        window.open(`/hair-salon.html?salon=${id}`, '_blank');
                    }
                }
                else if (type === 'catalog') window.open(`/catalog.html?id=${id}`, '_blank');
            };
        });
        document.querySelectorAll('.toggleActiveBtn').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.dataset.id;
                const current = btn.dataset.active === 'true';
                const type = btn.closest('.tenant-card').querySelector('.tenant-type').innerText.includes('Kafić') ? 'cafe' : (btn.closest('.tenant-card').querySelector('.tenant-type').innerText.includes('Salon') ? 'salon' : 'catalog');
                if (type === 'cafe') {
                    await update(ref(db, `cafes/${id}`), { disabled: !current });
                } else if (type === 'salon') {
                    await update(ref(db, `hairSalons/${id}/settings`), { disabled: !current });
                } else {
                    await update(ref(db, `klikhub/tenants/${id}`), { active: !current });
                }
                showToast(`Tenant ${id} ${!current ? 'deaktiviran' : 'aktiviran'}`);
                loadTenants();
            };
        });
        document.querySelectorAll('.deleteTenantBtn').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.dataset.id;
                const type = btn.dataset.type;
                if (confirm(`Trajno obrisati tenant "${id}"? Svi podaci će nestati.`)) {
                    if (type === 'cafe') {
                        await remove(ref(db, `cafes/${id}`));
                        await remove(ref(db, `${id}`));
                    } else if (type === 'salon') {
                        await remove(ref(db, `hairSalons/${id}`));
                    } else if (type === 'catalog') {
                        await remove(ref(db, `fishingCatalog`));
                    }
                    await remove(ref(db, `klikhub/tenants/${id}`));
                    showToast(`Obrisano ${id}`);
                    loadTenants();
                }
            };
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    async function showEditTenantModal(id, type, existingSalonType = 'online') {
        let existingData = {};
        let services = [];
        let workingHours = {};
        let slotInterval = 30;
        let salonType = existingSalonType || 'online';
        if (id && type === 'salon') {
            const servicesSnap = await get(ref(db, `hairSalons/${id}/services`));
            if (servicesSnap.exists()) services = servicesSnap.val();
            const whSnap = await get(ref(db, `hairSalons/${id}/settings/workingHours`));
            if (whSnap.exists()) workingHours = whSnap.val();
            const settingsSnap = await get(ref(db, `hairSalons/${id}/settings`));
            if (settingsSnap.exists()) {
                existingData = settingsSnap.val();
                if (settingsSnap.val().slotInterval) slotInterval = settingsSnap.val().slotInterval;
                if (settingsSnap.val().type) salonType = settingsSnap.val().type;
            }
        } else if (id && type === 'cafe') {
            const cafeSnap = await get(ref(db, `cafes/${id}`));
            if (cafeSnap.exists()) existingData = cafeSnap.val();
        } else if (id && type === 'catalog') {
            const catSnap = await get(ref(db, `klikhub/tenants/${id}`));
            if (catSnap.exists()) existingData = catSnap.val();
        }

        const modal = document.createElement('div');
        modal.className = 'modal';
        let innerHtml = `
            <div class="modal-content">
                <h3>${id ? 'Uredi' : 'Dodaj'} tenant</h3>
                <label>Tip tenanta</label>
                <select id="tenantType" ${id ? 'disabled' : ''}>
                    <option value="cafe" ${type === 'cafe' ? 'selected' : ''}>🍺 Kafić (pub meni)</option>
                    <option value="salon" ${type === 'salon' ? 'selected' : ''}>✂️ Frizerski salon</option>
                    <option value="catalog" ${type === 'catalog' ? 'selected' : ''}>📦 Katalog proizvoda</option>
                </select>
                <label>ID (jedinstven, mala slova, bez razmaka)</label>
                <input type="text" id="tenantId" value="${id || ''}" ${id ? 'readonly' : ''} placeholder="npr. gradski_salon">
                <label>Naziv (prikazni)</label>
                <input type="text" id="tenantName" value="${escapeHtml(existingData.name || '')}" placeholder="npr. Gradski salon">
        `;
        // Dodatna polja za salon (biće prikazana samo ako je izabran salon)
        const salonExtraHtml = `
            <div id="salonExtraFields" style="display: ${type === 'salon' ? 'block' : 'none'};">
                <label>Tip salona</label>
                <select id="salonTypeSelect">
                    <option value="online" ${salonType === 'online' ? 'selected' : ''}>🌐 Online salon (klijenti rezervišu)</option>
                    <option value="internal" ${salonType === 'internal' ? 'selected' : ''}>📋 Interni salon (samo evidencija za frizera)</option>
                </select>
                <hr style="margin: 16px 0; border-color: #334155;">
                <h4>✂️ Usluge</h4>
                <div id="servicesContainer"></div>
                <button type="button" id="addServiceBtn" class="secondary" style="margin-top: 8px;">+ Dodaj uslugu</button>
                <hr style="margin: 16px 0; border-color: #334155;">
                <h4>⏰ Radno vrijeme</h4>
                <div id="workingHoursContainer"></div>
                <hr style="margin: 16px 0; border-color: #334155;">
                <h4>⏱️ Interval termina (minute)</h4>
                <select id="slotIntervalSelect">
                    <option value="15" ${slotInterval === 15 ? 'selected' : ''}>15 minuta</option>
                    <option value="30" ${slotInterval === 30 ? 'selected' : ''}>30 minuta</option>
                    <option value="45" ${slotInterval === 45 ? 'selected' : ''}>45 minuta</option>
                    <option value="60" ${slotInterval === 60 ? 'selected' : ''}>60 minuta</option>
                </select>
            </div>
        `;
        innerHtml += salonExtraHtml;
        innerHtml += `
                <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                    <button id="cancelTenantModal">Odustani</button>
                    <button id="saveTenantBtn">Sačuvaj</button>
                </div>
            </div>
        `;
        modal.innerHTML = innerHtml;
        document.body.appendChild(modal);

        // Dinamičko prikazivanje/skrivanje salon polja na osnovu izbora tipa
        const tenantTypeSelect = modal.querySelector('#tenantType');
        const salonExtraDiv = modal.querySelector('#salonExtraFields');
        if (tenantTypeSelect && salonExtraDiv) {
            tenantTypeSelect.addEventListener('change', (e) => {
                if (e.target.value === 'salon') {
                    salonExtraDiv.style.display = 'block';
                } else {
                    salonExtraDiv.style.display = 'none';
                }
            });
        }

        let servicesList = [];
        let wh = {};

        if (type === 'salon') {
            const servicesContainer = modal.querySelector('#servicesContainer');
            const workingHoursContainer = modal.querySelector('#workingHoursContainer');
            
            servicesList = services.length ? services : [{ name: "Muško šišanje", duration: 30 }];
            function renderServices() {
                if (!servicesContainer) return;
                servicesContainer.innerHTML = '';
                servicesList.forEach((s, idx) => {
                    const div = document.createElement('div');
                    div.className = 'service-item';
                    div.innerHTML = `
                        <input type="text" placeholder="Naziv usluge" value="${escapeHtml(s.name)}" data-idx="${idx}" class="service-name" style="flex:2;">
                        <input type="number" placeholder="Trajanje (min)" value="${s.duration}" data-idx="${idx}" class="service-duration" style="width:130px;">
                        <button type="button" class="small danger remove-service" data-idx="${idx}">🗑️</button>
                    `;
                    servicesContainer.appendChild(div);
                });
                document.querySelectorAll('.remove-service').forEach(btn => {
                    btn.onclick = () => {
                        const idx = parseInt(btn.dataset.idx);
                        servicesList.splice(idx, 1);
                        renderServices();
                    };
                });
                document.querySelectorAll('.service-name, .service-duration').forEach(inp => {
                    inp.onchange = (e) => {
                        const idx = parseInt(inp.dataset.idx);
                        if (inp.classList.contains('service-name')) servicesList[idx].name = inp.value;
                        if (inp.classList.contains('service-duration')) servicesList[idx].duration = parseInt(inp.value);
                    };
                });
            }
            renderServices();
            const addServiceBtn = modal.querySelector('#addServiceBtn');
            if (addServiceBtn) {
                addServiceBtn.onclick = () => {
                    servicesList.push({ name: "Nova usluga", duration: 30 });
                    renderServices();
                };
            }

            const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
            const dayNames = ['Ponedjeljak', 'Utorak', 'Srijeda', 'Četvrtak', 'Petak', 'Subota', 'Nedjelja'];
            wh = workingHours;
            if (Object.keys(wh).length === 0) {
                wh = {};
                days.forEach((day, idx) => {
                    if (day === 'sunday') {
                        wh[day] = { enabled: false, intervals: [] };
                    } else if (day === 'saturday') {
                        wh[day] = { enabled: true, intervals: [{ start: "09:00", end: "15:00" }] };
                    } else {
                        wh[day] = { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] };
                    }
                });
            }
            function renderWorkingHours() {
                if (!workingHoursContainer) return;
                workingHoursContainer.innerHTML = '';
                days.forEach((day, idx) => {
                    const dayData = wh[day] || { enabled: true, intervals: [{ start: "09:00", end: "20:00" }] };
                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'day-row';
                    dayDiv.innerHTML = `
                        <div class="day-header">
                            <label style="width:100px;">${dayNames[idx]}</label>
                            <label style="display: flex; align-items: center; gap: 8px;">
                                <input type="checkbox" class="day-enabled" ${dayData.enabled ? 'checked' : ''}> Radni dan
                            </label>
                        </div>
                        <div class="intervals-container" id="intervals-${day}"></div>
                        <button type="button" class="small secondary add-interval" data-day="${day}" style="margin-top: 8px;">+ Dodaj interval</button>
                    `;
                    workingHoursContainer.appendChild(dayDiv);
                    const intervalsContainer = dayDiv.querySelector(`.intervals-container`);
                    const intervals = dayData.intervals || [];
                    function renderIntervals() {
                        intervalsContainer.innerHTML = '';
                        intervals.forEach((interval, iidx) => {
                            const intDiv = document.createElement('div');
                            intDiv.className = 'interval-item';
                            intDiv.innerHTML = `
                                <input type="time" value="${interval.start}" data-day="${day}" data-idx="${iidx}" class="interval-start">
                                <span>-</span>
                                <input type="time" value="${interval.end}" data-day="${day}" data-idx="${iidx}" class="interval-end">
                                <button type="button" class="small danger remove-interval" data-day="${day}" data-idx="${iidx}">🗑️</button>
                            `;
                            intervalsContainer.appendChild(intDiv);
                        });
                        intervalsContainer.querySelectorAll('.interval-start, .interval-end').forEach(inp => {
                            inp.onchange = (e) => {
                                const d = inp.dataset.day;
                                const iidx = parseInt(inp.dataset.idx);
                                if (!wh[d]) wh[d] = { enabled: true, intervals: [] };
                                if (!wh[d].intervals) wh[d].intervals = [];
                                if (inp.classList.contains('interval-start')) wh[d].intervals[iidx].start = inp.value;
                                else wh[d].intervals[iidx].end = inp.value;
                            };
                        });
                        intervalsContainer.querySelectorAll('.remove-interval').forEach(btn => {
                            btn.onclick = () => {
                                const d = btn.dataset.day;
                                const iidx = parseInt(btn.dataset.idx);
                                wh[d].intervals.splice(iidx, 1);
                                renderWorkingHours();
                            };
                        });
                    }
                    renderIntervals();
                    const addBtn = dayDiv.querySelector('.add-interval');
                    if (addBtn) {
                        addBtn.onclick = () => {
                            if (!wh[day]) wh[day] = { enabled: true, intervals: [] };
                            if (!wh[day].intervals) wh[day].intervals = [];
                            wh[day].intervals.push({ start: "09:00", end: "17:00" });
                            renderWorkingHours();
                        };
                    }
                    const enabledChk = dayDiv.querySelector('.day-enabled');
                    if (enabledChk) {
                        enabledChk.onchange = (e) => {
                            wh[day].enabled = e.target.checked;
                            renderWorkingHours();
                        };
                    }
                });
            }
            renderWorkingHours();
        }

        document.getElementById('cancelTenantModal').onclick = () => modal.remove();
        document.getElementById('saveTenantBtn').onclick = async () => {
            const tenantType = modal.querySelector('#tenantType')?.value || type;
            let id = document.getElementById('tenantId').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '_');
            const name = document.getElementById('tenantName').value.trim();
            if (!id) { alert('Unesite ID'); return; }
            if (!name) { alert('Unesite naziv'); return; }

            try {
                if (tenantType === 'cafe') {
                    const existing = await get(ref(db, `cafes/${id}`));
                    if (existing.exists()) { alert('ID već postoji'); return; }
                    await set(ref(db, `cafes/${id}`), { name, created: Date.now(), disabled: false });
                } else if (tenantType === 'salon') {
                    const salonTypeSelect = modal.querySelector('#salonTypeSelect');
                    const selectedSalonType = salonTypeSelect ? salonTypeSelect.value : 'online';
                    if (servicesList) {
                        await set(ref(db, `hairSalons/${id}/services`), servicesList);
                    }
                    if (wh) {
                        await set(ref(db, `hairSalons/${id}/settings/workingHours`), wh);
                    }
                    const intervalVal = parseInt(document.getElementById('slotIntervalSelect').value);
                    await set(ref(db, `hairSalons/${id}/settings`), { name, created: Date.now(), disabled: false, adminPassword: 'salon123', slotInterval: intervalVal, type: selectedSalonType });
                } else if (tenantType === 'catalog') {
                    alert('Katalozi će biti podržani uskoro. Za sada koristi postojeći fishingCatalog.');
                    return;
                }
                await set(ref(db, `klikhub/tenants/${id}`), { type: tenantType, name, createdAt: Date.now(), active: true });
                showToast(`Tenant ${id} dodat/ažuriran`);
                modal.remove();
                loadTenants();
            } catch (error) {
                console.error(error);
                showToast('Greška pri čuvanju: ' + error.message);
            }
        };
    }

    document.getElementById('addTenantBtn').onclick = () => showEditTenantModal(null, 'cafe');

            btn.classList.add('active');
            currentFilter = btn.dataset.type;
            loadTenants();
        };
    });
    document.getElementById('logoutBtn').onclick = () => {
        sessionStorage.removeItem('klikhub_hub_auth');
        location.reload();
    };
